const Q=[
{id:1,cat:`Zákon o zbraních`,q:`Právo nabývat, držet a nosit zbraně je zaručeno:`,a:`Ústavou České republiky, a tedy každému zletilému občanu České republiky.`,b:`Listinou základních práv a svobod a zákonem o zbraních a střelivu, a to příslušníkům ozbrojených sil a bezpečnostních sborů.`,c:`za podmínek stanovených zákonem o zbraních a střelivu.`,correct:"c"},
{id:2,cat:`Zákon o zbraních`,q:`Zákon o zbraních a střelivu:`,a:`upravuje nakládání se zbraněmi a střelivem, provozování střelnic a výkon státní správy v oblasti zbraní.`,b:`zapracovává příslušné předpisy Evropské unie, zároveň navazuje na přímo použitelné předpisy Organizace spojených národů a upravuje zahraniční obchod se strojním zařízením využitelným pro zbrojní výrobu.`,c:`upravuje nakládání se zbraněmi, střelivem a municí a výkon státní správy v oblasti zbraní, střeliva a munice.`,correct:"a"},
{id:3,cat:`Zákon o zbraních`,q:`Vyňatou veřejnoprávní institucí neboli institucí, která je z působnosti zákona o zbraních a střelivu až na drobné výjimky vyňata, pokud sama se zbraněmi nebo střelivem nakládá, nebo pokud zřizuje a provozuje střelnice, je:`,a:`Ministerstvo vnitra, Ministerstvo obrany, ozbrojené síly České republiky, bezpečnostní sbor České republiky nebo Český úřad pro zkoušení zbraní a střeliva.`,b:`Policie České republiky, obecní policie, Armáda České republiky a Poslanecká sněmovna a Senát Parlamentu České republiky.`,c:`zahraniční obchodní společnost se sídlem na území jiného členského státu.`,correct:"a"},
{id:4,cat:`Zákon o zbraních`,q:`Zbraní je pro účely zákona o zbraních a střelivu:`,a:`palná zbraň, plynová zbraň, chladná zbraň a další zařízení nebo přístroj, které jsou zařazeny do některé z kategorií zbraní nebo na které se podle § 9 použijí ustanovení o nakládání se zbraní určité kategorie.`,b:`palná zbraň, plynová zbraň a další zařízení nebo přístroj, které jsou zařazeny do některé z kategorií zbraní nebo na které se podle § 9 použijí ustanovení o nakládání se zbraní určité kategorie.`,c:`pouze střelná zbraň; zákon o zbraních a střelivu se naopak nevztahuje na chladné zbraně, zbraně hromadného ničení a expanzní přístroje.`,correct:"b"},
{id:5,cat:`Zákon o zbraních`,q:`Střelivem jsou pro účely zákona o zbraních a střelivu:`,a:`aktivní komponenty střeliva, náboj, nábojka, střela a munice.`,b:`náboje, které jsou zařazeny do některé z kategorií střeliva, jakož i aktivní a pasivní komponenty střeliva.`,c:`náboje, nábojky a aktivní komponenty střeliva, které jsou zařazeny do některé z kategorií střeliva.`,correct:"c"},
{id:6,cat:`Zákon o zbraních`,q:`Regulovanými součástmi zbraně jsou pro účely zákona o zbraních a střelivu:`,a:`hlavní části zbraně, tj. hlaveň, nadlimitní zásobníky, tělo zbraně a závěr.`,b:`hlavní část zbraně, součást zbraně umožňující samočinnou střelbu, polotovar hlavní části zbraně, tlumič hluku výstřelu, nebo nadlimitní zásobník.`,c:`hlavní část zbraně, součást zbraně umožňující samočinnou střelbu, tlumič hluku výstřelu nebo noktovizor.`,correct:"b"},
{id:7,cat:`Zákon o zbraních`,q:`Tlumič hluku výstřelu je:`,a:`regulovanou součástí zbraně.`,b:`neregulovanou součástí zbraně.`,c:`regulovanou součástí zbraně za předpokladu, že při použití běžného střeliva snižuje hluk výstřelu alespoň o 30 dB.`,correct:"a"},
{id:8,cat:`Zákon o zbraních`,q:`Noktovizní zaměřovač je:`,a:`regulovanou součástí zbraně.`,b:`zákonem o zbraních a střelivu neregulovaným doplňkem zbraně.`,c:`regulovanou součástí zbraně za předpokladu, že zesiluje záření o vlnových délkách alespoň 700 nm.`,correct:"b"},
{id:9,cat:`Zákon o zbraních`,q:`Mezi regulované součásti zbraně podle zákona o zbraních a střelivu nepatří:`,a:`polotovar hlavní části zbraně.`,b:`tlumič hluku výstřelu.`,c:`střelivo.`,correct:"c"},
{id:10,cat:`Zákon o zbraních`,q:`Mezi regulované součásti zbraně podle zákona o zbraních a střelivu nepatří:`,a:`nadlimitní zásobníky.`,b:`lafeta bezzákluzové zbraně.`,c:`součást zbraně umožňující samočinnou střelbu.`,correct:"b"},
{id:11,cat:`Zákon o zbraních`,q:`Mezi regulované součásti zbraně podle zákona o zbraních a střelivu patří:`,a:`sklopné pažby a ramenní opěry zbraní kategorie R1 nebo R2.`,b:`nadlimitní zásobník nebo tzv. bump-fire pažba.`,c:`úsťová zařízení, například tlumiče plamene.`,correct:"b"},
{id:12,cat:`Zákon o zbraních`,q:`Mezi regulované součásti zbraně podle zákona o zbraních a střelivu patří:`,a:`například spoušťové mechanismy samočinných zbraní, polotovary drážkovaných hlavní nebo nadlimitní zásobníky.`,b:`nadlimitní zásobníky, lafety nebo zaměřovací přístroje, o kterých tak stanoví Ministerstvo vnitra nařízením.`,c:`pouze ty součásti zbraní, které jsou zhotovené z kovu nebo alespoň z části obsahují kovové konstrukční prvky.`,correct:"a"},
{id:13,cat:`Zákon o zbraních`,q:`Pro účely zákona o zbraních a střelivu se nakládáním se zbraní má na mysli:`,a:`jakékoli fyzické zacházení se zbraní nebo střelivem, a to včetně zajištění jejich přepravy nebo uložení.`,b:`jakékoli fyzické zacházení se zbraní; zajištění její přepravy nebo uložení se za nakládání se zbraní nepovažuje.`,c:`jakékoli fyzické zacházení se zbraní, střelivem a municí, a to včetně zajištění jejich přepravy.`,correct:"a"},
{id:14,cat:`Zákon o zbraních`,q:`Právní jednání se i bez toho, aby se se zbraní současně zacházelo fyzicky, považuje za nakládání se zbraní pouze tehdy:`,a:`týká-li se toto právní jednání ostré zbraně; naopak právní jednání týkající se výhradně poplašné a signalizační zbraně se za nakládání se zbraní nepovažuje nikdy.`,b:`upravuje-li takový případ zákon o zbraních a střelivu výslovně.`,c:`směřuje-li takové právní jednání orgánu veřejné moci.`,correct:"b"},
{id:15,cat:`Zákon o zbraních`,q:`Pro účely zákona o zbraních a střelivu je nošením zbraně způsob nakládání se zbraní, při kterém ji fyzická osoba:`,a:`má na místě veřejnosti přístupném při sobě skrytou, bez ohledu na to, je-li daná zbraň nabitá nebo nikoli.`,b:`má při sobě viditelně nabitou.`,c:`má na místě veřejnosti přístupném při sobě nabitou nebo viditelně.`,correct:"c"},
{id:16,cat:`Zákon o zbraních`,q:`Podle zákona o zbraních a střelivu osoba, která má při sobě na místě veřejnosti přístupném nenabitou dlouhou zbraň uloženou v uzavřeném přepravním pouzdře:`,a:`nosí tuto zbraň, pokud lze podle tvaru pouzdra usuzovat na to, že se v něm nachází zbraň.`,b:`tuto zbraň nenosí, pokud u sebe současně taková osoba nemá střelivo, které by bylo možné použít pro nabití dané zbraně.`,c:`tuto zbraň nenosí, pokud není daná zbraň viditelná (např. pouzdro není průhledné nebo část zbraně nepřesahuje mimo přepravní pouzdro).`,correct:"c"},
{id:17,cat:`Zákon o zbraních`,q:`Pro účely zákona o zbraních a střelivu je sběratelskou činností:`,a:`praktické testování zbraní pro historické, kulturní, vědecké, technické, vzdělávací nebo památkové účely a publikace zjištěných výsledků, a to včetně jejich prezentace v audiovizuální formě.`,b:`činnost spočívající ve shromažďování a uchovávání zbraní, jejich hlavních částí nebo střeliva pro historické, kulturní, vědecké, technické, vzdělávací nebo památkové účely.`,c:`jakékoli nakládání se zbraněmi, jejich hlavními částmi, nadlimitními zásobníky, tlumiči hluku výstřelu nebo střelivem v množství, které přesahuje kvantitativní limity stanovené nařízením vlády.`,correct:"b"},
{id:18,cat:`Zákon o zbraních`,q:`Zbraně se podle zákona o zbraních a střelivu dělí na zbraně kategorie:`,a:`R1, R2, R3, R4, R-I, VO a BO.`,b:`R1, R2, R3, R4, PO a NO.`,c:`R1 až R6.`,correct:"b"},
{id:19,cat:`Zákon o zbraních`,q:`Zbraně kategorie R1, R2, R3 a R4:`,a:`podléhají registraci, přičemž zbraně kategorie R1 a R2 jsou zakázanými zbraněmi.`,b:`nepodléhají registraci, pouze notifikaci, přičemž zbraně kategorie R1 jsou zakázanými zbraněmi.`,c:`podléhají registraci, přičemž zbraně kategorie R1 a R2 jsou z povinnosti registrace vyňaty.`,correct:"a"},
{id:20,cat:`Zákon o zbraních`,q:`Zakázanými zbraněmi jsou zbraně kategorie:`,a:`K2 a K9.`,b:`R1 a R2.`,c:`PO a NO.`,correct:"b"},
{id:21,cat:`Zákon o zbraních`,q:`Střelivo se dělí na střelivo kategorie:`,a:`S0, S1, S2, S3 a S4.`,b:`S1, S2, S3 a S4.`,c:`S1, PO a NO.`,correct:"b"},
{id:22,cat:`Zákon o zbraních`,q:`Zakázaným střelivem je střelivo:`,a:`kategorie S1, pokud obsahuje výbušnou látku nebo tzv. stopovku.`,b:`kategorie S1 a S2.`,c:`určené k vojenským účelům.`,correct:"b"},
{id:23,cat:`Zákon o zbraních`,q:`Kategorizace zbraní a střeliva je mimo jiné ovládána zásadou, podle které:`,a:`zbrani nebo střelivu, kterým lze na základě konstrukčních vlastností nebo funkčního principu přiřadit různé kategorie, se přiřadí kategorie, která je z těchto kategorií nejpřísněji regulována; to neplatí v případě zbraní poplašných a signalizačních.`,b:`zbrani nebo střelivu, které jsou upraveny tak, aby jimi byl způsoben závažnější následek, se přiřadí kategorie o jeden stupeň přísnější, než by tomu bylo u takto neupravené zbraně; znehodnocení zbraně má naopak za následek přiřazení kategorie o jeden stupeň mírnější.`,c:`zbrani nebo střelivu, kterým lze na základě konstrukčních vlastností nebo funkčního principu přiřadit různé kategorie, se přiřadí kategorie, která je z těchto kategorií nejpřísněji regulována; to neplatí v případě zbraní historických nebo neaktivních.`,correct:"c"},
{id:24,cat:`Zákon o zbraních`,q:`Kategorizace zbraní je mimo jiné ovládána zásadou, podle které:`,a:`pokud není určitá palná zbraň uvedena v příloze č. 2 zákona o zbraních a střelivu, zařadí se taková palná zbraň do stejné kategorie jako zbraň uvedená v příloze č. 2 zákona o zbraních a střelivu, které je svou konstrukcí, funkcí nebo účelem a účinkem nejbližší.`,b:`pokud není určitá palná nebo plynová zbraň výslovně uvedena v příloze č. 2 zákona o zbraních a střelivu, rozhodne o zařazení takové zbraně do kategorie Český úřad pro zkoušení zbraní a střeliva; do doby nabytí právní moci jeho rozhodnutí je daná zbraň z preventivních důvodů předběžně zařazena do kategorie R1.`,c:`sečná zbraň, na kterou se zákon o zbraních a střelivu nevztahuje, je zbraní stejné kategorie jako bodná zbraň uvedená v příloze č. 2 k tomuto zákonu, které je svou konstrukcí nejbližší.`,correct:"a"},
{id:25,cat:`Zákon o zbraních`,q:`Mezi technické podmínky zařazení zbraně do kategorie PO a NO patří mimo jiné podmínka, podle které:`,a:`zbraň, která by jinak byla na základě konstrukčních vlastností nebo funkčního principu považována za zbraň kategorie PO nebo NO, ale která vznikla nevratnou úpravou zbraně podléhající registraci, je zbraní stejné kategorie jako zbraň podléhající registraci, z níž byla upravena; to neplatí v případě, že úsťová energie střely vystřelené z takto upravené zbraně nepřesahuje 50 J.`,b:`zbraň, která by jinak byla na základě konstrukčních vlastností nebo funkčního principu určena pro použití střeliva kategorie S1 nebo S2, ale která vznikla nevratnou úpravou zbraně podléhající registraci, je zbraní stejné kategorie jako zbraň podléhající oznámení, z níž byla upravena; to neplatí v případě zbraní určených pro použití střeliva obsahujícího aktivní komponenty střeliva.`,c:`zbraň, která by jinak byla na základě konstrukčních vlastností nebo funkčního principu považována za zbraň kategorie PO nebo NO, ale která vznikla nevratnou úpravou zbraně podléhající registraci, je zbraní stejné kategorie jako zbraň podléhající registraci, z níž byla upravena; to neplatí v případě znehodnocené zbraně a řezu zbraně, které odpovídají požadavkům zákona o zbraních a střelivu.`,correct:"c"},
{id:26,cat:`Zákon o zbraních`,q:`Zbraň, která by byla na základě svých konstrukčních vlastností nebo funkčního principu považována za zbraň kategorie PO nebo NO, ale která nesplňuje technické požadavky na výrobní provedení stanovené nařízením vlády č. 187/2025 Sb.:`,a:`je zbraní podléhající registraci a přiřadí se jí konkrétní kategorie na základě jejích konstrukčních vlastností nebo funkčního principu.`,b:`je zakázanou zbraní, to neplatí v případě zbraní určených pouze pro střelbu nábojkami nebo cvičným střelivem.`,c:`musí být předložena krajskému ředitelství policie k provedení úředního zničení regulovaných součástí zbraně, které neodpovídají technickým požadavkům stanoveným nařízením vlády, a to do 10 pracovních dnů ode dne doručení výzvy krajského ředitelství policie osobě, která je oprávněna s danou zbraní nakládat.`,correct:"a"},
{id:27,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se zbraní kategorie R1 je za podmínek stanovených zákonem o zbraních a střelivu mimo jiné:`,a:`držitel zbrojní licence skupiny ZL1, kterému byla pro nakládání s každou takovou zbraní vydána výjimka kategorie R1, držitel obecného zbrojního oprávnění nebo držitel zapsané autorizace.`,b:`držitel zbrojní licence skupiny ZL1, držitel zbrojní licence skupiny ZL2, kterému byla pro nakládání s každou takovou zbraní vydána výjimka kategorie R1, nebo osoba oprávněná uskutečnit přeshraniční přemístění takové zbraně.`,c:`držitel zbrojní licence skupiny ZL1, držitel zbrojní licence skupiny ZL2, kterému byla pro nakládání s každou takovou zbraní vydána výjimka kategorie R1, nebo držitel mimořádné dispenzace, kterou může v případech hodných zvláštního zřetele vydat Ministerstvo vnitra kterékoli zletilé a plně svéprávné fyzické osobě, pokud taková fyzická osoba vykonala mimořádný čin v oblasti vnitřního pořádku nebo bezpečnosti.`,correct:"b"},
{id:28,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se zbraní kategorie R1 za podmínek stanovených zákonem o zbraních není:`,a:`držitel zbrojní licence skupiny ZL1.`,b:`držitel zbrojního oprávnění, a to s výjimkou určitých specifických případů, na které se vztahují přechodná ustanovení zákona o zbraních a střelivu.`,c:`držitel zbrojní licence skupiny ZL2, kterému byla pro nakládání s každou takovou zbraní vydána výjimka kategorie R1.`,correct:"b"},
{id:29,cat:`Zákon o zbraních`,q:`Držitel zbrojního oprávnění je za standardních podmínek stanovených zákonem o zbraních a střelivu oprávněn nakládat se zbraněmi:`,a:`R4, R3, R2 a R1; se zbraněmi kategorie R4 a R3 je tento držitel oprávněn nakládat jen v případě, že mu byla k tomuto nakládání vydána příslušná výjimka nebo povolení.`,b:`R2, R3 a R4; se zbraněmi kategorie R2 a R3 je tento držitel oprávněn nakládat jen v případě, že mu byla k tomuto nakládání vydána příslušná výjimka nebo povolení.`,c:`R2, R3 a R4, avšak jen v případě, že mu byla k nakládání s každou takovou zbraní vydána příslušná individuální licence.`,correct:"b"},
{id:30,cat:`Zákon o zbraních`,q:`Výjimka je vydávána pro zbraně a střelivo kategorií:`,a:`R1, R2, R3, R4, S1 a S2.`,b:`R1, R2, S1 a S2.`,c:`R1, R2 a munici kategorie M1.`,correct:"b"},
{id:31,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se zbraní kategorie R2 je za podmínek stanovených zákonem o zbraních a střelivu mimo jiné:`,a:`držitel zbrojní licence skupiny ZL1, držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, kterému byla vydána pro nakládání s každou takovou zbraní výjimka kategorie R2 a osoba oprávněná uskutečnit přeshraniční přemístění takové zbraně.`,b:`držitel zbrojní licence skupiny ZL1 nebo ZL2, kterému byla pro nakládání s každou takovou zbraní vydána výjimka kategorie R1, a držitel rozšířeného zbrojního oprávnění.`,c:`držitel zbrojní licence skupiny ZL1, držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, kterému bylo vydáno pro nakládání s každou takovou zbraní povolení kategorie R2 a držitel zapsané autorizace.`,correct:"a"},
{id:32,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se zbraní kategorie R2 za podmínek stanovených zákonem o zbraních a střelivu není:`,a:`osoba oprávněná uskutečnit přeshraniční přemístění takové zbraně.`,b:`držitel zbrojní licence skupiny ZL2, kterému byla vydána pro nakládání s každou takovou zbraní výjimka kategorie R2.`,c:`držitel zapsané autorizace.`,correct:"c"},
{id:33,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se zbraní kategorie R3 je za podmínek stanovených zákonem o zbraních a střelivu:`,a:`držitel zbrojní licence skupiny ZL1, kterému byla vydána pro nakládání s každou takovou zbraní výjimka kategorie R3, a osoba, která požádala zastupitelský úřad České republiky o vydání oprávnění uskutečnit přeshraniční přemístění takové zbraně.`,b:`držitel zbrojní licence skupiny ZL1, držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, kterému bylo vydáno pro nakládání s každou takovou zbraní povolení kategorie R3 a osoba oprávněná uskutečnit přeshraniční přemístění takové zbraně.`,c:`držitel zbrojního oprávnění, kterému bylo vydáno povolení kategorie R3, držitel koncese pro nakládání s bezpečnostním materiálem, kterému byla pro ten účel vydány výjimka, provozovatel střelnice a dále pak osoba oprávněná cestovat v rámci tranzitu přes území České republiky se zbraněmi podléhajícími registraci, avšak nejvýše v počtu 3 kusů při jedné tranzitní cestě.`,correct:"b"},
{id:34,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se zbraní kategorie R4 je za podmínek stanovených zákonem o zbraních a střelivu mimo jiné:`,a:`držitel zbrojní licence, držitel zbrojního oprávnění, osoba oprávněná uskutečnit přeshraniční přemístění takové zbraně.`,b:`držitel zbrojního oprávnění, osoba oprávněná uskutečnit přeshraniční přemístění takové zbraně a držitel zapsané autorizace.`,c:`držitel zbrojního oprávnění nebo osoba oprávněná k výkonu práva myslivosti podle zákona č. 449/2001 Sb., o myslivosti. ve znění pozdějších předpisů.`,correct:"a"},
{id:35,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se zbraní kategorie PO je za podmínek stanovených zákonem o zbraních a střelivu:`,a:`držitel autorizace k nakládání se zbraní kategorie PO zapsané do centrálního registru zbraní (zapsaná autorizace) nebo držitel zbrojní licence; držitel zbrojního oprávnění není bez získání zapsané autorizace nakládat se zbraní kategorie PO oprávněn.`,b:`držitel autorizace k nakládání se zbraní kategorie PO zapsané do centrálního registru zbraní, držitel zbrojní licence, držitel zbrojního oprávnění, osoba oprávněná uskutečnit přeshraniční přemístění takové zbraně, nebo nevyňatá veřejnoprávní instituce.`,c:`zletilá fyzická osoba, která má místo pobytu na území České republiky nebo jiného členského státu Evropské unie, pokud je plně svéprávnou právnickou osobou.`,correct:"b"},
{id:36,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se zbraní kategorie NO je za podmínek stanovených zákonem o zbraních a střelivu:`,a:`plně svéprávná zletilá fyzická osoba, která má místo pobytu na území České republiky, právnická osoba se sídlem nebo odštěpným závodem na území České republiky, držitel zbrojní licence, držitel zbrojního oprávnění, osoba oprávněná uskutečnit přeshraniční přemístění takové zbraně, nebo nevyňatá veřejnoprávní instituce.`,b:`plně svéprávná zletilá fyzická osoba, která má místo pobytu na území České republiky, právnická osoba se sídlem nebo odštěpným závodem na území České republiky a držitel zbrojního oprávnění; se zbraní kategorie NO je mohou tyto osoby ovšem střílet pouze na schválené střelnici, nestanoví-li Český úřad pro zkoušení zbraní a střeliva v opatření obecné povahy jinak.`,c:`pouze plně svéprávná zletilá fyzická osoba, která je občanem České republiky, právnická osoba se sídlem nebo odštěpným závodem na území České republiky, držitel zbrojní licence a držitel zbrojního oprávnění.`,correct:"a"},
{id:37,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se střelivem kategorie S1 je za podmínek stanovených zákonem o zbraních a střelivu mimo jiné:`,a:`držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, a to v rámci oprávnění vyplývajících z výjimky kategorie R2 nebo výjimky pro nadlimitní zásobníky.`,b:`držitel zbrojního oprávnění, který nakládá se zbraní určenou pro použití takového střeliva.`,c:`držitel zbrojní licence skupiny ZL2, kterému byla pro nakládání s určitým počtem kusů takového střeliva vydána výjimka kategorie S1.`,correct:"c"},
{id:38,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se střelivem kategorie S2 je za podmínek stanovených zákonem o zbraních a střelivu mimo jiné:`,a:`držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, a to v rámci oprávnění vyplývajících z výjimky kategorie R2 nebo výjimky pro nadlimitní zásobníky.`,b:`osoba, které byla udělena registrace kategorie S2 na základě započitatelné praxe.`,c:`držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, kterému byla vydána výjimka kategorie S2.`,correct:"c"},
{id:39,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se střelivem kategorie S3 je za podmínek stanovených zákonem o zbraních a střelivu mimo jiné:`,a:`každá právnická osoba se sídlem nebo odštěpným závodem na území Evropské unie.`,b:`držitel zbrojního oprávnění.`,c:`držitel zapsané autorizace podle zákona o zbraních a střelivu.`,correct:"b"},
{id:40,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se střelivem kategorie S4 je za podmínek stanovených zákonem o zbraních a střelivu mimo jiné:`,a:`plně svéprávná zletilá fyzická osoba, která má místo pobytu na území České republiky.`,b:`pouze plně svéprávná zletilá fyzická osoba, která je občanem České republiky.`,c:`ve výjimečných případech také osoba mladší 15 let, které byla přenechána zbraň kategorie R4 určená pro použití takového střeliva a která má místo pobytu na území České republiky.`,correct:"a"},
{id:41,cat:`Zákon o zbraních`,q:`Osoba, která v souladu se zákonem o zbraních a střelivu nakládá se zbraní kategorie PO nebo NO:`,a:`je oprávněna nakládat i s jakýmkoli rážově příslušným střelivem pro takovou zbraň.`,b:`je oprávněna nakládat se střelivem kategorie S3, které je pro použití v takové zbrani určeno, a se střelivem kategorie S4.`,c:`je oprávněna nakládat pouze s aktivními komponenty střeliva pro předovky, zbraně kategorie PO nebo NO nejsou určeny pro použití jednotných nábojů.`,correct:"b"},
{id:42,cat:`Zákon o zbraních`,q:`Osobou oprávněnou nakládat se střelivem kategorie S4 je za podmínek stanovených zákonem o zbraních a střelivu mimo jiné:`,a:`držitel zbrojního oprávnění, a to i pokud je mladší 18 let.`,b:`držitel zbrojního oprávnění, avšak musí být starší 18 let.`,c:`plně svéprávná zletilá fyzická osoba, která má místo pobytu na území České republiky a která současně nesmí být držitelem zbrojního oprávnění, neboť držitel zbrojního oprávnění je oprávněn nakládat v souladu se zákonem o zbraních a střelivu pouze se střelivem kategorie S2 a S3.`,correct:"a"},
{id:43,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení:`,a:`tlumič hluku výstřelu je zakázaným doplňkem zbraně a nakládat s ním může pouze držitel zbrojního oprávnění, kterému byla vydána výjimka příslušné kategorie.`,b:`na nakládání s tlumičem hluku výstřelu se zákon o zbraních a střelivu nevztahuje.`,c:`na nakládání s tlumičem hluku výstřelu se použijí ustanovení o nakládání se zbraní kategorie R4.`,correct:"c"},
{id:44,cat:`Zákon o zbraních`,q:`Na nakládání s hlavní částí zbraně jako se samostatným předmětem:`,a:`se použijí ustanovení o nakládání se zbraní, jejíž taková hlavní část zbraně je nebo má být součástí.`,b:`se obecně vztahují ustanovení o nakládání se zbraní kategorie R4.`,c:`se vztahují pouze ustanovení o označování zbraní a jejich hlavních částí identifikačními údaji zbraně; jakmile je hlavní část zbraně v souladu se zákonem označena a ověřena Státní zkušebnou, může s ní nakládat každá zletilá a plně svéprávná fyzická osoba nebo právnická osoba se sídlem na území České republiky.`,correct:"a"},
{id:45,cat:`Zákon o zbraních`,q:`Se součástí zbraně umožňující samočinnou střelbu smí nakládat pouze:`,a:`osoba oprávněná nakládat se samočinnou zbraní příslušné kategorie.`,b:`držitel výjimky kategorie R1.`,c:`příslušník ozbrojených sil nebo bezpečnostního sboru, který absolvoval výcvik pro odpovídající služební zbraň nebo je určeným zbrojířem.`,correct:"a"},
{id:46,cat:`Zákon o zbraních`,q:`Se součástí zbraně umožňující samočinnou střelbu smí nakládat pouze osoba oprávněná nakládat se samočinnou zbraní:`,a:`kategorie R1.`,b:`příslušné kategorie; pokud jde například o samočinnou akustickou nebo salutní zbraň kategorie R2, je s příslušnou součástí zbraně umožňující samočinnou střelbu oprávněn nakládat i oprávněný držitel takové zbraně.`,c:`v rámci činnosti držitele zbrojní licence.`,correct:"b"},
{id:47,cat:`Zákon o zbraních`,q:`S polotovarem hlavní části zbraně určeným pro zhotovení hlavní části zbraně podléhající registraci smí nakládat pouze:`,a:`držitel zbrojního oprávnění nebo zbrojní licence anebo osoba oprávněná provést přeshraniční přemístění takového polotovaru.`,b:`držitel zbrojní licence nebo osoba oprávněná provést přeshraniční přemístění takového polotovaru.`,c:`pouze držitel zbraně, u které má dojít k výměně hlavní části zbraně, a daný polotovar je určen pro zhotovení takové hlavní části zbraně.`,correct:"b"},
{id:48,cat:`Zákon o zbraních`,q:`Není-li zákonem o zbraních a střelivu stanoveno jinak, obecně platí, že na nakládání s nadlimitním zásobníkem se přiměřeně použijí ustanovení zákona o:`,a:`střelivu kategorie S1.`,b:`zbrani kategorie R2.`,c:`střelivu kategorie S2.`,correct:"c"},
{id:49,cat:`Zákon o zbraních`,q:`Pro podnikání v oblasti zbraní a střeliva zákon o zbraních a střelivu mj. vyžaduje:`,a:`aby budoucí podnikatel nejdříve získal všechny jednotlivé výjimky a povolení pro všechny kategorie zbraní a střeliva.`,b:`aby byl podnikatel držitelem zbrojní licence skupiny ZL1, pokud je předmětem podnikání například nákup, prodej nebo výroba zbraní podléhajících registraci, zbraní kategorie PO nebo se střeliva kategorie S1, S2 nebo S3.`,c:`aby podnikatel byl podnikatel držitelem zbrojní licence skupiny ZL1 nebo v případě fyzických osob skupiny ZL3.`,correct:"b"},
{id:50,cat:`Zákon o zbraních`,q:`Pro podnikání v oblasti zbraní a střeliva zákon o zbraních a střelivu mj. vyžaduje:`,a:`aby byl podnikatel držitelem zbrojního oprávnění, pokud má být předmětem podnikání přeprava zbraní a střeliva.`,b:`souhlas Českého úřadu pro zkoušení zbraní a střeliva s vnitřním předpisem podnikatele; tento souhlas je vydáván mimo správní řízení a zákon nepřipouští uplatnění opravných prostředků.`,c:`aby byl podnikatel držitelem zbrojní licence, pokud je předmětem podnikání například nákup, prodej nebo výroba zbraní kategorie NO nebo se střeliva kategorie S4.`,correct:"c"},
{id:51,cat:`Zákon o zbraních`,q:`Se samonabíjecí palnou zbraní určenou pro jednotné střelivo se středovým zápalem, do které je vložen nadlimitní zásobník, je držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2 oprávněn nakládat:`,a:`pouze po dohodě s krajským ředitelstvím policie.`,b:`na základě výjimky kategorie R2 nebo výjimky kategorie S2 vydané pro nadlimitní zásobníky.`,c:`v rámci činnosti držitele zbrojní licence; to neplatí, jde-li o použití nadlimitního zásobníku ve zbrani kategorie R2, která byla nevratně upravena pro použití výhradně cvičného střeliva.`,correct:"b"},
{id:52,cat:`Zákon o zbraních`,q:`Při vložení nadlimitního zásobníku do samonabíjecí palné zbraně pro jednotné střelivo se středovým zápalem:`,a:`dochází ke změně kategorie takové zbraně na kategorii R2; změna kategorie zbraně se považuje za nevratnou úpravu zbraně a musí být do 10 pracovních dnů oznámena místně příslušnému krajskému ředitelství policie.`,b:`musí být osoba, která takto s danou samonabíjecí zbraní nakládá, držitelem výjimky kategorie R2 nebo výjimky kategorie S2 vydané pro nadlimitní zásobníky.`,c:`dochází ke změně kategorie zbraně na kategorii R2, a to s výjimkou použití takové samonabíjecí zbraně s vloženým nadlimitním zásobníkem na schválené střelnici.`,correct:"b"},
{id:53,cat:`Zákon o zbraních`,q:`Nabývání zbraní podléhajících registraci, zbraní kategorie PO, palných zbraní kategorie NO a střeliva prostřednictvím spotřebitelských smluv uzavřených na dálku je:`,a:`dovoleno za podmínky, je-li spotřebitelská smlouva uzavřena držitelem zbrojního oprávnění starším 18 let.`,b:`dovoleno, je ale vyloučena možnost odstoupení od smlouvy ve lhůtě 14 dnů.`,c:`zakázáno.`,correct:"c"},
{id:54,cat:`Zákon o zbraních`,q:`Prostřednictvím spotřebitelských smluv uzavřených na dálku je zakázáno nabývání:`,a:`zbraní podléhajících registraci, zbraní kategorie PO, palných zbraní kategorie NO a střeliva.`,b:`zbraní podléhajících registraci a zbraní kategorie PO; nabývání zbraní kategorie NO a střeliva je dovoleno.`,c:`zbraní podléhajících registraci; nabývání střeliva s výjimkou aktivních komponentů střeliva je dovoleno.`,correct:"a"},
{id:55,cat:`Zákon o zbraních`,q:`Každý je povinen předložit na výzvu Policie České republiky:`,a:`zbraň, se kterou nakládá, ne však střelivo.`,b:`zbraň nebo střelivo, se kterými nakládá, ne však s nimi související doklady a listiny, neboť fyzické dokumenty byly v oblasti zbraní a střeliva již zrušeny.`,c:`zbraň nebo střelivo, se kterými nakládá, popřípadě související doklady a listiny.`,correct:"c"},
{id:56,cat:`Zákon o zbraních`,q:`Každý je povinen předložit na výzvu Ministerstva obrany:`,a:`zbraň zvláště účinnou, zákeřnou zbraň, samočinnou palnou zbraň a samonabíjecí palnou zbraň, jakož i příslušné střelivo, nadlimitní zásobníky a související doklady a listiny.`,b:`zbraň zvláště účinnou, na kterou se vztahuje mezinárodní kontrolní režim, jakož i související doklady a listiny.`,c:`zbraň nebo střelivo, se kterými nakládá, popřípadě související doklady a listiny.`,correct:"b"},
{id:57,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení:`,a:`každý je povinen předložit na výzvu Ministerstva vnitra zbraň nebo střelivo, se kterými nakládá, popřípadě související doklady a listiny.`,b:`každý je povinen předložit na výzvu Ministerstva vnitra zbraň, se kterou nakládá, popřípadě související doklady a listiny, ne však střelivo.`,c:`Ministerstvo vnitra není oprávněno požadovat předložení zbraně nebo střeliva, se kterými nakládá, toto oprávnění má pouze Policie České republiky a v některých případech také Ministerstvo obrany.`,correct:"c"},
{id:58,cat:`Zákon o zbraních`,q:`Každý je povinen neprodleně ohlásit Policii České republiky ztrátu nebo odcizení zbraně, jde- li o zbraň:`,a:`podléhající registraci nebo zbraň kategorie PO.`,b:`podléhající registraci, zbraň kategorie PO nebo zbraň kategorie NO.`,c:`podléhající registraci, zbraň kategorie PO, střelivo a související doklady a listiny.`,correct:"a"},
{id:59,cat:`Zákon o zbraních`,q:`Každý je povinen neprodleně ohlásit:`,a:`Ministerstvu obrany použití zbraně k ostré střelbě v krajní nouzi nebo nutné obraně.`,b:`Policii České republiky použití zbraně k ostré střelbě v krajní nouzi nebo nutné obraně.`,c:`místně příslušné obecní policii použití zbraně k ostré střelbě v krajní nouzi nebo nutné obraně.`,correct:"b"},
{id:60,cat:`Zákon o zbraních`,q:`Použití zbraně k ostré střelbě je každý povinen ohlásit Policii České republiky:`,a:`při jakémkoliv použití zbraně, např. i na střelnici.`,b:`pouze po úspěšném použití zbraně v nutné obraně.`,c:`došlo-li k použití zbraně v krajní nouzi nebo nutné obraně.`,correct:"c"},
{id:61,cat:`Zákon o zbraních`,q:`Každý je povinen střílet ze zbraně, se kterou nakládá, pouze:`,a:`v místech, kde jiné osobě nehrozí újma na životě, zdraví nebo nehrozí-li dle trestního zákoníku větší škoda na majetku.`,b:`v místech, kde je k tomu oprávněn podle zákona o zbraních a střelivu nebo podle jiného právního předpisu.`,c:`na střelnicích, jejichž provoz byl povolen podle zákona o zbraních a střelivu nebo podle jiného právního předpisu.`,correct:"b"},
{id:62,cat:`Zákon o zbraních`,q:`Každý je podle zákon o zbraních a střelivu povinen uposlechnout na místě konání akce, při které se nakládá se zbraněmi a střelivem:`,a:`pokyny pořadatele, které směřují k zajištění plánovaného průběhu takové akce.`,b:`pokyny držitele zbrojního oprávnění, pokud se prokáže zbrojním listem, který není starší než 10 pracovních dnů.`,c:`pokyny pořadatele, které směřují k zajištění bezpečného nakládání se zbraněmi a střelivem.`,correct:"c"},
{id:63,cat:`Zákon o zbraních`,q:`Každý je povinen, pokud se pohybuje na střelnici:`,a:`dodržovat provozní řád střelnice a uposlechnout pokyny správce střelnice, které směřují k zajištění bezpečného nakládání se zbraněmi a střelivem.`,b:`uposlechnout pokyny pravidelných návštěvníků střelnice, kteří mají dlouholetou praxi a místní znalost.`,c:`dodržovat technický řád střelnice a uposlechnout pokyny provozovatele střelnice; tyto pokyny mohou být předávány v písemné podobě, a to zejména tehdy, pokud je provozovatelem střelnice právnická osoba.`,correct:"a"},
{id:64,cat:`Zákon o zbraních`,q:`Každý je povinen podrobit se při nakládání se zbraní nebo střelivem na výzvu policisty vyšetření podle zákona o ochraně zdraví před škodlivými účinky návykových látek ke zjištění, zda:`,a:`není ovlivněn alkoholem nebo jinou návykovou látkou, a to v míře vylučující schopnost bezpečně nakládat se zbraní nebo střelivem, přičemž zákon stanovuje hranici, od které se již má za to, že držitel zbraně s ní není schopen bezpečně nakládat, na úrovni 0,5 ‰ alkoholu v krvi, resp. na úrovni 15 mg THC na mililitr krve v případě jiných návykových látek.`,b:`není ovlivněn alkoholem nebo jinou návykovou látkou.`,c:`není ovlivněn alkoholem, léky nebo jinou nepredikovatelnou okolností, která má za následek ztrátu schopnosti bezpečně nakládat se zbraní nebo střelivem.`,correct:"b"},
{id:65,cat:`Zákon o zbraních`,q:`Držitel evropského zbrojního pasu je povinen:`,a:`ohlásit bez zbytečného odkladu jeho ztrátu nebo odcizení krajskému ředitelství policie.`,b:`předložit jej bez vyzvání při kontrole ze strany Policie České republiky.`,c:`požádat v případě ztráty nebo odcizení evropského zbrojního pasu krajské ředitelství policie o vydání jeho duplikátu.`,correct:"a"},
{id:66,cat:`Zákon o zbraních`,q:`Na hraničním přechodu:`,a:`je každý povinen oznámit Policii České republiky, že cestuje se zbraní nebo se střelivem.`,b:`musí být zbraň kategorie R1, R2, R3, R4 a PO přepravována viditelně tak, aby ji mohl zaznamenat automatizovaný systém kontroly hranic.`,c:`je každý držitel zbrojního oprávnění povinen předložit Policii České republiky Evropský zbrojní pas, který je v současnosti jediným listinným (fyzickým) dokladem, který je v České republice v oblasti zbraní a střeliva vydáván.`,correct:"a"},
{id:67,cat:`Zákon o zbraních`,q:`Nikdo nesmí nakládat se zbraní nebo střelivem:`,a:`pokud k tomu není oprávněn.`,b:`pokud k tomu není vyškolen a vycvičen.`,c:`jejichž konstrukční nebo funkční princip mu není znám.`,correct:"a"},
{id:68,cat:`Zákon o zbraních`,q:`Nikdo nesmí:`,a:`umožnit nakládat se zbraní nebo střelivem osobě, která k tomu není oprávněna; to neplatí v případě přenechání zbraně kategorie R1 za účelem zážitkové střelby.`,b:`převést zbraň nebo střelivo nebo jinak s nimi umožnit nakládat osobě, která k tomu není oprávněna.`,c:`umožnit nakládat se zbraní nebo střelivem osobě, která k tomu není oprávněna, a to s výjimkou přenechání takové zbraně nebo střeliva na dobu kratší než 30 dnů v kalendářním roce.`,correct:"b"},
{id:69,cat:`Zákon o zbraních`,q:`Nikdo nesmí dodat na trh zbraň nebo střelivo:`,a:`jako zbraň nebo střelivo jiné kategorie, než která odpovídá jejich konstrukčním vlastnostem nebo funkčnímu principu.`,b:`v době vyhlášeného krizového stavu.`,c:`jiné kategorie, než která odpovídá jejich konstrukčním vlastnostem nebo funkčnímu principu; to neplatí pro držitele zbrojní licence kategorie ZL1.`,correct:"a"},
{id:70,cat:`Zákon o zbraních`,q:`Nikdo nesmí:`,a:`nakládat se zbraní nebo střelivem, aniž by k tomu byla vyškolena certifikovaným instruktorem.`,b:`nakládat se zbraní nebo střelivem, tak že ohrozí život, zdraví nebo majetek jiné osoby, vůči které v mezích zákonných limitů postupuje v rámci nutné obrany nebo krajní nouze.`,c:`nakládat se zbraní nebo střelivem tak, že ohrozí život, zdraví nebo majetek jiné osoby tím, že nedbá zvýšené opatrnosti odpovídající povaze a stavu zbraně nebo střeliva.`,correct:"c"},
{id:71,cat:`Zákon o zbraních`,q:`Nikdo nesmí:`,a:`při nošení nebo jiné manipulaci se zbraní na místě veřejnosti přístupném požívat alkoholické nápoje nebo užívat jiné návykové látky, pokud jeho schopnost bezpečně nakládat se zbraní není současně kompenzována užitím adekvátních stimulujících léků.`,b:`nakládat se zbraní nebo střelivem tak, že ohrozí život, zdraví nebo majetek jiné osoby tím, že manipuluje se zbraní nebo střelivem pod vlivem alkoholu nebo jiné návykové látky anebo je-li jeho schopnost bezpečně nakládat se zbraní nebo střelivem snížena užitím léků nebo v důsledku jeho zdravotního stavu.`,c:`nakládat se zbraní nebo střelivem tak, že dbá zvýšené opatrnosti při zacházení se zbraní, dodržuje provozní řád střelnice a pokyny správce střelnice směřující k zajištění bezpečného nakládání se zbraní a střelivem; alkoholické nápoje je dovoleno požívat až po ukončení nakládání se zbraní nebo střelivem, užívat návykové látky je naproti tomu zákonem o zbraních a střelivu zakázáno před i po nakládání se zbraní nebo střelivem.`,correct:"b"},
{id:72,cat:`Zákon o zbraních`,q:`Nikdo nesmí střílet nebo nosit zbraň:`,a:`pokud je pod vlivem alkoholu nebo jiné návykové látky a jeho schopnost bezpečně nakládat se zbraní nebo střelivem je v důsledku toho významně snížena; hodnoty přípustného ovlivnění alkoholem nebo jinou návykovou látkou (toleranční limity) stanovuje prováděcí právní předpis.`,b:`pod vlivem alkoholu nebo jiné návykové látky anebo je-li jeho schopnost bezpečně nakládat se zbraní nebo střelivem snížena užitím léků nebo v důsledku jeho zdravotního stavu.`,c:`pod vlivem alkoholu nebo jiné návykové látky anebo užívá-li dlouhodobě léky nebo jiné humánní léčivé přípravky, anebo pokud ode dne nitrosvalové aplikace mRNA vakcíny proti infekčním onemocněním neuběhlo alespoň 10 pracovních dnů.`,correct:"b"},
{id:73,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení:`,a:`nikdo nesmí bez povolení provozovat střelnici, jejíž provozování podléhá povolení podle zákona o zbraních a střelivu.`,b:`nikdo nesmí zřídit střelnici bez předchozího souhlasu krajského úřadu místně příslušného podle místa pobytu nebo sídla provozovatele takové střelnice.`,c:`nikdo nesmí bez povolení provozovat střelnici; to neplatí v případě příležitostných střelnic, které nejsou podle provozního řádu využívány častěji než 26 dnů v kalendářním roce.`,correct:"a"},
{id:74,cat:`Zákon o zbraních`,q:`Nikdo nesmí nosit zbraň podléhající registraci:`,a:`která nebyla zaregistrována.`,b:`která nebyla zaregistrována; to neplatí, jde-li o zbraň přenechanou držitelem zbrojní licence skupiny ZL1.`,c:`která nebyla zaregistrována a následně též po dobu 10 pracovních dnů ode dne její registrace; to neplatí, jde-li o zbraň přenechanou držitelem rozšířeného zbrojního oprávnění nebo držitelem zbrojní licence skupiny ZL1.`,correct:"b"},
{id:75,cat:`Zákon o zbraních`,q:`Šířit Ministerstvem vnitra oficiálně sestavené písemné testy určené pro ověřování odborné způsobilosti podle zákona o zbraních a střelivu:`,a:`je povoleno.`,b:`je povoleno držiteli zbrojní licence skupiny ZL1 nebo ZL2 v rámci zajišťování školení nebo výcviku v bezpečném nakládání se zbraněmi nebo střelivem a při odborné přípravě uchazečů o získání zbrojního oprávnění.`,c:`je zakázáno.`,correct:"c"},
{id:76,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení:`,a:`nikdo nesmí provést přeshraniční přemístění zbraně nebo střeliva v rozporu se zákonem o zbraních a střelivu nebo s jiným právním předpisem.`,b:`nikdo nesmí provést přeshraniční přemístění zbraně nebo střeliva v rozporu se zákonem o zbraních a střelivu nebo s jiným právním předpisem; to neplatí pro přeshraniční přemístění zbraně nebo střeliva do země, která je členem Evropské Unie.`,c:`nikdo nesmí provést přeshraniční přemístění zbraně nebo střeliva v rozporu se zákonem o zbraních a střelivu nebo s jiným právním předpisem; to neplatí pro přeshraniční přemístění zbraně nebo střeliva držitelem rozšířeného zbrojního oprávnění za účelem jeho účasti ve střelecké soutěži v zemi, která je členem Evropské Unie.`,correct:"a"},
{id:77,cat:`Zákon o zbraních`,q:`Nikdo nesmí ohrozit život, zdraví nebo majetek:`,a:`svůj nebo jiné osoby v důsledku použití zbraně nebo střeliva ve špatném technickém stavu.`,b:`v důsledku použití zbraně nebo střeliva v rámci nutné obrany nebo krajní nouze, pokud nejsou splněny požadavky zákona o ověřování zbraní a střeliva.`,c:`jiné osoby v důsledku použití zbraně nebo střeliva ve špatném technickém stavu anebo zbraně nebo střeliva, které neodpovídají požadavkům zákona o ověřování zbraní a střeliva.`,correct:"c"},
{id:78,cat:`Zákon o zbraních`,q:`Zbrojní oprávnění opravňuje svého držitele – fyzickou osobu:`,a:`podnikat v oblasti zbraní a střeliva.`,b:`nakládat se zbraněmi podléhajícími registraci a střelivem, a to za dalších podmínek podle zákona o zbraních a střelivu.`,c:`zajišťovat v rámci samostatné výdělečné činnosti ostrahu a nosit při výkonu této činnosti skrytě zbraň kategorie R3.`,correct:"b"},
{id:79,cat:`Zákon o zbraních`,q:`Ve smyslu zákona o zbraních a střelivu se rozlišuje zbrojní oprávnění:`,a:`obecné a rozšířené; obecné zbrojní oprávnění a rozšířené zbrojní oprávnění se liší účelem a podmínkami pro vydání, z hlediska rozsahu oprávnění se obecné a rozšířené zbrojní oprávnění nepřekrývají.`,b:`obecné a rozšířené; součástí rozšířeného zbrojního oprávnění je rovněž obecné zbrojní oprávnění.`,c:`základní, obecné a rozšířené; rozšířené oprávnění může být vydáno žadateli, který je držitelem základního a obecného zbrojního oprávnění a dosáhl minimálního stanoveného věku.`,correct:"b"},
{id:80,cat:`Zákon o zbraních`,q:`Rozšířené zbrojní oprávnění je podle zákona o zbraních a střelivu vyžadováno pro výkon:`,a:`práva myslivosti.`,b:`činnosti zkušebního komisaře.`,c:`činnosti správce střelnice.`,correct:"b"},
{id:81,cat:`Zákon o zbraních`,q:`Rozšířené zbrojní oprávnění je podle zákona o zbraních a střelivu vyžadováno:`,a:`pro výkon činnosti zkušebního komisaře, pro výkon činnosti hlavního zbrojíře držitele zbrojní licence skupiny ZL1 nebo ZL3, pro skryté nošení zbraně podléhající registraci a u osob, které plní některé úkoly držitele zbrojní licence a o kterých tak stanoví § 90 zákona o zbraních a střelivu.`,b:`pro výkon činnosti zkušebního komisaře, pro výkon činnosti hlavního zbrojíře držitele zbrojní licence skupiny ZL2, pro skryté nošení palné nebo plynové zbraně a u osob, o kterých tak stanoví zákon o ověřování zbraní a střeliva.`,c:`pro výkon činnosti hlavního zbrojíře na střelnici, pro skryté nošení zbraně podléhající registraci a dále pak u osob, které plní úkoly při zajišťování průběhu zkoušek odborné způsobilosti nebo komisionálních zkoušek, a to na základě výzvy krajského ředitelství policie, která musí být těmto osobám doručena nejméně 10 pracovních dnů přede dnem konání příslušné zkoušky odborné způsobilosti nebo komisionální zkoušky.`,correct:"a"},
{id:82,cat:`Zákon o zbraních`,q:`Podmínky zbrojního oprávnění splňuje fyzická osoba, která:`,a:`je občanem České republiky, dosáhla stanoveného věku, je plně svéprávná (nejde-li o vydání zbrojního oprávnění osobě mladší 18 let v případech, kdy to zákon o zbraních a střelivu umožňuje), je psychologicky způsobilá, je bezúhonná a politicky spolehlivá.`,b:`má místo pobytu na území České republiky, dosáhla stanoveného věku, je plně svéprávná (nejde-li o vydání zbrojního oprávnění osobě mladší 18 let v případech, kdy to zákon o zbraních a střelivu umožňuje), je zdravotně způsobilá, je bezúhonná a spolehlivá a je odborně způsobilá.`,c:`má místo pobytu na území České republiky, dosáhla stanoveného věku, je plně svéprávná, je zdravotně způsobilá (nejde-li o vydání zbrojního oprávnění osobě mladší 18 let v případech, kdy to zákon o zbraních a střelivu umožňuje), je bezúhonná, je odborně způsobilá a byla vyškolena a vycvičena Policií České republiky nebo jiným ozbrojeným bezpečnostním sborem České republiky.`,correct:"b"},
{id:83,cat:`Zákon o zbraních`,q:`Jednou z podmínek vydání zbrojního oprávnění je podle zákona o zbraních a střelivu:`,a:`psychická odolnost (tzv. resilience).`,b:`spolehlivost; spolehlivostí se rozumí trestní a přestupková zachovalost a vyloučení rizika alkoholismu a zneužívání jiných návykových látek.`,c:`uznatelná praxe v oblasti nakládání se zbraněmi a střelivem; uznatelnou praxí se rozumí mimo jiné sportovně-střelecká činnost, výkon práva myslivosti, služba v Aktivní záloze Armády České republiky nebo dobrovolné převzetí branné povinnosti.`,correct:"b"},
{id:84,cat:`Zákon o zbraních`,q:`Mezi podmínky pro vydání zbrojního oprávnění podle zákona o zbraních a střelivu nepatří:`,a:`místo pobytu na území České republiky.`,b:`občanství České republiky.`,c:`dosažení stanoveného věku.`,correct:"b"},
{id:85,cat:`Zákon o zbraních`,q:`I v případě, že jsou jinak splněny podmínky pro vydání zbrojního oprávnění podle zákona o zbraních a střelivu, krajské ředitelství policie může mimo jiné:`,a:`z důvodu ochrany vnitřního pořádku nebo bezpečnosti zamítnout žádost o vydání zbrojního oprávnění cizince, který není občanem členského státu Evropské Unie.`,b:`z důvodu zajišťování potřeb ozbrojených sil České republiky zamítnout žádost o vydání zbrojního oprávnění cizince, který je občanem jiného členského státu Organizace Severoatlantické smlouvy.`,c:`vydat zbrojní oprávnění podmíněně, v omezeném rozsahu nebo se zkrácenou dobou platnosti, pokud je to z hlediska ochrany vnitřního pořádku nebo bezpečnosti nezbytné.`,correct:"a"},
{id:86,cat:`Zákon o zbraních`,q:`Zákon o zbraních a střelivu vyžaduje dosažení věku 21 let pro vydání:`,a:`obecného zbrojního oprávnění.`,b:`obecného zbrojního oprávnění pro účely myslivosti.`,c:`rozšířeného zbrojního oprávnění.`,correct:"c"},
{id:87,cat:`Zákon o zbraních`,q:`Zbrojní oprávnění lze mimo jiné vydat fyzické osobě, která dosáhla věku 15 let:`,a:`pokud jde o obecné zbrojní oprávnění a žadatel je členem spolku, který se zabývá sportovně- střeleckou činností, nebo je členem ozbrojené skupiny podle zákona o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek nebo bezpečnost České republiky.`,b:`pokud jde o obecné nebo rozšířené zbrojní oprávnění a je žákem střední školy v bezpečnostně-právní oblasti, přičemž je vyžadován písemný souhlas pouze jejího zákonného zástupce, opatrovníka nebo poručníka.`,c:`pokud jde o obecné zbrojní oprávnění a žadatel je žákem střední školy v oboru zahrnujícím výuku myslivosti, přičemž je vyžadován písemný souhlas jejího zákonného zástupce, opatrovníka nebo poručníka a příslušné střední školy.`,correct:"c"},
{id:88,cat:`Zákon o zbraních`,q:`Pro vydání obecného zbrojního oprávnění stanovuje zákon o zbraních a střelivu s výjimkou případů, kdy lze zbrojní oprávnění za určitých podmínek vydat osobě starší 15 let, dosažení věkové hranice:`,a:`zletilosti, tj. 21 let.`,b:`zletilosti, tj. 18 let.`,c:`právní zralosti, tj. 25 let.`,correct:"b"},
{id:89,cat:`Zákon o zbraních`,q:`Zdravotně způsobilý podle zákona o zbraních a střelivu mimo jiné není ten:`,a:`jehož způsobilost bezpečně nakládat se zbraní nebo střelivem byla potvrzena zdravotním posudkem vydaným ošetřujícím lékařem, a to po provedení odborného vyšetření z oboru psychiatrie.`,b:`jehož způsobilost bezpečně nakládat se zbraní nebo střelivem je vyloučena nebo omezena v důsledku nižšího než stanoveného věku nebo z důvodu nadměrného požívaní alkoholu anebo zneužívání návykových látek, pokud není znaleckým posudkem z oboru zdravotnictví nebo z oboru ochrana, obrana a bezpečnost prokázán opak.`,c:`jehož způsobilost bezpečně nakládat se zbraní nebo střelivem je vyloučena nebo omezena v důsledku stanovené nemoci, vady nebo stavu.`,correct:"c"},
{id:90,cat:`Zákon o zbraních`,q:`Lékařský posudek se vydává:`,a:`s neomezenou dobou platnosti, pokud pro stanovení konkrétního časového omezení doby platnosti nejsou dány důvody spočívající ve výhledu aktuálně zjištěného zdravotního stavu.`,b:`s dobou platnosti 5 let, nejsou-li s ohledem na výhled aktuálně zjištěného zdravotního stavu dány podmínky pro vydání lékařského posudku s dobou platnosti kratší nebo delší, nejméně však s dobou platnosti 1 roku a nejvíce 10 let.`,c:`s dobou platnosti 5 let, nejsou-li s ohledem na výhled aktuálně zjištěného zdravotního stavu dány podmínky pro vydání lékařského posudku s dobou platnosti kratší.`,correct:"c"},
{id:91,cat:`Zákon o zbraních`,q:`Zákon o zbraních a střelivu nechává řadu aspektů posuzování zdravotní způsobilosti na obecné právní úpravě, kterou představuje zákon o specifických zdravotních službách. S ohledem na tento zákon nesmí být posudek o zdravotní způsobilosti k prokázání zdravotní způsobilosti podle zákona o zbraních a střelivu starší:`,a:`10 pracovních dnů.`,b:`90 dnů.`,c:`6 měsíců.`,correct:"b"},
{id:92,cat:`Zákon o zbraních`,q:`Zákon o zbraních a střelivu nechává řadu aspektů posuzování zdravotní způsobilosti na obecné právní úpravě, kterou představuje zákon o specifických zdravotních službách. S ohledem na tento zákon lze lékařskou prohlídku pro účely posouzení dalšího trvání zdravotní způsobilosti držitele zbrojního oprávnění provést nejdříve:`,a:`6 měsíců a nejpozději 10 pracovních dnů před koncem dosavadního lékařského posudku.`,b:`90 dnů před koncem platnosti dosavadního lékařského posudku.`,c:`3 měsíce před koncem platnosti zbrojního oprávnění.`,correct:"b"},
{id:93,cat:`Zákon o zbraních`,q:`Zákon o zbraních a střelivu ponechává řadu aspektů posuzování zdravotní způsobilosti na obecné právní úpravě, kterou představuje zákon o specifických zdravotních službách. S ohledem na tento zákon se lékařský posudek k prokázání zdravotní způsobilosti podle zákona o zbraních a střelivu vydává na základě:`,a:`na základě výpisu ze zdravotnické dokumentace, který registrující poskytovatel zdravotních služeb předkládá krajskému ředitelství policie.`,b:`výsledků lékařské prohlídky u registrujícího poskytovatele zdravotních služeb a dalších potřebných odborných vyšetření.`,c:`výsledků lékařské prohlídky u registrujícího poskytovatele zdravotních služeb a předběžného situačního šetření krajského ředitelství policie k osobě žadatele o vydání zbrojního oprávnění nebo držitele zbrojního oprávnění, a to v místě, kde se pravidelně zdržuje, zejména v místě bydliště a místě zaměstnání.`,correct:"b"},
{id:94,cat:`Zákon o zbraních`,q:`Seznam nemocí, vad nebo stavů, které vylučují nebo omezují zdravotní způsobilost:`,a:`stanovuje ošetřující lékař po dohodě s krajským ředitelstvím policie s ohledem na aktuální bezpečnostní situaci.`,b:`obsahuje stejné nemoci, vady a stavy jako je tomu v případě zdravotní způsobilosti pro řízení motorových vozidel.`,c:`stanovuje pro oblast nakládání se zbraněmi, střelivem a s municí vláda nařízením, přičemž vymezení nemocí, vad a stavů se zaměřuje na prevenci specifických rizik souvisejících s nakládáním se zbraněmi, střelivem a municí.`,correct:"c"},
{id:95,cat:`Zákon o zbraních`,q:`Osoba, u níž se zjišťuje splnění podmínek zbrojního oprávnění, předkládá krajskému ředitelství policie lékařský posudek k ověření její zdravotní způsobilosti jako přílohu žádosti o vydání zbrojního oprávnění a vždy nejpozději:`,a:`ke dni uplynutí platnosti předchozího lékařského posudku.`,b:`30 dnů přede dnem uplynutí platnosti předchozího lékařského posudku.`,c:`90 dnů přede dnem skončení platnosti zbrojního oprávnění.`,correct:"a"},
{id:96,cat:`Zákon o zbraních`,q:`V případě pochybností o trvání zdravotní způsobilosti držitele zbrojního oprávnění:`,a:`krajské ředitelství policie požádá poskytovatele zdravotních služeb o vydání mimořádného lékařského posudku a současně držitele zbrojního oprávnění vyzve, aby se k lékařské prohlídce dostavil ve lhůtě, která nesmí být kratší než 10 pracovních dnů.`,b:`krajské ředitelství policie zbrojní oprávnění odejme.`,c:`je držitel zbrojního oprávnění povinen se na výzvu krajského ředitelství policie, Policejní prezidia České republiky nebo Ministerstva vnitra dostavit k přezkoumání své zdravotní způsobilosti k posudkové komisi složené z odborně způsobilých zástupců těchto orgánů veřejné moci.`,correct:"a"},
{id:97,cat:`Zákon o zbraních`,q:`Existuje-li podezření, že se posuzovaná osoba snaží ovlivnit nestrannost zjištění své zdravotní způsobilosti, anebo nelze-li její zdravotní způsobilost zjistit jiným způsobem:`,a:`je posuzovaná osoba povinna zvolit si jiného poskytovatele zdravotních služeb, který její zdravotní způsobilost vhodným způsobem přezkoumá.`,b:`krajské ředitelství policie nařídí přezkoumání zdravotní způsobilosti takové posuzované osoby konciliárně.`,c:`krajské ředitelství policie usnesením určí poskytovatele zdravotních služeb, který lékařský posudek vydá.`,correct:"c"},
{id:98,cat:`Zákon o zbraních`,q:`Osoba, které bylo uloženo ochranné léčení nebo zabezpečovací detence:`,a:`není zdravotně způsobilá.`,b:`je zdravotně způsobilá pouze pro účely nakládání se zbraněmi kategorie PO a NO.`,c:`není zdravotně způsobilá, byly-li ochranné léčení nebo zabezpečovací detence uloženy z důvodu nadměrného požívání alkoholu nebo zneužívání jiných návykových látek.`,correct:"a"},
{id:99,cat:`Zákon o zbraních`,q:`V případě osob, u kterých se v minulosti projevily určité závažné zdravotní nebo psycho- sociální okolnosti, pro které jim bylo uloženo ochranné léčení nebo zabezpečovací detence, bylo u nich zastaveno trestního stíhání nebo řízení o odpovědnosti za přestupek pro nepříčetnost anebo které byly bez svého souhlasu hospitalizovány z důvodu, že bezprostředně a závažným způsobem ohrožovaly sebe nebo své okolí a jevily známky duševní poruchy:`,a:`je jejich zdravotní způsobilost navždy vyloučena.`,b:`lze zdravotní způsobilost prokázat předložením lékařského posudku a současně též znaleckého posudku z oboru zdravotnictví a odvětví odpovídajícího důvodům, které k uložení příslušných mimořádných opatření vedly.`,c:`je jejich zdravotní způsobilost vyloučena po dobu 20 let ode dne ukončení ochranného léčení nebo zabezpečovací detence, zastavení trestního stíhání nebo řízení o odpovědnosti za přestupek anebo ode dne propuštění z nucené hospitalizace ve zdravotnickém zařízení.`,correct:"b"},
{id:100,cat:`Zákon o zbraních`,q:`Ošetřující lékař, který zjistí, že pacient trpí nemocí, vadou nebo stavem, které vylučují nebo omezují zdravotní způsobilost, je podle zákona o zbraních a střelivu povinen:`,a:`tuto skutečnost oznámit bez zbytečného odkladu policii, pokud je tento pacient držitelem oprávnění k nakládání se zbraněmi a střelivem.`,b:`neprodleně zrušit dřívější kladný lékařský posudek a vyzvat pacienta k odevzdání zbraní a střeliva, s nimiž nakládá, krajskému ředitelství policie, a to ve lhůtě 10 pracovních dnů ode dne zrušení dosavadního lékařského posudku.`,c:`tuto skutečnost oznámit policii v případě každého pacienta, a to i tehdy, pokud takový pacient není držitelem oprávnění k nakládání se zbraněmi a střelivem; policie tato oznámení uchovává za účelem preventivní kontroly budoucích uchazečů o vydání oprávnění k nakládání se zbraněmi a střelivem.`,correct:"a"},
{id:101,cat:`Zákon o zbraních`,q:`Ošetřující lékař, který zjistí, že pacient trpí nemocí, vadou nebo stavem, které vylučují nebo omezují zdravotní způsobilost, je podle zákona o zbraních a střelivu povinen:`,a:`zjistit u registrujícího poskytovatele zdravotních služeb takového pacienta, zda je tento pacient držitelem zbraně nebo střeliva, a tuto informaci neprodleně předat krajskému ředitelství policie.`,b:`ověřit, zda je daný pacient držitelem oprávnění k nakládání se zbraněmi a střelivem, a to prostřednictvím kmenového registru pacientů nebo centrálního registru zbraní anebo dotazem u krajského ředitelství policie.`,c:`přivolat policii a do jejího příjezdu zamezit pacientovi v opuštění zdravotnického zařízení.`,correct:"b"},
{id:102,cat:`Zákon o zbraních`,q:`Za bezúhonného se podle zákona o zbraních a střelivu nepovažuje ten, kdo:`,a:`byl v cizině pravomocně odsouzen za trestný čin, který by byl v případě spáchání na území České republiky považován za přestupek.`,b:`byl v cizině pravomocně odsouzen za trestný čin spáchaný v České republice, pokud k odsouzení v České republice nemohlo dojít z důvodu, že dané jednání na území České republiky není považováno za trestný čin.`,c:`byl v cizině pravomocně odsouzen za čin, jehož znaky odpovídají znakům některého z trestných činů podle trestního práva České republiky, které mají podle zákona o zbraních a střelivu vliv na posouzení bezúhonnosti.`,correct:"c"},
{id:103,cat:`Zákon o zbraních`,q:`Pro účely posouzení bezúhonnosti podle zákona o zbraních a střelivu je stanoveno, že byl-li úmyslný trestný čin spáchán násilím, pohrůžkou násilí nebo pohrůžkou jiné těžké újmy:`,a:`žadatel ztrácí možnost získat rozšířené zbrojní oprávnění a může být považován za bezúhonného pouze pro účely získání obecného zbrojního oprávnění nebo zapsané autorizace.`,b:`doba, po kterou se osoba nepovažuje za bezúhonnou, se prodlužuje.`,c:`žadatel o vydání zbrojního oprávnění musí k žádosti o vydání zbrojního oprávnění přiložit znalecký posudek z oboru psychologie, z jehož závěru vyplývá, že daná osoba již nepředstavuje nebezpečí pro společnost.`,correct:"b"},
{id:104,cat:`Zákon o zbraních`,q:`Pro účely posouzení bezúhonnosti podle zákona o zbraních a střelivu je stanoveno, že byl-li úmyslný trestný čin spáchán v souvislosti s nakládáním se zbraní, střelivem, municí nebo výbušninou:`,a:`doba, po kterou se osoba nepovažuje za bezúhonnou, se prodlužuje, a to standardně o 15 let oproti trestným činům spáchaným násilím, pohrůžkou násilí nebo pohrůžkou jiné těžké újmy.`,b:`doba, po kterou se osoba nepovažuje za bezúhonnou, se prodlužuje, a to v nejzávažnějších případech až na dobu 30 let.`,c:`osoba pozbývá spolehlivost pro účely nakládání se zbraněmi, střelivem, municí nebo výbušninou doživotně.`,correct:"b"},
{id:105,cat:`Zákon o zbraních`,q:`Nejdelší doba, na kterou nemůže být osoba považována podle zákona o zbraních a střelivu za bezúhonnou, je stanovena na:`,a:`nejdéle na 20 let, přičemž jde například o trestné činy spáchané v souvislosti s nakládáním se zbraní, střelivem nebo municí.`,b:`nejdéle na 30 let, přičemž jde zejména o trestné činy spáchané ve stavu zmenšené příčetnosti nebo pod vlivem alkoholu anebo jiných návykových látek.`,c:`neomezenou dobu, přičemž jde o trestné činy, za jejichž spáchání trestní zákoník umožňuje uložení výjimečného trestu.`,correct:"c"},
{id:106,cat:`Zákon o zbraních`,q:`Kdo spáchal úmyslný trestný čin anebo trestný čin spáchaný z nedbalosti v souvislosti s nakládáním se zbraní, střelivem, municí nebo výbušninou:`,a:`se podle zákona o zbraních a střelivu nepovažuje za spolehlivého, neuběhla-li alespoň doba 10 let od vykonání trestu, jeho promlčení nebo prominutí nebo uplynutí zkušební doby, bylo- li rozhodnuto, že se podmíněně odsouzený osvědčil, nebo má-li se za to, že se osvědčil.`,b:`se nepovažuje za způsobilého k nakládání se zbraněmi nebo střelivem, na které se zákon o zbraních a střelivu vztahuje, a to až doby nabytí právní moci usnesení policejního orgánu o tom, že se taková osoba občansky osvědčila a lze ji považovat za podmíněně spolehlivou.`,c:`se podle zákona o zbraních a střelivu nepovažuje za bezúhonného, neuběhla-li zákonem stanovená doba od vykonání trestu, jeho promlčení nebo prominutí nebo uplynutí zkušební doby, bylo-li rozhodnuto, že se podmíněně odsouzený osvědčil, nebo má-li se za to, že se osvědčil.`,correct:"c"},
{id:107,cat:`Zákon o zbraních`,q:`Při posuzování podmínky bezúhonnosti jako jedné z podmínek zbrojního oprávnění:`,a:`se nepřihlíží k zahlazení odsouzení ani k jiným případům, v nichž nastává účinek, že se na pachatele hledí, jako by nebyl odsouzen.`,b:`se za bezúhonného považuje i ten, na koho se hledí, jako by nebyl odsouzen.`,c:`vychází krajské ředitelství policie z výpisu z Rejstříku trestů, který je žadatel o vydání zbrojního oprávnění povinen k žádosti přiložit.`,correct:"a"},
{id:109,cat:`Zákon o zbraních`,q:`Za spolehlivého se podle zákona o zbraních a střelivu považuje ten:`,a:`kdo byl pravomocně odsouzen za úmyslný trestný čin spáchaný z nedbalosti v souvislosti s nakládáním se zbraní, střelivem, municí nebo výbušninou, jestliže neuplynuly alespoň 3 roky od rozhodnutí posudkové komise krajského úřadu nebo od vykonání trestu, jeho promlčení nebo prominutí anebo od uplynutí zkušební doby, bylo-li rozhodnuto, že se podmíněně odsouzený neosvědčil, nebo má-li se za to, že se neosvědčil.`,b:`kdo nadměrně požívá alkohol nebo zneužívá jiné návykové látky.`,c:`kdo byl v posledních 3 letech pravomocně uznán vinným ze spáchání více než 1 přestupku, jde-li o přestupek, kterého se fyzická osoba dopustí tím, že v provozu na pozemních komunikacích překročí nejvyšší dovolenou rychlost v obci o 40 km/h a a více nebo mimo obec o 50 km/h a více.`,correct:"c"},
{id:110,cat:`Zákon o zbraních`,q:`Za spolehlivého se podle zákona o zbraních a střelivu nepovažuje ten:`,a:`kdo byl v posledních 5 letech pravomocně uznán vinným ze spáchání více než 1 přestupku nebo jednání, které má znaky takového přestupku, pokud jej je třeba s ohledem na povahu činů, jimiž byly takové přestupky nebo jednání spáchány, považovat za vážné nebezpečí pro vnitřní pořádek nebo bezpečnost, a jde-li o přestupek proti mezinárodní organizaci nebo významným finančním zájmům Evropské unie.`,b:`kdo byl v posledních 3 letech pravomocně uznán vinným ze spáchání více než 1 přestupku nebo jednání, které má znaky takového přestupku, pokud jej je třeba s ohledem na povahu činů, jimiž byly takové přestupky nebo jednání spáchány, považovat za vážné nebezpečí pro vnitřní pořádek nebo bezpečnost, a jde-li o přestupek neoprávněného lovu zvěře podle zákona o myslivosti.`,c:`kdo byl pravomocně odsouzen za úmyslný trestný čin, pokud byl za jeho spáchání fyzické osobě uložen trest odnětí svobody nepřevyšující 2 roky a od vykonání trestu, jeho promlčení nebo prominutí neuplynulo alespoň 5 let.`,correct:"b"},
{id:111,cat:`Zákon o zbraních`,q:`Za spolehlivého se podle zákona o zbraních a střelivu nepovažuje ten:`,a:`kdo byl v posledních 3 letech pravomocně uznán vinným ze spáchání přestupku nebo jednání, které má znaky takového přestupku, pokud jej je třeba s ohledem na povahu činu, jímž byl takový přestupek nebo jednání spáchán, považovat za vážné nebezpečí pro vnitřní pořádek nebo bezpečnost, a jde-li o přestupek proti veřejnému pořádku nebo občanskému soužití.`,b:`kdo byl v posledních 3 letech pravomocně uznán vinným ze spáchání více než 1 přestupku nebo jednání, které má znaky takového přestupku, pokud jej je třeba s ohledem na povahu činů, jimiž byly takové přestupky nebo jednání spáchány, považovat za vážné nebezpečí pro vnitřní pořádek nebo bezpečnost, a jde-li o přestupek na úseku nakládání se zbraněmi a střelivem.`,c:`kdo byl v posledních 3 letech pravomocně uznán vinným ze spáchání více než 2 přestupků nebo jednání, která mají znaky takových přestupků, a za tyto přestupky nebo jednání nebyla uložena pokuta příkazem na místě.`,correct:"b"},
{id:112,cat:`Zákon o zbraních`,q:`Ten, kdo byl v posledních 3 letech pravomocně uznán vinným ze spáchání více než 1 přestupku nebo jednání, které má znaky takového přestupku, pokud jej je třeba s ohledem na povahu činů, jimiž byly takové přestupky nebo jednání spáchány, považovat za vážné nebezpečí pro vnitřní pořádek nebo bezpečnost, a jde-li o přestupek na úseku ochrany zdraví před škodlivými účinky návykových látek nebo na úseku provozu na pozemních komunikacích, spáchaného tím, že pachatel po požití alkoholického nápoje nebo po užití jiné návykové látky vykonával činnost, při níž by mohl ohrozit život nebo zdraví svoje nebo jiné osoby nebo poškodit majetek, nebo tím, že se odmítl podrobit orientačnímu vyšetření nebo odbornému lékařskému vyšetření:`,a:`není podle zákona o zbraních a střelivu považován za bezúhonného.`,b:`je podle zákona o zbraních a střelivu považován za spolehlivého.`,c:`není podle zákona o zbraních a střelivu považován za spolehlivého.`,correct:"c"},
{id:113,cat:`Zákon o zbraních`,q:`Ten, komu byl pravomocně uložen správní trest zákazu činnosti související s nakládáním se zbraněmi nebo střelivem, a to po dobu, na kterou je tento zákaz uložen:`,a:`není podle zákona o zbraních a střelivu považován za spolehlivého.`,b:`se pro účely zákona o zbraních a střelivu považuje za osobu s omezenou svéprávností.`,c:`je povinen zbraně a střelivo, se kterými nakládá, bez zbytečného odkladu předat do úschovy držiteli zapsané autorizace a vyrozumět o tom krajské ředitelství policie.`,correct:"a"},
{id:114,cat:`Zákon o zbraních`,q:`Žadatel o vydání zbrojního oprávnění je povinen zkoušku odborné způsobilosti a komisionální zkoušku vykonat:`,a:`způsobem umožňujícím dálkový přístup, zejména formou online testu; využití tlumočníka při vykonání teoretické se nepřipouští.`,b:`osobně; využití tlumočníka, podpůrce nebo obdobné osoby při vykonání teoretické nebo praktické části zkoušky odborné způsobilosti se nepřipouští.`,c:`osobně; využití tlumočníka při praktické části zkoušky odborné způsobilosti je v případě cizince, který spolehlivě neprokáže, že ovládá český jazyk, povinné.`,correct:"b"},
{id:115,cat:`Zákon o zbraních`,q:`Odborná způsobilost žadatele o vydání zbrojního oprávnění se ověřuje zkouškou odborné způsobilosti nebo komisionální zkouškou, které se skládají z:`,a:`teoretické části.`,b:`teoretické části a praktické části.`,c:`teoretické části, praktické části a technického školení a výcviku.`,correct:"b"},
{id:116,cat:`Zákon o zbraních`,q:`V teoretické části zkoušky odborné způsobilosti nebo komisionální zkoušky žadatel prokazuje znalosti:`,a:`obecně závazných právních předpisů, metodických doporučení Ministerstva vnitra a Ministerstva obrany, kategorizačních rozhodnutí Českého úřadu pro zkoušení zbraní a střeliva, technických znalostí o zbraních a střelivu, historie jejich použití a ze zdravotnického minima.`,b:`právních předpisů z oblasti nakládání se zbraněmi a střelivem, ověřování střelných zbraní a střeliva, trestněprávních aspektů nakládání se zbraněmi a střelivem, nauky o zbraních a střelivu, zásad bezpečného nakládání se zbraněmi a střelivem a ze zdravotnického minima.`,c:`právních předpisů z oblasti nakládání se zbraněmi a střelivem, myslivosti, bezpečnostního materiálu, výbušnin a pyrotechnických výrobků, zásad konstrukce zbraní a střeliva, dodavatelsko-odběratelských vztazích v oblasti obranného průmyslu a ze zdravotnického minima.`,correct:"b"},
{id:117,cat:`Zákon o zbraních`,q:`V praktické části zkoušky odborné způsobilosti nebo komisionální zkoušky žadatel:`,a:`prokazuje znalosti, schopnosti a dovednosti v oblasti střelby, skrytého nošení zbraně a střeliva, čištění, oprav a úprav zbraně a skladování zbraně a střeliva.`,b:`prokazuje znalosti, schopnosti a dovednosti v oblasti postupů bezpečného nakládání se zbraněmi a střelivem, a to jak za standardních, tak i za ztížených podmínek (např. ve tmě nebo pouze slabou rukou).`,c:`prokazuje znalosti, schopnosti a dovednosti v oblasti postupů bezpečného nakládání se zbraněmi a střelivem a střelby na terč.`,correct:"c"},
{id:118,cat:`Zákon o zbraních`,q:`Žadatel o obecné zbrojní oprávnění při zkoušce odborné způsobilosti nebo komisionální zkoušce prokáže, že je odborně způsobilý, pokud v praktické části zkoušky dosáhne:`,a:`při střelbě na kruhový terč o průměru 500 mm na vzdálenost 10 m z 5 výstřelů krátkou kulovou zbraní a na vzdálenost 25 m z 5 výstřelů dlouhou kulovou zbraní v čase nejvýše 5 minut alespoň celkem 6 zásahů.`,b:`při střelbě na kruhový terč o průměru 500 mm na vzdálenost 10 m z 5 výstřelů krátkou kulovou zbraní a na kruhový terč o průměru 200 mm na vzdálenost 15 m z 5 výstřelů dlouhou kulovou zbraní v čase nejvýše 5 minut alespoň celkem 8 zásahů.`,c:`při střelbě na kruhový terč o průměru 500 mm na vzdálenost 10 m z 10 výstřelů krátkou kulovou zbraní v čase nejvýše 5 minut alespoň celkem 8 zásahů, přičemž nástřelné výstřely se do celkového hodnocení započítávají, pokud tak rozhodne zkušební komisař.`,correct:"a"},
{id:119,cat:`Zákon o zbraních`,q:`Žadatel o rozšířené zbrojní oprávnění při zkoušce odborné způsobilosti nebo komisionální zkoušce prokáže, že je odborně způsobilý, pokud v praktické části zkoušky dosáhne:`,a:`při střelbě na kruhový terč o průměru 500 mm na vzdálenost 5 m z 10 výstřelů krátkou kulovou zbraní a na vzdálenost 5 m z 25 výstřelů dlouhou kulovou zbraní v čase nejvýše 5 minut alespoň celkem 8 zásahů.`,b:`při střelbě na kruhový terč o průměru 500 mm na vzdálenost 10 m z 5 výstřelů krátkou kulovou zbraní a na vzdálenost 25 m z 5 výstřelů dlouhou kulovou zbraní v čase nejvýše 5 minut alespoň celkem 6 zásahů.`,c:`při střelbě na kruhový terč o průměru 500 mm na vzdálenost 10 m z 5 výstřelů krátkou kulovou zbraní a na vzdálenost 25 m z 5 výstřelů dlouhou kulovou zbraní v čase nejvýše 5 minut alespoň celkem 8 zásahů.`,correct:"c"},
{id:120,cat:`Zákon o zbraních`,q:`Žadatel při zkoušce odborné způsobilosti nebo komisionální zkoušce prokáže, že je odborně způsobilý, pokud v praktické části zkoušky mimo jiné:`,a:`reálně při manipulaci se zbraní a se střelivem a při střelbě neohrozí bezpečnost osob; za reálné ohrožení se považuje pouze nebezpečná manipulace s zbraní včetně ostrého střeliva.`,b:`v předepsaném rozsahu prokáže teoretické znalosti postupů bezpečného nakládání se zbraní a střelivem.`,c:`neohrozí při manipulaci se zbraní a se střelivem a při střelbě nebo by v praxi neohrozil bezpečnost osob.`,correct:"c"},
{id:121,cat:`Zákon o zbraních`,q:`Zákon o zbraních a střelivu rozeznává:`,a:`odnětí a zrušení zbrojního oprávnění.`,b:`pozastavení, odnětí a zánik zbrojního oprávnění.`,c:`pozastavení, odnětí, zánik a zajištění zbrojního oprávnění.`,correct:"b"},
{id:122,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie může z důvodu ochrany vnitřního pořádku nebo bezpečnosti zbrojní oprávnění pozastavit mimo jiné na dobu, po kterou:`,a:`je u držitele zbrojního oprávnění dán důvod pro zajištění zbraně, střeliva nebo souvisejícího dokladu nebo listiny.`,b:`je u držitele zbrojního oprávnění dán důvod pro odnětí povolení kategorie R3 vydané pro příslušnou samonabíjecí palnou zbraň pro střelivo se středovým zápalem, pokud osoba, která s takovou zbraní nakládá, neoprávněně nakládá s nadlimitním zásobníkem určeným pro použití v této zbrani.`,c:`probíhá u držitele zbrojního oprávnění mobiliární exekuce na jím držené zbraně, střelivo nebo munici.`,correct:"a"},
{id:123,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie může z důvodu ochrany vnitřního pořádku nebo bezpečnosti zbrojní oprávnění pozastavit mimo jiné na dobu, po kterou:`,a:`držitel zbrojního oprávnění nedoložil po uplynutí platnosti jeho dosavadního posudku o zdravotní způsobilosti nový lékařský posudek, a proto je podle zákona o specifických zdravotních službách považován za zdravotně nezpůsobilého.`,b:`je držitel zbrojního oprávnění pod vlivem alkoholu nebo jiných návykových látek.`,c:`zákonný zástupce držitele zbrojního oprávnění odvolá, nebo případně pozastaví, svůj souhlas s vydáním zbrojního oprávnění danému držiteli zbrojního oprávnění, proti kterému bylo zahájeno trestní stíhání.`,correct:"a"},
{id:124,cat:`Zákon o zbraních`,q:`Odvolání proti rozhodnutí o pozastavení zbrojního oprávnění nebo o odnětí zbrojního oprávnění:`,a:`je třeba podat bez zbytečného odkladu u Ministerstva vnitra.`,b:`se nepřipouští.`,c:`nemá odkladný účinek.`,correct:"c"},
{id:125,cat:`Zákon o zbraních`,q:`Odvolání souhlasu spolku s vydáním zbrojního oprávnění nezletilé osobě je jedním z důvodů pro:`,a:`zánik zbrojního oprávnění.`,b:`přerušení řízení o odnětí zbrojního oprávnění.`,c:`pozastavení zbrojního oprávnění.`,correct:"c"},
{id:126,cat:`Zákon o zbraních`,q:`V případě, že držitel zbrojního oprávnění přestane mít místo pobytu na území České republiky, krajské ředitelství policie:`,a:`odejme zbrojní oprávnění.`,b:`pozastaví zbrojní oprávnění.`,c:`zbrojní oprávnění se ze zákona změní na zapsanou autorizaci.`,correct:"a"},
{id:127,cat:`Zákon o zbraních`,q:`V případě, že dojde k omezení svéprávnosti držitele zbrojního oprávnění, krajské ředitelství policie:`,a:`odejme zbrojní oprávnění.`,b:`v odpovídajícím rozsahu omezí rozsah práv vyplývajících ze zbrojního oprávnění.`,c:`pozastaví zbrojní oprávnění.`,correct:"a"},
{id:128,cat:`Zákon o zbraních`,q:`Pokud držitel zbrojního oprávnění přestane splňovat podmínku bezúhonnosti nebo spolehlivosti, krajské ředitelství policie zbrojní oprávnění:`,a:`pozastaví.`,b:`zadrží.`,c:`odejme.`,correct:"c"},
{id:129,cat:`Zákon o zbraních`,q:`Zbrojní oprávnění Policie České republiky neodejme z důvodu ztráty zdravotní způsobilosti jeho držitele, pokud:`,a:`je držitel zbrojního oprávnění podle závěru lékařského posudku zdravotně nezpůsobilý k nakládání se zbraněmi a střelivem.`,b:`se držitel zbrojního oprávnění bez vážného důvodu ve lhůtě stanovené krajským ředitelstvím policie nedostaví k poskytovateli zdravotních služeb, kterého mu určí krajské ředitelství policie, nebo se takové lékařské prohlídce nepodrobí.`,c:`je držitel zbrojního oprávnění krajským ředitelstvím policie na základě veškerých dostupných informací shledán jako osoba požívající alkoholické nápoje.`,correct:"c"},
{id:130,cat:`Zákon o zbraních`,q:`Zbrojní oprávnění podle zákona o zbraních a střelivu mimo jiné zaniká dnem:`,a:`vydání lékařského posudku se závěrem, že držitel zbrojního oprávnění je zdravotně nezpůsobilý k nakládání se zbraněmi a střelivem.`,b:`zajištění zbraně, střeliva, nebo souvisejícího dokladu nebo listiny z důvodu, že ze stanoviska nebo informace orgánu veřejné moci vyplývá, že osoba, která s nimi nakládá, představuje vážné nebezpečí pro vnitřní pořádek nebo bezpečnost.`,c:`nabytí právní moci rozhodnutí o jeho odnětí.`,correct:"c"},
{id:131,cat:`Zákon o zbraních`,q:`Zbrojní oprávnění podle zákona o zbraních a střelivu nezaniká dnem:`,a:`odvolání souhlasu zákonného zástupce, opatrovníka nebo poručníka, spolku nebo střední školy s vydáním zbrojního oprávnění nezletilé osobě.`,b:`nabytí právní moci rozhodnutí o uložení ochranného léčení nebo zabezpečovací detence jeho držiteli.`,c:`smrti jeho držitele nebo nabytí právní moci rozhodnutí o prohlášení jeho držitele za mrtvého.`,correct:"a"},
{id:132,cat:`Zákon o zbraních`,q:`Pokud se držitel zbrojního oprávnění svého zbrojního oprávnění ve formě standardního podání podle správního řádu směřovaného krajskému ředitelství policie vzdá:`,a:`zbrojní oprávnění následujícím dnem zaniká.`,b:`na platnost zbrojního oprávnění nemá takový postup vliv, neboť zákon o zbraních a střelivu neumožňuje se jednostranně platného zbrojního oprávnění vzdát; k zániku zbrojního oprávnění je nutné, aby jeho držitel přestal splňovat některou ze zákonem stanovených podmínek zbrojního oprávnění.`,c:`krajské ředitelství policie zbrojní oprávnění ve standardním správním řízení odejme.`,correct:"a"},
{id:133,cat:`Zákon o zbraních`,q:`Žadatel o vydání zbrojního oprávnění může odbornou způsobilost prokázat tak, že:`,a:`do 12 měsíců ode dne, kdy je krajským ředitelstvím policie do centrálního registru zbraní zapsána skutečnost, že je oprávněn prokázat odbornou způsobilost, úspěšně složí zkoušku odborné způsobilosti, kterou je oprávněn jednou opakovat, nebo komisionální zkoušku.`,b:`ve lhůtě 12 měsíců přede dnem podání žádosti o vydání zbrojního oprávnění, úspěšně složí zkoušku odborné způsobilosti, kterou je oprávněn dvakrát opakovat, nebo komisionální zkoušku.`,c:`do 6 měsíců ode dne, kdy je krajským ředitelstvím policie do centrálního registru zbraní zapsána skutečnost, že je oprávněn prokázat odbornou způsobilost, úspěšně složí zkoušku odborné způsobilosti, kterou je oprávněn dvakrát opakovat.`,correct:"a"},
{id:134,cat:`Zákon o zbraních`,q:`Komisionální zkoušku může vykonat žadatel o vydání zbrojního oprávnění, který:`,a:`neuspěl ani při opakované zkoušce odborné způsobilosti a uplatní námitku podjatosti zkušebního komisaře nebo nesrozumitelnosti testu.`,b:`neuspěl ani při opakované zkoušce odborné způsobilosti, pokud alespoň jednou uspěl v teoretické části zkoušky odborné způsobilosti.`,c:`nesložil zkoušku odborné způsobilosti nebo opakovanou zkoušku ve lhůtě 12 měsíců ode dne, kdy je krajským ředitelstvím policie do centrálního registru zbraní zapsána skutečnost, že je oprávněn prokázat odbornou způsobilost, přičemž komisionální zkoušku lze složit v dodatečné lhůtě 3 měsíců ode dne marného uplynutí předešlé dvanáctiměsíční lhůty.`,correct:"b"},
{id:135,cat:`Zákon o zbraních`,q:`Odborná způsobilost žadatele o vydání zbrojního oprávnění se prokazuje:`,a:`před zkušebním komisařem v případě zkoušky odborné způsobilosti a před tříčlennou zkušební komisí složenou ze zkušebních komisařů v případě komisionální zkoušky.`,b:`před zkušebním komisařem a zástupcem krajského ředitelství policie v případě zkoušky odborné způsobilosti a před tříčlennou zkušební komisí složenou ze zástupce krajského ředitelství policie, Policejního prezidia České republiky, Ministerstva vnitra, Ministerstva obrany a ze zkušebního komisaře v případě komisionální zkoušky.`,c:`před zkušebním komisařem v případě zkoušky odborné způsobilosti a před tříčlennou zkušební komisí složenou ze zástupce Ministerstva vnitra, Policejního prezidia Policie České republiky, Krajského ředitelství Policie České republiky a ze zkušebního komisaře v případě komisionální zkoušky.`,correct:"c"},
{id:136,cat:`Zákon o zbraních`,q:`Pro zkoušku odborné způsobilosti a komisionální zkouška podle zákona o zbraních a střelivu platí:`,a:`zkouška odborné způsobilosti je neveřejná; komisionální zkouška je veřejná.`,b:`zkouška odborné způsobilosti je veřejná; komisionální zkouška je neveřejná.`,c:`obě zkoušky jsou neveřejné.`,correct:"c"},
{id:137,cat:`Zákon o zbraních`,q:`Dozor nad průběhem zkoušek vykonává:`,a:`krajské ředitelství policie v případě zkoušek odborné způsobilosti a Český úřad pro zkoušení zbraní a střeliva v případě komisionálních zkoušek.`,b:`krajské ředitelství policie v případě zkoušek odborné způsobilosti a Ministerstvo vnitra nebo Policejní prezidium České republiky v případě komisionálních zkoušek.`,c:`nad zkouškou odborné způsobilosti i nad komisionální zkouškou vykonávají dozor příslušníci Ministerstva vnitra.`,correct:"b"},
{id:138,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie pořizuje:`,a:`obrazový a zvukový záznam o průběhu praktické části každé zkoušky odborné způsobilosti, který je součástí protokolu o vykonání dozoru.`,b:`zvukový záznam a fotografickou dokumentaci o průběhu celé zkoušky odborné způsobilosti, přičemž zvukový záznam slouží pro vyhodnocení případných bezpečnostních incidentů a fotografie jsou určeny pro prezentační účely.`,c:`obrazový a zvukový záznam z praktické části zkoušky za podmínky, že s pořízením takového záznamu souhlasí všichni žadatelé o vydání zbrojního oprávnění.`,correct:"a"},
{id:139,cat:`Zákon o zbraních`,q:`Žadatel o vydání zbrojního oprávnění, který neuspěl u zkoušky, je proti jejímu průběhu nebo výsledku oprávněn u krajského ředitelství policie, které provádí dozor nad jejím průběhem:`,a:`podepsat revers.`,b:`vznést protest.`,c:`podat rekurs.`,correct:"b"},
{id:140,cat:`Zákon o zbraních`,q:`Protest proti průběhu nebo výsledku zkoušky odborné způsobilosti žadatel o vydání zbrojního oprávnění se vznáší:`,a:`na místě konání zkoušky odborné způsobilosti u krajského ředitelství policie, které provádí dozor nad jejím průběhem, a to do 10 pracovních dnů ode dne ukončení zkoušky odborné způsobilosti nebo komisionální zkoušky; na později vznesený protest nelze brát zřetel.`,b:`písemně u zkušebního komisaře nebo elektronicky se zaručenou identitou u krajského ředitelství policie, které provádí dozor nad jejím průběhem, a to ihned po oznámení výsledku zkoušky odborné způsobilosti nebo nejpozději do 48 hodin po konzultaci průběhu zkoušky s nezávislým znalcem.`,c:`na místě konání zkoušky odborné způsobilosti u krajského ředitelství policie, které provádí dozor nad jejím průběhem, a to ihned po oznámení výsledku zkoušky odborné způsobilosti a poučení o možnosti jej vznést; na později vznesený protest nelze brát zřetel.`,correct:"c"},
