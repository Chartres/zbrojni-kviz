{id:434,cat:`Zákon o zbraních`,q:`Pro prokázání oprávnění nakládat se zbraní podléhající registraci nebo zbraní kategorie PO platí, že jej:`,a:`lze prokázat před krajským ředitelstvím policie nebo Policejním prezidiem, které oprávnění ověří, a to popřípadě i na žádost osob, které navzájem chtějí oprávnění prokázat.`,b:`nelze prokázat před držitelem zbrojní licence, protože ten není oprávněn za tímto účelem v centrálním registru zbraní oprávnění ověřit.`,c:`lze prokázat čestným prohlášením.`,correct:"a"},
{id:435,cat:`Zákon o zbraních`,q:`Oprávnění nakládat se zbraní podléhající registraci nebo zbraní kategorie PO lze podle zákona o zbraních a střelivu prokázat například:`,a:`před obecním úřadem, který je oprávněn oprávnění osoby v centrálním registru ověřit, a to případně i na žádost osoby, která uvede, že na má na prokázání existence oprávnění nakládat se zbraněmi nebo střelivem u jiné osoby právní nebo jiný zájem.`,b:`ústním prohlášením v případech, které nesnesou odkladu.`,c:`před krajským ředitelstvím policie nebo Policejním prezidiem, které oprávnění ověří, a to popřípadě i na žádost osob, které navzájem chtějí oprávnění prokázat, nebo před držitelem zbrojní licence, který je oprávněn za tímto účelem v centrálním registru zbraní oprávnění ověřit.`,correct:"c"},
{id:436,cat:`Zákon o zbraních`,q:`Oprávnění nakládat se zbraní podléhající registraci nebo zbraní kategorie PO lze podle zákona o zbraních a střelivu prokázat například:`,a:`předložením textu zákona o zbraních a střelivu v listinné podobě a označením ustanovení, na jejichž základě prokazované oprávnění platí.`,b:`předložením evropského zbrojního pasu vydávaného Českou republikou, ve kterém je zapsána zbraň, které se dané oprávnění týká.`,c:`předložením faktury nebo obdobné listiny anebo účetního dokladu v elektronické podobě, které prokazují nabytí zbraně do vlastnictví osobou, která oprávnění nakládat s takovou zbraní prokazuje.`,correct:"b"},
{id:437,cat:`Zákon o zbraních`,q:`Zbrojní list je:`,a:`ověřeným výstupem z informačního systému veřejné správy, ve kterém se o osobě, pro kterou se zbrojní list vydává, uvádí zejména soupis všech jejích oprávnění podle zákona o zbraních a střelivu, každá zbraň podléhající registraci nebo zbraň kategorie PO, jejichž je daná osoba držitelem, hlavním držitelem nebo vedlejším držitelem.`,b:`úřední listinou, ve které se o osobě, která je žadatelem o vydání zbrojního oprávnění, uvádí podrobnosti o úspěšně i neúspěšně absolvovaných zkouškách odborné způsobilosti, komisionálních zkouškách a o všech mimořádných přezkoušeních odborné způsobilosti nařízených krajským ředitelstvím policie v rámci jeho územní působnosti za období 12 měsíců po sobě jdoucích, a to ke dni předcházejícímu dni, ve kterém je krajskému ředitelství policie doručena žádost o vydání zbrojního listu.`,c:`dokumentem s úředně ověřeným podpisem, kterým držitel zbrojního oprávnění nebo zbrojní licence před orgánem veřejné moci, zejména před krajským ředitelstvím policie, čestně prohlašuje, že je držitelem ve zbrojním listu individuálně identifikované zbraně kategorie R2, R3, R4, PO nebo NO a konkrétním množstvím a ráží identifikovaného střeliva.`,correct:"a"},
{id:438,cat:`Zákon o zbraních`,q:`Zbrojní list je:`,a:`ověřený výstup z centrálního registru zbraní coby informačního systému veřejné správy.`,b:`doklad doprovázející zbraně nebo střelivo při přepravě.`,c:`doklad umožňující přeshraniční přemístění zbraně nebo střeliva.`,correct:"a"},
{id:439,cat:`Zákon o zbraních`,q:`Zbrojní list slouží:`,a:`k zaznamenání a uchování kompletních technických informací o konkrétní zbrani, zejména pak nevratných úprav zbraně a pravidelných fyzických kontrol zbraně krajským ředitelstvím policie; zbrojní list lze v tomto ohledu přirovnat k tzv. velkému technickému průkazu vozidla.`,b:`k převodu zbraně; zbrojní list je certifikátem prokazujícím vlastnictví zbraně a osoba, které je zbrojní list předán, se stává vlastníkem zbraně, přičemž v případě zbraní podléhajících registraci a zbraní kategorie PO jí okamžikem předání zbrojního listu vzniká povinnost ohlášení převodu takové zbraně krajskému ředitelství policie a současně povinnost mu předložit i nabytý zbrojní list.`,c:`spolu s předložením dokladu totožnosti k prokázání oprávnění podle zákona o zbraních a střelivu.`,correct:"c"},
{id:440,cat:`Zákon o zbraních`,q:`Zbrojní list osobě, jíž se týká, vydá:`,a:`z moci úřední Ministerstvo vnitra, a to na návrh krajského ředitelství policie.`,b:`na žádost krajské ředitelství policie nebo kontaktní místo veřejné správy.`,c:`na žádost Český úřad pro zkoušení zbraní a střeliva, pokud je žadatelem osoba, která předkládá zbraň nebo střelivo k ověření, Ministerstvo obrany, je-li žadatelem voják nebo voják v záloze a krajský úřad v ostatních případech.`,correct:"b"},
{id:441,cat:`Zákon o zbraních`,q:`Zbrojní list se:`,a:`zpřístupňuje prostřednictvím portálu veřejné správy, a to po přihlášení se zaručenou elektronickou identitou; zbrojní list se na portálu veřejné správy zpřístupňuje zdarma.`,b:`z důvodu ochrany kybernetické bezpečnosti nezpřístupňuje on-line.`,c:`zasílá do datové schránky fyzické osoby, a to na základě podání písemné žádosti u krajského ředitelství policie a po uhrazení správního poplatku ve výši 300 Kč.`,correct:"a"},
{id:442,cat:`Zákon o zbraních`,q:`Zbrojní list se vydává:`,a:`výhradně s uvedením všech údajů, které se týkají oprávnění, jejichž držitelem podle zákona o zbraních a střelivu žadatel je, a všech zbraní podléhajících registraci nebo kategorie PO, s nimiž nakládá.`,b:`s uvedením všech oprávnění, které se týkají oprávnění, jejichž držitelem podle zákona o zbraních a střelivu žadatel je, a všech zbraní podléhajících registraci nebo kategorie PO, s nimiž nakládá nebo nakládal, přičemž v případě zbraní, které žadatel převedl na jiné osoby v posledních 5 letech přede dnem vydání zbrojního listu, se na zbrojním listu uvádí i osoby, které s těmito zbraněmi nakládají k okamžiku vydání zbrojního listu.`,c:`v rozsahu, o který žadatel o vydání zbrojního listu požádá, přičemž ve zbrojním listu mohou být uvedeny údaje o všech nebo též pouze o některých oprávněních, jejichž držitelem podle zákon o zbraních a střelivu žadatel je, a všech nebo pouze některých zbraní podléhajících registraci nebo kategorie PO, s nimiž nakládá.`,correct:"c"},
{id:443,cat:`Zákon o zbraních`,q:`Zbrojní list platí:`,a:`po dobu 1 roku ode dne jeho vydání.`,b:`po dobu 30 dnů ode dne jeho vydání, není-li v něm uvedena doba platnosti kratší.`,c:`k okamžiku jeho vydání; zbrojní list nemá omezenou dobu platnosti či použitelnosti, vždy je ale třeba zvážit, zda je zbrojní list, od jehož vydání uběhla určitá doba, dostatečně relevantní a důvěryhodný pro prokázání existence určitého oprávnění v určité situaci.`,correct:"c"},
{id:444,cat:`Zákon o zbraních`,q:`Zbrojní list podle zákona o zbraních a střelivu nenahrazuje:`,a:`doklad o registraci zbraně, rozhodnutí o vydání výjimky kategorie R1 nebo R2 anebo povolení kategorie R3.`,b:`evropský zbrojní pas, zbrojní průvodní list nebo jinou listinu vydávanou v souvislosti s přeshraničním přemístěním zbraně nebo střeliva, potvrzení hlášení přepravy zbraní nebo střeliva, nebo certifikát znehodnocené zbraně.`,c:`doklad o zbrojním oprávnění nebo zbrojní licenci skupiny ZL2 nebo ZL3.`,correct:"b"},
{id:445,cat:`Zákon o zbraních`,q:`Pro rozhodnutí o přiznání práva (např. vyhovění žádosti o vydání zbrojního oprávnění, zbrojní licence, výjimky kategorie R1, S1, R2 nebo S2 anebo povolení kategorie R3, registraci zbraně) platí, že:`,a:`rozhodnutí se písemně nevyhotovuje a krajské ředitelství policie pouze zapíše údaj o přiznání práva do centrálního registru zbraní.`,b:`nabude právní moci 15. dnem po zápisu do centrálního registru zbraní.`,c:`jeho zápisu do centrálního registru zbraní se žadatel nevyrozumívá.`,correct:"a"},
{id:446,cat:`Zákon o zbraních`,q:`Zbraň určená pro střelivo typu Flobert s energií střely na ústí hlavně do 7,5 J, pokud byla ověřena nebo uvedena na trh přede dnem 30. ledna 2021, je vzhledem k přechodným ustanovením zákona o zbraních a střelivu zbraní kategorie:`,a:`NO.`,b:`PO.`,c:`PO-I.`,correct:"a"},
{id:447,cat:`Zákon o zbraních`,q:`Zbraň určená pro střelivo typu Flobert, náboje ráže 4mm M20 nebo úsťovou kinetickou energií střely srovnatelné střelivo určené pro výcvik ve střelbě, pokud byla taková zbraň ověřena nebo uvedena na trh od 30. ledna 2021 do dne předcházejícího nabytí účinnosti zákona o zbraních a střelivu, je vzhledem k přechodným ustanovením zákona o zbraních a střelivu zbraní kategorie:`,a:`PO-I.`,b:`PO.`,c:`NO.`,correct:"b"},
{id:448,cat:`Zákon o zbraních`,q:`Zbraň znehodnocená přede dnem 30. ledna 2021 se považuje za zbraň kategorie NO, pokud byla:`,a:`znehodnocena postupem, který následně schválilo krajské ředitelství policie.`,b:`znehodnocena postupem stanoveným v rozhodnutí Českého úřadu pro zkoušení zbraní a střeliva.`,c:`znehodnocena v souladu s právními předpisy platnými v době svého uvedení na trh.`,correct:"c"},
{id:449,cat:`Zákon o zbraních`,q:`Povinnost označení zbraně identifikačními údaji podle § 86 zákona o zbraních a střelivu a dodatečné provedení označení zbraně identifikačními údaji se netýkají zbraně:`,a:`podléhající registraci, která byla uvedena na trh před rokem 1996 v členském státu Evropského společenství, který ověření zbraně před uvedením na trh nevyžadoval.`,b:`která byla přede dnem nabytí účinnosti tohoto zákona uvedena na trh a platně ověřena, podléhala-li taková zbraň v době svého uvedení na trh ověřování.`,c:`která byla označena v souladu s doporučením Českého střeleckého svazu.`,correct:"b"},
{id:450,cat:`Zákon o zbraních`,q:`Palnou zbraní ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu se má na mysli:`,a:`zbraň, jejíž funkce je odvozena od okamžitého uvolnění chemické energie; za palnou zbraň se považují také jiné předměty, na které se vztahuje tento zákon a které lze na palnou zbraň upravit, zejména poplašné a signalizační zbraně, akustické a salutní zbraně a polotovary hlavních částí zbraní.`,b:`zbraň určená pro použití jednotných nábojů, nábojek nebo děleného střeliva; za palnou zbraň se považují také jiné předměty, na které se vztahuje tento zákon a které lze na palnou zbraň upravit, zejména poplašné a signalizační zbraně, plynové a zápalné zbraně a polotovary hlavních částí zbraní.`,c:`zbraň, jejíž funkce je odvozena od okamžitého uvolnění potenciální mechanické energie akumulované ve střelném prachu; za palnou zbraň se považují také jiné předměty, na které se vztahuje tento zákon a které lze na palnou zbraň upravit, zejména poplašné a signalizační zbraně, akustické a salutní zbraně a zbraňové systémy založené na principu laseru, vyzařování částic nebo energie.`,correct:"a"},
{id:451,cat:`Zákon o zbraních`,q:`Definici palné zbraně ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu splňuje následující zbraň:`,a:`bajonet určený k nasazení na ústí hlavně dlouhé palné zbraně.`,b:`paintballová zbraň.`,c:`akustická zbraň.`,correct:"c"},
{id:452,cat:`Zákon o zbraních`,q:`Definici palné zbraně ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu nesplňuje následující zbraň:`,a:`polotovar hlavní části zbraně.`,b:`zbraň, jejíž funkce je odvozena od okamžitého uvolnění energie stlačeného vzduchu nebo jiného plynu.`,c:`zbraň, jejíž funkce je odvozena od okamžitého uvolnění chemické energie.`,correct:"b"},
{id:453,cat:`Zákon o zbraních`,q:`Definici palné zbraně ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu nesplňuje následující zbraň:`,a:`poplašná zbraň.`,b:`signalizační zbraň.`,c:`plynová zbraň.`,correct:"c"},
{id:454,cat:`Zákon o zbraních`,q:`Definici palné zbraně ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu nesplňuje následující zbraň:`,a:`zbraň určená pro střelivo se zápalem typu Lefaucheux.`,b:`zbraň určená pro střelivo typu Flobert.`,c:`střelná zbraň typu trébuchet.`,correct:"c"},
{id:455,cat:`Zákon o zbraních`,q:`Plynovou zbraní ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu se má na mysli zbraň, jejíž funkce je odvozena od:`,a:`okamžitého uvolnění energie stlačeného vzduchu nebo jiného plynu.`,b:`okamžitého uvolnění dynamické nebo mechanické energie.`,c:`tlaku plynů vznikajících při výbušném hoření střelného prachu.`,correct:"a"},
{id:456,cat:`Zákon o zbraních`,q:`Krátkou palnou zbraní ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu se rozumí:`,a:`palná zbraň, jejíž délka v nejkratším funkčním stavu nepřesahuje 300 mm nebo jejíž délka hlavně nepřesahuje 152,4 mm (6 palců).`,b:`palná zbraň, jejíž délka v nejkratším funkčním stavu nepřesahuje 300 mm nebo jejíž celková délka i s případnou vysunoutou nebo vztyčenou ramenní opěrou a s nasazeným úsťovým zařízením (tlumič hluku výstřelu, kompenzátor apod.) nepřesahuje 600 mm.`,c:`palná zbraň, jejíž délka v nejkratším funkčním stavu nepřesahuje 600 mm nebo jejíž délka hlavně nepřesahuje 300 mm.`,correct:"c"},
{id:457,cat:`Zákon o zbraních`,q:`Definici krátké palné zbraně ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu splňuje zbraň, jejíž délka v nejkratším funkčním stavu činí 620 mm a:`,a:`délka hlavně její hlavně je 400 mm.`,b:`délka její hlavně je 200 mm.`,c:`bez ohledu na délku hlavně taková zbraň nebude vzhledem k celkové délce nikdy považována za krátkou.`,correct:"b"},
{id:458,cat:`Zákon o zbraních`,q:`Definici dlouhé palné zbraně ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu splňuje následující zbraň:`,a:`palná zbraň, jejíž délka hlavně je 295 mm.`,b:`palná zbraň s hlavní délky 610 mm.`,c:`palná zbraň, jejíž délka v nejkratším funkčním stavu činí 550 mm.`,correct:"b"},
{id:459,cat:`Zákon o zbraních`,q:`Dlouhou palnou zbraní ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je vždy:`,a:`palná zbraň s celkovou délkou minimálně 600 mm.`,b:`palná zbraň, která není krátkou zbraní.`,c:`palná zbraň s hlavní délky alespoň 300 mm.`,correct:"b"},
{id:460,cat:`Zákon o zbraních`,q:`Samočinnou (automatickou) palnou zbraní ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`palná zbraň, u níž se opětovné nabití děje v důsledku předchozího výstřelu a jejíž konstrukce neumožňuje více výstřelů na jedno stisknutí spouště.`,b:`palná zbraň, u níž se opětovné nabití děje využitím energie předchozího výstřelu a jejíž konstrukce umožňuje více výstřelů na jedno stisknutí spouště, nebo externího pohonu odlišného od ruční manipulace s jejím závěrovým mechanismem.`,c:`dlouhá samonabíjecí palná zbraň, jejíž zásobník nebo nábojová schránka a nábojová komora nemohou dohromady pojmout více než 3 náboje a jsou odnímatelné, nebo u níž není zaručeno, že nemůže být přeměněna běžně dostupnými nástroji na zbraň, jejíž zásobník nebo nábojová schránka a nábojová komora mohou dohromady pojmout více než 3 náboje.`,correct:"b"},
{id:461,cat:`Zákon o zbraních`,q:`Definici samočinné (automatické) palné zbraně ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu nesplňuje palná zbraň, u níž se opětovné nabití děje:`,a:`využitím externího pohonu odlišného od ruční manipulace s jejím závěrovým mechanismem.`,b:`v důsledku předchozího výstřelu a jejíž konstrukce neumožňuje více výstřelů na jedno stisknutí spouště.`,c:`využitím energie předchozího výstřelu a jejíž konstrukce umožňuje více výstřelů na jedno stisknutí spouště.`,correct:"b"},
{id:462,cat:`Zákon o zbraních`,q:`Samonabíjecí (poloautomatickou) palnou zbraní ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu se rozumí:`,a:`palná zbraň, jejíž délka v nejkratším funkčním stavu nepřesahuje 600 mm nebo jejíž délka hlavně nepřesahuje 300 mm.`,b:`u níž se opětovné nabití děje využitím energie předchozího výstřelu a jejíž konstrukce umožňuje více výstřelů na jedno stisknutí spouště, nebo externího pohonu odlišného od ruční manipulace s jejím závěrovým mechanismem.`,c:`palná zbraň, u níž se opětovné nabití děje v důsledku předchozího výstřelu a jejíž konstrukce neumožňuje více výstřelů na jedno stisknutí spouště.`,correct:"c"},
{id:463,cat:`Zákon o zbraních`,q:`Definici samonabíjecí (poloautomatické) palné zbraně ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu splňuje palná zbraň, u níž se opětovné nabití děje:`,a:`v důsledku předchozího výstřelu a jejíž konstrukce neumožňuje více výstřelů na jedno stisknutí spouště.`,b:`ruční manipulací se závěrovým mechanismem zbraně.`,c:`využitím externího pohonu odlišného od ruční manipulace s jejím závěrovým mechanismem.`,correct:"a"},
{id:464,cat:`Zákon o zbraních`,q:`Opakovací palnou zbraní ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu se rozumí palná zbraň:`,a:`u níž se opětovné nabití děje využitím energie předchozího výstřelu a jejíž konstrukce umožňuje více výstřelů na jedno stisknutí spouště.`,b:`u níž se opětovné nabití děje využitím externího pohonu odlišného od ruční manipulace s jejím závěrovým mechanismem.`,c:`jejíž konstrukce umožňuje použití se zásobníkem nebo jiným podávacím ústrojím a u níž je opětovné nabití prováděno ruční manipulací se závěrovým mechanismem zbraně.`,correct:"c"},
{id:465,cat:`Zákon o zbraních`,q:`Běžný revolver je dle přílohy č. 1 k zákonu o zbraních a střelivu považován za:`,a:`samonabíjecí palnou zbraň.`,b:`palnou zbraň nabíjenou jednotlivě.`,c:`opakovací palnou zbraň.`,correct:"c"},
{id:466,cat:`Zákon o zbraních`,q:`Palná zbraň nabíjená jednotlivě ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu se nabíjí:`,a:`ručním vložením nebo nabitím střeliva do nábojové komory, hlavně nebo nábojiště.`,b:`mechanickým vložením nebo nabitím střeliva do nábojové komory, hlavně nebo nábojiště.`,c:`ručním vložením nebo nabitím střeliva pouze do hlavně.`,correct:"a"},
{id:467,cat:`Zákon o zbraních`,q:`Běžná dvouranová broková kozlice je podle přílohy č. 1 k zákonu o zbraních a střelivu považována za:`,a:`palnou zbraň nabíjenou jednotlivě.`,b:`opakovací palnou zbraň.`,c:`salutní zbraň.`,correct:"a"},
{id:468,cat:`Zákon o zbraních`,q:`Akustická a salutní zbraň ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`pracovní zařízení nebo rázový stroj zkonstruované na principu palné zbraně a určené k průmyslovým nebo technickým účelům nebo k jateční porážce zvířat.`,b:`palná zbraň zvláště upravená pro střelbu pouze s využitím nábojek nebo cvičných nábojů.`,c:`palná zbraň, jejíž funkce je odvozena od okamžitého uvolnění energie stlačeného vzduchu nebo jiného plynu.`,correct:"b"},
{id:469,cat:`Zákon o zbraních`,q:`Poplašná a signalizační zbraň je ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je palná zbraň pro střelbu nábojek nebo cvičných nábojů, dráždivých nebo obdobných účinných látek anebo pyrotechnických signalizačních nábojů, která:`,a:`nemůže být přeměněna na palnou zbraň umožňující ostrou střelbu.`,b:`byla z původně ostré zbraně upravená pro střelbu pouze s využitím nábojek nebo cvičných nábojů.`,c:`může být přeměněna pouze na palnou zbraň, jejíž funkce je odvozena od okamžitého uvolnění energie stlačeného vzduchu nebo jiného plynu, a to pouze doplňkově k její základní funkci.`,correct:"a"},
{id:470,cat:`Zákon o zbraních`,q:`Neaktivní zbraň je ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu původně palná zbraň, která:`,a:`není nabita náboji v zásobníku, nábojové schránce nebo jiném zásobovacím mechanismu; nabitím se taková zbraň mění na aktivní a musí být zabezpečena v souladu s technickými požadavky stanovenými zákonem a nařízením vlády.`,b:`byla vyrobena do 31. prosince 1890, za podmínky, že všechny hlavní části zbraně byly vyrobeny do 31. prosince 1890.`,c:`se stala trvale a nevratně nefunkční; za neaktivní zbraň je považována znehodnocená zbraň, řez zbraně a neaktivní torzo zbraně.`,correct:"c"},
{id:471,cat:`Zákon o zbraních`,q:`Definici neaktivní zbraně ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu nesplňuje:`,a:`neaktivní zbraň, která byla, včetně všech jejích hlavních částí, učiněna trvale nefunkční postupem stanoveným tímto zákonem, přímo použitelným předpisem Evropské unie nebo jiným právním předpisem.`,b:`palná zbraň, která byla vyrobena do 31. prosince 1890, za podmínky, že všechny hlavní části zbraně byly vyrobeny do 31. prosince 1890, a taková zbraň střelbyschopná.`,c:`neaktivní zbraň, u níž je poškození nebo degradace takového rozsahu, že její uschopnění ke střelbě je vyloučeno.`,correct:"b"},
{id:472,cat:`Zákon o zbraních`,q:`Znehodnocenou zbraní je ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu:`,a:`palná zbraň zvláště upravená pro střelbu pouze s využitím nábojek nebo cvičných nábojů, pro použití například při divadelních představeních, fotografování, filmových a televizních záznamech, rekonstrukcích historických událostí, přehlídkách nebo sportovních akcích.`,b:`neaktivní zbraň, která byla, včetně všech jejích hlavních částí, učiněna trvale nefunkční postupem stanoveným tímto zákonem, přímo použitelným předpisem Evropské unie nebo jiným právním předpisem.`,c:`neaktivní zbraň, u níž je poškození nebo degradace takového rozsahu, že její uschopnění ke střelbě je vyloučeno.`,correct:"b"},
{id:473,cat:`Zákon o zbraních`,q:`Plynová zbraň konstruovaná pro vystřelování neletální střely a určená pro výcvikové, sportovní nebo rekreační účely je ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu považována za:`,a:`paintballovou a airsoftovou zbraň.`,b:`pracovní zařízení nebo rázový stroj zkonstruované na principu palné zbraně a určené k průmyslovým nebo technickým účelům nebo k jateční porážce zvířat.`,c:`signální zbraň.`,correct:"a"},
{id:474,cat:`Zákon o zbraních`,q:`Paintballovou zbraní je ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu:`,a:`plynová zbraň konstruovaná pro vystřelování neletální střely a určená pro výcvikové, sportovní nebo rekreační účely.`,b:`plynová nebo palná zbraň konstruovaná pro vystřelování střely obsahující barvu, určená pro spolehlivé označení cíle při výcviku, přičemž úsťová kinetická energie takové střely smí být nejvíce 200 J.`,c:`plynová zbraň určená pro vystřelování barevně označených nábojů.`,correct:"a"},
{id:475,cat:`Zákon o zbraních`,q:`Mezi historické zbraně se podle přílohy č. 1 k zákonu o zbraních a střelivu zařazuje:`,a:`palná zbraň, která byla vyrobena do 31. prosince 1890.`,b:`palná zbraň vyrobená před dobou delší než 100 let.`,c:`palná zbraň, která byla vyrobena do 31. prosince 1869.`,correct:"a"},
{id:476,cat:`Zákon o zbraních`,q:`Definici historické zbraně smyslu přílohy č. 1 k zákonu o zbraních a střelivu splňuje:`,a:`opakovací dlouhá kulová zbraň, která byla vyrobena do 31. prosince 1890, přičemž nejvýše jedna z hlavních částí takové zbraně může být vyrobena též později (například hlaveň vyměněná v rámci opravy za novou).`,b:`opakovací krátká kulová zbraň, která byla zkonstruována nejpozději 31. prosince 1890 bez ohledu na datum skutečné výroby.`,c:`opakovací dlouhá broková zbraň, která byla vyrobena do 31. prosince 1890, za podmínky, že všechny hlavní části zbraně byly vyrobeny do 31. prosince 1890.`,correct:"c"},
{id:477,cat:`Zákon o zbraních`,q:`Mezi historické zbraně se podle přílohy č. 1 k zákonu o zbraních a střelivu zařazují:`,a:`chladné zbraně včetně vojenských bajonetů, které byla zkonstruovány do 31. prosince 1890.`,b:`plynové zbraně, které byly zkonstruovány do 31. prosince 1890 (např. Girandoniho vojenská větrovka).`,c:`funkční repliky historických perkusních revolverů zkonstruovaných nejpozději 31. prosince 1890 (např. revolver LeMat).`,correct:"b"},
{id:478,cat:`Zákon o zbraních`,q:`Historickou zbraní ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu není:`,a:`plynová zbraň, která byla zkonstruována do 31. prosince 1890.`,b:`opakovací palná zbraň, která byla vyrobena do 31. prosince 1890, za podmínky, že všechny hlavní části zbraně byly vyrobeny do 31. prosince 1890.`,c:`neaktivní torzo palné zbraně vyrobené a zavedené do výzbroje některé z válčících stran v období 1. světové války.`,correct:"c"},
{id:479,cat:`Zákon o zbraních`,q:`Jednoranová jehlovka, která byla zkonstruována do 31. prosince 1890, se dle přílohy č. 1 k zákonu o zbraních a střelivu řadí mezi:`,a:`bodné zbraně.`,b:`historické zbraně.`,c:`opakovací palné zbraně.`,correct:"b"},
{id:480,cat:`Zákon o zbraních`,q:`Aktivními komponenty střeliva se dle přílohy č. 1 k zákonu o zbraních a střelivu rozumí:`,a:`pyrotechnické výrobky určené k výrobě nábojů.`,b:`zápalky a střeliviny, se kterými se nakládá za účelem výroby střeliva, jeho přebíjení nebo pro použití ve zbrani, a střely obsahující aktivní náplň, zejména střely výbušné, zápalné a svítící.`,c:`zápalky, střeliviny, střely obsahující aktivní náplň, zejména střely výbušné, zápalné a svítící, střely průbojné, střely s řízenu deformací, střely typu SP a FMJ, nábojnice a kalibrační matrice.`,correct:"b"},
{id:481,cat:`Zákon o zbraních`,q:`Nábojem ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`celek určený k nabití do palné zbraně, který obsahuje aktivní komponent střeliva a který není nábojkou nebo děleným střelivem.`,b:`náboj, který splňuje požadavky Úmluvy o vzájemném uznávání zkušebních značek ručních palných zbraní (C.I.P); náboje, které požadavky Úmluvy nesplňují, se pouvažují za munici.`,c:`pevné těleso nebo více pevných těles určené k zasažení cíle nebo vyvolání jiného účinku.`,correct:"a"},
{id:482,cat:`Zákon o zbraních`,q:`Pro ostrou střelbu z palné zbraně je určen náboj:`,a:`delaborovaný.`,b:`cvičný.`,c:`se střelou jednotnou nebo hromadnou.`,correct:"c"},
{id:483,cat:`Zákon o zbraních`,q:`Cvičným nábojem ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`výrobní provedení náboje určené pro simulaci ostré střelby, a to zejména prostřednictvím akustického, popřípadě vizuálního efektu; jinými slovy se jedná o „slepou“ variantu náboje standardní „ostré ráže“.`,b:`nábojka zkonstruovaná tak, aby nemohlo dojít k nabití podobného „ostrého“ střeliva do zbraně komorované pro takovou nábojku; jinými slovy se jedná o střelivo, které bylo speciálně zkonstruované jako „slepé“.`,c:`maketa náboje, která neobsahuje vůbec žádné aktivní komponenty střeliva; někdy se rovněž hovoří o školních nábojích.`,correct:"a"},
{id:484,cat:`Zákon o zbraních`,q:`Signálním nábojem ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`náboj pro signální zbraň; tyto náboje obvykle obsahují pyrotechnický prostředek např. typu světlice a nejčastější ráží tohoto střeliva pro ruční signální zbraně je v současnosti signální náboj ráže 26,5 mm.`,b:`náboj pro poplašnou a signalizační zbraň; tyto náboje jsou určeny pro simulaci ostré střelby a případně pro vytvoření dalších akustických a světelných efektů a používají se také v expanzních přístrojích, například pro jateční porážku zvířat.`,c:`maketa náboje vybavená „vlaječkou“ výrazné barvy, jejímž účelem je při vložení do nábojové komory zbraně signalizovat, že daná zbraň není nabita „ostrým“ střelivem.`,correct:"a"},
{id:485,cat:`Zákon o zbraních`,q:`Nábojkou ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`celek zhotovený z náboje delaborací jednotné nebo hromadné střely a uzavřením nábojnice obvykle tzv. hvězdicí; nábojky patří do skupiny expanzní munice.`,b:`nábojnice, která se po naplnění střelným prachem a osazení zápalkou a střelou považuje za náboj.`,c:`celek, který je za nábojku považován podle Úmluvy o vzájemném uznávání zkušebních značek ručních palných zbraní; nábojka je určena například pro simulaci ostré střelby při použití v poplašných a signalizačních zbraních.`,correct:"c"},
{id:486,cat:`Zákon o zbraních`,q:`Děleným střelivem ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`sestava, která je určena k nabití do palné zbraně a u níž jsou střela a aktivní komponenty střeliva nabíjeny do palné zbraně samostatně.`,b:`náboj pro poplašnou a signalizační zbraň, ze kterého byl oddělen projektil z důvodu zajištění bezpečného použití při simulaci ostré střelby.`,c:`sestava držená v jednom celku nábojnicí a určená k nabití do palné zbraně; dělené střelivo obsahuje aktivní komponent střeliva a střelu složenou ze 2 nebo více pevných těles, které se po opuštění hlavně rozdělí.`,correct:"a"},
{id:487,cat:`Zákon o zbraních`,q:`Střelou ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`náboj pro ostrou střelbu; rozlišují se náboje jednotné a hromadné.`,b:`pevné těleso určené pro vyvolání destruktivního nebo letální účinku v cíli; rozlišují se střely drážkované a brokové.`,c:`pevné těleso nebo více pevných těles určené k zasažení cíle nebo vyvolání jiného účinku.`,correct:"c"},
{id:488,cat:`Zákon o zbraních`,q:`Jednotnou střelou ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`střela, které se po opuštění hlavně nerozdělí.`,b:`střela jednotného typu, která podléhá typové kontrole podle zákona o ověřování střelných zbraní a střeliva a která může být použita v kterékoli zbrani s příslušným nominálním rozměrem vývrtu hlavně.`,c:`střela sférického nebo ogiválního tvaru, ze které se po opuštění hlavně neoddělí více než 35 % její celkové hmoty.`,correct:"a"},
{id:489,cat:`Zákon o zbraních`,q:`Hromadnou střelou se dle přílohy č. 1 k zákonu o zbraních a střelivu rozumí:`,a:`střela, která je vyráběna průmyslově v podmínkách hromadné výroby; na rozdíl od hromadných střel jsou tzv. custom střely vyráběny v zásadě kusově s důrazem na maximální přesnost a minimální tolerance.`,b:`střela složená ze 2 nebo více pevných těles, které se po opuštění hlavně rozdělí a které jsou určeny k zasažení cíle nebo vyvolání jiného účinku.`,c:`sestava, která je určena k nabití do palné zbraně a u níž jsou střela a aktivní komponenty střeliva nabíjeny do palné zbraně samostatně.`,correct:"b"},
{id:490,cat:`Zákon o zbraních`,q:`Střela pro vojenské nebo speciální účely, která obsahuje výbušnou náplň a je určená k tomu, aby po dopadu nebo za jiných vymezených podmínek explodovala je dle přílohy č. 1 k zákonu o zbraních a střelivu:`,a:`střela výbušná.`,b:`střela zápalná.`,c:`střela expanzní.`,correct:"a"},
{id:491,cat:`Zákon o zbraních`,q:`Svítící střelou se dle přílohy č. 1 k zákonu o zbraních a střelivu rozumí:`,a:`střela s hrotem z luminiscenčního plastu nebo obdobné hmoty.`,b:`střela se stopovkou zkonstruovaná tak, aby bylo možné sledovat její dráhu.`,c:`světlice.`,correct:"b"},
{id:492,cat:`Zákon o zbraních`,q:`Střelou zápalnou ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je střela pro vojenské nebo speciální účely, která:`,a:`obsahuje výbušnou náplň a je určená k tomu, aby po dopadu nebo za jiných vymezených podmínek explodovala.`,b:`u které dojde po výstřelu ze zbraně k zážehu a její dostřel činí nanejvýš 100 m, neboť po této vzdálenosti celá střela odhoří.`,c:`je určena pro vyvolání zápalného účinku.`,correct:"c"},
{id:493,cat:`Zákon o zbraních`,q:`Mezi hlavní části zbraně podle přílohy č. 1 k zákonu o zbraních a střelivu řadíme:`,a:`hlaveň, tělo zbraně, závěr, pojistné mechanismy a spoušťové a bicí ústrojí.`,b:`hlaveň, tělo zbraně, válec revolverové palné zbraně, závěr.`,c:`hlaveň, tělo zbraně, válec revolverové palné zbraně, závěr, tlumič hluku výstřelu a lafetu.`,correct:"b"},
{id:494,cat:`Zákon o zbraních`,q:`Hlavní částí zbraně podle přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`hlaveň; hlavní je i vložná hlaveň a vložná nábojová komora.`,b:`hlaveň a vložné úsťové zařízení.`,c:`hlaveň a hlaviště pažby.`,correct:"a"},
{id:495,cat:`Zákon o zbraních`,q:`Hlavní částí zbraně podle přílohy č. 1 k zákonu o zbraních a střelivu je:`,a:`závěr; závěrem se v případě historické zbraně rozumí také zámková deska.`,b:`závěr; závěrem se rozumí také závorník a nosič závorníku.`,c:`uzávěr; uzávěrem se rozumí také závorník a závora.`,correct:"b"},
{id:496,cat:`Zákon o zbraních`,q:`Závěrem se podle přílohy č. 1 k zákonu o zbraních a střelivu rozumí:`,a:`ovládací element těla zbraně a pažby, jehož manuálním ovládáním dochází k nabití a vybití zbraně a na kterou se upevňují další součásti a doplňky zbraně.`,b:`konstrukční součást, která nabíjí projektily do hlavně a její součástí je hop-up komora.`,c:`konstrukční součást, která zajišťuje uzavření komory palné zbraně a je vystavena tlakům při výstřelu.`,correct:"c"},
{id:497,cat:`Zákon o zbraních`,q:`Tělo zbraně podle přílohy č. 1 k zákonu o zbraních a střelivu:`,a:`nepatří mezi hlavní části zbraně, je pouze regulovanou součástí zbraně.`,b:`patří mezi hlavní části zbraně; tělem zbraně je také závorník a pouzdro závěru, včetně pravé a levé skořepiny děleného pouzdra závěru.`,c:`patří mezi hlavní části zbraně; tělem zbraně je také rám revolverové zbraně a pouzdro závěru, včetně horní a dolní části děleného pouzdra závěr.`,correct:"c"},
{id:498,cat:`Zákon o zbraních`,q:`Tělem zbraně je podle přílohy č. 1 k zákonu o zbraních a střelivu:`,a:`základní nosná konstrukční součást zbraně, na které jsou ostatní hlavní části a jiné součásti zbraně upevněny nebo jsou s ní pohyblivě spojeny.`,b:`konstrukční součást, která zajišťuje uzavření komory palné zbraně a je vystavena tlakům při výstřelu.`,c:`konstrukční celek, který zajišťuje pevné a stabilní uložení zbraně v pažbě (tzv. bedding).`,correct:"a"},
{id:499,cat:`Zákon o zbraních`,q:`Mezi hlavní části zbraně podle přílohy č. 1 k zákonu o zbraních a střelivu nepatří:`,a:`nadlimitní zásobník.`,b:`válec revolverové palné zbraně.`,c:`vložná nábojová komora.`,correct:"a"},
{id:500,cat:`Zákon o zbraních`,q:`Mezi regulované součásti zbraně podle přílohy č. 1 k zákonu o zbraních a střelivu nepatří:`,a:`závorník.`,b:`noktovizor.`,c:`vložná hlaveň.`,correct:"b"},
{id:501,cat:`Zákon o zbraních`,q:`Tlumič hluku výstřelu je podle přílohy č. 1 k zákonu o zbraních a střelivu:`,a:`zařízení určené pro použití s palnou zbraní a konstruované pro celkové snížení hluku výstřelu, a to včetně snížení hluku výstřelu ve směru střelby.`,b:`zařízení určené pro použití s palnou nebo plynovou zbraní a konstruované pro snížení hluku výstřelu ve směru střelby.`,c:`zařízení určené pro použití s palnou zbraní a konstruované pro celkové snížení hluku výstřelu, a to včetně snížení hluku způsobovaného mechanickým pohybem součástí zbraně při jejím funkčním cyklu.`,correct:"a"},
{id:502,cat:`Zákon o zbraních`,q:`Za tlumič hluku výstřelu se podle přílohy č. 1 k zákonu o zbraních a střelivu považuje zařízení, které:`,a:`při použití subsonického střeliva snižuje hluk výstřelu alespoň o 15 dB.`,b:`při použití běžného střeliva snižuje hluk výstřelu alespoň o 10 dB.`,c:`při použití běžného střeliva snižuje hluk výstřelu alespoň o 45 dB.`,correct:"b"},
{id:503,cat:`Zákon o zbraních`,q:`Nadlimitním zásobníkem ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je zásobník nebo sestava nábojové schránky určené pro palnou zbraň pro střelivo se středovým zápalem s kapacitou přesahující:`,a:`10 nábojů v případě krátké palné zbraně nebo s kapacitou přesahující 20 nábojů v případě dlouhé palné zbraně.`,b:`20 nábojů v případě samonabíjecí palné zbraně nebo s kapacitou přesahující 10 nábojů v případě opakovací palné zbraně.`,c:`20 nábojů v případě krátké palné zbraně nebo s kapacitou přesahující 10 nábojů v případě dlouhé palné zbraně.`,correct:"c"},
{id:504,cat:`Zákon o zbraních`,q:`Nadlimitním zásobníkem ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu je zásobník nebo sestava nábojové schránky přesahující zákonem o zbraních a střelivu stanovenou kapacitu určené pro palnou zbraň pro střelivo:`,a:`s jednotnou střelou.`,b:`se středovým zápalem.`,c:`s okrajovým nebo středovým zápalem.`,correct:"b"},
{id:505,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie R1 podle přílohy č. 2 k zákonu o zbraních a střelivu jsou mimo jiné zařazeny:`,a:`bojová technika zařazená do výzbroje armád NATO.`,b:`zbraně zvláště účinné, kterými jsou zbraně pro střelbu munice, zápalné zbraně a zbraňové systémy na principu principu vyzařování částic nebo energie.`,c:`signální zbraně pro použití signálních nábojů ráže větší než 16 mm.`,correct:"b"},
{id:506,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie R1 podle přílohy č. 2 k zákonu o zbraních a střelivu jsou mimo jiné zařazeny:`,a:`zákeřné zbraně.`,b:`samonabíjecí palná zbraň, která vznikla nevratnou úpravou ze samočinné palné zbraně.`,c:`krátké samonabíjecí nebo opakovací palné zbraně pro použití střeliva se středovým nebo okrajovým zápalem.`,correct:"a"},
{id:507,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie R1 podle přílohy č. 2 k zákonu o zbraních a střelivu jsou zařazeny:`,a:`samonabíjecí palné zbraně pro střelivo se středovým zápalem vybavené nadlimitním zásobníkem.`,b:`zbraně hromadně účinné, záludné zbraně a samočinné palné zbraně.`,c:`zbraně zvláště účinné, zákeřné zbraně a samočinné palné zbraně.`,correct:"c"},
{id:508,cat:`Zákon o zbraních`,q:`Pro plamenomety platí, že:`,a:`jsou coby plynová zařízení zařazeny podle přílohy č. 2 k zákonu o zbraních a střelivu do kategorie PO.`,b:`nejsou zákonem o zbraních a střelivu upraveny, neboť se nejedná o střelné zbraně.`,c:`pokud jde o zápalné zbraně, pak jsou zařazeny podle přílohy č. 2 k zákonu o zbraních a střelivu do kategorie R1.`,correct:"c"},
{id:509,cat:`Zákon o zbraních`,q:`Samočinné palné zbraně jsou zařazeny podle přílohy č. 2 k zákonu o zbraních a střelivu mezi zbraně kategorie:`,a:`R1.`,b:`R4.`,c:`R3.`,correct:"a"},
{id:510,cat:`Zákon o zbraních`,q:`Zákeřnými zbraněmi ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu jsou mimo jiné:`,a:`dlouhé samonabíjecí palné zbraně zkonstruované pro střelbu s použitím ramenní opěry, kterou lze sklopením, zasunutím nebo obdobnou manipulací s ramenní opěrou zkrátit na délku kratší než 600 mm.`,b:`palné zbraně vyrobené z takových materiálů, které neumožňují tyto zbraně identifikovat při kontrolách osob a zavazadel pomocí detekčních přístrojů.`,c:`dlouhé samonabíjecí palné zbraně, jejichž zásobník nebo nábojová schránka a nábojová komora nemohou dohromady pojmout více než 3 náboje a jsou odnímatelné, nebo u nichž není zaručeno, že nemohou být přeměněny běžně dostupnými nástroji na zbraně, jejichž zásobník nebo nábojová schránka a nábojová komora mohou dohromady pojmout více než 3 náboje.`,correct:"b"},
{id:511,cat:`Zákon o zbraních`,q:`Zákeřnými zbraněmi ve smyslu přílohy č. 1 k zákonu o zbraních a střelivu nejsou:`,a:`nástrahová zařízení založená na principu palné zbraně umožňující ostrou střelbu.`,b:`palné zbraně maskované jako jiné předměty tak, aby byla jejich podstata utajena.`,c:`nášlapné protipěchotní miny.`,correct:"c"},
{id:512,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie R2 podle přílohy č. 2 k zákonu o zbraních a střelivu jsou zařazeny:`,a:`dlouhá samonabíjecí palná zbraň zkonstruovaná pro střelbu s použitím ramenní opěry, kterou lze sklopením, zasunutím nebo obdobnou manipulací s ramenní opěrou zkrátit na délku kratší než 600 mm.`,b:`nástrahová zařízení založená na principu palné zbraně umožňující ostrou střelbu.`,c:`palné zbraně vyrobené z takových materiálů, které neumožňují tyto zbraně identifikovat při kontrolách osob a zavazadel pomocí detekčních přístrojů.`,correct:"a"},
{id:513,cat:`Zákon o zbraních`,q:`Samonabíjecí palná zbraň, která vznikla nevratnou úpravou ze samočinné palné zbraně patří podle přílohy č. 2 k zákonu o zbraních a střelivu do kategorie:`,a:`R1.`,b:`R2.`,c:`R4.`,correct:"b"},
{id:514,cat:`Zákon o zbraních`,q:`Samonabíjecí palná zbraň pro střelivo se středovým zápalem vybavená nadlimitním zásobníkem patří podle přílohy č. 2 k zákonu o zbraních a střelivu do kategorie:`,a:`R1.`,b:`R2.`,c:`R4.`,correct:"b"},
{id:515,cat:`Zákon o zbraních`,q:`Samonabíjecí pušky vybavené zásobníkem se standardní kapacitou 30 nábojů jsou podle přílohy č. 2 k zákonu o zbraních a střelivu zbraněmi kategorie:`,a:`R3.`,b:`R1.`,c:`R2.`,correct:"c"},
{id:516,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie R2 podle přílohy č. 2 k zákonu o zbraních a střelivu nepatří:`,a:`akustická a salutní zbraň, která vznikla nevratnou úpravou ze zbraně kategorie R1.`,b:`samonabíjecí palná zbraň pro střelivo se středovým zápalem vybavená nadlimitním zásobníkem.`,c:`krátké palné zbraně nabíjené jednotlivě pro použití střeliva se středovým zápalem, nebo s okrajovým zápalem, jejichž celková délka je menší než 280 mm.`,correct:"c"},
{id:517,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie R3 podle přílohy č. 2 k zákonu o zbraních a střelivu jsou mimo jiné zařazeny:`,a:`akustická a salutní zbraň, která vznikla nevratnou úpravou ze zbraně kategorie R2.`,b:`dlouhé samonabíjecí nebo opakovací palné zbraně s hlavní s hladkým vývrtem, pokud délka hlavně nepřesahuje 600 mm.`,c:`krátké jednoranové nebo dvouranové palné zbraně nabíjené jednotlivě pro použití děleného střeliva.`,correct:"b"},
{id:518,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie R3 podle přílohy č. 2 k zákonu o zbraních a střelivu jsou zařazeny:`,a:`krátké palné zbraně nabíjené jednotlivě pro použití střeliva se středovým zápalem.`,b:`dlouhé palné zbraně s hlavní s hladkým vývrtem nabíjené jednotlivě, pokud délka hlavně nepřesahuje 600 mm.`,c:`samonabíjecí, opakovací a jednotlivě nabíjené palné zbraně neuvedené v jiných kategoriích.`,correct:"a"},
{id:519,cat:`Zákon o zbraních`,q:`Krátké palné zbraně nabíjené jednotlivě pro použití střeliva s okrajovým zápalem, jejichž celková délka je menší než 280 mm patří podle přílohy č. 2 k zákonu o zbraních a střelivu do kategorie:`,a:`PO.`,b:`R3.`,c:`R4.`,correct:"b"},
{id:520,cat:`Zákon o zbraních`,q:`Dlouhé palné zbraně vyrobené jako samonabíjecí, jejichž zásobník nebo nábojová schránka a nábojová komora mohou dohromady pojmout více než 3 náboje avšak nejvýše 10 nábojů patří podle přílohy č. 2 k zákonu o zbraních a střelivu do kategorie:`,a:`R4.`,b:`R3.`,c:`R2.`,correct:"b"},
{id:521,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie R3 podle přílohy č. 2 k zákonu o zbraních a střelivu nepatří:`,a:`jednoranové nebo dvouranové palné zbraně nabíjené jednotlivě pro použití děleného střeliva.`,b:`samonabíjecí palné zbraně, pokud mají vzhled samočinných palných zbraní.`,c:`dlouhé samonabíjecí palné zbraně, jejichž zásobník nebo nábojová schránka a nábojová komora nemohou dohromady pojmout více než 3 náboje avšak nejvíce 10 nábojů a jsou odnímatelné, nebo u nichž není zaručeno, že nemohou být přeměněny běžně dostupnými nástroji na zbraně, jejichž zásobník nebo nábojová schránka a nábojová komora mohou dohromady pojmout více než 3 náboje.`,correct:"a"},
{id:522,cat:`Zákon o zbraních`,q:`Signální zbraně ráže 26,5 mm jsou podle přílohy č. 2 k zákonu o zbraních a střelivu zbraněmi kategorie:`,a:`R3.`,b:`R1.`,c:`PO.`,correct:"a"},
{id:523,cat:`Zákon o zbraních`,q:`Samonabíjecí nebo opakovací palné zbraně s hladkým vývrtem hlavně, jejichž zásobovací ústrojí a nábojová komora nemohou dohromady pojmout více než tři náboje a délka jejich hlavně větší než 60 cm, jsou podle přílohy č. 2 k zákonu o zbraních a střelivu zbraněmi kategorie:`,a:`R3.`,b:`R2.`,c:`R4.`,correct:"c"},
{id:524,cat:`Zákon o zbraních`,q:`Typické samonabíjecí pistole vybavené odnímatelným zásobníkem s kapacitou 10 až 20 ran jsou podle přílohy č. 2 k zákonu o zbraních a střelivu zbraněmi kategorie:`,a:`R3.`,b:`R2.`,c:`R4.`,correct:"a"},
{id:525,cat:`Zákon o zbraních`,q:`Krátké palné zbraně nabíjené jednotlivě pro použití střeliva s okrajovým zápalem, jejichž celková délka je rovna nebo větší než 280 mm, jsou podle přílohy č. 2 k zákonu o zbraních a střelivu zařazeny do kategorie:`,a:`R4.`,b:`R3.`,c:`PO.`,correct:"a"},
{id:526,cat:`Zákon o zbraních`,q:`Běžné dlouhé dvouranové brokovnice s lůžkovým závěrem, jakými jsou kozlice nebo dvojky, jsou podle přílohy č. 2 k zákonu o zbraních a střelivu zbraněmi kategorie:`,a:`R2.`,b:`R4.`,c:`R3.`,correct:"b"},
{id:527,cat:`Zákon o zbraních`,q:`Dlouhé opakovací kulové zbraně pro střelivo se středovým zápalem (opakovací puška nebo kulovnice) jsou podle přílohy č. 2 k zákonu o zbraních a střelivu zbraněmi kategorie:`,a:`R4.`,b:`R3.`,c:`R2.`,correct:"a"},
{id:528,cat:`Zákon o zbraních`,q:`Dlouhé opakovací kulové zbraně pro střelivo se okrajovým zápalem (opakovací malorážky) jsou podle přílohy č. 2 k zákonu o zbraních a střelivu zbraněmi kategorie:`,a:`R3.`,b:`PO.`,c:`R4.`,correct:"c"},
{id:529,cat:`Zákon o zbraních`,q:`Samonabíjecí nebo opakovací palné zbraně s hladkým vývrtem hlavně, jejichž zásobovací ústrojí a nábojová komora nemohou dohromady pojmout více než tři náboje a délka jejich hlavně větší než 60 cm, jsou podle přílohy č. 2 k zákonu o zbraních a střelivu zbraněmi kategorie:`,a:`R3.`,b:`R2.`,c:`R4.`,correct:"c"},
{id:530,cat:`Zákon o zbraních`,q:`Samonabíjecí palné zbraně s drážkovaným vývrtem hlavně, jejichž zásobovací ústrojí a nábojová komora nemohou dohromady pojmout více než tři náboje a nelze je ani běžně dostupnými nástroji upravit tak, aby jejich zásobovací ústrojí mělo vyšší kapacitu, patří podle přílohy č. 2 k zákonu o zbraních a střelivu do kategorie:`,a:`R2.`,b:`R4.`,c:`NO.`,correct:"b"},
{id:531,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie PO podle přílohy č. 2 k zákonu o zbraních a střelivu jsou mimo jiné zařazeny:`,a:`palné zbraně vyrobené z takových materiálů, které neumožňují tyto zbraně identifikovat při kontrolách osob a zavazadel pomocí detekčních přístrojů.`,b:`neletální zneschopňující prostředky založené na principu palné nebo plynové zbraně.`,c:`plynové zbraně nejvýše ráže 6,35 mm.`,correct:"b"},
{id:532,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie PO podle přílohy č. 2 k zákonu o zbraních a střelivu jsou mimo jiné zařazeny:`,a:`poplašné a signalizační zbraně.`,b:`historické zbraně.`,c:`signální zbraně pro použití signálních nábojů ráže větší než 16 mm.`,correct:"a"},
{id:533,cat:`Zákon o zbraních`,q:`Jednoranové nebo dvouranové palné zbraně nabíjené jednotlivě pro použití děleného střeliva patří podle přílohy č. 2 k zákonu o zbraních a střelivu do kategorie:`,a:`R3.`,b:`PO.`,c:`NO.`,correct:"b"},
{id:534,cat:`Zákon o zbraních`,q:`Zbraně znehodnocené v souladu s přímo použitelným předpisem Evropské unie, kterým se stanoví technické specifikace pro znehodnocování palných zbraní patří podle přílohy č. 2 k zákonu o zbraních a střelivu do kategorie:`,a:`R2.`,b:`PO.`,c:`NO.`,correct:"b"},
{id:535,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie PO podle přílohy č. 2 k zákonu o zbraních a střelivu nepatří:`,a:`neletální zneschopňující prostředek založený na principu palné nebo plynové zbraně.`,b:`plynové zbraně s ráží vyšší než 6,35 mm, nejde-li o paintballové, airsoftové nebo obdobné zbraně.`,c:`expanzní přístroje.`,correct:"c"},
{id:536,cat:`Zákon o zbraních`,q:`Zbraněmi kategorie NO podle přílohy č. 2 k zákonu o zbraních a střelivu jsou:`,a:`expanzní přístroje, neaktivní zbraně nezahrnuté do kategorie PO, historické zbraně, plynové zbraně nejvýše ráže 6,35 mm, paintballové a airsoftové zbraně.`,b:`poplašné a signalizační zbraně, expanzní přístroje, tasery, vzduchovky, větrovky, plynové zbraně na CO2 a historické zbraně zkonstruované nejpozději 31. ledna 1899.`,c:`expanzní přístroje, historické zbraně, paintballové a airsoftové zbraně a ostatní střelné zbraně nezahrnuté do jiných kategorií.`,correct:"a"},
{id:537,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie NO podle přílohy č. 2 k zákonu o zbraních a střelivu jsou mimo jiné zařazeny:`,a:`záchranářské signální zbraně.`,b:`historické zbraně.`,c:`kuše s nátahovou silou přesahující 200 N.`,correct:"b"},
{id:538,cat:`Zákon o zbraních`,q:`Expanzní přístroje patří podle přílohy č. 2 k zákonu o zbraních a střelivu do kategorie:`,a:`RO.`,b:`PO.`,c:`NO.`,correct:"c"},
{id:539,cat:`Zákon o zbraních`,q:`Mezi zbraně kategorie NO podle přílohy č. 2 k zákonu o zbraních a střelivu nepatří:`,a:`neaktivní zbraně nezahrnuté do kategorie PO.`,b:`laserové značkovače a obdobná přenosná ruční laserová zařízení, která mohou oslepit.`,c:`plynové zbraně nejvýše ráže 6,35 mm.`,correct:"b"},
{id:540,cat:`Zákon o zbraních`,q:`Mezi střelivo kategorie S1 podle přílohy č. 2 k zákonu o zbraních a střelivu jsou mimo jiné zařazeny:`,a:`náboje nezjistitelné pomocí detekčních a rentgenových přístrojů.`,b:`náboje se svítící střelou.`,c:`aktivní komponenty střeliva, s výjimkou výbušných, zápalných nebo svítících střel.`,correct:"a"},
{id:541,cat:`Zákon o zbraních`,q:`Náboje obsahující ve své sestavě střelu výbušnou, zápalnou nebo průbojnou jsou podle přílohy č. 2 k zákonu o zbraních a střelivu střelivem kategorie:`,a:`S1.`,b:`S2.`,c:`S3.`,correct:"a"},
{id:542,cat:`Zákon o zbraních`,q:`Mezi střelivo kategorie S1 nepatří:`,a:`aktivní komponenty střeliva, pokud jde o výbušné a zápalné střely.`,b:`náboje nezjistitelné pomocí detekčních a rentgenových přístrojů.`,c:`náboje s pyrotechnickým prostředkem podle zákona o pyrotechnice s akustickým, světelným nebo dýmovým efektem určené pro střelbu z palných zbraní.`,correct:"c"},
{id:543,cat:`Zákon o zbraních`,q:`Mezi střelivo kategorie S1 podle přílohy č. 2 k zákonu o zbraních a střelivu jsou mimo jiné zařazeny:`,a:`náboje s průbojnou střelou, kterou se rozumí střela pro vojenské nebo speciální účely, která je tvořena materiálem tvrdším než 250 HB.`,b:`náboje se střelou typu dum-dum.`,c:`náboje s průraznou střelou, kterou se rozumí střela pro vojenské nebo speciální účely, která je konstruována tak, aby prorazila plnou železobetonovou bariéru minimálně do hloubky 250 mm.`,correct:"a"},
{id:544,cat:`Zákon o zbraních`,q:`Mezi střelivo kategorie S2 podle přílohy č. 2 k zákonu o zbraních a střelivu jsou zařazeny:`,a:`náboje obsahující ve své sestavě střelu výbušnou, zápalnou nebo průbojnou.`,b:`náboje pro krátké palné zbraně obsahující ve své sestavě střelu s řízenou deformací nebo fragmentací určenou k vyvolání zvýšeného ranivého účinku.`,c:`aktivní komponenty střeliva, s výjimkou výbušných, zápalných nebo svítících střel.`,correct:"b"},
{id:545,cat:`Zákon o zbraních`,q:`Náboje se svítící střelou jsou podle přílohy č. 2 k zákonu o zbraních a střelivu střelivem kategorie:`,a:`S1.`,b:`S2.`,c:`S3.`,correct:"b"},
{id:546,cat:`Zákon o zbraních`,q:`Mezi střelivo kategorie S2 nepatří:`,a:`cvičné náboje.`,b:`náboje pro krátké palné zbraně obsahující ve své sestavě střelu s řízenou deformací nebo fragmentací určenou k vyvolání zvýšeného ranivého účinku.`,c:`aktivní komponenty střeliva, pokud jde o svítící střely.`,correct:"a"},
{id:547,cat:`Zákon o zbraních`,q:`Mezi střelivo kategorie S3 podle přílohy č. 2 k zákonu o zbraních a střelivu jsou zařazeny:`,a:`náboje s hromadnou nebo jednotnou střelou neuvedené v jiných kategoriích střeliva.`,b:`aktivní komponenty střeliva, s výjimkou výbušných, zápalných nebo svítících střel.`,c:`náboje obsahující ve své sestavě střelu výbušnou, zápalnou nebo průbojnou.`,correct:"a"},
{id:548,cat:`Zákon o zbraních`,q:`Náboje s pyrotechnickým prostředkem podle zákona o pyrotechnice s akustickým, světelným nebo dýmovým efektem určené pro střelbu z palných zbraní jsou ohledem na přílohu č. 2 k zákonu o zbraních a střelivu:`,a:`střelivem kategorie S1.`,b:`tyto speciální náboje nejsou považovány za střelivo a podléhají regulaci zákona o munici.`,c:`střelivem kategorie S3.`,correct:"c"},
{id:549,cat:`Zákon o zbraních`,q:`Mezi střelivo kategorie S3 podle přílohy č. 2 k zákonu o zbraních a střelivu nepatří:`,a:`cvičné náboje.`,b:`nábojky.`,c:`signální náboje určené pro signální zbraně ráže větší než 16 mm.`,correct:"b"},
{id:550,cat:`Zákon o zbraních`,q:`Běžné střelivo pro ruční palné zbraně používané v civilním sektoru, například náboje s celoplášťovou (FMJ) střelou pro pistole nebo pro pušky, jsou podle přílohy č. 2 k zákonu o zbraních a střelivu považovány za střelivo kategorie:`,a:`S2.`,b:`S3.`,c:`S4.`,correct:"b"},
{id:551,cat:`Zákon o zbraních`,q:`Běžné náboje s poloplášťovou (SP) střelou pro krátké nebo dlouhé zbraně jsou podle přílohy č. 2 k zákonu o zbraních a střelivu považovány za střelivo kategorie:`,a:`S4.`,b:`S2.`,c:`S3.`,correct:"c"},
{id:552,cat:`Zákon o zbraních`,q:`Náboje s běžnou jednotnou nebo hromadnou střelou s okrajovým zápalem, například náboje typu Flobert, jsou podle přílohy č. 2 k zákonu o zbraních a střelivu považovány za střelivo kategorie:`,a:`S4.`,b:`S3.`,c:`PO.`,correct:"b"},
{id:553,cat:`Zákon o zbraních`,q:`Mezi střelivo kategorie S4 podle přílohy č. 2 k zákonu o zbraních a střelivu mimo jiné patří:`,a:`náboje s hromadnou nebo jednotnou střelou neuvedené v jiných kategoriích střeliva.`,b:`aktivní komponenty střeliva, s výjimkou výbušných, zápalných nebo svítících střel.`,c:`náboje pro krátké palné zbraně obsahující ve své sestavě střelu s řízenou deformací nebo fragmentací určenou k vyvolání zvýšeného ranivého účinku.`,correct:"b"},
{id:554,cat:`Zákon o zbraních`,q:`Nábojky a signální náboje určené pro signální zbraně nejvýše ráže 16 mm jsou podle přílohy č. 2 k zákonu o zbraních a střelivu považovány za střelivo kategorie:`,a:`S3.`,b:`S2.`,c:`S4.`,correct:"c"},
{id:555,cat:`Zákon o zbraních`,q:`Přílohy č. 1 a 2 k zákonu o zbraních a střelivu stanovují:`,a:`seznam prováděcích předpisů k zákonu o zbraních a střelivu a odkazů na směrnice Evropského parlamentu a Rady (EU) a nařízení Komise (EU).`,b:`druhy zbraní, střeliva a regulovaných součástí zbraní a jejich zařazení do kategorií zbraní a střeliva.`,c:`zdravotnické minimum a zásady první pomoci (příloha č. 1) a zásady bezpečného nakládání se zbraněmi a střelivem (příloha č. 2).`,correct:"b"},
{id:556,cat:`Zákon o zbraních`,q:`Právně závazné technické a organizační požadavky na střelnice jsou stanoveny:`,a:`v příloze č. 3 zákona o zbraních a střelivu a střelivu.`,b:`v technických normách (ČSN).`,c:`pro střelnice v rámci jednoho kraje v územním výměru vydávaném periodicky místně příslušným krajským ředitelstvím policie.`,correct:"a"},
{id:557,cat:`Zákon o zbraních`,q:`Ohroženým prostorem ve smyslu technických a organizačních požadavků na střelnice podle přílohy č. 3 k zákonu o zbraních je:`,a:`prostor střelnice, který se vždy nachází mimo bezpečný směr pro bezpečnou manipulaci se zbraní a střelivem.`,b:`prostor, v němž se provádějí technická opatření, která musí zajistit, že i při nedodržení pravidel stanovených provozním řádem (např. vstup neoprávněné osoby do ohroženého prostoru) zde nemůže být ohrožen život nebo zdraví účinkem kinetické energie střel, střepin nebo povýstřelových zplodin.`,c:`prostor, v němž může být i při dodržení pravidel a opatření stanovených provozním řádem střelnice ohrožen život nebo zdraví účinkem kinetické energie střel, střepin nebo povýstřelových zplodin.`,correct:"c"},
{id:558,cat:`Zákon o zbraních`,q:`Terče a terčová zařízení musí být ve smyslu přílohy č. 3 k zákonu o zbraních a střelivu umísťována tak, aby se minimalizovalo:`,a:`riziko nebezpečných odrazů střel.`,b:`působení hluku výstřelu alespoň o 10 dB.`,c:`riziko vstupu nezúčastněných osob do výstřelného prostoru mezi střelcem a terčem.`,correct:"a"},
{id:559,cat:`Zákon o zbraních`,q:`K zajištění ochrany života a zdraví osob v ohroženém prostoru a při zacházení se zbraněmi a střelivem na konkrétní střelnici, a to i mimo ohrožené prostory, jakož i při příchodu a odchodu ze střelnice jsou přiměřená technicko-organizační opatření stanovena v:`,a:`zákoně o munici.`,b:`technicko-organizační směrnici Ministerstva vnitra.`,c:`provozním řádu střelnice.`,correct:"c"},
{id:560,cat:`Zákon o zbraních`,q:`Technická opatření k zajištění bezpečného provozu střelnice spočívají zejména v:`,a:`vhodné konstrukci dopadiště a terčových zařízení, ochranných prvků; přijetí opatření proti vstupu nezúčastněných osob do ohroženého prostoru, instalaci fyzických zábran pohybu se zbraní po střelnici; střelnice, které nejsou střelnicemi krytými instalují nad celým prostorem střeliště neprůstřelné podhledy.`,b:`vhodné konstrukci dopadiště a terčových zařízení, ochranných prvků a přijetí opatření proti vstupu nezúčastněných osob do ohroženého prostoru; účelem technických opatření je zabránit úniku střel z prostoru střelnice bez ohledu na chování konkrétních návštěvníků střelnice a jejich nekázeň.`,c:`vhodné konstrukci dopadiště a terčových zařízení, ochranných prvků a přijetí opatření proti vstupu nezúčastněných osob do ohroženého prostoru; při nedodržování organizačních opatření nebo nekázni na střelnici mohou však být veškerá technická opatření k zajištění bezpečného provozu střelnice bez ohledu na jejich důkladnost zcela neúčinná.`,correct:"c"},
{id:561,cat:`Zákon o zbraních`,q:`Organizační opatření k zajištění bezpečného provozu střelnice spočívají zejména v:`,a:`stanovení zásad bezpečné střelby a bezpečného zacházení se zbraněmi a střelivem, způsobu střelby a vymezení směrů a mezních dálek střelby, vymezení palebné a terčové čáry a vymezení zbraní a střeliva, se kterými lze na střelnici střílet; dodržování organizačních opatření je základním předpokladem bezpečného provozu střelnice a funkčnosti jejích technických opatření.`,b:`stanovení zásad bezpečné střelby a bezpečného zacházení se zbraněmi a střelivem, způsobu střelby a vymezení směrů a mezních dálek střelby, vymezení palebné a terčové čáry a vymezení zbraní a střeliva, se kterými lze na střelnici střílet; organizační opatření jsou pouze doplňková k technickým opatřením, která jsou na střelnici k zajištění bezpečnosti realizována a musí být provedena tak, že ani při nedodržování organizačních opatření nesmí dojít k úniku střel z prostoru střelnice.`,c:`seznámení osoby, která na střelnici provádí střelbu s organizací práce správce střelnice a vzájemném předání kontaktů, tak aby v případě potřeby bezpečnost provozu správce střelnice aktivně zajistil. II. Prováděcí právní předpisy:`,correct:"a"},
{id:562,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky se bezpečný směr určuje tak, aby:`,a:`v běžném rozsahu umožňoval předvedení postupů bezpečného nakládání se zbraněmi a střelivem; bezpečný směr je možno určit zejména tak, že směřuje k dopadišti střel vymezenému provozním řádem střelnice.`,b:`v běžných případech směřoval do prostoru, kde se nevyskytují nezúčastněné osoby nebo kde se takové osoby zdržují pouze po nezbytnou dobu.`,c:`v běžném rozsahu umožňoval předvedení postupů běžného a taktického použití zbraně, přičemž z důvodu zajištění bezpečnosti osob musí být vždy vymezen minimálně v rozsahu 135° na každou stranu od výstřelné roviny ve směru k dopadišti střel vymezenému provozním řádem střelnice.`,correct:"a"},
{id:563,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky platí, že zbraň, která nebyla kontrolou uvedena do bezpečného stavu:`,a:`může směřovat ústím hlavně výhradně vertikálně k zemi.`,b:`není zkontrolovaná a proto je technicky nezpůsobilá ke střelbě.`,c:`musí při manipulaci směřovat do bezpečného směru.`,correct:"c"},
{id:564,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky se nepřipouští provádění manipulace nebo simulace situací, při kterých by zbraň, u níž nebyla provedena kontrola jejího stavu nebo se kterou se simuluje nabitý stav zbraně nebo střelba:`,a:`směřovala do bezpečného směru.`,b:`nesměřovala do bezpečného směru.`,c:`nebyla nabita školními náboji v nábojové komoře a v zásobníku nebo revolverovém válci.`,correct:"b"},
{id:565,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky platí, že určený bezpečný směr:`,a:`musí respektovat každá osoba přítomná při zkoušce odborné způsobilosti nebo komisionální zkoušce a nesmí do něj v jejím průběhu vstupovat nebo jinak zasahovat.`,b:`musí respektovat žadatel o vydání zbrojního oprávnění; zástupce Ministerstva vnitra přítomný při komisionální zkoušce žadateli o vydání zbrojního oprávnění v případě, že tento žadatel určený bezpečný směr nerespektuje, udělí písemnou důtku, která se vkládá do centrálního registru zbraní.`,c:`je určen závazně pro manipulaci s nabitou zbraní a pro ostrou střelbu, tedy pro jediné případy manipulace se zbraní, při kterých hrozí riziko náhodného výstřelu.`,correct:"a"},
{id:566,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky se rána jistoty provádí tak:`,a:`aby bylo případně možné určit, zda byla zbraň nabita školním nábojem, cvičným nábojem anebo ostrým střelivem.`,b:`aby nemohlo dojít k vypuštění bicího mechanismu zbraně.`,c:`aby zbraň vždy směřovala do bezpečného směru.`,correct:"c"},
{id:567,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky se nabití zbraně provede:`,a:`vložením zásobníku naplněného stanoveným počtem nábojů a zachycením otevřeného závěru na tzv. střelecké pohotovosti, tedy uvedením zbraně do stavu, ve kterém je ke střelbě zapotřebí pouze odjištění vnější manuální pojistky a stisknutí spouště.`,b:`uvedením zbraně do stavu, ve kterém je ke střelbě zapotřebí pouze přesunutí prstu ruky do prostoru lučíku a stisknutí spouště.`,c:`uvedením zbraně do stavu, ve kterém je ke střelbě zapotřebí již pouze provedení zamíření (tzv. mířená rána jistoty).`,correct:"b"},
{id:568,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky platí, že dokud není po nabití zbraně a přípravě ke střelbě vydán pokyn ke střelbě:`,a:`musí být prst ruky mimo lučík zbraně; zbraň neustále směřuje do bezpečného směru.`,b:`žadatel musí samostatně provést vybití zbraně a popřípadě odevzdat střelivo, u kterého došlo k selhači, na místě přítomnému kontrolnímu orgánu policie.`,c:`musí být prst ruky mimo ovládací prvky zbraně a žadatel se nesmí žádnou končetinou dotýkat zařízení střelnice.`,correct:"a"},
{id:569,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky platí, že prst ruky na spoušti nebo v prostoru lučíku:`,a:`se považuje za porušení zásad bezpečného nakládání se zbraní, s výjimkou případů, kdy je do prostoru lučíku vložen jiný prst než ukazováček střílející ruky, případně prst jiné než silné ruky osoby provádějící manipulaci se zbraní, anebo prst ruky jiné osoby.`,b:`se považuje za běžnou součást manipulace se zbraní, s výjimkou případů, kdy zkušební komisař vkládání prstu ruky na spoušť nebo do prostoru lučíku výslovně zakáže, anebo pokud do prostoru, který byl určen jako bezpečný směr, vstoupí osoba anebo nachází-li se tam zvíře nebo větší majetková hodnota.`,c:`se považuje za porušení zásad bezpečného nakládání se zbraní, s výjimkou případů, kdy je stisknutí spouště nezbytné k záměrnému provedení výstřelu nebo je v případě nenabité zkontrolované zbraně nezbytné pro manipulaci, například provedení rány jistoty, nebo pokud takovou manipulaci se zbraní stanovuje její výrobce, například před nebo při rozebrání zbraně.`,correct:"c"},
{id:570,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky se přerušení střelby provede:`,a:`pokud žadatel o vydání zbrojního oprávnění dostřílí stanovený počet nábojů pro nástřelnou položku nebo pro hodnocenou část střelby na terč v rámci praktické části zkoušky odborné způsobilosti nebo komisionální zkoušky.`,b:`s ohledem na konkrétní charakter situace, která k přerušení střelby vedla, například při vstupu osoby do prostoru ohroženého střelbou nebo v případě jiné události neumožňující pokračovat bezpečně ve střelbě; přitom je nezbytné směřovat zbraň do prostoru, kde by náhodný výstřel nezpůsobil škody.`,c:`kontrolou zbraně, přičemž vždy se provede mířená rána jistoty do bezpečného směru, který na začátku praktické části zkoušky určí zkušební komisař.`,correct:"b"},
{id:571,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky se při ukončení střelby:`,a:`provede kontrola zbraně.`,b:`musí zkušebnímu komisaři zřetelně slovně ohlásit, zda v průběhu střelby došlo k závadě na zbrani nebo střelivu anebo k jiné mimořádné události.`,c:`provede rozborka a sborka zbraně v rozsahu nezbytném pro vyčištění zbraně po ukončení střelby.`,correct:"a"},
{id:572,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky je účelem kontroly zbraně:`,a:`důkladné zjištění technického stavu zbraně, zejména zjištění prasklin hlavně, závěru a rámu zbraně.`,b:`příprava zbraně pro nabití, vybití nebo k nošení.`,c:`její vybití a uvedení do stavu bezpečného pro odložení zbraně nebo další manipulaci, například rozebrání zbraně.`,correct:"c"},
{id:573,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky platí, že:`,a:`mířit na osoby je přípustné pouze se zbraní, která byla kontrolou spolehlivě uvedena do bezpečného stavu.`,b:`mimo případů naplněných zákonných podmínek nutné obrany a krajní nouze není přípustné mířit na osoby ani v případě, je-li zbraň vybitá, zkontrolovaná nebo nekompletní; úmyslné míření na osoby je v takovém případě porušením zásad bezpečného nakládání se zbraní.`,c:`mimo případů naplněných zákonných podmínek nutné obrany a krajní nouze není přípustné mířit na osoby ani v případě, je-li zbraň zkontrolovaná; zkušení držitelé zbrojního oprávnění mohou míření na osoby nanejvýše naznačovat, přičemž si musí být jisti, že zbraň je vybitá nebo nabitá pouze školními nebo cvičnými náboji.`,correct:"b"},
{id:574,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky ohledně využití dodatečných bezpečnostních prvků konkrétního typu zbraně pro její uvedení do bezpečného stavu platí, že:`,a:`tyto postupy nejsou povinnou součástí zkoušky odborné způsobilosti nebo komisionální zkoušky.`,b:`žadatel o vydání zbrojního oprávnění musí být schopen prakticky předvést pouze použití prvku pro bezpečné vypuštění napnutého bicího mechanismu (tzv. decocker) a integrovaného zámku spoušťového mechanismu.`,c:`tyto postupy jsou vyžadovány pouze v případě praktické části zkoušky odborné způsobilosti žadatelů o vydání rozšířeného zbrojního oprávnění.`,correct:"a"},
{id:575,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky platí v případě, že je zbraň vybavena odnímatelným zásobníkem, který je při kontrole zbraně a jejím uvedení do bezpečného stavu ze zbraně vyjmut, že:`,a:`vybít náboje z vyňatého zásobníku je nezbytné pro zajištění bezpečnosti přítomných osob a pro následnou kontrolu nábojů před jejich uložením do přepravní schránky.`,b:`vybití nábojů z vyňatého zásobníku není povinnou součástí zkoušky odborné způsobilosti nebo komisionální zkoušky.`,c:`vybití nábojů z vyňatého zásobníku je nezbytné pouze v případě zásobníků pro krátké zbraně nebo z nadlimitních zásobníků, v případě zásobníků pro dlouhé zbraně, které nejsou nadlimitními zásobníky, není vybití nábojů vyžadováno, protože v tomto případě nehrozí vzhledem k délce zbraně nezáměrná iniciace nabitých nábojů.`,correct:"b"},
{id:576,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při kontrole samonabíjecí pistole mimo jiné platí, že:`,a:`se provede vyjmutí zásobníku, po stažení závěru do zadní polohy se přes výhozné okénko provede vizuální kontrola nábojové komory.`,b:`se provede stažení závěru vzad, a to podle potřeby i vícekrát, dokud není závěr automaticky zachycen v zadní poloze na tzv. střelecké pohotovosti.`,c:`se provede vyjmutí zásobníku a stažení závěru do zadní polohy; v případě starších typů samonabíjecích pistolí, které nejsou vybaveny odnímatelným zásobníkem a neumožňují zachycení závěru v zadní poloze, se tato část kontroly neprovádí a provede se pouze mířená rána jistoty do bezpečného směru.`,correct:"a"},
{id:577,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při kontrole samonabíjecí pistole mimo jiné platí, že:`,a:`se provede kontrola zásobníkové šachty, přičemž pro zajištění bezpečnosti tohoto postupu musí být kontrola provedena k tomu určeným speciálním nástrojem (tzv. magwell).`,b:`se provede kontrola celkové kapacity zásobníku, a to buď vizuálně pohledem přes výhozné okénko při stažení závěru do zadní polohy nebo pohmatem prsty ruky, která nedrží zbraň, přes ústí zásobníkové šachty.`,c:`se provede kontrola zásobníkové šachty, zda se v ní nenachází zásobník; tuto kontrolu lze provést vizuálně pohledem přes výhozné okénko při stažení závěru do zadní polohy nebo pohmatem prsty ruky, která nedrží zbraň, přes ústí zásobníkové šachty.`,correct:"c"},
{id:578,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při kontrole samonabíjecí pistole mimo jiné platí, že:`,a:`po provedení kontroly se závěr sejme ze zbraně a podle potřeby se provede jeho další demontáž.`,b:`po provedení kontroly lze závěr ponechat v zadní poloze, pokud to konstrukce zbraně umožňuje, nebo jej vypustit do přední polohy; v přední poloze závěru se provede rána jistoty.`,c:`po provedení kontroly lze závěr ponechat v přední poloze, pokud to konstrukce zbraně umožňuje, nebo jej vypustit do zadní polohy a zde jej zachytit na záchytu závěru; v zadní poloze závěru se provede rána jistoty.`,correct:"b"},
{id:579,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při kontrole revolveru mimo jiné platí, že:`,a:`se provede vyklopení nábojového válce a vizuální kontrola jeho nábojových komor.`,b:`se provede stažení závěru vzad a vizuální nebo pohmatová kontrola nábojových komor a zásobníkové šachty.`,c:`se provede vyklopení nábojového válce, sklopení hlavňového svazku a vizuální kontrola nábojových komor nábojového válce i hlavňového svazku.`,correct:"a"},
{id:580,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při kontrole revolveru mimo jiné platí, že:`,a:`odložení revolveru se provede vyklopeným válcem nebo s nábojovým válcem uzamčeným ve zbrani, ale v takovém případě je před odložením zbraně nezbytné provést ránu jistoty, a to minimálně tolikrát, kolik nábojových komor má nábojový válec daného revolveru.`,b:`odložení revolveru se provede se závěrem v zadní poloze.`,c:`odložení revolveru se provede s vyklopeným nábojovým válcem.`,correct:"c"},
{id:581,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při kontrole samonabíjecí dlouhé kulové zbraně mimo jiné platí, že:`,a:`se provede vyjmutí zásobníku a vizuální kontrola zásobníkové šachty přes ústí zásobníkové šachty, provede se vyjmutí baterie z pažby nebo podle konstrukce zbraně z jiného umístění a zbraň se odloží.`,b:`se provede vyjmutí zásobníku; pokud to konstrukce zbraně umožňuje, provede se vizuální kontrola nábojové komory po stažení závěru do zadní polohy přes výhozné okénko a pokud konstrukce zbraně vizuální kontrolu nábojové komory přes výhozné okénko neumožňuje, provede se opakované stažení závěru do zadní polohy s následným vypuštěním do přední polohy.`,c:`se provede vyjmutí zásobníku, ze kterého se vyjmou náboje, provede se kontrola funkčnosti mířidel a spoušťového a bicího mechanismu, kontrola samonabíjecí dlouhé zbraně končí stažením závěru do zadní polohy, přičemž kontrola nábojové komory se neprovádí, neboť u moderních konstrukcí těchto zbraní je nábojová komora z vnějšku nedostupná a zbraň je vybaven bezpečnostními prvky, které náhodnému výstřelu efektivně brání.`,correct:"b"},
{id:582,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při kontrole samonabíjecí dlouhé kulové zbraně mimo jiné platí, že:`,a:`se provede kontrola zásobníkové šachty, zda se v ní nenachází zásobník; tuto kontrolu lze provést vizuálně pohledem přes výhozné okénko při stažení závěru do zadní polohy nebo pohmatem prsty ruky, která nedrží zbraň, přes ústí zásobníkové šachty.`,b:`se provede kontrola zásobníkové šachty, a to tak že se do ní opakovaně vloží a opět vyjme zásobník, ze kterého byly vybity veškeré náboje.`,c:`se provede kontrola zásobníkové šachty, zda se v ní nenachází zásobník; tuto kontrolu lze provést manipulací se závěrem nebo k tomu určeným ovládacím prvkem zbraně (tzv. vytahovač podavače zásobníku).`,correct:"a"},
{id:583,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při kontrole samonabíjecí dlouhé kulové zbraně mimo jiné platí, že:`,a:`po provedení kontroly lze zásobník ponechat v zadní poloze, pokud to konstrukce zbraně umožňuje, nebo jej vypustit do přední polohy; v přední poloze zásobníku se provede jeho vizuální kontrola přes výhozné okénko nebo rána jistoty.`,b:`odložení revolveru se provede se závěrem v zadní poloze.`,c:`po provedení kontroly lze závěr ponechat v zadní poloze, pokud to konstrukce zbraně umožňuje, nebo jej vypustit do přední polohy; v přední poloze závěru se provede rána jistoty.`,correct:"c"},
{id:584,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při kontrole opakovací dlouhé kulové zbraně s otočným odsuvným závěrem mimo jiné platí, že:`,a:`se provede otevření závěru stažením posuvného předpažbí do zadní polohy a vizuální kontrola trubkového zásobníku přes zásobníkovou štolu.`,b:`se provede vyjmutí zásobníku, otevření závěru a následně vizuální kontrola nábojové komory a zásobníkové šachty.`,c:`se provede vyjmutí zásobníku, ze kterého se vyjmou náboje, otevření závěru, kontrola opakovací dlouhé kulové zbraně s otočným odsuvným závěrem končí po otevření závěru deaktivací vnější manuální pojistky.`,correct:"b"},
{id:585,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při kontrole opakovací dlouhé kulové zbraně s otočným odsuvným závěrem mimo jiné platí, že:`,a:`odložení zbraně se provede po sklopení hlavňového svazku, a to tak, aby ústí hlavní směřovala do bezpečného směru nebo k zemi.`,b:`odložení zbraně se provede se závěrem v otevřené poloze; při uzamčení nenabité zkontrolované zbraně se provede vypuštění bicího mechanismu prostřednictvím rány jistoty.`,c:`odložení zbraně se provede se závěrem v otevřené poloze; rána jistoty se provádí vždy také se závěrem v otevřené poloze, protože při provedení rány jistoty s uzamčeným závěrem by mohlo dojít k poškození bicího mechanismu.`,correct:"b"},
{id:586,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při řešení závady na zbrani nebo střelivu typu selhač platí, že:`,a:`nedojde-li k iniciaci náboje, je třeba vyčkat minimálně 10 sekund se zbraní směřující do bezpečného směru, výrobce zbraně nebo střeliva může v návodu k použití stanovovat též jinou (vesměs delší) minimální dobu, po kterou je třeba vyčkat, zda nedojde k opožděné iniciaci a k výstřelu.`,b:`nedojde-li k iniciaci náboje, je třeba jej okamžitě vybít ze zbraně (provést kontrolu zbraně), protože opožděnou iniciací náboje by mohlo dojít k nevratnému poškození zbraně.`,c:`nedojde-li k iniciaci náboje, je třeba vyčkat minimálně 10 sekund se zbraní směřující do bezpečného směru, výrobce zbraně nebo střeliva nesmí v návodu k použití stanovovat jinou (kratší nebo delší) minimální dobu, po kterou je třeba po neúspěšné iniciaci náboje vyčkat, protože takové pravidlo by bylo v rozporu s tím, co pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky stanovila vláda nařízením.`,correct:"a"},
{id:587,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při řešení závady na zbrani nebo střelivu typu selhač platí, že:`,a:`po vyjmutí náboje ze zbraně je třeba jej umístit na bezpečné místo a vyčkat minimálně 10 sekund, zda nedojde k jeho opožděné iniciaci; rovněž se následně provede kontrola zbraně zkontroluje se zápalník, zda na něm zápalka nezanechala otisk v případě, že závada byla zapříčiněna střelivem.`,b:`po uplynutí doby, po kterou je nutné vyčkat, zda nedojde k opožděné iniciaci náboje a k výstřelu, se selhaný náboj odevzdá správci střelnice, pokud k selhači došlo na střelnici, myslivecké stráži, pokud k selhači došlo při lovu, a Českému úřadu pro zkoušení zbraní a střeliva v ostatních případech.`,c:`po uplynutí doby, po kterou je nutné vyčkat, zda nedojde k opožděné iniciaci náboje a k výstřelu, se provede kontrola zbraně; následně je také třeba zkontrolovat otisk zápalníku na zápalce pro zjištění, zda je závada zapříčiněna zbraní nebo střelivem.`,correct:"c"},
{id:588,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při řešení závady na zbrani nebo střelivu typu slabá rána platí, že:`,a:`je třeba vyčkat minimálně 10 sekund, přičemž zbraň musí být odložena tak, aby ústí hlavně směřovalo do bezpečného směru, neboť může dojít k opožděné detonaci střely uvízlé v hlavni, výrobce zbraně nebo střeliva může v návodu k použití stanovovat též jinou (vesměs delší) minimální dobu, po kterou je třeba vyčkat, zda nedojde k opožděné detonaci.`,b:`se provede kontrola zbraně a následně se provede kontrola průchodnosti vývrtu hlavně, které bude u zbraní většiny konstrukcí předcházet rozebrání zbraně; v případě, že střela je uvízlá v hlavni, pouze se slovně popíše správný postup jejího odstranění.`,c:`se provede kontrola průchodnosti vývrtu hlavně, která bude u většiny zbraní v případě střely uvízlé v hlavni možná pouze zasunutím vhodného nástroje (např. vytěráku) ústím hlavně tak, aby byla zjištěna poloha uvízlé střely; po zjištění polohy uvízlé střely se zvolí následný vhodný postup a provede se vybití a kontrola zbraně.`,correct:"b"},
{id:589,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při řešení závady na zbrani nebo střelivu typu slabá rána platí, že:`,a:`provedení rány jistoty po kontrole zbraně, u které došlo ke slabé ráně, není porušením zásad bezpečného nakládání se zbraní, a to zejména pokud je takový způsob uvolnění spoušťového a bicího mechanismu nezbytný pro její rozebrání.`,b:`provedení rány jistoty je možné až po uplynutí doby 10 sekund, po kterou musí zbraň směřovat ústím hlavně do bezpečného směru, provedením rány jistoty dojde k opožděné iniciaci střeliva a je možné pokračovat obdobně jako v případě řešení závady na zbrani nebo střelivu typu selhač.`,c:`provedení rány jistoty není možné ani po provedení kontroly zbraně, protože by došlo k uvolnění spoušťového a bicího mechanismu a následný vývoj eventuálního výstřelu by byl nepředvídatelný.`,correct:"a"},
