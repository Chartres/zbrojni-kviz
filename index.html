{id:717,cat:`Nauka o zbraních`,q:`Výše vyobrazená jednotná zkušební značka dokládá, že touto značkou označená palná zbraň byla:`,a:`otestována na maximálně přípustný obsah dusíku v kovových součástech, čímž je garantována minimální vyžadovaná pružnost těchto součástí.`,b:`ověřena na základě tzv. obyčejné zkoušky, přičemž jde o značku uznávanou podle Úmluvy o vzájemném uznávání zkušebních značek ručních palných zbraní („C.I.P.“).`,c:`zkontrolována, přičemž ověřením neprošla („N“) a byla vyřazena z používání; v případě, že by zbraň ověřením prošla úspěšně, byla by označena písmenem „A“.`,correct:"a",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCABIADoDASIAAhEBAxEB/8QAGwABAAMBAQEBAAAAAAAAAAAAAAQFBgMBBwL/xAAzEAABBAIABAQDBQkAAAAAAAABAAIDBAURBhIhMRMUQVEHIoEVNFJxdCcyM2FkkaGxwf/EABQBAQAAAAAAAAAAAAAAAAAAAAD/xAAUEQEAAAAAAAAAAAAAAAAAAAAA/9oADAMBAAIRAxEAPwDcLnPYhrR888rI2fie4ALoToEn0WTw9SPiW3ayOSHjRMkMcELj8jQPXXug0ta9Vt78tYil135Hg6XSSeKJzGySMY5500OOi4/yVHkeGYueKxiBHStxPBD2ghrh6ggKPxOD9r4Lm1vx+uvog0U1uvXIE80cZPYPcBtfhl+pI4NjtQucewEgJWd4jrw2uK8TDZY2SJzH8zXdiuuZwODr4yeTwIYHNYS2RrtEO9NdUGlRVPCs08/D1SSySXlutu7kb6FWyDxw2CPQrL8LWI8XYuYi28RSsmL4+c6D2n2WpUPIYijkwBdrMlLexPQj6hBCzueZjY2R1gyxcleGxwg7J/PSgcSFxyuBLwA7x+oHoeit6GAxuOk8SrVY2T8ZJcR9SpFnH1bc0Ms8Qe+B3NGST8pQZziapFe4pxVecExvY4EA6/yrCPhDDseHGs6TXXT5HEf22rSbH1p7cNqWIOnh2I37PyqQg8Y0MYGtAa0DQA7AL1EQEREHjnhv7xA/MoXhoBJ1s6WV+IbXOxlVrN8zpwBr30p/CeVdkcb4c/S1WPhyg9+nYoLvnAdy7G/bfVerLWj+0OoP6c/6K1KAiIgIiIMxx391ofqmrhmGnh3iKLKwtPlLR5LDR2B9/wDq78d/daH6pqvMpQiydCWrMAWyN0D7H0KCgncH/EGm5pBaaxII9ehWqXzvhw2WcX1qtz+JVjfD9ADpfREBERAREQcLdGtdaxtqFsoY7maHeh913REEb7OqeeF3y7PMga8XXXSkoiAiIg//2Q==`]},
{id:718,cat:`Nauka o zbraních`,q:`Závorník u zbraně je součást, která:`,a:`uzavírá nebo uzamyká nábojovou komoru v případě zbraně se složeným závěrovým mechanismem.`,b:`slouží k manuálnímu otevření závěru.`,c:`u některých zbraní (zejména loveckých) slouží jako pojistný mechanismus, který se řadí mezi automatické pojistky.`,correct:"a"},
{id:719,cat:`Nauka o zbraních`,q:`Nosič závorníku u zbraně je součást, která:`,a:`unáší při nabíjecím cyklu zbraně závorník a zajišťuje tak jeho odemčení a uzamčení.`,b:`může být připojena ke zbrani se složeným závěrovým mechanismem a umožňuje její bezpečné nošení s vyjmutým závorníkem.`,c:`je součástí pouzdra závěru, do které je při výstřelu uzamčen závorník.`,correct:"a"},
{id:720,cat:`Nauka o zbraních`,q:`Hlaveň je součást palné nebo plynové zbraně:`,a:`v níž se tepelná energie vznikající při hoření střelného prachu nebo při prudkém stlačování plynu přeměňuje na potenciální energii střely, která se rovná kinetické energii této střely při jejím dopadu na cíl.`,b:`která vymete náboj směrem od střelce, a to silou která odpovídá složeným silám úderníkové pružiny a odstředivé síly pohybu závěrového mechanismu.`,c:`v níž se určitý druh energie přemění v pohybovou energii střely, vodicí část vývrtu přitom vede střelu v požadovaném směru.`,correct:"c"},
{id:721,cat:`Nauka o zbraních`,q:`Účelem hlavně s drážkovanou částí vývrtu je:`,a:`vytvoření podélných rýh na povrchu střely, jejichž účelem je způsobení větší destrukce v cíli.`,b:`uvedení střely do otáčivého pohybu kolem její podélné osy.`,c:`zapojení střely do drážek, které střelu následně dovedou až k cíli.`,correct:"b"},
{id:722,cat:`Nauka o zbraních`,q:`Vývrtem hlavně se rozumí:`,a:`část hlavně, do které jsou vyvrtány otvory pro uchycení jiných částí zbraně.`,b:`„vývrtkovité“ vrypy v hlavni.`,c:`vnitřní dutina hlavně; vývrt hlavně může být hladký nebo drážkovaný.`,correct:"c"},
{id:723,cat:`Nauka o zbraních`,q:`Polygonálním vývrtem hlavně se rozumí:`,a:`vývrt hlavně s profilem tvořeným několika kruhovými oblouky se středy křivosti ležícími mimo podélnou osu symetrie hlavně; polygonální vývrt tvoří šroubovici, která uvádí střelu do otáčivého pohybu obdobně jako drážkovaný vývrt hlavně.`,b:`vývrt hlavně konstruovaný pro střelbu speciálního střeliva pro nácvik postupu policejních a obdobných bezpečnostních složek na k tomuto účelu určeném polygonu; tento vývrt zejména z důvodu bezpečnosti výcviku na polygonu vylučuje, aby jím prošla jednotná střela.`,c:`vývrt na vnějším plášti hlavně v podobě ozdobných šroubovic či drážek; účel polygonálního vývrtu je ryze estetický.`,correct:"a"},
{id:724,cat:`Nauka o zbraních`,q:`Nábojová komora je prostor:`,a:`do kterého při výstřelu expandují spalné plyny vznikající při hoření střeliviny obsažené v náboji; nábojová komora revolverové zbraně přímo navazuje na ústí komor nábojového válce.`,b:`za vývrtem hlavně, do kterého se vkládá zásobovací ústrojí s náboji; nábojová komora má rozměr odpovídající délce náboje, a šířku odpovídající uchycovacímu rozhraní zásobovacího ústrojí zbraně.`,c:`v zadní části vývrtu hlavně, do kterého je po nabití zasunut náboj; nábojová komora svými rozměry i tvarem odpovídá příslušnému náboji; u revolverové zbraně nejsou komory součástí hlavně, ale válce.`,correct:"c"},
{id:725,cat:`Nauka o zbraních`,q:`Výhozné okénko je:`,a:`součást, která po vyklopení ze zbraně umožňuje vyhození vytahovače zbraně.`,b:`otvor, kterým se ze zbraně vybavené trubicovou nábojovou schránkou obvykle vyhazuje prázdný zásobník.`,c:`otvor, kterým se ze zbraně vyhazuje vystřelená nábojnice, resp. náboj při vybití zbraně.`,correct:"c"},
{id:726,cat:`Nauka o zbraních`,q:`Součást zbraně zvaná „lučík“:`,a:`kryje spoušť proti nechtěnému či náhodnému zmáčknutí například při manipulaci, ukládání do pouzdra či při zavěšení do nosného popruhu.`,b:`slouží k tzv. předepínání spouště (název této součásti vychází z faktu, že z hlediska mechaniky je spoušť lučíkem předepínána obdobně, jako když střelec natahuje luk).`,c:`zakrývá otvor, kterým se ze zbraně vyhazuje vystřelená nábojnice, resp. náboj při vybití zbraně.`,correct:"a"},
{id:727,cat:`Nauka o zbraních`,q:`Uzamčeným závěrem je závěr, který:`,a:`je vybaven zámkem, kterým lze zbraň speciálně k tomu určeným mechanickým klíčem (nebo u zbraní novějších konstrukcí digitálně) uzamknout a zamezit tak jejímu zneužití neoprávněnou osobou.`,b:`je v okamžiku výstřelu pevně spojen (uzamčen) s hlavní; účelem uzamčení je udržení tlaku vznikajícího při výstřelu uvnitř hlavně.`,c:`je při střelbě pevně spojen s tělem zbraně a volně zakluzuje (nebo podle konstrukce předkluzuje) vůči hlavni; účelem uzamčení je zajištění spolehlivosti nabíjecího cyklu.`,correct:"b"},
{id:728,cat:`Nauka o zbraních`,q:`Neuzamčeným závěrem se rozumí:`,a:`závěr, který není v okamžiku výstřelu pevně spojen s hlavní; neuzamčený závěr se označuje také jako dynamický závěr.`,b:`uzamčený závěr, který je odemčen a nachází se v zadní poloze (zadní úvrati).`,c:`závěr bez ovládací kličky nebo obdobného ovládacího prvku; jedná se například o lůžkový závěr zbraně se sklopným hlavňovým svazkem.`,correct:"a"},
{id:729,cat:`Nauka o zbraních`,q:`Uzamykacími prvky závěru se rozumí zejména:`,a:`uzamykací ozuby, uzamykací kuličky nebo válečky, kleština nebo závora.`,b:`klíče závěru.`,c:`závěr, závorník, nosič závorníku, hlaveň, vložná hlaveň, vložná nábojová komora, tělo zbraně včetně horní a dolní části pouzdra závěru, a válec revolverové zbraně.`,correct:"a"},
{id:730,cat:`Nauka o zbraních`,q:`Bicím mechanismem zbraně se rozumí:`,a:`mechanismus způsobující úder na zápalku (iniciační mechanismus).`,b:`bajonet nebo bodák zbraně; v případě starších konstrukcí se za bicí mechanismus považovala také zápalková perkuse.`,c:`nabiják a další součásti sestavy nabíjecího mechanismu zbraně.`,correct:"a"},
{id:731,cat:`Nauka o zbraních`,q:`Spoušťovým ústrojím zbraně se rozumí:`,a:`mechanismus pro vypouštění prázdného zásobníku ze zbraně nebo pro vypouštění zásobníku ze zbraně v případě kontroly zbraně.`,b:`mechanismus, kterým působí zbraň a střelivo na cíl a vyvolává požadovaný destruktivní účinek (zastarale se hovořilo o mechanismu „způsobujícím spoušť“).`,c:`mechanismus zbraně, který slouží k ovládání iniciačního ústrojí (bicího mechanismu).`,correct:"c"},
{id:732,cat:`Nauka o zbraních`,q:`Spouští se v případě střelných zbraní rozumí:`,a:`ovládací prvek, který se vyskytuje pouze u krátkých zbraní a ovládá se prstem střelcovy ruky; v případě dlouhých zbraní se namísto spouště hovoří o spoušťové páce.`,b:`součást, na kterou je připojena bicí pružina, která po stisknutí kohoutku vymete z hlavně nábojnici.`,c:`součást, jejíž pohyb vyvolaný typicky tlakem prstu na jazýček spouště způsobí přímo nebo zprostředkovaně aktivaci iniciačního ústrojí (bicího mechanismu).`,correct:"c"},
{id:733,cat:`Nauka o zbraních`,q:`Funkční cyklus revolveru je obvykle založen na:`,a:`manuálním ovládání spoušťového a bicího mechanismu; revolver je až na výjimky samonabíjecí zbraní.`,b:`manuálním ovládání spoušťového a bicího mechanismu; revolver je až na výjimky opakovací zbraní.`,c:`impulzu zpětného rázu při výstřelu, který působí na osu válce; revolver je až na výjimky opakovací samonabíjecí zbraní.`,correct:"b"},
{id:734,cat:`Nauka o zbraních`,q:`Funkční cyklus opakovací kulovnice s otočným odsuvným závěrem je obvykle založen na:`,a:`manuálním ovládání odsuvného závěru obvykle prostřednictvím kliky spojené se závěrem, kdy otočením závěru dochází k jeho uzamčení; v závěru bývá typicky umístěn také přímoběžný bicí mechanismus.`,b:`manuálním ovládání odsuvného závěru prostřednictvím spodní páky (tzv. lever action), kdy pohybem páky směrem dolů dochází k uzamčení zbraně; bicí mechanismus má typicky podobu vnějšího bicího kohoutu umístěného na zámkové desce.`,c:`impulzu tlaku spalných plynů, které jsou odebírány z vývrtu hlavně a působí na nosič otočného odsuvného závěru buď prostřednictvím pístu nebo přímo; bicí mechanismus má typicky podobu vnitřního kladívka nebo přímoběžného úderníku.`,correct:"a"},
{id:735,cat:`Nauka o zbraních`,q:`Funkční cyklus opakovací brokovnice ovládané posuvným předpažbím je obvykle založen na:`,a:`manuálním ovládání posuvného předpažbí, kterým se ovládá závěrový a spoušťový mechanismus zbraně; při posunu předpažbí směrem vpřed dochází standardně také k odjištění uzamykacích válečků.`,b:`manuálním ovládání posuvného předpažbí, kterým se ovládá závěrový a nabíjecí mechanismus zbraně; při posunu předpažbí směrem vzad dochází standardně také k natažení bicího mechanismu.`,c:`impulzu zpětného rázu při výstřelu; před prvním výstřelem dochází k nabití zbraně pohybem posuvného předpažbí a následně je již funkce zbraně zajišťována automatikou zbraně.`,correct:"b"},
{id:736,cat:`Nauka o zbraních`,q:`Funkce neuzamčeného závěru samonabíjecí pistole se obvykle odvozuje od:`,a:`impulzu zpětného rázu při výstřelu (tzn. tlaku spalných plynů na dno nábojnice v nábojové komoře).`,b:`impulzu zpětného rázu střely (tzn. tlaku vyvolaného setrvačnou silou střely, kterou střelec při střelbě pocítí v okamžiku, kdy střela opustí hlaveň a dojde k expanzi spalných plynů u ústí hlavně).`,c:`impulzu spalných plynů působících v případě samonabíjecích pistolí s tzv. dynamickým závěrem na nosič závorníku a odebíraných odemykací kulisou z prostoru nábojové komory.`,correct:"a"},
{id:737,cat:`Nauka o zbraních`,q:`Funkční cyklus samonabíjecí pušky určené pro náboje středního balistického výkonu (např. 223 Remington nebo 7,62 x 39 mm) je obvykle založen na:`,a:`manuálním ovládání závěrového mechanismu přes páku, kliku nebo obdobný ovládací prvek, který může být s ohledem na konkrétní konstrukci zbraně spojen buď přímo se závěrem, s pístem nebo pístnicí; přímoběžný bicí mechanismus bývá umístěn typicky v dutině nosiče závěru.`,b:`impulzu zpětného rázu při výstřelu, který působí na dynamický (neuzamčený) otočný odsuvný závěr.`,c:`využití tlaku spalných plynů, a to buď v podobě impulzu udělovaného nosiči závorníku těmito plyny odebranými z vývrtu hlavně (v případě uzamčených závěrových mechanismů), nebo formou jejich tlaku na dno nábojnice (v případě bržděných nebo též polouzamčených závěrových mechanismů).`,correct:"c"},
{id:738,cat:`Nauka o zbraních`,q:`Pojistka zbraně je:`,a:`zařízení, které vyhazuje nábojnici nebo náboj.`,b:`součást zajišťující zbraň proti výstřelu.`,c:`součást, která přidržuje nábojnici.`,correct:"b"},
{id:739,cat:`Nauka o zbraních`,q:`Je-li dlouhá broková zbraň vybavena automatickou pojistkou, která zajišťuje zbraň při každém sklopení hlavně nebo hlavňového svazku, před výstřelem:`,a:`není nutno ji odjistit, neboť k zajišťování a odjišťování tohoto typu pojistky dochází automaticky nezávisle na vůli střelce; od střelce se pouze vyžaduje, aby identifikoval okamžik, kdy automatický mechanismus zbraň odjistí, a následně může zahájit střelbu.`,b:`je nutno ji odjistit pomocí příslušného ovládacího prvku umístěného například na hřbetě krku pažby.`,c:`dojde k jejímu automatickému odjištění při prvním stisknutím spouště, k zajištění dochází obvykle (podle konkrétní konstrukce) při dalším stisknutí spouště.`,correct:"b"},
{id:740,cat:`Nauka o zbraních`,q:`Vložná hlaveň je:`,a:`hlaveň větší ráže vkládaná do vývrtu hlavně menší ráže.`,b:`zařízení nebo součást hlavně, která upravuje účinky výstřelu (například nábojová redukce), nebo která slouží k uchycení tlumiče hluku výstřelu na hlaveň s hladkým vývrtem.`,c:`hlaveň menší ráže vkládaná do vývrtu hlavně větší ráže.`,correct:"c"},
{id:741,cat:`Nauka o zbraních`,q:`Rám revolverové zbraně je:`,a:`součást revolveru, která vytahuje a vyhazuje vystřelené nábojnice z nábojové komory hlavně.`,b:`část zbraně, která je určena k podávání nábojů z revolverového zásobníku, který má obvykle tvar bubnu nebo disku.`,c:`součást revolveru, na které jsou ostatní hlavní části a jiné součásti revolveru upevněny nebo jsou s ní pohyblivě spojeny.`,correct:"c"},
{id:742,cat:`Nauka o zbraních`,q:`Palná zbraň – jednuška je:`,a:`jednoranová dvouhlavňová brokovnice.`,b:`jednohlavňová jednoranová brokovnice.`,c:`víceranová brokovnice.`,correct:"b"},
{id:743,cat:`Nauka o zbraních`,q:`Palná zbraň – dvojka je:`,a:`dvouhlavňová brokovnice s hlavněmi vedle sebe.`,b:`dvouhlavňová brokovnice s hlavněmi nad sebou.`,c:`lovecká zbraň s brokovou a kulovou hlavní vedle sebe.`,correct:"a"},
{id:744,cat:`Nauka o zbraních`,q:`Palná zbraň - lankasterka je:`,a:`dvojka se skrytými kladívky.`,b:`jednoranová kozlice.`,c:`dvojka s vnějšími kohouty.`,correct:"c"},
{id:745,cat:`Nauka o zbraních`,q:`Palná zbraň - hamerleska je:`,a:`opakovací zbraň s kulovou a brokovou hlavní, které jsou spojeny kladívkovým zámkem.`,b:`dvojka s vnějšími kohouty.`,c:`dvojka se sklopnými hlavněmi a se skrytými kladívky.`,correct:"c"},
{id:746,cat:`Nauka o zbraních`,q:`Palná zbraň - broková kozlice je:`,a:`opakovací zbraň s kulovou a brokovou hlavní, které jsou spojeny uzamykacím kozlíkem.`,b:`zbraň se dvěma hlavněmi vedle sebe; obě tyto hlavně jsou brokové.`,c:`zbraň se dvěma hlavněmi nad sebou; obě tyto hlavně jsou brokové.`,correct:"c"},
{id:747,cat:`Nauka o zbraních`,q:`Palná zbraň - kombinovaná zbraň je:`,a:`lovecká dlouhá zbraň se dvěma a více hlavněmi; hlavně mají různý vývrt.`,b:`zbraň s délkou hlavně 30 cm a celkovou délkou 60 cm, díky čemuž tato zbraň efektivně kombinuje výhody jak krátké, tak i dlouhé zbraně.`,c:`broková zbraň s přepínačem, který umožňuje používat tuto zbraň jak v samonabíjecím režimu, tak i v režimu opakovací zbraně (ovládané posuvným předpažbím).`,correct:"a"},
{id:748,cat:`Nauka o zbraních`,q:`Palná zbraň - kulobroková kozlice je:`,a:`zbraň s dvěma hlavněmi stejné ráže nad sebou, kdy první část vývrtu těchto hlavní je hladká a druhá (obvykle kratší) část vývrtu je drážkovaná; díky této konstrukci umožňuje tato kozlice z obou hlavní střelbu jak brokovým, tak i kulovým střelivem.`,b:`zbraň se dvěma hlavněmi nad sebou, a to kulovou a brokovou hlavní.`,c:`lovecká zbraň určená pro střelbu dnes již zastaralého kulobrokového střeliva.`,correct:"b"},
{id:749,cat:`Nauka o zbraních`,q:`Palná zbraň - kulovnice je:`,a:`opakovací lovecká zbraň se sklopným svazkem 2 nebo 3 hlavní, kdy alespoň jedna z těchto hlavní musí být určena pro střelbu kulovými náboji.`,b:`lovecká zbraň s kulovým závěrem.`,c:`jednohlavňová (obvykle lovecká) dlouhá zbraň s drážkovaným vývrtem určená pro střelbu kulovými náboji.`,correct:"c"},
{id:750,cat:`Nauka o zbraních`,q:`Palná zbraň - dvoják je:`,a:`lovecká dlouhá zbraň se dvěma kulovými hlavněmi vedle sebe.`,b:`zbraň konstruovaná pro střelbu střelivem s vyššími tlaky, a to až do dvojnásobku standardního tlaku podle C.I.P.`,c:`lovecká dlouhá zbraň se dvěma kulovými hlavněmi nad sebou.`,correct:"a"},
{id:751,cat:`Nauka o zbraních`,q:`Palná zbraň - kulová kozlice je:`,a:`lovecká palná zbraň specificky určená pro regulační odstřel kozlic muflona evropského, kamzíka horského, kozy bezoárové a některých nepůvodních zavlečených druhů jako např. kozy kamerunské.`,b:`lovecká dlouhá zbraň se dvěma kulovými hlavněmi nad sebou.`,c:`speciální střelecké vybavení určené pro nastřelování kulovnic, někdy se též hovoří o střelecké koze nebo kulové stolici.`,correct:"b"},
{id:752,cat:`Nauka o zbraních`,q:`Palná zbraň - flobertka je:`,a:`krátká nebo dlouhá jednohlavňová nebo vícehlavňová zbraň určená pro náboje typu Flobert.`,b:`krátká nebo dlouhá zbraň s hladkým vývrtem pro kulový náboj s jiným než středovým nebo okrajovým zápalem.`,c:`plynová zbraň pro střelbu tréninkového charakteru nebo např. střelbu v místnostech.`,correct:"a"},
{id:753,cat:`Nauka o zbraních`,q:`Palná zbraň - pistole je:`,a:`krátká zbraň s pevnou hlavní a otáčivým válcem s nábojovými komorami, které se mezi jednotlivými výstřely natáčejí do osy hlavně.`,b:`dlouhá zbraň s pevnou hlavní s nábojovou komorou; jednoranová, opakovací nebo samonabíjecí (popřípadě vícehlavňová).`,c:`krátká zbraň s pevnou nebo pohyblivou hlavní s nábojovou komorou; jednoranová, opakovací nebo samonabíjecí (popřípadě vícehlavňová).`,correct:"c"},
{id:754,cat:`Nauka o zbraních`,q:`Palná zbraň - revolver je:`,a:`krátká zbraň s pevnou nebo pohyblivou hlavní s nábojovou komorou; jednoranová, opakovací nebo samonabíjecí (popřípadě vícehlavňová).`,b:`krátká zbraň s pevnou hlavní a otáčivým válcem s nábojovými komorami, které se mezi jednotlivými výstřely natáčejí do osy vývrtu hlavně.`,c:`dlouhá zbraň s pohyblivou hlavní a otáčivým válcem s nábojovými komorami, které se mezi jednotlivými výstřely natáčejí do osy vývrtu hlavně.`,correct:"b"},
{id:755,cat:`Nauka o zbraních`,q:`Ráže palné zbraně pro kulový náboj je:`,a:`vyjádřena některými nebo všemi údaji: smluvní velikostí průměru vodicí části vývrtu hlavně, technickým popisem nábojové komory, technickým popisem použitelného náboje, doplňkovými označeními.`,b:`vyjádřena všemi údaji: zvykovou velikostí poloměru vodicí linie vývrtu hlavně, technickým popisem nábojové komory, smluvním popisem použitého náboje, doplňkovým označením „Magnum“ a symbolem označujícím smluvní dostřel daného náboje.`,c:`vyjádřena přesným technickým údajem o velikosti průměru vodicí části hlavně a o délce komory.`,correct:"a"},
{id:756,cat:`Nauka o zbraních`,q:`Zahrdlení je úprava:`,a:`ústí šachty zásobníku zbraně vybavené odnímatelným zásobníkem, účelem zahrdlení je usnadnit vkládání zásobníku do zásobníkové šachty při rychlém přebíjení zbraně.`,b:`nábojové komory brokové zbraně jejímž účelem je zajistit dostatečné zaškrcení čela náboje s hromadnou střelou.`,c:`úsťové části brokové hlavně ovlivňující velikost a charakter krytí.`,correct:"c"},
{id:757,cat:`Nauka o zbraních`,q:`Ráže palné zbraně pro brokový náboj je:`,a:`přesná velikost průměru vodicí části vývrtu hlavně, což je smluvní číslo udávající počet koulí stejného průměru odlitých z jednoho kilogramu olova, které projdou vývrtem hlavně.`,b:`vyjádřena přesnou velikostí průměru vývrtu hlavně a smluvním číslem udávajícím počet ogiválních střel o váze jedné unce ( 28,35 g) odlitých z jedné anglické libry olova, které suvně projdou vývrtem hlavně. ≐`,c:`smluvní označení, ke kterému přísluší zejména smluvní velikost průměru vodící části hlavně a jmenovitá nebo skutečná délka nábojnice.`,correct:"c"},
{id:758,cat:`Nauka o zbraních`,q:`Střelivo s mechanickým zápalem se dělí na střelivo:`,a:`s okrajovým zápalem, středovým zápalem, zápalem typu Gatling nebo zápalem Bordeaux.`,b:`s nízkým, středním a silným zápalem.`,c:`s okrajovým zápalem, středovým zápalem nebo se zápalem Lefaucheux.`,correct:"c"},
{id:759,cat:`Nauka o zbraních`,q:`Školní náboj je náboj:`,a:`určený ke světelné a akustické imitaci ostré střelby v rámci výuky a výcviku ve vojenských školách nebo školách bezpečnostních sborů.`,b:`bez výmetné náplně a zápalky, který rozměrově odpovídá skutečnému náboji: slouží pro výuku a výcvik v nabíjení a spouštění zbraně a pro kontrolu funkce zásobníku, závěru a spušťadla.`,c:`s výmetnou náplní, který rozměrově neodpovídá skutečnému náboji.`,correct:"b"},
{id:760,cat:`Nauka o zbraních`,q:`Náboj typu Flobert je náboj:`,a:`se středovým zápalem pro brokové zbraně.`,b:`s plastovou střelou určenou k neletálnímu nácviku střelby například v sebeobranných situacích; někdy se v souvislosti se střelivem typu Flobert hovoří také o soupeřském systému střeleckého výcviku.`,c:`s okrajovým zápalem; má střelu jednotnou nebo hromadnou, obvykle v rážích 4 mm, 6 mm nebo 9 mm.`,correct:"c"},
{id:761,cat:`Nauka o zbraních`,q:`U perkusního zámku se iniciace výmetné náplně zajišťuje:`,a:`úderem kladívka (kohoutu) na perkusní zápalku.`,b:`úhozem kladívka (kohoutu) na ocílku.`,c:`úderem křemene, pazourku nebo jejich syntetické náhražky upevněných v čelistech zámku na perkusní střelný prach.`,correct:"a"},
{id:762,cat:`Nauka o zbraních`,q:`Záměrná je:`,a:`kladný náměr, který definuje odklon odměru od úrovně ústí hlavně směrem vzhůru.`,b:`přímka spojující mířidla zamířené zbraně a záměrný bod na cíli.`,c:`rána vystřelená ze zbraně záměrně a s rozmyslem.`,correct:"b"},
{id:763,cat:`Nauka o zbraních`,q:`Maximální dostřel je:`,a:`největší dosažitelný dostřel při střelbě z určité zbraně s určitým střelivem.`,b:`největší vzdálenost od zbraně, na níž lze efektivně vyřadit střelbou zvolený cíl.`,c:`největší počet výstřelů dosažitelný při střelbě z určité zbraně.`,correct:"a"},
{id:764,cat:`Nauka o zbraních`,q:`Maximální dostřel při výstřelu z pistole ráže 9 mm Luger nebo jiné srovnatelné ráže, při použití standardního střeliva, může činit:`,a:`přibližně 100 až 150 m, přičemž střela je schopná způsobit člověku vážné či smrtelné poranění po celé dráze svého letu.`,b:`i více než 1,5 km, přičemž střela je schopná způsobit člověku vážné či smrtelné poranění po více než polovinu dráhy svého letu.`,c:`při optimálním náměru přibližně až 3 km, přičemž ale účinný dostřel představuje pouze přibližně 50 m.`,correct:"b"},
{id:765,cat:`Nauka o zbraních`,q:`Maximální dostřel při výstřelu z dlouhé kulové zbraně ráže 308 Winchester nebo srovnatelné ráže, při použití standardního střeliva, může činit přibližně:`,a:`až 800 m, přičemž střela může způsobit vážnou újmu na zdraví po celé své dráze letu.`,b:`až 3 km, přičemž střela může způsobit vážnou újmu na zdraví pouze zhruba v první polovině dráhy svého letu.`,c:`až 4 km, přičemž střela může způsobit vážnou újmu na zdraví po celé své dráze letu.`,correct:"c"},
{id:766,cat:`Nauka o zbraních`,q:`Maximální dostřel při výstřelu z dlouhé kulové zbraně ráže 22 Long Rifle, při použití standardního střeliva, může činit:`,a:`více než 1,5 km; střela může způsobit vážnou újmu na zdraví po zhruba dvě třetiny dráhy svého letu.`,b:`až stonásobek délky hlavně měřené v metrech; střela může způsobit vážnou újmu na zdraví přibližně do vzdálenosti 150 m.`,c:`až 4 km, přičemž střela může způsobit vážnou újmu na zdraví po celé své dráze letu.`,correct:"a"},
{id:767,cat:`Nauka o zbraních`,q:`Maximální dostřel při výstřelu hromadné střely (broky o velikosti 2,4 mm až 3,5 mm) z dlouhé brokové zbraně ráže 12 nebo 16 činí přibližně:`,a:`i více než 1,5 km, přičemž větší shluk broků může způsobit vážnou újmu na zdraví po celé dráze letu.`,b:`stovky metrů; hodnotu maximálního dostřelu v metrech lze přibližně určit jako stonásobek průměru broku v milimetrech (tzn. např. přibližně 250 m v případě broků velikosti 2,4 mm).`,c:`desítky metrů; maximální dostřel se shoduje s tzv. distanční vzdáleností střelby, kterou se rozumí orientačně zjištěná vzdálenost, na kterou lze za běžných viditelnostních podmínek rozpoznat postavu člověka, a to bez použití optického zaměřovače; v případě použití optického zaměřovače se takto zjištěná vzdálenost zvyšuje na dvojnásobek.`,correct:"b"},
{id:768,cat:`Nauka o zbraních`,q:`Maximální dostřel při výstřelu hromadné střely (broky větších velikostí, tzv. hrubé broky či „buck shoty“, např. velikosti 8,43 mm) z dlouhé brokové zbraně ráže 12 nebo 16 činí přibližně:`,a:`nižší stovky metrů, hodnotu maximálního dostřelu v metrech lze přibližně určit jako stonásobek průměru broku v milimetrech.`,b:`pravidlo o stonásobku průměru broku v milimetrech na maximální dostřel v případě hrubých broků použít nelze, tyto broky mají již vesměs maximální dostřel srovnatelný s kulovými střelami menších ráží, a tedy i přes 1000 m.`,c:`při optimálním náměru přibližně až 3 km, přičemž ale účinný dostřel představuje pouze přibližně 50 m.`,correct:"b"},
{id:769,cat:`Nauka o zbraních`,q:`Účinný dostřel je:`,a:`největší vzdálenost od zbraně, na níž lze efektivně vyřadit mířenou střelbou zvolený cíl.`,b:`největší dosažený dostřel při střelbě z určité zbraně s určitým střelivem, a to při ideálním náměru kolem 30°.`,c:`maximální vzdálenost od zbraně, kam dopadne náboj.`,correct:"a"},
{id:770,cat:`Nauka o zbraních`,q:`Krytí brokovnice je:`,a:`poměr počtu zásahů vytvořených broky brokového shluku určitého náboje ve čtverci o stanovené úhlopříčce vůči průměru kružnice opsané tomuto čtverci.`,b:`poměr počtu zásahů broků v kruhovém zkušebním terči v určené vzdálenosti od ústí zbraně k celkovému počtu broků v náboji, vyjádřený v procentech.`,c:`účinnost maskovacího nástřiku (krycí povrchové úpravy) zejména u loveckých brokovnic; krytí se hodnotí v jednotkách DPI (dots per inch).`,correct:"b"},
{id:771,cat:`Nauka o zbraních`,q:`Ranivý účinek je:`,a:`ničivý účinek střel na živé cíle, jehož výsledkem je vznik střelných poranění.`,b:`ničivý účinek střel na pevné cíle, jehož výsledkem je zničení cíle.`,c:`rozdíl mezi dopadovou a zbytkovou energií střely, přičemž tento rozdíl ovlivňuje velikost zpětného rázu zbraně a může při manipulaci se zbraní způsobit zranění neopatrnému střelci.`,correct:"a"},
{id:772,cat:`Nauka o zbraních`,q:`Průbojný účinek je:`,a:`účinek střely, který umožňuje, aby střela procházela vývrtem hlavně a byla jí drážkováním udělována rotace.`,b:`ničivý účinek střel na živé cíle, jehož výsledkem je vznik střelných poranění.`,c:`ničivý účinek střely spočívající v pronikání střely cílem.`,correct:"c"},
{id:773,cat:`Nauka o zbraních`,q:`Vydutí hlavně je`,a:`rozšíření ústí brokové hlavně; jedná se o konstrukční úpravu, jejímž smyslem je zvýšení krytí při použití broků menšího průměru (tzv. bird shots).`,b:`místní zvětšení průměru hlavně způsobené při výstřelu; jedná se o formu havárie zbraně.`,c:`výšleh plamene z hlavně po výstřelu; vydutí je způsobeno nespálenými zrny střelného prachu, které jsou z hlavně při výstřelu vymeteny.`,correct:"b"},
{id:774,cat:`Nauka o zbraních`,q:`Zápalka je:`,a:`prachová tableta určená pro použití jako zápalná látka v palných střelných zbraních.`,b:`součást náboje obsahující zápalkovou slož, která se nárazem nebo jiným způsobem vznítí a zažehne výmetnou náplň.`,c:`rozbuška se zpožďovačem, která je určena k vyvolání iniciační detonace v brokovém náboji těsně před tím, než bicí mechanismus přivede zbraň k výstřelu.`,correct:"b"},
{id:775,cat:`Nauka o zbraních`,q:`Střelecké stanoviště je:`,a:`přesně určené místo, popřípadě ohrazené, z něhož se střílí.`,b:`přesně určené místo, popřípadě ohrazené, na kterém se střelcům udělují instrukce.`,c:`stanoviště, odkud střelci vyrážejí k plnění střeleckých úloh; střeleckým stanovištěm je například prostor, ze kterého vyjíždějí závodníci v rámci biatlonových soutěží.`,correct:"a"},
{id:776,cat:`Nauka o zbraních`,q:`Palebná čára je čára, která omezuje střelecká stanoviště směrem:`,a:`k terčové čáře.`,b:`k ostatním střelcům, kteří současně provádějí střelbu.`,c:`od dopadiště k terčové čáře.`,correct:"a"},
{id:777,cat:`Nauka o zbraních`,q:`Cílový prostor je prostor, kde:`,a:`se zdržuje střelec po zasažení cíle.`,b:`je prováděno vyhodnocení střelby na cíl.`,c:`je umístěn terč a terčová zařízení.`,correct:"c"},
{id:778,cat:`Nauka o zbraních`,q:`Terčové zařízení je zařízení sloužící:`,a:`k automatickému lepení terčů po provedené střelbě.`,b:`k umístění a případnému pohybu terčů.`,c:`k uskladnění používaných terčů na střelnici.`,correct:"b"},
{id:779,cat:`Nauka o zbraních`,q:`Nástřelná série je:`,a:`série sloužící k ověření zkušební značky zbraně.`,b:`série sloužící k ověření průměrné hodnoty bodu zásahu.`,c:`série sloužící k ověření nastřelení a funkce zbraně zpravidla před soutěží.`,correct:"c"},
{id:780,cat:`Nauka o zbraních`,q:`V případě značného znečištění hlavně nebo je-li v hlavni jiná cizí překážka (např. způsobená nechtěným nabráním hlíny do vývrtu hlavně), hrozí při výstřelu:`,a:`že samonabíjecí zbraň začne tzv. kulometit, neboli vystřelí dávku ran v důsledku selhání správné činnosti bicího mechanismu; přitom hrozí ztráta kontroly nad zbraní a zasažení nezúčastněných osob střelbou.`,b:`vydutí nebo roztržení hlavně a případně další destrukce zbraně s možností vážného zranění střelce nebo v okolí se nacházejících osob.`,c:`snížení tlaku spalných plynů v hlavni, neboť střela musí při průchodu vývrtem hlavně překonávat zvýšený odpor; v důsledku toho může obvykle dojít k výraznému zhoršení přesnosti a střela může mít nižší (suboptimální) účinek střely v cíli.`,correct:"b"},
{id:781,cat:`Nauka o zbraních`,q:`Ke střelbě ze zbraně v dobrém technickém stavu lze bezpečně použít:`,a:`střelivo ráže a případně též konkrétního výrobního provedení, pro které je zbraň určena a které jsou obvykle vyznačeny na zbrani.`,b:`střelivo, které lze do zbraně vložit a uzamknout, aniž by musela být použita větší síla.`,c:`náboje označené typem dané zbraně; to platí vždy v případě civilních zbraní, zatímco u vojenských zbraní může být stanoven odlišný postup.`,correct:"a"},
{id:782,cat:`Nauka o zbraních`,q:`Kulové střelivo s výrazně zdeformovanou střelou nebo střelou pokrytou např. rzí:`,a:`může být použito ke střelbě pouze na schválených střelnicích.`,b:`by nemělo být použito ke střelbě, protože může způsobit poškození, případně i havárii zbraně.`,c:`může být použito ke střelbě pouze ve zbraních určených pro použití střeliva se zvýšeným ranivým účinkem.`,correct:"b"},
{id:783,cat:`Nauka o zbraních`,q:`Střelivo může být použito ke střelbě:`,a:`ze zbraně, která je pro takové střelivo určena, a pouze v případě, že je jak střelivo, tak i zbraň v dobrém technickém stavu.`,b:`pouze v případě, že bylo vyrobeno před méně než 10 lety, po uplynutí této doby je střelivo považováno za expirované a jeho použití je vysoce rizikové.`,c:`ve zbrani příslušné nebo obdobné ráže; pokud zbraň není určena přímo pro toto střelivo, ale lze jej do této zbraně nabít, lze jej v takové zbrani vždy bezpečně použít, pokud je výkonově slabší než střelivo, pro které je daná zbraň určena.`,correct:"a"},
{id:784,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Se zbraní není dovoleno mířit na jiného člověka, zvířata nebo věci vyšší hodnoty, pokud je zbraň nabitá a pokud k tomu takový člověk nebo vlastník zvířete anebo věci nedal souhlas.`,b:`S každou zbraní je na místě zacházet, jakoby byla nabitá; to neplatí, pokud zacházíme se zbraní, která byla jako nenabitá bezpečně uložena v trezoru odpovídajícím požadavkům nařízení vlády č. 217/2017 Sb.`,c:`S každou zbraní je na místě zacházet, jakoby byla nabitá; zejména není přípustné „jen tak“ mířit na jiného člověka, a to i se zbraní, o níž jsme přesvědčeni, že nabitá není.`,correct:"c"},
{id:785,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Pouze na schválené střelnici nebo v honitbě lze střílet bez obav ze zasažení jiné osoby nebo způsobení škody na majetku.`,b:`Střílet ze zbraně je možné pouze v případě, že víme, na co střílíme, uvědomujeme si, kam dále může střela letět v případě průstřelu cíle nebo jiné překážky, a zohledníme riziko odrazu střely.`,c:`Střílet ze zbraně lze do cílového prostoru, o kterém jsme si jisti, že se v něm nevyskytnou osoby, a to zejména s ohledem na denní dobu; to neplatí na schválené střelnici, na níž je výskyt osob v zásadě vyloučen.`,correct:"b"},
{id:786,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Se zbraní lze střílet pouze tehdy, pokud její technický stav odpovídá použitému střelivu a úrovni výcviku střelce; čím je technická kompetentnost střelce důkladnější, tedy zejména v případě dlouhodobější zkušenosti se zacházením se zbraní, tím menší důraz lze klást na technickou způsobilost zbraně nebo použitého střeliva.`,b:`Technickou způsobilost zbraně ke střelbě zajišťuje ověření zbraně příslušnou zkušební značkou; je-li zbraň adekvátně ověřena, je možné ji ke střelbě bezpečně použít vždy.`,c:`Se zbraní lze střílet pouze tehdy, pokud je v dobrém technickém stavu; při každém pravidelném čištění zbraně a pokud možno před každou střelbou je proto na místě alespoň zběžná prohlídka zbraně, nevykazuje-li defekty (vydutí hlavně, cizí předměty v hlavni, prasklé součásti), které by bezpečné použití zbraně ke střelbě vylučovaly.`,correct:"c"},
{id:787,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Při střelbě lze použít ochranu sluchu, zejména pokud střílíme častěji; ochranu zraku je nutné použít pouze tehdy, pokud hrozí odrazy střel.`,b:`Při střelbě je potřeba použít ochranu sluchu a zraku, pokud je to možné.`,c:`Při střelbě je nezbytné použití střeleckých rukavic, pokud je střelba prováděna ve ztížených klimatických podmínkách.`,correct:"b"},
{id:788,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Nošení zbraně je přípustné pouze na místech, kde je nižší koncentrace osob, především tedy mimo intravilán obcí a měst.`,b:`Nošení zbraně je komplexní problematika; vždy je třeba věnovat nošení zbraně důsledný trénink, a to zejména s ohledem na rychlost tasení zbraně. Zbraň musí být nošena ve stavu umožňujícím okamžité použití.`,c:`Nošení zbraně je komplexní problematika; zejména je třeba zohledňovat platná právní pravidla, nosit krátkou zbraň v odpovídajícím pouzdře a volit oděv tak, aby umožňoval bezpečné nošení zbraně; dlouhou zbraň je na místě nosit vždy buď zajištěnou, a není-li vybavena spolehlivou manuální pojistkou nebo obdobným mechanismem, tak ji nosit bez náboje v nábojové komoře.`,correct:"c"},
{id:789,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Zbraní se nesmí mířit, ani mimoděk při jakékoli manipulaci se zbraní, na nic, na co by nebylo možné vystřelit.`,b:`Zbraní se smí mířit pouze na osoby, které s tím souhlasí a jsou si vědomé všech podstatných rizik z takového postupu vyplývajících.`,c:`Zbraní se nesmí mířit na kohokoli, kdo s takovým jednáním není srozuměn, nebo není držitelem zbrojního oprávnění.`,correct:"a"},
{id:790,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Prst na spoušti se připouští pouze při tzv. taktické manipulaci se zbraní, kdy se např. při pohybu se zbraní nebo při změnách střeleckých poloh vyžaduje okamžitá připravenost k provedení výstřelu.`,b:`Pokud střelec nechce střílet, nesmí se nijak dotýkat spouště (prst musí být bezpečně mimo prostor lučíku spouště).`,c:`Pokud střelec nechce střílet, nesmí se nijak dotýkat spouště zepředu ukazovákem střílející ruky; přípustná je při dodržení ostatních bezpečnostních zásad pouze umístění jiného prstu do prostoru lučíku nebo dotýkání se spouště zboku (tak, aby se prst zároveň nenacházel přímo v prostoru lučíku).`,correct:"b"},
{id:791,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Každý si musí být vědom rizik souvisejících s možným průstřelem terče nebo jiného cíle, na druhé straně ale střelec nemůže být vesměs schopen odhadnout materiál a prostřelitelnost objektů nacházejících se za terčem nebo jiným cílem; rizika spojená s prostřelením těchto objektů tedy nelze při střelbě zohledňovat.`,b:`Při střelbě si musí být každý vědom toho, že po průstřelu terče nebo jiného cíle dochází k bezpečnému zachycení střely v půdě pod terčem nebo jiným cílem; pouze pokud nedojde k zasažení terče nebo jiného cíle, musí střelec odpovědně zvažovat, kde střela skončí svůj let.`,c:`Při střelbě je třeba si být vědom, kde střela skončí, a to až do jejího úplného zachycení.`,correct:"c"},
{id:792,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Není přípustné střílet na cíl, který může daná zbraň prostřelit, aniž by si byl střelec jistý, co je za tímto cílem v dosahu střely vypálené z jeho zbraně.`,b:`Při střelbě si musí být každý vědom toho, že po průstřelu terče nebo jiného cíle dochází k bezpečnému zachycení střely v půdě pod terčem nebo jiným cílem; pouze pokud nedojde k zasažení terče nebo jiného cíle, musí střelec odpovědně zvažovat, kde střela skončí svůj let.`,c:`Každý si musí být vědom rizik souvisejících s možným průstřelem terče nebo jiného cíle, na druhé straně ale střelec nemůže být vesměs schopen odhadnout materiál a prostřelitelnost objektů nacházejících se za terčem nebo jiným cílem; rizika spojená s prostřelením těchto objektů tedy nelze při střelbě zohledňovat.`,correct:"a"},
{id:793,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Z důvodu nebezpečí odrazu je nepřípustné střílet na povrchy, které hrozí odrazem střely; těmito povrchy jsou však toliko beton, asfalt, ocel a kámen (žula nebo tvrdší horniny).`,b:`Z důvodu nebezpečí odrazu střely je nepřípustné střílet pod příliš malým úhlem proti většině povrchů, a to včetně vodní hladiny nebo povrchu země.`,c:`Rizika spojená s odrazy střel jsou mýtem bezpečné manipulace se zbraněmi a střelivem, odražené střely nebo jejich fragmenty nemají nikdy dostatečnou energii ke způsobení vážnějších následků.`,correct:"b"},
{id:794,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Odražené střely nebo jejich fragmenty nemají nikdy dostatečnou energii ke způsobení vážnějších následků.`,b:`Při střelbě na tvrdé a zakřivené povrchy je nejdříve nezbytné kvalifikovaně odhadnout směr eventuálního (byť nepravděpodobného) odrazu střely a zkontrolovat, že se v tomto směru nenachází osoby; za doporučenou praxi se považuje zkontrolovat nejen samotný směr eventuálního odrazu střely, ale také dodatečný bezpečnostní úhel 5° na každou stranu od směru eventuálního odrazu střely.`,c:`Zejména v případě tvrdých nebo zakřivených povrchů může nepředvídatelně docházet k nebezpečným odrazům střel i při dopadu střel pod prakticky jakýmkoli úhlem.`,correct:"c"},
{id:795,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Manipulace se zbraní zpravidla začíná a končí kontrolou jejího stavu, není-li při dodržení všech bezpečnostních zásad odůvodněný jiný postup (například při přípravě zbraně pro nošení).`,b:`Manipulace se zbraní končí vždy ránou jistoty; před provedením rány jistoty je potřeba provést kontrolu stavu zbraně, pokud si osoba, která se zbraní nakládá, není jistá, zda se ve zbrani náhodou nenacházejí náboje.`,c:`Manipulace se zbraní vyžaduje kontrolu zbraně, pokud před tím byla zbraň nabita náboji, byť jen v zásobníku; odložení nabité zbraně se připouští výhradně u zbraní vybavených vnějšími bicími kohouty (lankasterky).`,correct:"a"},
{id:796,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Na veřejnosti lze nabitou zbraň odložit, pouze je-li to akceptovatelné z hlediska tradic a místních podmínek (např. v rámci tzv. poslední leče).`,b:`Žádnou, ani nenabitou zbraň není přípustné bez dozoru ponechat na místě volně přístupném jiným osobám.`,c:`Žádnou, ani nenabitou zbraň není přípustné bez dozoru ponechat na místě veřejnosti volně přístupném po dobu delší než krátkou; za dobu delší než krátkou se obvykle považuje doba přesahující dobu nezbytnou pro restartování chytrého telefonu.`,correct:"b"},
{id:797,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Není přípustné, aby se zbraní a střelivem manipulovala osoba, která si nepřečetla celý originální návod k použití dané zbraně a střeliva.`,b:`Zbraň a střelivo neznámého původu nenabíjej bez vážného důvodu!`,c:`Každý, kdo má manipulovat s jakoukoli zbraní nebo střelivem, se musí předem seznámit s jejich funkcí, ovládacími prvky a se zásadami bezpečného zacházení.`,correct:"c"},
{id:798,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Zvládnutí postupů bezpečného zacházení se zbraněmi a střelivem, průběžné zdokonalování příslušných návyků a vědomé dodržování zásad bezpečného zacházení se zbraněmi a střelivem jsou odpovědností každého, kdo se zbraní a střelivem nakládá.`,b:`Zvládnutí postupů bezpečného zacházení se zbraněmi a střelivem, průběžné zdokonalování příslušných návyků a vědomé dodržování zásad bezpečného zacházení se zbraněmi a střelivem jsou nezbytností pro toho, kdo si je pořizuje pro střelbu, ale nikoli pro toho, kdo si zbraň pořizuje jen pro jistotu nebo jako statusový symbol.`,c:`Zajištění zvládnutí postupů bezpečného zacházení se zbraněmi a střelivem, průběžného zdokonalování příslušných návyků a průběžné upozorňování držitelů zbraní na potřebu dodržování zásad bezpečného zacházení se zbraněmi a střelivem jsou odpovědností státu.`,correct:"a"},
{id:799,cat:`Nauka o zbraních`,q:`Za jednu ze zásad bezpečného zacházení se zbraní a střelivem lze považovat následující tezi:`,a:`Ten, kdo nakládá se zbraní a střelivem má nárok na respekt a pokoru ze strany laické veřejnosti.`,b:`Celková pokora a uměřenost při jakémkoli zacházení se zbraní jsou základní povinností každého, kdo se zbraní a střelivem nakládá.`,c:`Zbraně jsou odznakem a zdrojem síly a autority; každý, kdo se zbraněmi nakládá, si má být této síly a autority vědom a má je dávat najevo. V. Zdravotnické minimum:`,correct:"b"},
{id:800,cat:`Zdravotnické minimum`,q:`Při popálení nebo opaření malé plochy postižené místo:`,a:`chladíme popálené místo pod tekoucí vodou (15–20 minut), ne ledem. Sundáme šperky kvůli otoku. Po zchlazení sterilně překryjeme.`,b:`na popáleninu ihned přikládáme led nebo studený obklad z mrazáku, aby se rychle ochladila.`,c:`pos�žené místo potřeme mas� nebo olejem a zavážeme obvazem, aby se rána nezaní�la.`,correct:"a"},
{id:801,cat:`Zdravotnické minimum`,q:`Při polití kyselinou nebo louhem:`,a:`postižené místo okamžitě a dlouze oplachujeme tekoucí vodou směrem ven od těla, abychom zabránili dalšímu šíření chemikálie.`,b:`ránu rychle vysušíme čímkoliv, co máme po ruce a následně zakryjeme suchým obvazem, aby se kyselina nevstřebávala do těla.`,c:`na kůži se snažíme koncentraci chemikálie bezodkladně zvýšit, abychom dosáhli jejího rychlejšího odpaření.`,correct:"a"},
{id:802,cat:`Zdravotnické minimum`,q:`Jak se postupuje při krátkodobém bezvědomí postiženého, který rychle nabude vědomí (tzv. mdloba):`,a:`pos�ženého ihned posadíme a dáme mu napít vody a najíst, aby se vzpamatoval a probral se vlastní ak�vitou.`,b:`postiženého ponecháme vleže na zemi, komunikujeme s ním, uvolníme oděv, zajistíme přívod čerstvého vzduchu. Ochlazujeme čelo a zápěstí. Nezvedáme nohy automaticky – záleží na příčině.`,c:`Polijeme pos�ženého studenou vodou nebo mu dáme několik úderů otevřenou dlaní, ne hřbetem ruky, aby se pos�žený rychleji probral.`,correct:"b"},
{id:803,cat:`Zdravotnické minimum`,q:`V případě použití zaškrcovadla:`,a:`zaškrcovadlo přikládáme na jakékoli místo konče�ny, ideálně přímo na ránu, aby se krvácení rychle zastavilo.`,b:`po několika minutách zaškrcovadlo povolíme, abychom zjis�li, jestli krvácení přestalo a konče�na neodumřela.`,c:`zaškrcovadlo přikládáme nad ránu na paži nebo stehně, utahujeme až do zástavy krvácení. Zaznamenáme čas zaškrcení a voláme 155.`,correct:"c"},
{id:804,cat:`Zdravotnické minimum`,q:`Rozhodneme-li se provádět při resuscitaci také dýchání z plic do plic a vidíme-li, že je dýchání z plic do plic neúčinné (tzn. nezvedá se hrudník postiženého):`,a:`pokračujeme ve stlačování hrudníku a před dalším vdechem upravíme záklon hlavy, abychom lépe uvolnili dýchací cesty.`,b:`pokud se při dýchání z úst do úst nezvedá hrudník, znamená to, že resuscitace nefunguje. Nemá smysl pokračovat, proto s oživováním přestaneme.`,c:`když se hrudník nezvedá, znamená to, že do plic nejde dost vzduchu. Proto začneme dýchat silněji a častěji, abychom vzduch „protlačili“ dovnitř.`,correct:"a"},
{id:805,cat:`Zdravotnické minimum`,q:`Při bezvědomí:`,a:`pos�ženého ihned uložíme do stabilizované polohy, i když ještě nevíme, zda dýchá. Hlavně se nesmí dusit jazykem, takže mu otevřeme ústa a vytáhneme jazyk, pokud to jde.`,b:`zkontrolujeme tep na krku, a pokud je cí�t, tak je vše v pořádku. Dýchání kontrolovat nemusíme, protože srdeční tep znamená, že člověk žije. Zavoláme záchranku a počkáme u pos�ženého.`,c:`postiženého uložíme na záda, provedeme záklon hlavy a zkontrolujeme dýchání. Dýchá-li normálně, voláme 155 a držíme záklon a kontrolujeme dýchání do příjezdu pomoci. Nedýchá-li nebo následně přestane dýchat, voláme 155 a zahájíme resuscitaci.`,correct:"c"},
{id:806,cat:`Zdravotnické minimum`,q:`Při dýchání z plic do plic:`,a:`po každém stlačení hrudníku uděláme jeden vdech, aby měl pos�žený dostatek vzduchu. Čím častěji budeme dýchat, �m lépe.`,b:`pokud provádíme dýchání z úst do úst, střídáme 30 stlačení hrudníku a 2 vdechy. Vdechujeme tolik, aby se viditelně zvedl hrudník. Před zahájením vždy napřed voláme 155 a začínáme 30 kompresemi. Pokračujeme bez přerušení, v pravidelném rytmu.`,c:`při resuscitaci nejprve provedeme 2 vdechy a teprve poté začneme se stlačováním hrudníku. Tento postup opakujeme stále dokola v poměru 2 vdechy ku 30 stlačením.`,correct:"b"},
{id:807,cat:`Zdravotnické minimum`,q:`Resuscitaci provádíme:`,a:`stlačujeme hrudník měkkou čás� dlaně a držíme prsty rozevřené, aby bylo stlačování šetrnější. Hrudník stlačujeme jen do hloubky asi 3-4 cm, abychom neporanili žebra. Pokud se pos�žený po dvou minutách neprobere, voláme 155.`,b:`resuscitaci začneme stlačováním hrudníku na tvrdém podkladu. Položíme hranou dlaně (heel of hand) jedné ruky na dolní polovinu hrudní kosti (střed hrudníku), druhou ruku položíme na první. Stlačujeme 100–120× za minutu do hloubky 5–6 cm (cca 1/3 hrudní stěny). Před zahájením vždy voláme 155.`,c:`při resuscitaci stlačujeme hrudník volně podle citu – pomezí oblas� hrudníku a břicha nebo tam, kde to vypadá nejměkčí. Ruce nemusíme pokládat přesně – stačí, když tlačíme jednou dlaní. Pokud jsme unavení, můžeme si po chvíli odpočinout, srdce chvíli vydrží bez pomoci.`,correct:"b"},
{id:808,cat:`Zdravotnické minimum`,q:`Kdy lze manipulovat s postiženým, u kterého máme podezření na poranění páteře:`,a:`zjistíme-li, že postižený nedýchá normálně, musíme ihned zahájit resuscitaci. V takovém případě je nutné postiženého šetrně uložit na záda na tvrdou podložku, i když máme podezření na poranění páteře. Zástava dechu je okamžitě život ohrožující stav, zatímco poranění páteře je v tuto chvíli pouze podezření – prioritou je vždy záchrana života.`,b:`i když pos�žený nedýchá, nesmíme s ním hýbat, pokud máme podezření na poranění páteře. Každý pohyb by mohl způsobit ochrnu� nebo smrt. Počkáme na příjezd záchranářů, kteří mají vybavení k bezpečnému přemístění.`,c:`při podezření na poranění páteře volíme stabilizovanou polohu, která zajišťuje průchodnost dýchacích cest a zároveň minimalizuje riziko sekundárního poranění míchy. V případě bezvědomí se proto doporučuje pos�ženého ponechat v této poloze až do příjezdu odborné pomoci, abychom zabránili zbytečné manipulaci.`,correct:"a"},
{id:809,cat:`Zdravotnické minimum`,q:`Jak postupujeme u masivního krvácení na končetinách:`,a:`při masivním krvácení přikládáme rovnou tlakový obvaz, bez zbytečného zdržování přímým tlakem. Zaškrcovadlo používáme až jako úplně poslední možnost, protože může způsobit poškození nervů a amputaci konče�ny. Volání záchranky není nutné, pokud se krvácení podaří zastavit.`,b:`při masivním krvácení z konče�ny je vhodné nejprve zaujmout přístup podporující fyziologickou autoregulaci – pacienta uklidníme, uvedeme do polohy vleže a poraněnou konče�nu elevujeme nad úroveň srdce, čímž se sníží hydrosta�cký tlak a přirozeně omezí výtok krve. Přímý tlak do rány aplikujeme pouze tehdy, když máme jistotu, že nedošlo k hlubokému poranění cév nebo přítomnos� cizího tělesa, jinak může dojít k dalšímu poškození tkání. Pokud krvácení neustává, doporučuje se monitorovat barvu a teplotu konče�ny a vyčkat na příjezd odborné pomoci.`,c:`nejprve zajistíme vlastní bezpečí – pokud máme, nasadíme rukavice. Pokud rukavice nemáme, můžeme improvizovat (např. použít igelit, sáček, textilii) jako ochranu před kontaktem s krví. Krvácení se snažíme zastavit přímým tlakem do rány. Pokud to nestačí, přikládáme tlakový obvaz, a když ani ten nezastaví krvácení, použijeme zaškrcovadlo. U masivního krvácení vždy voláme 155 – jde o stav ohrožující život.`,correct:"c"},
{id:810,cat:`Zdravotnické minimum`,q:`Cizí těleso v ráně:`,a:`každé cizí těleso by se mělo z rány co nejrychleji vyjmout, aby rána mohla volně krvácet a byla přístupná pro dezinfekci. Pokud těleso ponecháme, hrozí infekce nebo další poškození tkáně. Po odstranění tělesa krvácení ošetříme tlakem sterilním obvazem a ránu zakryjeme.`,b:`cizí těleso z rány nevyjímáme, pokud je zapíchnuté nebo hluboko v ráně – mohlo by zastavovat krvácení a jeho vytažením bychom mohli stav zhoršit. Odstranit lze jen volně přiložený předmět, který není zapíchnutý ani pevně zachycený v ráně.`,c:`pokud je cizí těleso zapíchnuté například v konče�ně, lze ho opatrně vyjmout, aby bylo možné ránu vydezinfikovat a účinně zastavit krvácení. V případě, že je těleso zapíchnuté do trupu – například v oblas� hrudníku nebo břicha – je vhodné se s pos�ženým domluvit, zda si přeje těleso vyjmout. Vždy je ale důležité poté ránu sterilně překrýt a vyhledat lékařské ošetření.`,correct:"b"},
{id:811,cat:`Zdravotnické minimum`,q:`Zotavovací poloha je:`,a:`poloha na boku, používaná u člověka v bezvědomí, který dýchá normálně. Zajišťuje samostatný záklon hlavy a umožňuje odtok zvratků, krve nebo slin z úst, čímž snižuje riziko vdechnutí. Spodní ruka je natažená před tělo, horní ruka podepírá hlavu, horní noha je pokrčená a zajišťuje stabilitu těla. Tato poloha se používá, pokud je zachránce sám a musí od postiženého odejít, nebo hrozí vdechnutí tekutin.`,b:`určena pro osoby v bezvědomí, bez ohledu na to, zda dýchají či nikoli. Je důležité co nejrychleji uložit pos�ženého na bok, aby se nezadusil například zvratky nebo slinami, a pak případně zkontrolovat dýchání.`,c:`vhodná i u při vědomí pos�ženého, protože napomáhá prohloubení dýchání, uvolňuje bránici a stabilizuje trup. Může být využita jako klidová poloha u osob s dušnos�, slabos� nebo po úrazech, pokud není podezření na poranění páteře. Tato poloha je přirozená, nenásilná a zároveň zabraňuje komplikacím, jako je vdechnu� teku�n nebo kolaps do bezvědomí.`,correct:"a"},
{id:812,cat:`Zdravotnické minimum`,q:`Jak postupujeme při krvácení z nosu:`,a:`postižený předkloní hlavu. Pomocí prstů stlačíme postiženému měkkou část nosu nad nosními dírkami po dobu 5-10 minut, díky čemuž stlačíme cévy, ze kterých teče krev. Pro úlevu můžeme přiložit studený obklad na zátylek nebo kořen nosu.`,b:`pos�žený zakloní hlavu, aby krev netekla ven, a dýchá ústy. Zaklonění pomáhá krvácení zastavit, protože krev zůstane v nosní du�ně, nevyteče a dojde k samovolnému srážení.`,c:`při krvácení z nosu je ideální položit pos�ženého do lehu a podložit mu hlavu, aby zůstala ve zvýšené poloze. Stlačení nosu není vhodné, protože může poškodit sliznici nebo cévy v nose. Doporučuje se klid a čekání na spontánní zastavení krvácení.`,correct:"a"},
{id:813,cat:`Zdravotnické minimum`,q:`Jak postupujeme u otevřené zlomeniny?`,a:`Při otevřené zlomenině musíme co nejdříve konče�nu narovnat, aby se kost dostala zpět do původní polohy. Následně silně utáhneme obvaz, abychom ránu stáhli a zabránili otoku a krvácení.`,b:`Voláme 155. Se zraněnou končetinou nehýbeme. Pokud rána masivně krvácí, je nezbytné zastavit masivní krvácení pomocí zaškrcovadla a do příjezdu záchranné služby kontrolovat, zda masivní krvácení nepokračuje. V případě, že rána masivně nekrvácí, lze pro psychologický efekt ránu lehce přikrýt obvazem, ale bez tlaku a utahování.`,c:`Pokud z otevřená zlomenina nekrvácí ve velkém množství, není nutné volat záchrannou službu – stačí konče�nu pevně znehybnit pomocí dostupného materiálu, přikrýt ránu a dopravit pos�ženého co nejdříve k lékaři.`,correct:"b"},
{id:814,cat:`Zdravotnické minimum`,q:`Při podezření na vnitřní poranění břicha, kdy je postižený při vědomí:`,a:`při podezření na vnitřní poranění břicha posadíme pos�ženého do vzpřímené polohy, aby se mu lépe dýchalo, a na oblast břicha přiložíme led nebo studený obklad, který pomůže omezit vnitřní krvácení a zmírnit bolest. Tato opatření snižují riziko šoku a pomáhají udržet stabilní stav. Voláme 155.`,b:`při podezření na vnitřní poranění břicha uložíme pos�ženého na bok do zotavovací polohy, aby v případě ztráty vědomí nedošlo k vdechnu� zvratků. Hlavní je, aby neležel na zádech, protože v této poloze by mohlo dojít k útlaku vnitřních orgánů.`,c:`voláme 155. Uložíme postiženého do polosedu či do polohy, která je postiženému příjemná (leh na zádech, na boku). Nehýbeme s ním zbytečně. Komunikujeme s postiženým a kontrolujeme jeho stav do příjezdu záchranné služby.`,correct:"c"},
{id:815,cat:`Zdravotnické minimum`,q:`Jak postupujeme u zlomeniny horní končetiny:`,a:`zlomeninu zpevníme pevným tlakem, například obinadlem nebo šátkem, abychom kost vrá�li do správné polohy. Poté ji přitáhneme k tělu a zafixujeme, aby se nehýbala.`,b:`u zlomeniny horní konče�ny je vhodné zhotovit provizorní dlahu z pevného předmětu (pravítko, dřevo, deštník), kterou přiložíme podél celé paže a pevně připevníme obinadlem. Tím snížíme bolest a usnadníme transport. Vždy voláme 155.`,c:`dopravíme postiženého k lékaři. Je důležité, aby postižený se zlomenou končetinou co nejméně hýbal a držel si ji u těla vlastní rukou. V případě, že to nelze, lze použít závěs končetiny do šátku. Zlomeniny nedlahujeme, nezatěžujeme a nehýbeme s nimi. Dopravíme postiženého k lékaři nebo voláme pomoc.`,correct:"c"},
{id:816,cat:`Zdravotnické minimum`,q:`Jak postupujeme u zlomeniny dolní končetiny:`,a:`zlomeniny nedlahujeme, nezatěžujeme a nehýbeme s nimi. U zlomeniny dolní končetiny voláme ideálně 155 a kontrolujeme stav postiženého do příjezdu záchranné služby.`,b:`zlomenou konče�nu ihned dlahujeme nebo svážeme s druhou zdravou nohou, aby byla stabilní. Poté můžeme pos�ženého přesunout do vozidla a dopravit ho k lékaři.`,c:`při podezření na zlomeninu dolní konče�ny je vhodné konče�nu manuálně zafixovat v aktuální poloze a následně ji jemně elevovat (zvednout), aby se zabránilo otoku. Pokud je pacient schopen stát a bolest není výrazná, lze mu s dopomocí pomoci k chůzi a dopravit ho do zdravotnického zařízení. Před transportem je vhodné konče�nu obalit do přikrývky nebo izotermické folie kvůli zajištění tepelného komfortu.`,correct:"a"},
{id:817,cat:`Zdravotnické minimum`,q:`První pomoc je povinen poskytnout:`,a:`první pomoc poskytuje pouze zdravotník nebo proškolená osoba, ostatní se do zásahu nemají zapojovat, aby neudělali chybu. Běžný neproškolený občan nemá právní povinnost pomáhat.`,b:`první pomoc je povinen poskytnout každý občan České republiky, pokud tím neohrozí sebe ani jiné. Zákonná povinnost vyplývá z trestního zákoníku (§ 150 a 151). Povinnost se týká především základních úkonů, jako je přivolání zdravotnické záchranné služby (tel. 155) a zajištění bezpečnosti na místě. Neznalost nebo nejistota není omluvou pro zcela pasivní přístup. Povinnost neplatí, pokud by pomoc byla spojena s vážným ohrožením života či zdraví zachránce.`,c:`každý občan má sice morální povinnost poskytnout pomoc, nicméně dle obecného principu neodpovědnos� za nečinnost nenese žádnou právní odpovědnost, pokud u nehody pouze přihlíží. Z hlediska zákona postačuje, zůstane-li na místě jako svědek událos�. Povinnost zásahu by mohla být interpretována jako zásah do osobní svobody, a proto není běžným občanům uložena.`,correct:"b"},
{id:818,cat:`Zdravotnické minimum`,q:`Při střelném poranění:`,a:`musíme ránu pro zvýšenou možnost infekce důkladně vyčis�t a vydezinfikovat.`,b:`voláme 155 a řešíme život ohrožující stav (masivní krvácení, bezvědomí). Pokud rána masivně krvácí, snažíme se zastavit masivní krvácení. Pokud je zastaveno masivní krvácení a postižený je v bezvědomí a nedýchá normálně, zahájíme resuscitaci.`,c:`musíme dbát na možnost komplikací, proto vždy ránu důkladně vymyjeme a dezinfikujeme pouze okolí.`,correct:"b"},
{id:819,cat:`Zdravotnické minimum`,q:`Při střelném poranění hrudníku, kdy je postižený při vědomí:`,a:`voláme 155, usadíme postiženého do polosedu, ránu ničím nepřikrýváme, necháváme zcela nezakrytou s ponechanou komunikací s okolním prostředím. V případě, že rána masivně krvácí, je třeba krvácení zastavit přímým tlakem v ráně a jen v případě nezbytnosti lze použít speciální krytí (prodyšný nebo vybavený chlopní).`,b:`na ránu přiložíme neprodyšný obvaz, poraněného uložíme na záda.`,c:`na ránu přiložíme neprodyšný obvaz, poraněného uložíme do polohy na bok, poraněnou stranou nahoru. Zajis�me dostatek teku�n, aby u zraněného nenastal šok.`,correct:"a"},
{id:820,cat:`Zdravotnické minimum`,q:`Při střelném poranění končetiny:`,a:`zvedneme konče�nu vůči tělu do výšky, abychom snížili průtok krve do rány. Místo vstřelu vydezinfikujeme a překryjeme sterilním obvazem.`,b:`zvedneme poraněnou konče�nu vůči tělu do výšky, abychom snížili průtok krve do rány a pokusíme se vyjmout střelu z rány.`,c:`voláme 155 a řešíme život ohrožující stav (masivní krvácení, bezvědomí). Pokud rána masivně krvácí, snažíme se zastavit masivní krvácení – první volnou je stlačení rány prsty ruky, druhou použití tlakového obvazu, v případě, že prosakuje i druhá vrstva tlakového obvazu, končetinu zaškrtíme.`,correct:"c"},
{id:821,cat:`Zdravotnické minimum`,q:`Při poskytování první pomoci je u postiženého v bezvědomí nejdříve nutné:`,a:`zastavit masivní krvácení, následně zaklonit hlavu pro uvolnění dýchacích cest, zkontrolovat dýchání a v případě, že postižený nedýchá normálně, zahájit resuscitaci.`,b:`prohledáním kapes pos�ženého zjis�t, jestli u sebe dotyčný má doklad o možných chronických zdravotních po�žích.`,c:`hlasitým voláním o pomoc přivolat další osobu, která nám bude pomáhat při poskytování první pomoci.`,correct:"a"},
{id:822,cat:`Zdravotnické minimum`,q:`Jaká jsou zásadní základní pravidla pro řešení zlomenin?`,a:`Pokud zlomenina působí deformaci např. konče�ny, co nejrychleji ji narovnáme, abychom zabránili trvalým následkům.`,b:`Poraněnou konče�nu zafixujeme například pomocí klacku a šátku.`,c:`Zlomeniny nedlahujeme, nezatěžujeme a nehýbeme s nimi.`,correct:"c"},
{id:823,cat:`Zdravotnické minimum`,q:`Podezření na poranění páteře a míchy vyvolává:`,a:`pozice těla pos�ženého.`,b:`mechanismus úrazu (pády z výšky, úrazy na lyžích, autonehody), ztráta hybnosti a citlivosti končetin.`,c:`krvácení z uší a nosu.`,correct:"b"},
{id:824,cat:`Zdravotnické minimum`,q:`Při krátkodobé ztrátě vědomí (tzv. mdlobě) je volání záchranné služby nezbytné:`,a:`vždy.`,b:`nedojde-li k rychlé úpravě stavu, dochází-li k opakovaným ztrátám vědomí.`,c:`pouze má-li zachránce k dispozici mobilní telefon.`,correct:"b"},
{id:825,cat:`Zdravotnické minimum`,q:`Jak se provádí uvolnění dýchacích cest u postiženého v bezvědomí:`,a:`řádným záklonem hlavy.`,b:`vytažením jazyka z úst.`,c:`přetočením pos�ženého do pozice na boku.`,correct:"a"},
{id:826,cat:`Zdravotnické minimum`,q:`Co je nejdůležitější při poskytování aktivní první pomoci?`,a:`Zajištění dýchacích cest.`,b:`Tepelný komfort pos�ženého.`,c:`Vlastní bezpečí, tedy bezpečí zachránce.`,correct:"c"},
{id:827,cat:`Zdravotnické minimum`,q:`Je dýchání z plic do plic povinná součást laické resuscitace?`,a:`Není. Laik by měl provádět dýchání z plic do plic, pokud to umí a neohrožuje ho to na životě a zdraví.`,b:`Ano, je.`,c:`Je povinná pouze u osob zjevně vyššího věku a malých dě�.`,correct:"a"},
{id:828,cat:`Zdravotnické minimum`,q:`Jak mohu nejlépe určit polohu místa nehody, kterou musím sdělit dispečerce záchranné služby?`,a:`Pomocí popisu okolí, lesa, polí, cest, křižovatek, budov.`,b:`Přesným popisem aktuální konstelace nebeských těles viditelných z místa nehody nebo z nejbližšího vyvýšeného místa; za nebeská tělesa vhodná pro určení geografické polohy však nelze považovat umělé družice Země (satelity, které jsou lidskými výrobky).`,c:`Např. pomocí aplikace záchranka, pomocí číselných kódů na lampách pouličního osvětlení, pomocí čísel mostů, železničních přejezdů, silnic; pomocí čísel na turistických značkách či kódů na tabulkách záchranných bodů umístěných v přírodě.`,correct:"c"},
{id:829,cat:`Zdravotnické minimum`,q:`Jaká je první pomoc při křečových stavech?`,a:`Pos�ženého se snažíme udržet silou v jedné pozici, abychom utlumili jeho chvění a zabránili tak případnému zranění.`,b:`Podáme pos�ženému nápoj s dostatkem minerálů, které působí jako prevence křečí.`,c:`Křeče necháváme volně proběhnout. Kolem postiženého uděláme prostor, aby se dále nezranil (odstraníme okolní nábytek apod.). Po odeznění křečí, zkontrolujeme vědomí postiženého.`,correct:"c"},
{id:830,cat:`Zdravotnické minimum`,q:`Jaký je postup při otravě léky?`,a:`Voláme 155. Pokusíme se u postiženého vyvolat zvracení, je-li postižený při vědomí. Můžeme podat tablety černého uhlí. Důležité je zjistit o jaký druh léčiv se jedná. Další postup konzultujeme s linkou 155 nebo Toxikologickým informačním střediskem.`,b:`Pos�ženému podáme 2L čisté, neperlivé vody a dohlédneme na to, aby toto množství pos�žený vypil v co nejkratším čase. Poté sledujeme jeho zdravotní stav a v případě zhoršení jej dopravíme k lékaři. Množství vody léky naředí a sníží se tak jejich účinek.`,c:`Pos�ženého uložíme ke spánku do dobře větrané místnos�. Během spánku účinek požitých léků postupně zeslábne až vymizí.`,correct:"a"},
{id:831,cat:`Zdravotnické minimum`,q:`U jakých chemikálií nemůžeme vyvolávat zvracení v rámci poskytování první pomoci u otrav?`,a:`Alkohol.`,b:`Kyseliny, zásady, pěnidla.`,c:`Léčiva.`,correct:"b"},
{id:832,cat:`Zdravotnické minimum`,q:`Kdy zahajujeme resuscitaci u postiženého, který je v bezvědomí?`,a:`Pokud pos�žený nereaguje na opakované boles�vé podněty např. š�pání, údery konečky prstů do žeber, zatahání za vlasy okolo uší, poplácání dlaní po tváři apod.`,b:`V případě, že jsme uvolnili dýchací cesty záklonem hlavy a postižený nedýchá normálně, zahájíme resuscitaci. "Nedýchá normálně" znamená: při záklonu hlavy nedýchá vůbec, chrčí či lape po dechu.`,c:`Pokud pos�žený po uložení na záda a zvednu� nohou do výšky ani po dvou minutách nenabyde vědomí.`,correct:"b"},
{id:833,cat:`Zdravotnické minimum`,q:`Kdy vytahujeme rukou jazyk postiženého, který je v bezvědomí?`,a:`Nikdy.`,b:`Pouze pokud pos�žený nedýchá.`,c:`Vždy když je potřeba uvolnit u pos�ženého dýchací cesty. Využijeme spínací špendlík z lékárničky.`,correct:"a"},
{id:834,cat:`Zdravotnické minimum`,q:`Postiženého v bezvědomí, který je zasažen elektrickým proudem:`,a:`opláchneme studenou vodou, aby se rychleji probral.`,b:`nejprve izolujeme od zdroje elektrického proudu.`,c:`otočíme na bok do stabilizované polohy.`,correct:"b"},
{id:835,cat:`Zdravotnické minimum`,q:`Jaké příznaky se objevují u cévní mozkové příhody, tzv. mrtvice?`,a:`Ochabnutí koutku oka, úst, patrný křivý úsměv, plazení jazyka šikmo, ochrnutí na jednu polovinu těla (špatná hybnost, slabost v končetinách, nepředpažení rukou, jiná síla v rukou), postižení řečového centra (potíže s mluvením).`,b:`Euforie, zvýšené sebevědomí a hovornost, rozšířené oční zornice, trhavé pohyby a vysušené sliznice (olizuje se).`,c:`Vysoká horečka, bolest hlavy, malátnost, zvracení, zrychlený tep a suchá pokožka.`,correct:"a"},
{id:836,cat:`Zdravotnické minimum`,q:`Jaká je první pomoc u člověka s cukrovkou, který je při vědomí a špatně komunikuje?`,a:`Podáme malé množství tvrdého alkoholu, nejlépe 40 % v množství 0,04L. Pokud nedojde k rychlému zlepšení zdravotního stavu poškozeného, můžeme podat ještě jednu dávku, více však ne.`,b:`Pos�ženému přivoláme zdravotnickou záchrannou službu, která mu změří množství cukru v krvi a podle naměřeného množství lékař podá infuzi.`,c:`Vždy podáme cukr, ideálně v tekuté formě. Dále sledujeme stav postiženého, zda dochází ke zlepšení. V případě, že se stav nelepší, voláme 155.`,correct:"c"},
{id:837,cat:`Zdravotnické minimum`,q:`Kdy se používá automatizovaný externí defibrilátor a proč?`,a:`U postiženého, který je resuscitován, je-li v dosahu a nezdržuje to zachránce od provádění resuscitace (zpravidla tak musí být na místě více zachránců).`,b:`V případech, kdy zachránci dochází při resuscitaci síly, aby získal čas pro jejich načerpání.`,c:`Při krátkém bezvědomí (mdlobě) k rychlejšímu přivedení pos�ženého k vědomí. Elektrický výboj pos�ženého výrazně š�pne, čímž mu dá boles�vý podnět.`,correct:"a"}

const[m,sM]=useState("menu"),[cats,sC]=useState(new Set(CATS)),[qs,sQ]=useState([]),[i,sI]=useState(0),
[sel,sS]=useState(null),[sh2,sH2]=useState(false),[sc,sSc]=useState(0),[hist,sHi]=useState([]),
[ex,sE]=useState(false),[t,sT]=useState(0),[ea,sEA]=useState({}),[st,sSt]=useState({t:0,c:0,bc:{}}),
[sr,sSr]=useState("");

const fin=useCallback(()=>{
  let s=0;const h=qs.map((q,j)=>{const u=ea[j]||null,o=u===q.correct;if(o)s++;return{...q,ua:u,ok:o}});
  sSc(s);sHi(h);sSt(p=>{const n={...p,t:p.t+qs.length,c:p.c+s,bc:{...p.bc}};h.forEach(a=>{if(!n.bc[a.cat])n.bc[a.cat]={t:0,c:0};n.bc[a.cat].t++;if(a.ok)n.bc[a.cat].c++});return n});sM("res");
},[qs,ea]);

useEffect(()=>{if(ex&&m==="q"&&t>0){const x=setInterval(()=>sT(v=>{if(v<=1){clearInterval(x);fin();return 0}return v-1}),1000);return()=>clearInterval(x)}},[ex,m,t,fin]);

const flt=useMemo(()=>{let f=Q.filter(q=>cats.has(q.cat));if(sr){const s=sr.toLowerCase();f=f.filter(q=>[q.q,q.a,q.b,q.c].some(t=>t.toLowerCase().includes(s)))}return f},[cats,sr]);

const go=(w)=>{let p=flt;if(w&&hist.length)p=Q.filter(q=>hist.some(h=>h.id===q.id&&!h.ok));if(!p.length)return;sQ(sh(p));sI(0);sS(null);sH2(false);sSc(0);sHi([]);sE(false);sM("q")};
const goEx=()=>{sQ(sh(Q).slice(0,30));sI(0);sS(null);sH2(false);sSc(0);sHi([]);sE(true);sEA({});sT(2400);sM("q")};

const ans=(l)=>{
  if(ex){sEA(p=>({...p,[i]:l}));if(i<qs.length-1)sI(i+1);return}
  if(sh2)return;sS(l);sH2(true);
  const o=l===qs[i].correct;if(o)sSc(s=>s+1);
  sHi(p=>[...p,{...qs[i],ua:l,ok:o}]);
  sSt(p=>{const c=qs[i].cat,n={...p,t:p.t+1,c:p.c+(o?1:0),bc:{...p.bc}};if(!n.bc[c])n.bc[c]={t:0,c:0};n.bc[c].t++;if(o)n.bc[c].c++;return n});
  if(o)setTimeout(()=>{if(i<qs.length-1){sI(j=>j+1);sS(null);sH2(false)}else sM("res")},600);
};
const nx=()=>{if(i<qs.length-1){sI(i+1);sS(null);sH2(false)}else sM("res")};
const tg=c=>sC(p=>{const n=new Set(p);n.has(c)?n.delete(c):n.add(c);return n});

if(m==="menu")return(
<div style={{minHeight:"100vh",padding:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
<div style={{maxWidth:460,width:"100%"}}>
  <div style={{textAlign:"center",marginBottom:20}}>
    <div style={{fontSize:48,marginBottom:4}}>🎯</div>
    <h1 style={{fontSize:26,fontWeight:800,color:"#fff",marginBottom:2}}>Zbrojní oprávnění</h1>
    <p style={{color:"#6b7280",fontSize:12}}>Oficiální testové otázky MV ČR · {Q.length} otázek · platné od 1.1.2026</p>
  </div>
  {st.t>0&&<div style={{background:"#1f2937",borderRadius:12,padding:14,marginBottom:12}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:12,color:"#9ca3af"}}>Celková úspěšnost</span><span style={{fontWeight:700,color:"#f59e0b"}}>{Math.round(st.c/st.t*100)}%</span></div>
    <div style={{width:"100%",background:"#374151",borderRadius:99,height:6}}><div style={{width:`${st.c/st.t*100}%`,background:"#f59e0b",height:6,borderRadius:99,transition:"width .3s"}}/></div>
    <p style={{fontSize:10,color:"#6b7280",marginTop:3}}>{st.c}/{st.t} správně</p>
  </div>}
  <div style={{background:"#1f2937",borderRadius:12,padding:14,marginBottom:10}}>
    <h2 style={{fontSize:11,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Kategorie</h2>
    {CATS.map(c=>{const n=Q.filter(q=>q.cat===c).length,s=st.bc[c];return(
      <label key={c} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 6px",borderRadius:6,cursor:"pointer"}}>
        <input type="checkbox" checked={cats.has(c)} onChange={()=>tg(c)} style={{accentColor:"#f59e0b"}}/>
        <span style={{flex:1,fontSize:13,color:CC[c]}}>{CI[c]} {c}</span>
        <span style={{fontSize:11,color:"#6b7280"}}>{n}</span>
        {s&&<span style={{fontSize:10,color:s.c/s.t>.85?"#10b981":"#f59e0b"}}>{Math.round(s.c/s.t*100)}%</span>}
      </label>)})}
  </div>
  <input type="text" placeholder="🔍 Hledat v otázkách..." value={sr} onChange={e=>sSr(e.target.value)}
    style={{width:"100%",padding:10,background:"#1f2937",border:"1px solid #374151",borderRadius:10,color:"#f3f4f6",fontSize:13,marginBottom:10,outline:"none"}}/>
  {sr&&<p style={{fontSize:10,color:"#6b7280",marginBottom:6}}>Nalezeno: {flt.length}</p>}
  <div style={{display:"flex",flexDirection:"column",gap:8}}>
    <button className="btn" onClick={()=>go(false)} style={{padding:"14px 0",background:"#d97706",color:"#fff",fontWeight:700,borderRadius:12,fontSize:16}}>
      Procvičování ({flt.length} otázek)</button>
    <button className="btn" onClick={goEx} style={{padding:"12px 0",background:"#374151",color:"#fff",fontWeight:700,borderRadius:12,fontSize:14}}>
      Simulace zkoušky (30 / 40 min)</button>
    {hist.some(h=>!h.ok)&&<button className="btn" onClick={()=>go(true)} style={{padding:"12px 0",background:"#7f1d1d",color:"#fff",fontWeight:700,borderRadius:12,fontSize:14}}>
      Opakovat chybné ({hist.filter(h=>!h.ok).length})</button>}
  </div>
  <p style={{color:"#374151",fontSize:10,textAlign:"center",marginTop:14}}>Zdroj: Ministerstvo vnitra ČR · Soubor testových otázek platný od 15.12.2025</p>
</div></div>);

if(m==="q"){const q=qs[i],pc=((i+1)/qs.length)*100;return(
<div style={{minHeight:"100vh",padding:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
<div style={{maxWidth:520,width:"100%"}} className="fade" key={i}>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
    <button className="btn" onClick={()=>sM("menu")} style={{color:"#9ca3af",background:"none",fontSize:12}}>← Menu</button>
    <span style={{color:"#9ca3af",fontSize:12}}>{i+1}/{qs.length}</span>
    {ex?<span style={{fontFamily:"monospace",fontWeight:700,color:t<300?"#ef4444":"#f59e0b",fontSize:15}}>{fm(t)}</span>
      :<span style={{color:"#10b981",fontWeight:700,fontSize:13}}>{sc} ✓</span>}
  </div>
  <div style={{width:"100%",background:"#1f2937",borderRadius:99,height:4,marginBottom:14}}>
    <div style={{width:`${pc}%`,background:"#f59e0b",height:4,borderRadius:99,transition:"width .3s"}}/></div>
  <div style={{background:"#1f2937",borderRadius:12,padding:18,marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
      <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:CC[q.cat]}}>{q.cat}</span>
      <span style={{fontSize:10,color:"#6b7280"}}>#{q.id}</span></div>
    <p style={{fontSize:14,fontWeight:500,lineHeight:1.6}}>{q.q}</p>
    {q.imgs&&q.imgs.map((s,j)=><img key={j} className="qi" src={s} alt="" style={{maxHeight:240,objectFit:"contain"}}/>)}
  </div>
  <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
    {["a","b","c"].map(l=>{
      let bg="#1f2937",bd="#374151",op=1;
      if(!ex&&sh2){if(l===q.correct){bg="#064e3b";bd="#059669"}else if(l===sel&&l!==q.correct){bg="#7f1d1d";bd="#dc2626"}else op=.35}
      else if(ex&&ea[i]===l){bg="#78350f";bd="#d97706"}
      return(<button key={l} className="ab" onClick={()=>ans(l)} disabled={!ex&&sh2}
        style={{width:"100%",textAlign:"left",padding:12,background:bg,border:`2px solid ${bd}`,borderRadius:10,color:"#f3f4f6",fontSize:13,opacity:op}}>
        <b style={{marginRight:8,color:"#6b7280"}}>{l.toUpperCase()})</b>{q[l]}</button>)})}
  </div>
  {!ex&&sh2&&sel!==q.correct&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
    <span style={{color:"#ef4444",fontWeight:700,fontSize:13}}>✗ Špatně</span>
    <button className="btn" onClick={nx} style={{padding:"8px 20px",background:"#d97706",color:"#fff",fontWeight:700,borderRadius:10,fontSize:13}}>
      {i<qs.length-1?"Další →":"Výsledky"}</button></div>}
  {ex&&<><div style={{display:"flex",justifyContent:"space-between"}}>
    <button className="btn" onClick={()=>i>0&&sI(i-1)} disabled={i===0}
      style={{padding:"8px 16px",background:"#374151",color:"#fff",borderRadius:10,opacity:i===0?.3:1}}>←</button>
    {i<qs.length-1?<button className="btn" onClick={()=>sI(i+1)} style={{padding:"8px 16px",background:"#374151",color:"#fff",borderRadius:10}}>→</button>
      :<button className="btn" onClick={fin} style={{padding:"8px 16px",background:"#d97706",color:"#fff",fontWeight:700,borderRadius:10}}>Odevzdat</button>}
  </div>
  <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:3,justifyContent:"center"}}>
    {qs.map((_,j)=><button key={j} className="btn" onClick={()=>sI(j)}
      style={{width:26,height:26,borderRadius:5,fontSize:10,fontWeight:700,
        background:j===i?"#d97706":ea[j]?"#4b5563":"#1f2937",color:j===i||ea[j]?"#fff":"#6b7280"}}>{j+1}</button>)}</div></>}
</div></div>)}

if(m==="res"){const pc=Math.round(sc/qs.length*100),ok=ex?sc>=26:pc>=87,w=hist.filter(h=>!h.ok);return(
<div style={{minHeight:"100vh",padding:16}}>
<div style={{maxWidth:520,margin:"0 auto"}}>
  <div style={{textAlign:"center",paddingTop:32,marginBottom:20}}>
    <div style={{fontSize:52,marginBottom:6}}>{ok?"✅":"❌"}</div>
    <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{ex?(ok?"Zkouška úspěšná!":"Zkouška neúspěšná"):"Výsledky"}</h2>
    <p style={{fontSize:32,fontWeight:800,color:"#f59e0b"}}>{sc}/{qs.length}</p>
    <p style={{color:"#9ca3af",fontSize:14}}>{pc}%</p>
    {ex&&<p style={{fontSize:11,color:"#6b7280",marginTop:4}}>Potřeba: 26/30 (87%) obecné · 28/30 (93%) rozšířené</p>}
  </div>
  {w.length>0&&<div style={{background:"#1f2937",borderRadius:12,padding:14,marginBottom:14}}>
    <h3 style={{fontWeight:700,fontSize:13,color:"#ef4444",marginBottom:10}}>Chybné ({w.length})</h3>
    <div style={{maxHeight:360,overflowY:"auto"}}>
      {w.map((a,j)=><div key={j} style={{padding:10,background:"rgba(127,29,29,.15)",borderRadius:8,border:"1px solid #7f1d1d",marginBottom:6}}>
        <p style={{fontSize:12,fontWeight:500,marginBottom:3}}>#{a.id}: {a.q}</p>
        {a.imgs&&a.imgs.map((s,k)=><img key={k} src={s} style={{maxWidth:"100%",maxHeight:100,borderRadius:4,margin:"3px 0"}} alt=""/>)}
        {a.ua&&<p style={{fontSize:11,color:"#ef4444"}}>Tvoje: {a.ua.toUpperCase()}) {a[a.ua]}</p>}
        <p style={{fontSize:11,color:"#10b981"}}>Správně: {a.correct.toUpperCase()}) {a[a.correct]}</p>
      </div>)}</div></div>}
  <div style={{display:"flex",flexDirection:"column",gap:8}}>
    {w.length>0&&<button className="btn" onClick={()=>go(true)} style={{padding:12,background:"#7f1d1d",color:"#fff",fontWeight:700,borderRadius:12}}>Opakovat chybné ({w.length})</button>}
    <button className="btn" onClick={()=>sM("menu")} style={{padding:12,background:"#d97706",color:"#fff",fontWeight:700,borderRadius:12}}>Menu</button>
  </div>
</div></div>)}
return null}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body></html>
