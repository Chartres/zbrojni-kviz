{id:590,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při řešení závady na zbrani nebo střelivu typu selhač platí, že:`,a:`po vyjmutí náboje ze zbraně je třeba jej umístit na bezpečné místo a vyčkat minimálně 10 sekund, zda nedojde k jeho opožděné iniciaci; rovněž se následně provede kontrola zbraně zkontroluje se zápalník, zda na něm zápalka nezanechala otisk v případě, že závada byla zapříčiněna střelivem.`,b:`po uplynutí doby, po kterou je nutné vyčkat, zda nedojde k opožděné iniciaci náboje a k výstřelu, se selhaný náboj odevzdá správci střelnice, pokud k selhači došlo na střelnici, myslivecké stráži, pokud k selhači došlo při lovu, a Českému úřadu pro zkoušení zbraní a střeliva v ostatních případech.`,c:`po uplynutí doby, po kterou je nutné vyčkat, zda nedojde k opožděné iniciaci náboje a k výstřelu, se provede kontrola zbraně; následně je také třeba zkontrolovat otisk zápalníku na zápalce pro zjištění, zda je závada zapříčiněna zbraní nebo střelivem.`,correct:"c"},
{id:591,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při řešení závady na zbrani nebo střelivu typu slabá rána platí, že:`,a:`vyčkání před dalším postupem po slabé ráně obdobně jako v případě selhače je nezbytné, neboť žadatel o vydání zbrojního oprávnění musí v takové situaci minimálně po dobu 10 sekund vyčkat na pokyn zkušebního komisaře, že má být další postup zahájen.`,b:`vyčkávání před dalším postupem po slabé ráně obdobně jako v případě selhače (tj. minimálně po dobu 10 sekund) je možné, ale nevyžaduje se.`,c:`vyčkávání před dalším postupem po slabé ráně obdobně jako v případě selhače (tj. minimálně po dobu 10 sekund) je neakceptovatelné a jde o porušení zásad bezpečného nakládání se zbraněmi a střelivem, protože vlivem času může slabá rána přejít v ránu silnou.`,correct:"b"},
{id:592,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při řešení závady na zbrani nebo střelivu typu zádržka platí, že:`,a:`závadu je třeba řešit s ohledem na její konkrétní charakter, přičemž zpravidla se nejprve provede vyjmutí zásobníku, je-li zbraň vybavena odnímatelným zásobníkem, a vnější vizuální kontrola zbraně a zjištění druhu závady.`,b:`závadu je třeba řešit s ohledem na konkrétní výrobní provedení použitého střeliva, přičemž v případě, že je použitou pouze školní nebo cvičné střelivo, postačí k řešení závady vyjmutí zásobníku a zpětné vložení zásobníku, je-li zbraň vybavena odnímatelným zásobníkem.`,c:`závadu je třeba řešit s ohledem na její konkrétní charakter, přičemž pokud došlo vlivem zádržky k závadě typu slabá rána, je třeba vyčkat minimálně 10 sekund se zbraní směřující do bezpečného směru; výrobce zbraně nebo střeliva může v návodu k použití stanovovat též jinou (vesměs delší) minimální dobu, po kterou je třeba vyčkat, zda nedojde k opožděné iniciaci a k výstřelu.`,correct:"a"},
{id:593,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při řešení závady na zbrani nebo střelivu typu zádržka platí, že:`,a:`odstranění závady se provádí s ohledem na její charakter, a to zejména kontrolou průchodnosti vývrtu hlavně po provedení kontroly zbraně; nejčastěji bude k odstranění závady typu zádržka postačovat výměna zásobníku za zásobník s vytahovačem, který vykazuje lepší kluzné vlastnosti.`,b:`po uplynutí doby, po kterou je nutné vyčkat, zda nedojde k opožděné iniciaci náboje a k výstřelu, se provede kontrola zbraně; následně je také třeba zkontrolovat otisk zápalníku na zápalce pro zjištění, zda je závada zapříčiněna zbraní nebo střelivem.`,c:`odstranění závady se provádí s ohledem na její charakter, a to zejména odstraněním vzpříčeného nebo zaseklého náboje nebo nábojnice z zbraně; nejčastěji bude k odstranění závady typu zádržka postačovat po vyjmutí zásobníku opakované stažení a vypuštění závěru do přední polohy.`,correct:"c"},
{id:594,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky při řešení závady na zbrani nebo střelivu typu zádržka platí, že:`,a:`v případě, že nelze vysunout zásobník, například z důvodu náboje vzpříčeného ve vývodkách zásobníku, je třeba pokud možno využít k řešení závady jiné zásobovací mechanismy zbraně, tj. například vyklopit revolverový válec nebo na místo odnímatelného zásobníku vložit pevnou nábojovou schránku.`,b:`v případě, že nelze vysunout zásobník, například z důvodu náboje vzpříčeného ve vývodkách zásobníku, je třeba pokud možno zachytit závěr v zadní poloze a odstranit příčinu zádržky přes výhozné okénko.`,c:`provedení rány jistoty po kontrole zbraně, u které došlo k zádržce, je porušením zásad bezpečného nakládání se zbraní, a to zejména pokud je takový způsob uvolnění spoušťového a bicího mechanismu nezbytný pro její rozebrání.`,correct:"b"},
{id:595,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky příprava zbraně k jejímu částečnému rozebrání a složení v rozsahu nezbytném pro vyčištění zbraně spočívá v:`,a:`praktickém předvedení kontroly zbraně a následném slovním popisu postupu vyčištění zbraně, jehož součástí je i vysvětlení jeho zásad ohledně samotného čištění, rozebírání a skládání zbraně pro čištění, používání pomůcek a látek pro čištění atd.`,b:`praktickém předvedení kontroly zbraně a následném slovním popisu postupu vyčištění zbraně, střeliva, pouzder pro nošení zbraně, přebíjecích a delaboračních strojů a nástrojů, jakož i pomůcek a látek pro čištění atd.`,c:`praktickém předvedení kontroly zbraně a následném slovním popisu postupu vyčištění zbraně, uvedení hlavních zásad provádění drobných oprav povrchové úpravy zbraně a střeliva, rozebrání a složení zbraně v rozsahu nezbytném pro odstranění zaseklých nebo vzpříčených pomůcek a látek pro čištění atd.`,correct:"a"},
{id:596,cat:`Prováděcí předpisy`,q:`Z hlediska základních pravidel pro manipulaci se zbraní a střelbu stanovených pro průběh zkoušky odborné způsobilosti nebo komisionální zkoušky mají být při přípravě zbraně k jejímu částečnému rozebrání a složení v rozsahu nezbytném pro vyčištění zbraně mimo jiné vysvětleny zásady pro ověření správného složení zbraně po jejím vyčištění; účelem ověření správného složení zbraně po jejím vyčištění může mimo jiné být:`,a:`zjistit opakovanou kontrolou zbraně, vkládáním zbraně do pouzdra a jejím vyjímáním z pouzdra při současném provádění tzv. suchého tréninku, zda nedošlo k samovolného posunutí středního bodu zásahu zbraně nebo k zneprůchodnění vývrtu hlavně.`,b:`zjistit praktickou manipulací s pohyblivými částmi zbraně, zda míra jejich pokrytí odpovídajícím mazivem odpovídá požadavkům na zajištění spolehlivého funkčního cyklu zbraně a při jejich pohybu nedochází k mechanickým nebo akustickým jevům naznačujícím nedostatečné promazání, které by mohlo mít vliv na pevnost hlavních částí zbraně, u kterých ke vzájemnému pohybu docházet nemá.`,c:`zjistit praktickou manipulací s pohyblivými částmi zbraně, zda jejich vzájemný pohyb odpovídá funkčnímu cyklu zbraně a při jejich pohybu nedochází k zasekávání nebo naopak samovolné demontáži; rovněž je na místě ověření pevnosti sestavení částí, u kterých vzhledem ke konstrukčnímu řešení zbraně ke vzájemnému pohybu docházet nemá.`,correct:"c"},
{id:597,cat:`Prováděcí předpisy`,q:`Závazné technické požadavky na výrobní provedení zbraní jsou stanoveny:`,a:`na obecné úrovni v opatřeních obecné povahy, která v podobě technických norem vydává Český úřad pro zkoušení zbraní a střeliva, a dále pak v rozhodnutích odborných institucí Evropské unie a konečně ve stanoviscích Asociace obranného a bezpečnostního průmyslu, která však zavazují pouze členy této asociace.`,b:`na obecné úrovni samotným zákonem o zbraních a střelivu a dále pak nařízením vlády o technických požadavcích a dalších specifikacích pro některé zbraně, střelivo a střelnice a pro zabezpečení zbraní a střeliva, a v některých případech také v právních aktech Evropské unie (jako například u znehodnocených zbraní nebo poplašných a signalizačních zbraní) nebo v mezinárodních smlouvách (například rozměry nábojových komor a vývrtů hlavní palných zbraní).`,c:`stanovovány vždy v konkrétním případě policií, která při tom vychází z potřeb zajišťování vnitřního pořádku nebo bezpečnosti, a Ministerstva vnitra, které může v případě vyhlášení krizového stavu nařídit retroaktivní úpravu výrobního provedení konkrétních typů zbraní, a to na náklady osob, které s takovými zbraněmi nakládají.`,correct:"b"},
{id:598,cat:`Prováděcí předpisy`,q:`Z hlediska technických požadavků na způsob zabezpečení zbraně nebo střeliva při jejich krátkodobém uložení ve vozidle platí, že:`,a:`při krátkodobém uložení nejvýše 2 zbraní kategorie R2, R3 nebo R4 anebo střeliva kategorie S2 nebo S3 v počtu nejvýše 1000 nábojů ve vozidle nepřesahujícím 4 hodiny musí být zabezpečení provedeno uzamčením zbraně nebo střeliva v uzamykatelné plastovém nebo kovovém kufru nebo obdobné schránce, které nejsou při pohledu z vnějšku vozidla ani částečně viditelné a které jsou upevněny ke karoserii vozidla; kufr nebo schránku nesmí být možné otevřít nebo oddělit od karoserie bez použití dílenského nářadí.`,b:`při krátkodobém uložení nejvýše 2 zbraní kategorie R1 nebo R2 a současně nejvýše 2 zbraní kategorie R3 nebo R4 a střeliva v počtu nejvýše 1000 nábojů nebo 5 kg bezdýmného nebo černého prachu a 15 000 ks zápalek typu W209 ve vozidle nepřesahujícím 4 hodiny musí být zabezpečení provedeno uložením zbraně nebo střeliva v uzamykatelné schráně, která splňuje požadavky odolnosti proti vloupání alespoň 15 odporových jednotek; při stanovení odolnosti proti vloupání se přiměřeně použije technická norma ČSN EN 1143-1 nebo ČSN EN 14450+A1.`,c:`zákon o zbraních a střelivu nepřipouští ani krátkodobé uložení zbraně nebo střeliva ve vozidla, naopak platí zásada, že „auto není trezor“ a zbraně nebo střelivo tak mohou být v souvislosti s dopravou ukládány pouze v zapečetěných ocelových kontejnerech pro intermodální přepravu, přičemž však uložení zbraní nebo střeliva v takových kontejnerech nesmí přesáhnout 4 hodiny.`,correct:"a"},
{id:599,cat:`Prováděcí předpisy`,q:`Z hlediska technických požadavků na způsob zabezpečení zbraně nebo střeliva při jejich krátkodobém uložení ve vozidle platí, že:`,a:`zbraň nebo střelivo, které jsou stanoveným způsobem zabezpečovány při jejich krátkodobém uložení ve vozidle, smí být umístěny pouze v té části vozidla, do které je z vnějšího prostoru vidět, a to tak, aby osoba, která za zabezpečení zbraní a střeliva nese odpovědnost, mohla provádět jejich pravidelnou vizuální kontrolu v intervalech, které nesmějí přesáhnout 4 hodiny.`,b:`zbraň nebo střelivo, které je ve vozidle uloženo po dobu delší než 4 hodiny, musí být zabezpečeno způsobem, který stanoví vláda nařízením; to neplatí, je-li zabezpečení zbraní provedeno jiným vhodným způsobem se srovnatelnou účinností (například pomocí psa bojového plemene přítomného ve vozidle po celou dobu uložení zbraní nebo střeliva).`,c:`zbraň nebo střelivo, které jsou stanoveným způsobem zabezpečovány při jejich krátkodobém uložení ve vozidle, smí být umístěny pouze v té části vozidla, která je chráněna uzavřenou pevnou kovovou karoserií; okna a jiné obdobné otvory vozidla musí být plně uzavřeny a vozidlo musí být standardním způsobem uzamčeno.`,correct:"c"},
{id:600,cat:`Prováděcí předpisy`,q:`Z hlediska technických požadavků na způsob zabezpečení zbraně nebo střeliva při jejich krátkodobém uložení ve vozidle platí, že:`,a:`zbraň zabezpečovaná při krátkodobém uložení ve vozidle musí být zajištěna vnější manuální pojistkou, nebo v případě, že takovým ovládacím prvkem není vybavena, musí být vybavena automatickou blokovou pojistkou úderníku, která musí zůstat aktivní po celou dobu uložení zbraně ve vozidle.`,b:`zbraň zabezpečovaná při krátkodobém uložení ve vozidle nesmí být v nabitém stavu a střelivo musí být uloženo odděleně od zbraně.`,c:`zbraň zabezpečovaná při krátkodobém uložení ve vozidle nesmí být v nabitém stavu a střelivo musí být po celou dobu uložení ve vozidle delaborováno.`,correct:"b"},
{id:601,cat:`Prováděcí předpisy`,q:`Maximální doba, po kterou lze ve vozidle ponechat zbraň nebo střelivo při jejich krátkodobém uložení, nesmí přesáhnout:`,a:`12 hodin.`,b:`4 hodiny.`,c:`48 hodin.`,correct:"b"},
{id:602,cat:`Prováděcí předpisy`,q:`Z hlediska zabezpečování zbraně a střeliva ve vozidle, nesmí doba jejich dlouhodobého uložení přesáhnout:`,a:`10 pracovních dnů.`,b:`dlouhodobé uložení zbraní nebo střeliva ve vozidle je možné po neomezenou dobu, pokud jsou splněny technické požadavky na zabezpečení stanovené příslušnou Českou technickou normou pro oblast balistické odolnosti.`,c:`dlouhodobé uložení zbraní nebo střeliva ve vozidle zákon o zbraních a střelivu nepřipouští.`,correct:"c"},
{id:603,cat:`Prováděcí předpisy`,q:`Nařízení vlády o technických požadavcích a dalších specifikacích pro některé zbraně, střelivo a střelnice a pro zabezpečení zbraní a střeliva stanovuje ohledně přechovávání aktivních komponentů střeliva mimo jiné, že:`,a:`aktivní komponenty střeliva musí být přechovávány v uzavřených originálních obalech výrobce a takovým způsobem, aby nemohlo dojít k jejich zahoření nebo iniciaci anebo k přímému ohrožení života nebo zdraví osob po nezamýšleném zahoření nebo iniciaci těchto komponentů.`,b:`aktivní komponenty střeliva musí být přechovávány v obalech označených vhodně takovým způsobem, aby nemohlo dojít k jejich vzájemné záměně a aby současně v jednom obalu nebylo přechováváno méně než 50 gramů bezdýmného nebo 150 gramů černého prachu, neboť při menším množství nebezpečně narůstá riziko iniciace vlivem výboje statické elektřiny.`,c:`aktivní komponenty střeliva musí být přechovávány v uzavřených originálních obalech výrobce a takovým způsobem, aby nemohlo dojít k jejich nezamýšlenému nabití do zbraně nebo k záměně za rážově nepříslušné jednotné náboje.`,correct:"a"},
{id:604,cat:`Prováděcí předpisy`,q:`Nařízení vlády o technických požadavcích a dalších specifikacích pro některé zbraně, střelivo a střelnice a pro zabezpečení zbraní a střeliva stanovuje ohledně přechovávání aktivních komponentů střeliva mimo jiné, že:`,a:`aktivní komponenty střeliva musí být přechovávány mimo prostory určené k obývání, a v minimální vzdálenosti 2 m od nejbližšího elektrického zařízení nebo vedení elektrické energie.`,b:`každý druh aktivních komponentů střeliva musí být uložen odděleně od jiných druhů aktivních komponentů tak, aby nemohlo dojít k jejich záměně; zejména je třeba zabránit záměně zápalek typu W209 za zápalky typu Gévelot, neboť tato záměna může vést k fatální havárii zbraně konstruované na principu doutnákového, kolečkového, křesadlového nebo perkusního zámkového systému nebo na principu jehlovky.`,c:`aktivní komponenty střeliva musí být přechovávány v suchu a odděleně od lehce vznětlivých nebo snadno hořlavých látek a předmětů; každý druh aktivních komponentů střeliva musí být uložen odděleně od jiných druhů aktivních komponentů tak, aby nemohlo dojít k jejich řetězové iniciaci.`,correct:"c"},
{id:605,cat:`Prováděcí předpisy`,q:`Z hlediska nakládání s aktivními komponenty střeliva při přebíjení střeliva podle nařízení vlády o technických požadavcích a dalších specifikacích pro některé zbraně, střelivo a střelnice a pro zabezpečení zbraní a střeliva platí, že:`,a:`při přebíjení nábojů musí být dodržována omezení, která mají vliv na ráži výsledného náboje, přičemž v případě, že dojde vlivem nedodržení postupů nebo tolerancí v průběhu přebíjení ke změně ráže, musí být tato změna držitelem zbrojního oprávnění zřetelně vyznačena na náboji a na zbrani.`,b:`při přebíjení nábojů musí být dodržována omezení, která mají vliv na maximální tlaky vznikající při výstřelu a na manipulační bezpečnost, plynoucí z technických údajů uváděných výrobci jednotlivých aktivních komponentů střeliva, střel a zařízení určených k přebíjení střeliva, které jsou při přebíjení střeliva použity.`,c:`při přebíjení nábojů musí být dodržována omezení vyplývající z konstrukce zbraně, zejména pak její nábojové komory a zásobovacího ústrojí; náboje, které po nabití do zásobníku zbraně mohou způsobit závady při přebíjení, musí být odevzdány krajskému ředitelství policie k úřednímu zničení.`,correct:"b"},
{id:606,cat:`Prováděcí předpisy`,q:`Podle nařízení vlády o technických požadavcích a dalších specifikacích pro některé zbraně, střelivo a střelnice a pro zabezpečení zbraní a střeliva je celkové maximální množství daného druhu aktivního komponentu střeliva, se kterým může jedna fyzická osoba oprávněná nakládat se střelivem kategorie S4, nejde-li o držitele zbrojní licence, v kterýkoli okamžik podle zákona o zbraních a střelivu nakládat (tzv. obecný množstevní limit):`,a:`10 kg v případě bezdýmného prachu, 3 kg v případě černého loveckého prachu, 15 000 ks zápalek pro kulové zbraně, 10 000 ks zápalek pro brokové zbraně a 15 000 ks perkusních zápalek.`,b:`25 kg střelného prachu a 10 000 ks zápalek.`,c:`10 kg střelného prachu, 15 000 ks zápalek, 100 ks rozbušek a 20 metrů bleskovice.`,correct:"a"},
{id:607,cat:`Prováděcí předpisy`,q:`Podle nařízení vlády o technických požadavcích a dalších specifikacích pro některé zbraně, střelivo a střelnice a pro zabezpečení zbraní a střeliva se do obecného množstevního limitu aktivních komponentů střeliva, se kterým může jedna fyzická osoba oprávněná nakládat se střelivem kategorie S4, nejde-li o držitele zbrojní licence, v kterýkoli okamžik podle zákona o zbraních a střelivu nakládat, započítává:`,a:`vedle aktivních komponentů střeliva obsažených samostatně v originálních obalech výrobce také množství aktivních komponentů střeliva obsažených v kompletních nábojích, nábojkách a nábojnicích se zápalkou, se kterými daná osoba nakládá v souladu se zákonem.`,b:`množství aktivních komponentů střeliva sumárně a vždy se použije vyšší z obecných množstevních limitů pro určitou skupinu aktivních komponentů střeliva, tzn. že se sčítají hmotnostní množství prachů bez ohledu na to, jde-li o bezdýmný nebo černý prach, a počty kusů zápalek bez ohledu na jejich typ.`,c:`každý druh aktivních komponentů střeliva samostatně, tzn. že pro každý druh aktivního komponentu střeliva je určen samostatný obecný množstevní limit, a množství různých aktivních komponentů střeliva se nesčítají.`,correct:"c"},
{id:608,cat:`Prováděcí předpisy`,q:`Podle nařízení vlády o technických požadavcích a dalších specifikacích pro některé zbraně, střelivo a střelnice a pro zabezpečení zbraní a střeliva představuje výše uvedený obrazec:`,a:`předepsané identifikační označení tuzemského držitele zbrojní licence skupiny D, které je v rámci činnosti podnikatele v oboru zbraní a střeliva povinen používat k označení jím vyrobených, upravených nebo opravených zbraní.`,b:`kontrolní znehodnocovací značku, kterou držitel zbrojní licence vyznačuje na všechny hlavní části palné zbraně ihned po jejich znehodnocení.`,c:`ověřovací značku Českého úřadu pro zkoušení zbraní a střeliva, která se vyznačuje na delaborované zbraně na základě přezkoušení jejich funkčnosti.`,correct:"b",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCABIAGoDASIAAhEBAxEB/8QAGgABAAMBAQEAAAAAAAAAAAAAAAMFBgQCAf/EADsQAAIBAwIEAwQGCAcAAAAAAAECAwAEEQUSBhMhMUFRcQcUImEVMnORocEXIzM2UoGx4TRCVFWTotH/xAAUAQEAAAAAAAAAAAAAAAAAAAAA/8QAFBEBAAAAAAAAAAAAAAAAAAAAAP/aAAwDAQACEQMRAD8A3FcGvXUtlot3c27BZY4yykjODXfVVxT+7d/9kaDH2XEPFGoIzWY5yocMUhXoamj4v1rS7pE1i1yjdw0exseYPY12+zX/AAV79ov9K7+PbZJuHXlZQXhdWU+WTg/1oL61uYry2juIG3RyKGU/KpazPs+maTh8oxyI5mVfTofzNaagUpSgUpSgUpSgUpSgVVcU/u3f/ZGrWufUbNNQsJrSRmVJV2kr3FBjfZ/qFpZ2d2t1dQwlpFIEjhc9PnUvG/EFlcaX7lZzpO8jgsUOQoHXv61P+jzT/wDV3X/X/wArs0/gnS7KZZXElwynIEpBA/kKCTgqwex4fi5q7XmYykHwB7fgKvqUoFR3M6WttJPLkJGpZsDPQVJXJrEby6ReRxqWdoXCqBkk4oObUdRdZI47Ny0mA8iLC0hCHx6dj5edTvq1qIoXjZpjOMxpEpZmA7nHhj51x2zPp17cvNbzOlwsbo0UZfqEClTjt2/GitcQ30F/PZuqSQGN0iG8xHdkZA8x3x4igsrS8ivEZoico211ZSrKfIg9qnqnt4ubd3N5cW0yxzSxCJNp3ZX/ADkDsMnx8B1q1kkEbICrne23KrnHTx8hQe6VD7yMZ5cv7Tl/UP3+nzqagUrl1PUbfSrJ7q6bCL4Dux8APnWNPGOtajK/0Vp4Ma+AjMhHqaDeUrHaLxs8t6tnq8CwuzbRIoIwfJge1WfE+s3+ktbiwtBcczduyjNjGMdvWgvqVg24y11VLNpaAAZJMT9Pxrr4c4vvdX1eO0mggRGDElAcjAz {id:609,cat:`Prováděcí předpisy`,q:`Podle nařízení vlády o technických požadavcích a dalších specifikacích pro některé zbraně, střelivo a střelnice a pro zabezpečení zbraní a střeliva představují výše uvedené obrazce:`,a:`verifikační znehodnocovací značky, jejichž vyznačením na znehodnocené zbrani příslušný orgán, kterým je Český úřad pro zkoušení zbraní a střeliva nebo Ministerstvo obrany, potvrzuje, že znehodnocená zbraň prošla kontrolou a znehodnocení bylo provedeno v souladu se stanovenými technickými požadavky.`,b:`kontrolní ověřovací značky, jejichž vyznačením na znehodnocené zbrani příslušný orgán, kterým je Český úřad pro zkoušení zbraní a střeliva nebo Ministerstvo obrany, potvrzuje, že daná zbraň byla v souladu s požadavky na přeshraniční přepravu dovezena z jiného členského státu Evropské unie nebo vyrobena na území České republiky pod dohledem autorizovaného zbrojního inspektora.`,c:`typové verifikační značky, jejichž vyznačením na znehodnocené zbrani příslušný orgán, kterým je Český úřad pro zkoušení zbraní a střeliva nebo Ministerstvo obrany, potvrzuje, že daná zbraň podléhající registraci byla schválena pro uvedení buď v rámci celého vnitřního trhu Evropské unie nebo pouze v rámci území České republiky, anebo schválena pro použití ozbrojenými silami České republiky. III. Jiné právní předpisy:`,correct:"a",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCAAXAKkDASIAAhEBAxEB/8QAGgAAAwEBAQEAAAAAAAAAAAAAAAQFAwIBBv/EADUQAAEDBAAFAgQDBwUAAAAAAAECAwQABRESBhMhQVEUMSJhcYEyQqEHFRYzNnLBJFJzkbH/xAAUAQEAAAAAAAAAAAAAAAAAAAAA/8QAFBEBAAAAAAAAAAAAAAAAAAAAAP/aAAwDAQACEQMRAD8A+rvF1Ys8P1MlK1I2CcIGTk0pb+JGJ7ym0RZjeqCvZ1rUYHzzSX7QP6fH/Mn/ADTVshXFiK6qbcfVoWxhCOWE6nH60DtruzF1t5mR0rDYJGFjB6V1abmzdofqY6VpRsU4WMHIqBwW+03wq8FuISW1Obgn8PTvTPAf9PA9i8sj59aChdr9DtCkIkFa3XPwtNJ2UftSo4qiqiKf {id:610,cat:`Jiné předpisy`,q:`Právo bránit život svůj či život jiného člověka i se zbraní je zaručeno za podmínek, které stanoví zákon:`,a:`má toliko občan České republiky, přičemž toto právo si s sebou nese i při cestách do zahraničí (uplatňuje se zde tzv. personalita práva).`,b:`má pouze držitel rozšířeného zbrojního oprávnění.`,c:`je základním právem uvedeným v Listině základních práv a svobod.`,correct:"c"},
{id:611,cat:`Jiné předpisy`,q:`Právo bránit život svůj či život jiného člověka i se zbraní je podle Listiny základních práv a svobod zaručeno za podmínek, které stanoví zákon; tímto zákonem se rozumí:`,a:`speciální prováděcí zákon, jehož přije� je Lis�nou základních práv a svobod předvídáno, ale který doposud přijat nebyl, a předmětné právo tedy doposud uplatňovat nelze.`,b:`konkrétně občanský zákoník, pokud jde o realizaci tohoto práva v občanském životě, a správní řád, pokud jde o jeho správné a řádné uplatňování před orgány veřejné moci.`,c:`zejména trestní zákoník, pokud jde o vymezení podmínek použití zbraně mj. v nutné obraně a v krajní nouzi, a též zákon o zbraních, pokud jde o právo cíleně nakládat se střelnými zbraněmi za účelem ochrany života.`,correct:"c"},
{id:612,cat:`Jiné předpisy`,q:`Zákon o zbraních a střelivu a zákon o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek a bezpečnost:`,a:`jsou synonyma téhož právního předpisu, konkrétně zákona č. 90/2024 Sb.`,b:`jsou dva odlišné právní předpisy, které na sebe navzájem navazují.`,c:`jsou dva odlišné právní předpisy, přičemž zákon o zbraních a střelivu se týká nakládání se zbraněmi v civilní sféře, za�mco zákon o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek a bezpečnost upravuje nakládání se zbraněmi pouze u příslušníků ozbrojených sil.`,correct:"b"},
{id:613,cat:`Jiné předpisy`,q:`Zakládat, organizovat nebo vyzbrojovat ozbrojenou skupinu podle zákona č. 14/2021 Sb., o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek a bezpečnost:`,a:`je dovoleno.`,b:`je dovoleno, pokud k tomu Policejní prezidium České republiky vydalo souhlas.`,c:`je zakázáno.`,correct:"c"},
{id:614,cat:`Jiné předpisy`,q:`Stanovená záloha státu:`,a:`je synonymem pro Ak�vní zálohu ozbrojených sil České republiky.`,b:`je právnickou osobou sdružující bývalé příslušníky Československé lidové armády.`,c:`jsou osoby účastnící se programu střelecké přípravy a střelné zbraně, s níž je nakládáno v systému střelecké přípravy, pro plnění úkolů při zajišťování vnitřního pořádku nebo bezpečnosti České republiky anebo obrany České republiky, a to za podmínek, které stanoví vláda nařízením.`,correct:"c"},
{id:615,cat:`Jiné předpisy`,q:`Získáním pokročilé aprobace v programu střelecké přípravy podle zákona č. 14/2021 Sb., o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek a bezpečnost, se účastník takového programu stává:`,a:`členem ak�vní zálohy.`,b:`členem pasivní zálohy.`,c:`součástí stanovené zálohy státu.`,correct:"c"},
{id:616,cat:`Jiné předpisy`,q:`Systém střelecké přípravy podle zákona o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek a bezpečnost:`,a:`se skládá z programů střelecké přípravy, přičemž jeho účelem je zlepšování znalostí, schopností a dovedností osob oprávněných k nakládání se střelnými zbraněmi pro potřeby zajišťování vnitřního pořádku nebo bezpečnosti České republiky.`,b:`je jedním z prvků výkonu branné povinnos� státního občana České republiky, kterých se musí povinně účastnit každý státní občan České republiky po dosažení věku 18 let.`,c:`doplňuje výcvik příslušníků Policie České republiky, Vojenské policie a dalších složek integrovaného záchranného systému k plnění zvláštních úkolů při vyhlášení stavu nebezpečí, nouzového stavu, stavu ohrožení státu nebo válečného stavu.`,correct:"a"},
{id:617,cat:`Jiné předpisy`,q:`Akreditovaná osoba podle zákona o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek a bezpečnost:`,a:`je osoba pověřená kontrolou nad dodržováním povinnos� podle zákona o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek a bezpečnost, například pokud jde o plnění podmínek akreditace vydané krajským vojenským velitelstvím ozbrojené skupině.`,b:`je osoba, které byla udělena akreditace pro zajišťování kurzu v rámci programu střelecké přípravy.`,c:`je osoba nadaná pravomocí dohlížet na zachování práva bránit život svůj či život jiného člověka i se zbraní v průběhu správního řízení.`,correct:"b"},
{id:618,cat:`Jiné předpisy`,q:`Kurzy střelecké přípravy pro oblast vnitřního pořádku a bezpečnosti České republiky, upravené nařízením vlády č. 255/2021 Sb., o provedení zákona o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek nebo bezpečnost České republiky:`,a:`jsou povinnou součás� přípravy na zkoušku odborné způsobilos� všech žadatelů o vydání zbrojního oprávnění.`,b:`jsou dobrovolné.`,c:`jsou povinné pouze pro žadatele o rozšířené zbrojní oprávnění.`,correct:"b"},
{id:619,cat:`Jiné předpisy`,q:`Municí se rozumí:`,a:`zkompletovaný nebo neúplný výrobek obsahující aktivní muniční náplň a speciálně konstruovaný pro použití ozbrojenými silami nebo bezpečnostními sbory; nakládání s municí upravuje zákon o munici.`,b:`výbušné střely, zápalné střely, střely se stopovkou a průbojní střely všech ráží; nakládání s municí upravuje zákon o pyrotechnice.`,c:`náboje s ráží vyšší než 12,7 mm (.50), nábojky a ak�vní komponenty střeliva; nakládání s municí upravuje zákon o zbraních a střelivu.`,correct:"a"},
{id:620,cat:`Jiné předpisy`,q:`Které z následujících tvrzení je správné:`,a:`Zákon č. 91/2024 Sb., o munici je právním předpisem doplňujícím zákon č. 219/1999 Sb., o ozbrojených silách České republiky, a upravuje nakládání s municí příslušníky ozbrojených sil.`,b:`Zákon č. 91/2024 Sb., o munici je již neplatný právní předpis, přičemž nakládání s municí v současnos� upravuje zákon č. 90/2024 Sb., o zbraních a střelivu, kterým byl zákon o munici zrušen.`,c:`Zákon č. 91/2024 Sb., o munici je samostatným právním předpisem, který pro civilní oblast upravuje nakládání s municí, zacházení s neaktivním muničním předmětem a pyrotechnický průzkum.`,correct:"c"},
{id:621,cat:`Jiné předpisy`,q:`Výrobky, jejich součásti a náhradní díly, které jsou vzhledem ke svým charakteristickým technicko-konstrukčním vlastnostem posuzovány jako zkonstruované nebo přizpůsobené pro použití v ozbrojených silách nebo bezpečnostních sborech, nebo jsou hromadně v těchto složkách užívány k zabezpečení úkolů obrany a bezpečnosti státu:`,a:`jsou regulovány zákonem o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek nebo bezpečnost České republiky a nakládat s nimi jsou v rámci zahraničního ochodu oprávněni jen držitelé akreditace nebo aprobace, které byly uděleny podle tohoto speciálního právního předpisu.`,b:`jsou vojenským materiálem ve smyslu zákona č. 38/1994 Sb., o zahraničním obchodu s vojenským materiálem; při dovozu, vývozu a přeshraničním přemístění těchto výrobků se postupuje podle tohoto speciálního právního předpisu, a to i tehdy, jde-li o zbraně podléhající jinak zákonu o zbraních.`,c:`jsou zvláštním majetkem státu, se kterým může disponovat pouze Ministerstvo obrany pro výzkumné účely.`,correct:"b"},
{id:622,cat:`Jiné předpisy`,q:`Držitel zbrojní licence je oprávněn trvale dovézt, trvale vyvézt nebo v rámci Evropské unie trvale přeshraničně přemístit zbraně a střelivo, které jsou vojenským materiálem:`,a:`na základě povolení podle zákona č. 38/1994 Sb., o zahraničním obchodu s vojenským materiálem, přičemž v případech stanovených tímto zákonem mu současně musí být Ministerstvem průmyslu a obchodu udělena licence.`,b:`na základě zbrojního průvodního listu podle zákona č. 90/2024 Sb., o zbraních a střelivu, který mu vydá příslušný útvar Celní správy na hraničním přechodu.`,c:`pouze na základě výjimky udělené Ministerstvem obrany v souladu s usnesením o vyhlášení stavu ohrožení státu nebo válečného stavu.`,correct:"a"},
{id:623,cat:`Jiné předpisy`,q:`Dovoz, vývoz a jiné přeshraniční přemístění v rámci podnikatelské činnosti v oboru zbraní a střeliva, a v některých případech též neobchodní vývoz, pokud jde o palné zbraně a střelivo, které nejsou vojenským materiálem:`,a:`jsou možné bez zvláštního povolení, pokud jde o přeshraniční přemístění v rámci Evropské unie; jiný postup by byl v rozporu s principem volného pohybu zboží na vnitřním trhu Evropské unie.`,b:`jsou bezvýhradně zakázány přímo použitelnými předpisy Evropské unie.`,c:`podléhají povolení Ministerstva průmyslu a obchodu vydávanému podle zákona č. 228/2005 Sb., o kontrole obchodu s výrobky, jejichž držení se v České republice omezuje z bezpečnostních důvodů.`,correct:"c"},
{id:624,cat:`Jiné předpisy`,q:`Zbraň, u které je přes dříve vyznačené zkušební značky vyraženo písmeno „X“:`,a:`nesplňuje stanovené technické požadavky, a nelze ji tedy považovat za platně ověřenou podle zákona o ověřování střelných zbraní a střeliva.`,b:`splňuje stanovené technické požadavky, které byly podle zákona o ověřování střelných zbraní a střeliva ověřeny opakovaným kusovým ověřováním ze strany výrobce.`,c:`je bezpečná pro použi� ke střelbě, neboť písmenem „X“ je označena aktuálně platná zkušební značka podle zákona o ověřování střelných zbraní a střeliva; zkušební značky, které nejsou takto označeny jako aktuálně platné, se považují za neúčinné.`,correct:"a"},
{id:625,cat:`Jiné předpisy`,q:`Ve vyhlášce č. 335/2004 Sb., kterou se provádějí některá ustanovení zákona o ověřování střelných zbraní a střeliva, je možné se seznámit mimo jiné:`,a:`se vzorem kontrolní znehodnocovací značky, kterou držiteli znehodnocené zbraně přiděluje Český úřad pro zkoušení zbraní a střeliva.`,b:`s postupem Policie České republiky při ověřování stanovených střelných zbraní nebo stanoveného střeliva.`,c:`s podobou uznávaných zkušebních značek a identifikačních značek zkušeben v rámci systému vzájemného uznávání zkušebních značek podle příslušné mezinárodní úmluvy („C.I.P.“).`,correct:"c"},
{id:626,cat:`Jiné předpisy`,q:`Zkušební značky umístěné na zbrani:`,a:`osvědčují, že předmětná zbraň splňuje stanovené technické požadavky podle zákona o ověřování zbraní a střeliva`,b:`osvědčují, že předmětná zbraň obstála při sportovně-střelecké soutěži.`,c:`osvědčují, že předmětnou zbraň lze bez dalších administra�vních povinnos� vyvést do kteréhokoli státu mimo Evropskou unii, a to do 2 let ode dne vyznačení zkušební značky.`,correct:"a"},
{id:627,cat:`Jiné předpisy`,q:`Které z následujících tvrzení není pravdivé:`,a:`Ověřování zbraně je činnost, při které se technickými zkouškami, měřením a zkušební střelbou zjišťují vlastnos� kontrolované zbraně, shoda s technickými požadavky na ni stanovenými a označování zbraně zkušebními značkami.`,b:`Ověřování zbraně je prováděno pouze u zbraní pocházejících z nečlenských států Evropské unie.`,c:`Ověřování zbraně se provádí formou homologace, kusového ověřování nebo opakovaného kusového ověřování.`,correct:"b"},
{id:628,cat:`Jiné předpisy`,q:`Ověřování stanovených zbraní, stanoveného střeliva a stanovených doplňků v České republice provádí:`,a:`Český úřad pro zkoušení zbraní a střeliva.`,b:`Úřad pro technickou normalizaci, metrologii a státní zkušebnictví.`,c:`Zkušební ústav strojírenský zřizovaný a řízený Ministerstvem vnitra.`,correct:"a"},
{id:629,cat:`Jiné předpisy`,q:`Kdo bez povolení vyrobí, sobě nebo jinému opatří nebo přechovává střelnou zbraň nebo její hlavní části, tlumič hluku výstřelu, munici anebo ve větším množství střelivo nebo polotovary hlavních částí zbraně, anebo kdo padělá, pozmění, zahlazuje nebo odstraňuje jedinečné označení střelné zbraně, které umožňuje její identifikaci, se:`,a:`dopus� přestupku podle zákona o kontrole obchodu s výrobky, jejichž držení se v České republice omezuje z bezpečnostních důvodů.`,b:`dopustí trestného činu nedovoleného ozbrojování.`,c:`se dopus� disciplinárního deliktu pro� e�ckému kodexu držitelů oprávnění nakládat se zbraněmi; tento disciplinární delikt projednává oborová rada jmenovaná ministrem vnitra a může uložit sankci v podobě povinnos� věnování určené částky na charita�vní nebo obdobné obecně prospěšné účely a povinnos� věnovat předmětnou zbraň nebo střelivo muzejní ins�tuci, která se danou problema�kou zabývá, přičemž pokud není určena jiná muzejní ins�tuce, pla�, že zbraň a střelivo připadají Muzeu Policie České republiky.`,correct:"b"},
{id:630,cat:`Jiné předpisy`,q:`Kdo podstatně ohrozí obecný zájem tím, že poruší zákaz, omezení nebo jinou důležitou povinnost stanovenou pro dovoz, vývoz nebo průvoz zbraně, munice nebo většího množství střeliva, se:`,a:`dopus� přestupku podle zákona o zbraních.`,b:`dopus� platebního deliktu podle daňového řádu.`,c:`dopustí trestného činu podle § 261 trestního zákoníku.`,correct:"c"},
{id:631,cat:`Jiné předpisy`,q:`U přestupku, k jehož spáchání byla užita zbraň nebo k jehož spáchání byla tato zbraň určena, anebo ji pachatel získal přestupkem nebo jako odměnu za něj, lze uložit mimo jiné také trest:`,a:`propadnutí věci (tj. dané zbraně).`,b:`odebrání zbraně, avšak pouze tehdy není-li její hodnota v hrubém nepoměru k povaze přestupku.`,c:`zajištění věci (tj. dané zbraně), pouze pokud takovou sankci za příslušný přestupek zákon o odpovědnos� za přestupky a řízení o nich výslovně uložit umožňuje.`,correct:"a"},
{id:632,cat:`Jiné předpisy`,q:`V trestním zákoníku je o krajní nouzi stanoveno, že jde o:`,a:`čin jinak trestný, kterým někdo odvrací mimořádně důrazný útok směřovaný vůči většímu množství občanů, kteří jsou chráněni �mto zákoníkem, není trestným činem, pokud tak rozhodne soud na návrh Ministerstva spravedlnos�; nejde o krajní nouzi, jestliže bylo možno tento útok odvrá�t jinými prostředky.`,b:`čin jinak trestný, kterým někdo odvrací nebezpečí přímo hrozící zájmu chráněnému trestním zákonem, není trestným činem; nejde o krajní nouzi, jestliže bylo možno toto nebezpečí za daných okolností odvrátit jinak anebo způsobený následek je zřejmě stejně závažný nebo ještě závažnější než ten, který hrozil, anebo byl ten, komu nebezpečí hrozilo, povinen je snášet.`,c:`čin jinak trestný, kterým někdo zabraňuje útočníkovi v páchání trestného nebo jiného činu, který je uveden v trestním zákoníku, není trestným činem; jde o krajní nouzi, i jestliže bylo možno pachateli v páchání činu zabránit jiným způsobem.`,correct:"b"},
{id:633,cat:`Jiné předpisy`,q:`Jednat v krajní nouzi podle trestního zákoníku je obecně oprávněn:`,a:`pouze příslušník Policie České republiky, strážník obecní policie nebo příslušník hasičského záchranného sboru.`,b:`pouze ten, komu hrozí nebezpečí a jehož zájmy jsou ohroženy.`,c:`kdokoliv, tedy nejen ten, komu nebezpečí hrozí přímo a jehož zájmy jsou ohroženy, ale i ten, jehož zájmy ohroženy v daném případě nejsou (tzv. pomoc v krajní nouzi).`,correct:"c"},
{id:634,cat:`Jiné předpisy`,q:`Při posuzování oprávněnosti krajní nouze podle trestního zákoníku je rozhodující:`,a:`zda osoba jednající v krajní nouzi nezpůsobila škodu na majetku nebo nezpůsobila újmu na zdraví osoby.`,b:`to, zda nebylo možné dané nebezpečí odvrátit jinak nebo zda způsobený následek není zřejmě stejně závažný nebo ještě závažnější než ten, který hrozil.`,c:`výsledek psychologického vyšetření osoby jednající v krajní nouzi.`,correct:"b"},
{id:635,cat:`Jiné předpisy`,q:`Základní podmínkou vzniku stavu krajní nouze je nebezpečí, které hrozí zájmu chráněnému trestním zákonem. Toto nebezpečí:`,a:`musí hrozit přímo (tedy bezprostředně).`,b:`musí hrozit výhradně nepřímo (tedy zprostředkovaně).`,c:`musí hrozit nejpozději ve střednědobé budoucnos� a jeho vznik musí vyplývat z úřední lis�ny, údaje vedeného v informačním systému veřejné správy nebo z obdobně důvěryhodné skutečnos�.`,correct:"a"},
{id:636,cat:`Jiné předpisy`,q:`Nebezpečí přímo hrozící zájmu chráněnému trestním zákonem může být s ohledem na vznik stavu krajní nouze způsobeno:`,a:`pouze neovladatelnou přírodní silou bez jakéhokoli vlivu lidské činnos�.`,b:`oprávněným zásahem orgánu veřejné moci nebo i technickou závadou na zbrani.`,c:`různými faktory, např. přírodní silou, člověkem nebo různými fyziologickými a biologickými procesy.`,correct:"c"},
{id:637,cat:`Jiné předpisy`,q:`V trestním zákoníku je o nutné obraně stanoveno, že jde o:`,a:`čin jinak trestný, kterým někdo v sebeobraně odvrací napadení nebezpečným útočníkem, a to za použi� střelné zbraně, není trestným činem, pokud byla střelná zbraň držena v souladu se zákonem o zbraních a pokud její držitel před jejím použi�m opakovaně vyzval osobu útočníka, aby upus�l od pro�právního jednání; o nutnou obranu jde i tehdy, byla-li obrana zcela zjevně nepřiměřená útoku.`,b:`čin jinak trestný, kterým někdo odvrací přímo hrozící nebo trvající útok na zájem chráněný trestním zákonem, není trestným činem; nejde o nutnou obranu, byla-li obrana zcela zjevně nepřiměřená způsobu útoku.`,c:`čin jinak trestný, kterým někdo odvrací nebezpečí přímo hrozící zájmu chráněnému trestním zákonem, není trestným činem; nejde o nutnou obranu, jestliže bylo možno toto nebezpečí za daných okolnos� odvrá�t jinak anebo způsobený následek je zřejmě stejně závažný nebo ještě závažnější než ten, který hrozil, anebo byl ten, komu nebezpečí hrozilo, povinen je snášet.`,correct:"b"},
{id:638,cat:`Jiné předpisy`,q:`Při posuzování oprávněnosti nutné obrany podle trestního zákoníku je rozhodující zda:`,a:`nebylo možné dané nebezpečí odvrá�t jinak.`,b:`obrana nebyla zcela zjevně nepřiměřená ve srovnání se způsobem útoku.`,c:`způsobený následek není zřejmě stejně závažný nebo ještě závažnější než ten, který hrozil; závažnost způsobeného následku a následku, který hypote�cky hrozil se zjišťuje formou posudkové péče podle zákona o specifických zdravotních službách, přičemž skutečnému a hypote�ckému následku na zdraví se přiděluje bodové skóre podle metodiky, kterou stanoví vláda nařízením.`,correct:"b"},
{id:639,cat:`Jiné předpisy`,q:`Pokud obránce hodlá proti útočníkovi použít střelnou zbraň ve stavu nutné obrany ve smyslu trestního zákoníku:`,a:`je povinen vyzvat osobu, pro� které má být zbraň použita, aby upus�la od pro�právního jednání s výstrahou, že bude použito zbraně; od výzvy s výstrahou může upus�t jen v případě, že je ohrožen jeho život nebo zdraví anebo je-li ohrožen život nebo zdraví jiné osoby.`,b:`není povinen vyzvat osobu, proti které má být zbraň použita, aby upustila od protiprávního jednání.`,c:`je povinen za všech okolnos� vyzvat osobu, pro� které má být zbraň použita, aby upus�la od pro�právního jednání s výstrahou, že bude použito zbraně; střelnou zbraň obránce nesmí nikdy použít vůči zjevně těhotné ženě, osobě zjevně vysokého věku nebo osobě, která zjevně nerozuměla výstraze z důvodu neznalos� jazyka nebo pos�žení sluchu.`,correct:"b"},
{id:640,cat:`Jiné předpisy`,q:`V případě jednání ve stavu nutné obrany podle trestního zákoníku z povahy věci vyplývá, že:`,a:`obrana musí být intenzivnější než útok, proto aby odvrátila jistě a bez rizika útok útočníka, tzn. že musí být silnější než útok, ale nesmí být zcela zjevně nepřiměřená způsobu útoku.`,b:`obrana nesmí být intenzivnější než útok, smí být pouze přiměřená intenzitě útoku.`,c:`obrana musí být intenzivnější než útok, přičemž otázka stupně její přiměřenos� není podstatná; v odůvodněných případech tak může být i zcela zjevně nepřiměřená způsobu útoku.`,correct:"a"},
{id:641,cat:`Jiné předpisy`,q:`Jednání ve stavu nutné obrany podle trestního zákoníku je při splnění dalších podmínek možné tehdy, pokud někdo odvrací přímo hrozící nebo trvající útok:`,a:`pouze na život a zdraví.`,b:`pouze na zdraví a majetek.`,c:`na zájem chráněný trestním zákonem.`,correct:"c"},
{id:642,cat:`Jiné předpisy`,q:`Jednáním v nutné obraně podle trestního zákoníku někdo odvrací přímo hrozící nebo trvající útok na zájem chráněný trestním zákonem; ohrožení těchto zájmů může být způsobeno:`,a:`pouze pro�právním jednáním fyzické osoby vedené zlým úmyslem; přitom může jít i o jednání, které je samo nutnou obranou nebo krajní nouzí, v nichž jedná útočník, a v takovém případě je pak zásadní vzájemné porovnání přiměřenos� jednání útočníka a napadeného.`,b:`pouze opomenu�m fyzické osoby.`,c:`protiprávním jednáním fyzické osoby, může být způsobeno i opomenutím fyzické osoby, pokud je toto opomenutí také protiprávní.`,correct:"c"},
{id:643,cat:`Jiné předpisy`,q:`Při jednání v nutné obraně podle trestního zákoníku je možné:`,a:`bránit pouze své zájmy.`,b:`bránit pouze své zájmy a zájmy rodinných příslušníků.`,c:`bránit za stejných podmínek své zájmy i zájmy jiné osoby (pomoc v nutné obraně), a to pokud jde o zájmy chráněné trestním zákonem.`,correct:"c"},
{id:644,cat:`Jiné předpisy`,q:`Jednání v nutné obraně musí směřovat:`,a:`přímo proti útočníkovi, přičemž mu může vzniknout újma nejen na majetku, ale též na zdraví či dokonce na životě a případně i na jiných hodnotách chráněných trestním zákonem.`,b:`přímo pro� útočníkovi, přičemž mu může vzniknout pouze újma na majetku či na zdraví, a tuto újmu je mu obránce povinen nahradit.`,c:`přímo pro� útočníkovi či jeho rodinným příslušníkům, kteří se v čase zahájení pro�právního útoku nalézají v blízkos� místa útoku, i když se samotného útoku neúčastní.`,correct:"a"},
{id:645,cat:`Jiné předpisy`,q:`Pokud je útočníků více:`,a:`musí nutná obrana směřovat v první řadě na osobu, která dle subjek�vního vnímání obránce udílí pokyny ostatním útočníkům.`,b:`musí být kroky podniknuté v rámci nutné obrany rovnoměrně zaměřeny vůči všem útočníkům.`,c:`může nutná obrana směřovat proti kterémukoliv z nich.`,correct:"c"},
{id:646,cat:`Jiné předpisy`,q:`V případě, že si osoba připraví na obranu proti hrozícímu a očekávánému útoku zbraň:`,a:`splňuje podmínky nutné obrany, pokud tato osoba použije zbraň až v okamžiku, kdy útok skutečně nastane a jsou splněny další podmínky podle trestního zákoníku.`,b:`nesplňuje podmínky nutné obrany, jelikož �mto jednáním dává osoba zjevně najevo svůj úmysl způsobit újmu na zdraví nebo životě, případně i na majetku a na jiných hodnotách chráněných trestním zákonem.`,c:`splňuje podmínky nutné obrany, jelikož zbraň je možno preven�vně použít i v očekávání domnělého útoku; obránce však nesmí slovně hrozit použi�m zbraně v nutné obraně osobám, které považuje za útočníky, neboť takový postup trestní zákoník považuje za kvalifikovanou provokaci.`,correct:"a"},
{id:647,cat:`Jiné předpisy`,q:`Bránit se střelnou zbraní proti útoku nožem, teleskopickým obuškem či obdobným předmětem:`,a:`nelze, jelikož obrana musí být vždy proporcionální způsobu útoku, tzv. rovný s rovným.`,b:`lze pouze v případě, že útok probíhá v obydlí obránce.`,c:`lze, jelikož jde o jednání v nutné obraně, kdy obrana musí být ze své podstaty intenzivnější než útok, nicméně nesmí být zcela zjevně nepřiměřená způsobu útoku.`,correct:"c"},
{id:648,cat:`Jiné předpisy`,q:`Pokud osoba spáchá trestný čin odvraceje útok, aniž byly ale zcela splněny podmínky nutné obrany, soud při ukládání trestu takové osobě k tomuto`,a:`přihlédne pouze jako k polehčující okolnosti.`,b:`přihlédne jako k přitěžující okolnos�.`,c:`nepřihlédne. IV. Nauka o zbraních a střelivu:`,correct:"a"},

{id:656,cat:`Nauka o zbraních`,q:`Výše vyobrazené brokové náboje mají na dnu nábojnice vyznačeny hodnoty „12“ (v případě horního náboje) a „20“ (v případě dolního náboje); který z těchto nábojů má větší ráži?`,a:`Náboj ráže 20.`,b:`Náboj ráže 12.`,c:`Označení 12 a 20 se nevztahuje k ráži, ale označuje počet broků obsažených v hromadné střele daného náboje; oba náboje mají stejnou ráži, přičemž dolní náboj je pouze delší (vzhledem k většímu počtu broků) než horní náboj, což vyvolává optickou iluzi rozdílnosti ráží obou nábojů.`,correct:"b",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCACtAcIDASIAAhEBAxEB/8QAGwABAAIDAQEAAAAAAAAAAAAAAAIDBAUGAQf/xABCEAABAwICBQgGBwgDAQEAAAABAAIDBBESIQUTMUFRBhUiU2FxkZIUQlKBobEjMjNywdHhFiRDVGJzgvA0RGOi8f/EABkBAQEBAQEBAAAAAAAAAAAAAAABAgMEBf/EACMRAQEAAgEDBQEBAQAAAAAAAAABAhESITFRAwQTFEFhMiL/2gAMAwEAAhEDEQA/AO4REQEREBERAREQFVUVMNKzHUSsjbxcbLSaa5SNpnOgorPlGTpNrW93ErlKieWqkMk8jpHne4qWrI7Co5V6PiNo9ZL2tbYfFYp5ZQXypJLfeC5S1tqNDXX25BZ5NcY7KDlbQyECRksXaQCPgtxTVtPVtxU8zJOwHMe5fMypQzywPD4XuY4bCCryOL6gi5jQvKgSFsFeQHbBJ+f5rpwQRcG4K0xZoREQEREHjnBjS5xAaBck7lgU2nKGqqNTFKcRNgSLB3csDllWup9GtgjNnTmx+6Nv4Lk43ujjDth23U3F0+lovnTdIVA2TSecqfOVUP48vnKu4afQkXz8aUrN1TN5yh0tXDZVTecp0NPoCLk6OsrWx9OplcTmbuuskVtT17/Fa41nbo0XMv0rKyZkTqh+N/1W7bpLpeWFhe+pIaMidtk4m3TIuaGkakgETuscwou0hWEZVDx4Jxpt06LiajSukYsTvTJC3u2fBUQ8odJPu7WSFvuTibd6i43nWte0Ojqn91wVXJpfSGrLo6qS7frNNr/JOJt2yLgW8oq82vVljjud/wDiM5TaSD7OmJA22AKcVd8i5ODTtRUR4myyNsbEOFlZztVdc7wCcU26hFy3PFV1zvAJzxU3vr3fBOFNupRctz1U9cfAK+LSlQ5oOtOfYE4026JFohpOo6z4BTj0pOHdItcOFrJxqt0i8jeJGNe3Y4XXqyCIiAiIgIiICIiAiIgIiICIiAiIgLn+U+mHU7fQ6Z1pHD6Rw9UcO8rd1dQ2lpZZ3/VjaXFfOppnVE75pjdz3FzipbpZFROey69A4r1127Ok08FEkBuW3isNvXWtldQBs217Z371bHCSzWSuEbNxO/uQPpAbHWHtAUFbyLL1rC0XP1iMgdyudTNlYX07w8DdvHuVLiXPsRZ2/NBW+wdlkexdVyU00XFtDUuz/huPyXM4WtBcel2qs {id:657,cat:`Nauka o zbraních`,q:`Výše jsou vyobrazeny náboje dvou nejčastějších brokových ráží, konkrétně ráže 12 a ráže 20; s náboji těchto ráží se pojí jedno významné uživatelské riziko, a to:`,a:`náboj ráže 12 může být omylem nabit do zbraně ráže 20, přičemž ale při výstřelu dochází u brokového střeliva ráže 12 ke vzniku podstatně vyšších tlaků, než na jaké jsou konstruovány zbraně ráže 20, a může tedy dojít k destrukci zbraně ráže 20 a k ohrožení zdraví a případně života střelce a případně i dalších osob.`,b:`oba náboje mají extrémní zpětný ráz a v souvislé řadě nesmí střelec vystřelit více než 16 nábojů ráže 12 nebo více než 24 nábojů ráže 20, jinak může dojít k nevratnému poškození pohybového aparátu střelce, zejména pak k poškození ramenního kloubu, o který se zbraň při střelbě opírá.`,c:`v případě, že je do nábojové komory brokové zbraně ráže 12 omylem vložen náboj ráže 20, může dojít k zachycení náboje za jeho okraj v přechodovém kuželu vývrtu hlavně, a pokud následně dojde k vložení náboje ráže 12 a k výstřelu, dojde s vysokou pravděpodobností k destrukci zbraně a k ohrožení zdraví a případně života střelce a případně i dalších osob; z tohoto důvodu mívají brokové náboje ráže 20 žlutý plášť nábojnice, kterým se odlišují od jiných brokových nábojů.`,correct:"c",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCACuAcIDASIAAhEBAxEB/8QAGwABAAIDAQEAAAAAAAAAAAAAAAIDBAUGAQf/xABEEAABAwIDAwcIBwcDBQAAAAABAAIDBBESITEFQVEGExQiYXGRFVJTgZKhsdEjMjNCYnLBJDRDVIKi4RZz8DVEY7Lx/8QAGQEBAQEBAQEAAAAAAAAAAAAAAAECAwQF/8QAIxEBAQACAQQDAQEBAQAAAAAAAAECERIDEzFRBBQhQTIiYf/aAAwDAQACEQMRAD8A7hERAREQEREBERAVdRUw00eOeVkbeLjZaTbXKRtK50FFaSUZOfq1vzK5SoqJqqQyTyOked7ipbpZHX1HKrZ8RtHzkva1th71jHllBfKklt+YLk7W1Roa6+uQWeTXGOzg5W0EhAkbLF2kXHuW3pqynq24qeZkg7DmPUvmZUoZ5aeQPhkcxw0IKvI4vqCLmdi8qBKWwV5DXaCT5/ {id:663,cat:`Nauka o zbraních`,q:`S ohledem na konstrukci střely a celkové provedení výše vyobrazených kulových nábojů ráží 7,5 x 55 Swiss (dva náboje shora) a 7,62 x 54 R (náboj zobrazený nejníže) vyberte správné tvrzení:`,a:`jde o náboje pro lovecké účely, tradičním nábojem je v tomto směru je zejména spodní náboj, který má nábojnici lakovanou v myslivecké barvě.`,b:`jejich původním určením bylo vojenské využití, v případě že odpovídají požadavkům podle zákona o ověřování zbraní a střeliva (jako je tomu zřejmě zejm. v případě horního náboje), je lze využít například také pro sportovní střelbu.`,c:`jde o náboje určené především pro střelecký výcvik mládeže, a to s ohledem na jejich nižší zpětný ráz a při střelbě celkově kultivované a pro střelce nenáročné chování zbraní, pro které jsou určeny.`,correct:"b",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCACkAcUDASIAAhEBAxEB/8QAGwABAAIDAQEAAAAAAAAAAAAAAAQFAgMGAQf/xABBEAABAwIEAQgIAwcEAgMAAAABAAIDBBEFEiExQQYTFCJRYXGRFjIzUlOBkqEVI0JDVGJygrHBJGOi4SXRNETx/8QAGAEBAQEBAQAAAAAAAAAAAAAAAAECAwT/xAAhEQEBAAMAAgMBAQEBAAAAAAAAAQIREhMxAyFRQWFxgf/aAAwDAQACEQMRAD8A7hERAREQEREBERARFqqahtNC6R+w2HaUGckrIm5pHBo7SoEuN0zCQ0OfbsCqaieSpkzyuuTs2+jVoc+7MpIuNFzuf43MV3DjtO92V7Xx34mxCsY5GyNDmEEHiFxrrtd1m7+92KVQ18lHKMpJiO7f8hWZfpcXVIsYpGyxte03DhcLJbYFrmqIacAzSNZfa53Wxc/j95qkNBsYxp42us5XU2uM3V8+VjI87nAN7StAxClO07VyNMJxMIHtLGOZzjhc2J7VlplAJKxfkjc+PbrunUp/bs806dTfHZ5rk4QzMTm1txRzWbiQb7WTyxfG6zp1N8dnmvDX0o3nZ5rk8osOvv3LBzG3sJE8sTxuxbWU7hpMzzWXSYT+1Z9S4sxi3tfIFYtZr7TfZPLDxu35+I/tGfUF7zsfvt81xXN8Q827l7kIHru27U8kOHac4z3m+a9zt94ea4gMkP6zbxWTYpS0kyHzV8kOHa5h2he3C4Z3PjZ79e8r3NUj9rJ9SeSJw7hFxINbf2kn1LLPXAe1k+pPJF4rtEXHMlr/AI0lvFWdLVVtFHG+pJljkNhfcJPklTir5FA/GKUC7y5p7CFj+O0N7c476VvcZ5qxRV/43Q31lI8Wlb4sRpJm3ZOz5mybhqpKLATwnaVh/qCyEjDs5p+aqPUS99kQEREBERAREQEREBERARE {id:664,cat:`Nauka o zbraních`,q:`Výše jsou vyobrazené dva náboje stejné ráže, a to 7,62 x 39 mm; vyberte správné tvrzení:`,a:`typicky jde v případě střeliva této ráže o střední balistické výkonnosti vyvinutý pro vojenské použití, dnes pak často používaný též pro sportovní účely.`,b:`nejčastějším využitím tohoto střeliva je použití k loveckým účelům, typicky pro tzv. trojáčky.`,c:`konstrukčně se jedná o střelivo pro krátké palné zbraně (pistole a výjimečně též pro revolvery), přičemž hlavní předností tohoto střeliva je jeho nízký zpětný ráz v krátké palné zbrani oproti větším rážím, jako je např. 7,65 mm Browning nebo 9 mm Luger.`,correct:"a",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCAB9AcYDASIAAhEBAxEB/8QAGwABAAIDAQEAAAAAAAAAAAAAAAIGAQQFAwf/xABAEAABAwIEAwQHBQcEAgMAAAABAAIDBBEFEiExBkGRE1FhcRUiMlKBkqEWQlNUghQzQ2KxwdEjRHLhJGOi8PH/xAAZAQEBAQEBAQAAAAAAAAAAAAAAAQIDBAX/xAApEQEBAAIBAwQCAQQDAAAAAAAAAQIRAxIhMQQTQVFSkWEFFBUiMkKh/9oADAMBAAIRAxEAPwC8IiICIiAiIgIiIChLPFCLyPa3zK0MTxQU57KI+vzPcuFK58ziZHE+eq55Zydm8cNrA/GqFhsZejStinrqaqF4ZWu+n9VUHsbf/C9ILxuzMdlPIjULPuVr21yRcjDcTLnCGb2raHv8l1wbi41C6Y5SudmhERaQWC9ocGlwBPIlZVVrZZvSLqkXLGvv4WBspcpPKybWpR7Rnvt6quVeLVFVG2FoyZhrbcrhyyywVPZuvfcrNzkduLhvJlp9Azt94dVnMO8L57NVyBl23usiskL2tzuHqm6x70er+wu9dT6DdF8/fWziRjWyusQTe6ekKkDSd/Up70a/x2X5PoCKnmulY0B1RdwAvnny2020C124hWMrMslQWjNYkuLgOq3c5HHH0WWW+68Iqn+01LWOfLNURMDScxmYb+AC0n4zWNymKse5jve0I8wlzkMfRZZeLF5RUduO4hcf+Q467WXUjra128khPc1jieiuOcy8M8no8+PzYsiKn1OP1kExYZSyw2kjynoVAcS1f5hnyhZvLjLpqeh5LN7i5oqcOJ6v8aI/pCgeKq8OOkRHflScmNWf0/lvjS6IqrTcWyA2qIQfFui6LOKKFzbuEjT3WutdUc8/R82HnF2UXI+0uH+9J8iz9pcP99/yK9U+3P8At+X8b+nWRc2LH8PlJAmtb3mkL19L0P5libjN4eSecb+m6i0vS9D+ZYnpig/NRpuHtZ/jW6i0vTFB+aj6rPpeg/NRdU3D2s/xrcRazMRo5DZlTEf1LYa9rxdrg4d4N1WLjZ5jKIiIIiICIiAiIgIiICIiAiIgIiICIiAtbEaoUdFJLzAsPNbK4nFbyKGNo2c {id:665,cat:`Nauka o zbraních`,q:`Výše jsou vyobrazené dva náboje stejné ráže, a to 7,62 x 39 mm; horní náboj je:`,a:`značkovacím střelivem určeným pro speciálně upravené zbraně dané ráže; jeho použití spočívá v označení cíle vystříknutou barvou, což se standardně využívá při tzv. soupeřských metodách výcviku.`,b:`svítícím nábojem, a z tohoto důvodu se jedná podle zákona o zbraních a střelivu o zakázané střelivo.`,c:`tzv. školní nebo „vybíjecí“ náboj určený pro bezpečné spouštění bicího ústrojí zbraně a pro nácvik manipulace se zbraní a střelivem.`,correct:"c",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCAB+AcYDASIAAhEBAxEB/8QAGwABAAIDAQEAAAAAAAAAAAAAAAQGAQIFAwf/xABBEAABAwIDBAUHCQgDAQAAAAABAAIDBBEFEiEGMUFRE2FxgZEUFSIyUpKhFjNCQ0RTVILRI2JjcrHB4fAkNKKy/8QAGQEBAQEBAQEAAAAAAAAAAAAAAAECAwQF/8QAJxEBAQACAQMEAQUBAQAAAAAAAAECEQMSITEEE0FRYRQVIlKRMnH/2gAMAwEAAhEDEQA/ALwiIgIiICIiAiIgLSWaOEXke1vaVAxPFBTnooiDJxPJcKZ753EyOJ7Vzyzk7N44bWB+NULDYzeDSpFPXU9ULwytd8FT3sbf9F6wXjdmY7KeFtQs+5WvbXJFyMNxMvcIZvWtv59i64NxcLpjlK52aERFpBYL2ggFwBPC6yqrWzTecnVNyWNf3WBspbJ5WTa1LXpGe03xVcq8WnqY2wtbkzC5tvK4csssFT0bib7ys3OR24uG8mWn0DM3mPFZuOa+ezVcgZdpN1kVspe1okcPRPFY96PV+gu9dT6Ci+fvrqgSMa2V2oJvdZ841IGk7/Eq+9Gv27L+0X9FTzXTRtAdUXcAL5qjJbTdoo7MRrW1mR9QWjNYkuLgPit3ORxx9FllvuvCKqeU1TWOfLNVRMDS7MZGW7AFCfjVazKYqxz2O5ixHUQpc5DH0WWXixeEVHbj2IXH/IJ13WXUjr612pkeSeDGknwsrjnMvDPJ6PPj82LIiqFRtBWQzFnS5LDdJHlPgVoNpaz7+P3Qs3lxl01PQ8lm9xckVPG09X97EfyrQ7VVzXEZYiP5UnJjV/b+W+NLmiq1Nta/dUQg9bV0WbT0Dm3cZGnllutdUcs/R82HnF2EXJ+UmH+2/wBxZ+UmHfeP91Xqn2x+n5f63/HVRc6LHcPmJDZ7W9oEL187UP4libjN4uSecb/iYih+dqH8TH4p52ofxUfim4nt5/VTEUPztQ/io/FZ860P4qL3k3D28/qpaKOyvpJDZlTEfzBe7XBwu0gjmCqzcbPMZRERBERAREQEREBERAREQEREBERAREQFGxGqFHRyTcQLDtUlcTap5FDG0bnP1/3vUt1Fk3XDEzpZC5xJJ1uvUODeO/gVHitlAWj3npWMvobk9f8Av9l59O7aSoYH/TPWG3Xux9mBzTmF+CjOY0guLuG {id:672,cat:`Nauka o zbraních`,q:`Z hlediska konstrukce nábojnice výše uvedených nábojů lze uvést, že:`,a:`všechny vyobrazené náboje mají nábojnici s okrajem, přičemž náboje zobrazené nad čísly 1 a 2 jsou náboji s okrajovým zápalem, a proto má jejich nábojnice tzv. zápich.`,b:`nábojnice nábojů zobrazených nad čísly 1 a 2 mají okraj a nábojnice nábojů zobrazených nad čísly 3, 4 a 5 mají drážku; v případě nábojnice náboje zobrazeného nad číslem 3 (ráže 7,65 Browning) se někdy hovoří o tzv. polookraji (semi-rim).`,c:`nábojnice náboje uvedeného nad číslem 1 má okraj, nábojnice náboje nad číslem 2 má okraj s dosedacím nákružkem, nábojnice náboje nad číslem 3 má okraj se zakroužením, nábojnice náboje nad číslem 4 má drážku a nábojnice náboje nad číslem 5 má okraj i drážku.`,correct:"b",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCADiAcUDASIAAhEBAxEB/8QAGwABAAIDAQEAAAAAAAAAAAAAAAUGAgMEAQf/xABBEAACAQMCAwQGCAQEBgMAAAAAAQIDBBEFIQYSMRNBUbEiNWFxgZEUFTJScqHB0SNCc4IlMzRiFkNT4fDxJESS/8QAGAEBAAMBAAAAAAAAAAAAAAAAAAECAwT/xAAgEQEBAAMAAwEBAQEBAAAAAAAAAQIRMQMSIUEyEyJR/9oADAMBAAIRAxEAPwC8AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAGNWpGlSlOX2YrLA0Xt/QsafPXnjwiurIqHFdrKpiVKpGPjlM1afRjq9zWurtc8E+WEH0OOhZWsuIZUZR5qPM8R9uDG+T7qLzFa7e4pXVJVaM1OD70bCAk4aLq9KNN4t7n0XHuT8SfNMbuK2aAAWQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAFY1nXLiVzO2sZ8ig8SmurZMmxZwUD6fqXaxj9NrJt98mS+l63dW13G21GXPCbwqjW6f7E+tFoABUAAAI3iCt2Ol1MPDlsSRAcYVHGxppd7bIvEzrPQo8mkQeeuZN4IO2ueXW1U59u0M7TVOz0d01tOKaXxIWFbFbO+cnJMbbW34tvFycbKlUT3jPYnLKt29nRq/fgn+RVdcvfpekUOZPP6k9w3Nz0O2z3Ra/M38V6zyiSABqoAAAAAAAAAAAAAAAAAAAAAAB5KShFyk0opZbfcB6Cr33GcKNbltbV1aaeOeUuXm9y8CT0XXqOrKUOR0a8Vl05PqvFE6EqACAAAAAAAAAAAAAAAAABjUqRpQc5yUYrdtkFc8VUaVVxpUJVEv5nLGSLZE62nwR2m61b6g+RJ06n3Zd/uZIk72gAAAAAc2pXKs7CtX74x29/cUazbnJycvSn {id:696,cat:`Nauka o zbraních`,q:`O výše vyobrazené zbrani lze z hlediska zásad bezpečné manipulace se zbraněmi a střelivem říci, že:`,a:`je vybitá, protože je vypuštěný bicí kohout, a tedy je možné s ní jakkoliv manipulovat.`,b:`není možno určit zda je nabitá nebo vybitá, a před další manipulací s ní by tedy bylo bezpodmínečně nutné provést důkladnou kontrolu jejího stavu.`,c:`před další manipulací s ní by bylo nutné vyjmout zásobník, ale další kontrolu by nutné provést nebylo s ohledem na to, že náboj v komoře se nacházet nemůže, protože je již vypuštěn bicí kohout.`,correct:"b",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCAC0AUwDASIAAhEBAxEB/8QAGwABAAIDAQEAAAAAAAAAAAAAAAIDAQUGBAf/xAA+EAACAQIDBAYIAwcEAwAAAAAAAQIDEQQFIRIxQVEGExZhcZEUIjJSU4GSoUKx0RUjVGLB4fE0cqLwJDNj/8QAFwEBAQEBAAAAAAAAAAAAAAAAAAECA//EABoRAQEBAAMBAAAAAAAAAAAAAAABEQIhMRL/2gAMAwEAAhEDEQA/AO4AAAAAAAABoelGcVMHh3h8DUSxUrXfux7u80WX9JM4oWVeVGvD/wCjSfmi4O7BpqfSfAuEXUcoza1SV0n4ku02Xe9U+kYNuDUdpsu9+f0me0uXe/P6Rg2wNT2ly/35/SO0uXe/P6Rg2wNT2ly74k/pHaXLviT+kYNsDU9pcu+JL6R2ly74kvpGDbA1PaXLviS+kz2ky74kvpGDag1XaTLviy+kdpMu+LL6Rg2oNV2ky74svpHaPLviy+kYNqDV9o8u+LL6R2jy74svpGDaA1XaPL/iy+kdpMu+LL6Rg2oNV2ky74svpHaPLviy+kYNnOrTppupOMUuMmkKdWFWO1TnGa5xdzgMzqKtDFYp1esnWqKKVvZW+32NvkWYU8uor0mTjRqwTTt+Jf2/IvymuqBrIdIculJLr7X4uLNlGUZxUotOLV01xMqyAAAAAAAAAAAAAAAAV4mo6WGqTjvjFtX5lhTjVtYOsv5H+QHzvMsXKVevOtGE69SWreqSstyNbd8y7G03TrSu9pKVrlFzaJqctnZ0te+7XzCb5kLkk7hEnJpChLabUtURk9DFF7Lk2BfFwfvv5mbL+bzIUYylG8YuS5os2J/Dn5FGNlPc5eZnYV978zKjJfgl5GbS+HPyAjsLnLzMqnHnLzM+t8OfkZjtp+xLyYEeqje15eZLqoc5+Zn1tbwn5Mzd2tsy8mBF0YcJS+bHUR96XmSu2tYy+kztc1L6R0IrDwf435mfRo+/IknrufkNrx8gI+jQ9+Rn0WPvyJbUdbp+QU4rix0iHosffl5k6+CjSw0KiqSlKUtm3BEuthzJVakKuAnTUltRe1FPjzHSvE0le63C0eK+5JttvTn/AFF9dxFQlZx9njuuzE6s+qs22o6JOTaRNveu8hU1g19gLMNh1iKSntuD8zospxOYww0MHhavWt {id:705,cat:`Nauka o zbraních`,q:`Pod číslem „3“ se na obrázku výše nachází součást samonabíjecí pistole označovaná jako:`,a:`vývrt hlavně s vložkou nábojové komory; tato součást se vkládá do hlavně, kde uděluje rotaci střele (projektilu), čímž ji stabilizuje v letu.`,b:`bicí pružina s úderníkem; tato součást je u vyobrazené zbraně určena k tomu, aby po stisknutí kohoutku udeřila hlavní o závěr a tím iniciovala zápalku náboje, čímž dojde k výstřelu.`,c:`předsuvná (nebo vratná) pružina s vodítkem; jde o pružinu, která působí na závěr a mimo jiné jej po výstřelu vrací do přední polohy.`,correct:"c",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCADlAcUDASIAAhEBAxEB/8QAGwABAAIDAQEAAAAAAAAAAAAAAAUGAQIEAwf/xABDEAACAQMCAgUJBAYKAwEAAAAAAQIDBBEFEiExBhNBUZEUIlJhcYGSobEVMlPBFiNCVJPRJDM0Q0RicoLh8WNz8GT/xAAYAQEBAQEBAAAAAAAAAAAAAAAAAQIDBP/EACERAQACAQQDAAMAAAAAAAAAAAABEQIDEiExBBNBMmGB/9oADAMBAAIRAxEAPwC8AAAAAAAAAAAAAAAAAAAAAABF9ItSem6e5U3irU4R9XewJGVelFtSqwTXY5IrvS3WqlnToUrKvtqTblKUGnhL/wC+RUesrTludTi3lng6im5Oby1wyapLfQ+juqq+01O4qx66m9s22lnufgSnXUvxIfEj5XGtsbcZNN+s28pn6cvEUW+p9bT9OPiOsh6UfE+Wyu5qLaqSyZdzUS410uGcNii31LfH0l4mdy70fMKNzKVu5yqPdnH3uRjyqfZXk/8AcKLfUMoHyy8uas6cFCpJS7WpM8I3N9FYjcVMd25kpX1oHyaV5f4/tNX42eMry83ca9Vtf52KH18HzVXt04x6qtNRS5yk+LHl18v8RL4mWkt9KB81V/f/ALxL4mZ+0dQ7K8viYot9JB84Wo6h+8S+JmftLUey4l8bFFvowPnVDU7+qqmbqpFweOEmZ+0tQ7Lyp4sUW+iHHcavYWslGtdUoy7k8v5FHeoahKLUruo01hpvmcrU85/V/AIhZuJqX02MlOKlFpprKa7TJWeiOo161SraXEtyhBSpvuXJr6FmMgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABUum7k69tBJtOLwl35LaRmu2NzeUaTsurVanPOZvCw1hlglQY05KWNj8Uc8tPryqScEsNtrLLV9gau3lq0+JmfsLV3w/oq/3MrKq/Zlz3R+Iz9m3LWMw+IttLQNVlLZOvQpQfOUcyfuTPd9Fa2OGp1M/+tBVK+zLh8G4Y/1HXC0qQy4SSzjOcPl7Swfo/qsZY329RLlKTayYWg6suStl/uYRX52k58Z7H/tRjyBv9mHgiz0dA1KpPFerb04d8cyYr6BqUJYoVbepDvlmLFitQsJRbwoceGOBurWcXnzCeeg6r/ {id:714,cat:`Nauka o zbraních`,q:`Výše je vyobrazena pouze střední část dlouhé palné zbraně – opakovací malorážky. Určete, které tvrzení níže platí z hlediska správného používání této zbraně:`,a:`šipka nad zbraní označuje směr, pro který je z hlediska používání zbraně charakteristické zejména to, že jde o bezpečný směr a pokud zbraň ve směru této šipky směřuje k osobám, nejedná se nikdy o porušení zásad bezpečné manipulace se zbraní, zatímco ve směru naznačeném šipkou pod zbraní se o bezpečný směr jedná pouze tehdy, směřuje-li zbraň k rameni střelce.`,b:`šipka nad zbraní označuje směr, pro který je z hlediska používání zbraně charakteristické zejména to, že jde o směr působení zpětného rázu zbraně, zatímco šipka pod zbraní směřuje pryč od místa, kde se zbraň opírá do ramene střelce.`,c:`šipka nad zbraní označuje směr, pro který je z hlediska používání zbraně charakteristické zejména to, že jde o směr, ve kterém střela opouští zbraň, jde tedy o šipku směřující k ústí hlavně, zatímco šipka pod zbraní směřuje k rameni střelce.`,correct:"c",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCADPAcUDASIAAhEBAxEB/8QAGwABAAIDAQEAAAAAAAAAAAAAAAIEAQMFBgf/xABCEAACAQIDAwYLBwQCAQUAAAAAAQIDEQQFIQYSMRNBUXGBkRQWIjJSVGFykqHRFTNCU2KxwSNDgpNE4SQ0NWOy8f/EABoBAQEBAQEBAQAAAAAAAAAAAAABAgMEBQb/xAAsEQEAAgEDAwQCAQQDAQAAAAAAARECAxJREyExBCJSkRRBQgUyYXGBofDx/9oADAMBAAIRAxEAPwD3AAAAAAAAAAAAAAAAAAAAAAAG1FXbSXtAAjytP04945Wn6ce8FJAjytP04945Wn6ce8FJAjytP04945Wn6ce8FJAjytP04945Wn6ce8FJAjytP04945Wn6ce8FJAjytP04945Wn6ce8FJAjytP0495WzHE8ll+IqUqkVONNuLunqLaxxnKYhbB4qG0OZQVuXUvegmb6e1OMj59OjPsa/k59XF7Z/p+tHinrgeZp7WyX3mET92f/RZhtXhn59CtHqsy9THlyn0evH8XdByYbSZfLjUnD3oP+CxDOcvqebi6Xa7fuXdHLlOjqY+cZ+l4GmGLw9TzK9KXVNM2qSaumn1GnOYmPLIFwEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAObtF/7LiOz90dIo53QqYnK61KjHenK1lfjqiZeJ {id:716,cat:`Nauka o zbraních`,q:`O zbrani označené výše vyobrazenou značkou lze říci, že:`,a:`jde o zbraň ověřenou státní autoritou v České republice (od roku 2000 je touto autoritou Český úřad pro zkoušení zbraní a střeliva).`,b:`jde o zbraň zařazenou do výzbroje ozbrojených sil České republiky, jedná se o tzv. přejímku.`,c:`jde o zbraň určenou výhradně pro střelivo plněné černým prachem a náhradní střelou.`,correct:"a",imgs:[`data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDABIMDRANCxIQDhAUExIVGywdGxgYGzYnKSAsQDlEQz85Pj1HUGZXR0thTT0+WXlaYWltcnNyRVV9hnxvhWZwcm7/2wBDARMUFBsXGzQdHTRuST5Jbm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm5ubm7/wAARCABGADIDASIAAhEBAxEB/8QAGgAAAgMBAQAAAAAAAAAAAAAAAAUDBAYCB//EADgQAAEDAwAHBQQKAwEAAAAAAAECAwQABREGEhMhMXOxIjRBUXEUNmGRFRYyVYGUwdHh8EJicqH/xAAUAQEAAAAAAAAAAAAAAAAAAAAA/8QAFBEBAAAAAAAAAAAAAAAAAAAAAP/aAAwDAQACEQMRAD8Au25qbpNtJ7l0kRYu0UlpmMdU6oPifOr/ANWT983f8z/FQaA+7aOYvrTS93QWiD7UpoujXSkpScHf5UFL6sn75u/5n+K4Gj7alaovt0Kj4CUM9PgflTmVtFQndiotOlB1VYHZON3HdXlujhkydKIqkrUpwva61Z8N5V+vzoN59WT983f8z/FV5lhmxGXJEG9zy40gqSh9zXSojfg11NvK5Ntg3GHtG2fbEocQd2ujWKf2p5O7i/y1dDQI4mk63YbLjkYFam0lRCsDJG+ikMHuEflJ6Cige6A+7aOYvrTO925dxjtJZcSh5h1L7eunKVKTnAPwpZoD7to5i+tdaTL2V0s7iA8p0PKw2z9pacAkemQM+tBLMvbIs80TUmPJaaIcYKt+SMDVPiCTuIpLoBaG1Qn57mtruazKd24J3ZI/vhTKfo+/eIr0i6EKlbJQjsNnsMnw3/5Hhk8Ki0BkBNgeQ6cGO6rWGN6RgH96Dm2Ne2w7ZbAkpTDWXJY8lIUQEn1Vv9BWlndxf5auhpRGSuEhi5k6olKBlJJwO2RqH1TkD0zTed3F/lq6GgwsHuEflJ6CiiD3CPyk9BRQPdAfdtHMX1pzcJ8O3NpfnOoaTnCVKGT6DxpNoD7to5i+tSaRZj3S2z5LalwYylbQpGdRR3BRHkKDpzS+3BOswiVJTnGWmDj5nFJLRIem6ST2beyqEzKaC3kvoyof7AeZz/7W2QpK20rbIUlQyCDuIpDZ21O6VXmUpIGqW2UnHkMnf8qCz9DynIzUN+eHIjaknGxw4oJIIBVnHEDfimM7uL/LV0NTVDO7i/y1dDQYWD3CPyk9BRRB7hH5SegooH+hOqzbZEIk7WLIWhYPHjuP98qYv3m2JkPQ35TIcQnttrPEYzjfuO7wqnc7PKbnqudmeQ1KUAHWXB2HgPPyNL5MxgL2l90aWlzgp5ttLqT8c0DbRZpaLK0peslLqlONtk52aCeykfDGPnVe6WmwsyfaJ5DDklfEvqQFK/A4q7a73bbkA3CfQVJGNkRqqH4H9Ki0gcsqWUfTWxIH2Aver8AN/hQVbGwyxfZbVsWowm2kBwFwrBcO8apOfDj6imt4kIi2mW84cJQ0o8eO7cPn
