{id:303,cat:`Zákon o zbraních`,q:`Držitel zbrojní licence skupiny ZL1 je povinen zapsat do centrálního registru zbraní každou změnu stavu evidované zbraně nebo střeliva, a to v rozsahu stanoveném zákonem:`,a:`do 10 pracovních dnů ode dne, ve kterém ke změně stavu evidované zbraně nebo střeliva došlo.`,b:`nejpozději před předáním a bez zbytečného odkladu po převzetí zbraně nebo střeliva a v mimořádných odůvodněných případech pak nejdéle do 2 pracovních dnů ode dne, kdy byly zbraň nebo střelivo převzaty.`,c:`do 10 pracovních dnů ode dne předání zbraně nebo střeliva držiteli zbrojního oprávnění nebo převze� zbraně nebo střeliva od držitele zbrojního oprávnění, a do 2 pracovních dnů ode dne, kdy byly zbraň nebo střelivo převzaty v ostatních případech.`,correct:"b"},
{id:304,cat:`Zákon o zbraních`,q:`Přenecháním zbraně nebo střeliva je pro účely zákona o zbraních a střelivu:`,a:`dočasné umožnění jiné osobě samostatně nakládat se zbraní nebo střelivem osoby, která je přenechává; ten, komu byly zbraň nebo střelivo přenechány, je nesmí sám přenechat jiné osobě.`,b:`svěření zbraně držiteli zbrojního oprávnění nebo zbrojní licence skupiny ZL2 nebo ZL3.`,c:`časový úsek od okamžiku převodu zbraně jinému oprávněnému držiteli do okamžiku, kdy převodce i nabyvatel zbraně provedou ohlášení převodu a naby� zbraně krajskému ředitelství policie.`,correct:"a"},
{id:305,cat:`Zákon o zbraních`,q:`Přenecháním zbraně nebo střeliva je pro účely zákona o zbraních a střelivu:`,a:`dočasné umožnění jiné osobě samostatně nakládat se zbraní nebo střelivem osoby, která je přenechává.`,b:`trvalé umožnění jiné osobě samostatně nakládat se zbraní nebo střelivem osoby, která je přenechává.`,c:`dočasné umožnění jiné osobě pod dohledem nakládat se zbraní nebo střelivem osoby, která je přenechává.`,correct:"a"},
{id:306,cat:`Zákon o zbraních`,q:`Osoba, které byly zbraň nebo střelivo přenechány podle § 78 odst. 1 zákona o zbraních a střelivu:`,a:`je může sama přenechat jiné osobě.`,b:`je může sama přenechat jiné osobě, ale musí si dodatečně opatřit souhlas osoby, která jí je přenechala.`,c:`je nesmí sama přenechat jiné osobě.`,correct:"c"},
{id:307,cat:`Zákon o zbraních`,q:`Držitel zbrojní licence je oprávněn přenechávat zbraň podléhající registraci:`,a:`držiteli zbrojního oprávnění nebo držiteli zbrojní licence, a to na základě smlouvy o přenechání zbraně; podmínkou účinnos� smlouvy o přenechání zbraně je souhlas s přenecháním zbraně, k jehož udělení je oprávněno krajské ředitelství policie místně příslušné podle místa pobytu osoby, které má být zbraň přenechána.`,b:`držiteli zbrojního oprávnění nebo držiteli zapsané autorizace.`,c:`držiteli zbrojního oprávnění, který je k němu v pracovněprávním, členském nebo obdobném vztahu, a to pro plnění úkolů při výkonu činnosti, pro kterou byla zbrojní licence vydána.`,correct:"c"},
{id:308,cat:`Zákon o zbraních`,q:`Držiteli zbrojního oprávnění, nejde-li o přenechání zbraně podle odstavce 2, nebo držiteli zbrojní licence skupiny ZL2 může být zbraň podléhající registraci přenechána, pokud jde o:`,a:`hlavního držitele zbraně, přenechání zbraně držitelem zbrojního oprávnění nebo zbrojní licence za účelem návštěvy střelnice nebo přenechání zbraně kategorie R2, R3 nebo R4 na dobu nejvýše 30 dnů po sobě jdoucích.`,b:`vedlejšího držitele zbraně, přenechání zbraně kategorie R2, R3 nebo R4 držitelem zbrojní licence na střelnici, nebo přenechání zbraně kategorie R4 vždy na dobu nejvýše 30 dnů po sobě jdoucích.`,c:`vedlejšího držitele zbraně, zbraň mu však musí být přenechána bez střeliva; střelivo je povinen si obstarat držitel zbrojního oprávnění nebo zbrojní licence, kterému byla zbraň přenechána, a to vlastním jménem a na vlastní odpovědnost.`,correct:"b"},
{id:309,cat:`Zákon o zbraních`,q:`Držiteli zbrojního oprávnění nebo držiteli zbrojní licence skupiny ZL2 lze přenechat zbraň podléhající registraci, pokud jde:`,a:`zároveň také o držitele zapsané autorizace.`,b:`o přenechání zbraně kategorie R2, R3 nebo R4 držitelem zbrojní licence na střelnici.`,c:`o přenechání zbraně kategorie R3 vždy na dobu nejvýše 90 dnů po sobě jdoucích.`,correct:"b"},
{id:310,cat:`Zákon o zbraních`,q:`Zbraň kategorie PO nebo NO a střelivo pro takovou zbraň lze přenechat:`,a:`osobě, která je oprávněna s nimi nakládat, nebo plně svéprávné zletilé fyzické osobě.`,b:`osobě, která je vedlejším držitelem zbraně kategorie PO nebo NO zapsaným do centrálního registru zbraní.`,c:`fyzické nebo právnické osobě a držitel takové zbraně musí její přenechání bez zbytečného odkladu ohlásit krajskému ředitelství policie.`,correct:"a"},
{id:311,cat:`Zákon o zbraních`,q:`Držitel zbraně kategorie PO nebo NO nesmí takovou zbraň nebo střelivo pro takovou zbraň přenechat:`,a:`osobě, která není ve smyslu zákona o zbraních a střelivu považována za spolehlivou.`,b:`držiteli zbrojního oprávnění nebo držiteli zapsané autorizace.`,c:`osobě, o které nezná údaje potřebné k určení její totožnosti.`,correct:"c"},
{id:312,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení.`,a:`Zbraň kategorie PO nebo NO a střelivo pro takovou zbraň lze přenechat osobě, která je oprávněna s nimi nakládat, nebo svéprávné fyzické osobě starší 15 let.`,b:`Držitel zbraně kategorie PO nebo NO nesmí takovou zbraň nebo střelivo pro takovou zbraň přenechat osobě, o které nezná údaje potřebné k určení její totožnosti.`,c:`Paintballovou a airso�ovou zbraň nebo jinou expanzní zbraň kategorie NO lze přenechat osobě, která dosáhla věku 10 let; s přenecháním takové zbraně této osobě musí udělit souhlas její zákonný zástupce, opatrovník nebo poručník.`,correct:"b"},
{id:313,cat:`Zákon o zbraních`,q:`Paintballovou a airsoftovou zbraň nebo jinou plynovou zbraň kategorie NO lze přenechat osobě, která:`,a:`dosáhla věku alespoň 12 let a s ohledem na stupeň jejího fyzického a rozumového vývinu lze předpokládat, že s touto zbraní bude nakládat bezpečně.`,b:`dosáhla věku 15 let; s přenecháním takové zbraně této osobě musí udělit souhlas její zákonný zástupce, opatrovník nebo poručník.`,c:`je plně svéprávná, zle�lá a má místo pobytu na území České republiky; přenechání paintballové a airso�ové zbraně nebo jiné plynové zbraně kategorie NO osobě mladší 18 let zákon o zbraních a střelivu nepřipouš�.`,correct:"b"},
{id:314,cat:`Zákon o zbraních`,q:`Svěřením zbraně nebo střeliva je pro účely zákona o zbraních a střelivu:`,a:`umožnění jiné fyzické osobě nakládat se svěřenou zbraní nebo střelivem pod dohledem osoby oprávněné se svěřovanou zbraní a střelivem nakládat.`,b:`dočasné umožnění jiné osobě samostatně nakládat se zbraní nebo střelivem osoby, která je svěřuje; ten, komu byly zbraň nebo střelivo svěřeny, je nesmí sám svěřit jiné osobě, smí je však jiné osobě přenechat.`,c:`odevzdání zbraně, která byla podle zákona o zbraních a střelivu zadržena nebo zajištěna, do úschovy držiteli zbrojní licence skupiny ZL1; svěřená zbraň nemusí být v rámci zadržení nebo zajištění odevzdána policii.`,correct:"a"},
{id:315,cat:`Zákon o zbraních`,q:`Svěřením zbraně nebo střeliva je pro účely zákona o zbraních a střelivu:`,a:`umožnění jiné fyzické osobě nakládat se svěřenou zbraní nebo střelivem bez dohledu jiné osoby.`,b:`umožnění jiné fyzické osobě nakládat se svěřenou zbraní nebo střelivem pod dohledem osoby oprávněné se svěřovanou zbraní a střelivem nakládat.`,c:`umožnění právnické osobě nakládat s přenechanou zbraní nebo střelivem.`,correct:"b"},
{id:316,cat:`Zákon o zbraních`,q:`Zbraň kategorie R1 nebo střelivo kategorie S1 lze svěřit:`,a:`plně svéprávné zle�lé fyzické osobě, na kterou při nakládání se zbraní kategorie R1 nebo střelivem kategorie S1 v rámci zážitkové střelby musí dohlížet držitel rozšířeného zbrojního oprávnění.`,b:`pouze držiteli zbrojního oprávnění, který je k držiteli zbrojní licence v pracovním, členském nebo obdobném vztahu, nebo který je držitelem zbrojní licence.`,c:`po předchozím poučení a případném jiném nezbytném zaškolení držiteli zbrojního oprávnění, nebo jiné plně svéprávné zletilé fyzické osobě, a to při činnosti držitele zbrojní licence; účelem svěření nesmí být zážitková střelba.`,correct:"c"},
{id:317,cat:`Zákon o zbraních`,q:`Není pravda, že:`,a:`zbraň kategorie R1 nebo střelivo kategorie S1 lze při splnění dalších podmínek podle zákona o zbraních svěřit jiné osobě po předchozím poučení a případném jiném nezbytném zaškolení.`,b:`zbraň kategorie R1 nebo střelivo kategorie S1 lze svěřit držiteli zbrojního oprávnění.`,c:`zbraň kategorie R1 nebo střelivo kategorie S1 lze svěřit jiné fyzické osobě starší 21 let, a to při činnosti držitele zbrojní licence za účelem provedení zážitkové střelby.`,correct:"c"},
{id:318,cat:`Zákon o zbraních`,q:`Platí, že zbraň kategorie PO nebo NO a střelivo pro takovou zbraň lze svěřit:`,a:`jiné fyzické osobě bez dohledu.`,b:`jiné fyzické osobě pouze za dohledu osoby oprávněné s takovou zbraní a střelivem nakládat.`,c:`pouze právnické osobě.`,correct:"b"},
{id:319,cat:`Zákon o zbraních`,q:`Pokud je zbraň kategorie R2, R3 nebo R4 a střelivo pro takovou zbraň svěřována fyzické osobě, která je mladší 18 let a není držitelem zbrojního oprávnění:`,a:`může jít o osobu ve věku 16 let nebo starší, nad kterou musí dohlížet držitel rozšířeného zbrojního oprávnění, který dosáhl věku alespoň 25 let.`,b:`musí jít o přiměřeně rozumově a tělesně vyspělou osobu a dohled nad takovou osobou musí zajišťovat fyzická osoba, která dosáhla věku 21 let a je držitelem zbrojního oprávnění po dobu delší než 3 roky.`,c:`musí nad ní být zajištěn dohled držitele zbrojního oprávnění pouze tehdy, pokud současně nakládá se zbraní kategorie R2, R3 nebo R4 a s odpovídajícím střelivem nebo provádí-li střelbu.`,correct:"b"},
{id:320,cat:`Zákon o zbraních`,q:`Zbraň kategorie PO nebo NO a střelivo pro takovou zbraň lze svěřit pouze:`,a:`za dohledu osoby oprávněné s takovou zbraní a střelivem nakládat.`,b:`jde-li o zbraň a střelivo ověřené pro civilní použi� podle zákona o ověřování střelných zbraní a střeliva.`,c:`jde-li o zbraň a střelivo označené iden�fikačními údaji v souladu se zákonem o zbraních a střelivu.`,correct:"a"},
{id:321,cat:`Zákon o zbraních`,q:`Ten, kdo dohlíží na osobu, které byla svěřena zbraň nebo střelivo, je povinen:`,a:`bezodkladně oznámit krajskému ředitelství policie porušení povinnos� nebo zákazu stanoveného zákonem o zbraních a střelivu osobou, které byly zbraň a střelivo svěřeny.`,b:`oznámit údaje o svěření zbraně nebo střeliva krajskému ředitelství policie prostřednictvím zápisu do evidenčního soupisu vedeného držitelem zbrojního oprávnění nebo zbrojní licence.`,c:`poučit tuto osobu o bezpečném nakládání se svěřenou zbraní a střelivem a provádět dohled v potřebném rozsahu tak, aby osoba, které byly zbraň a střelivo svěřeny, neporušila povinnost nebo zákaz stanovený zákonem o zbraních a střelivu a zejména neohrozila život nebo zdraví.`,correct:"c"},
{id:322,cat:`Zákon o zbraních`,q:`Pro nošení zbraně platí, že:`,a:`skryté nošení zbraně se vyžaduje pouze v případě, že zbraň nosí držitel rozšířeného zbrojního oprávnění; držitel obecného zbrojního oprávnění je oprávněn zbraň skrytě nebo viditelně, pokud �m není ohrožen život, zdraví, majetek nebo veřejný pořádek.`,b:`nejde-li o nošení zbraně v provozovně držitele zbrojní licence, na střelnici nebo v jiném zřetelně ohraničeném prostoru, ve kterém se se zbraní nakládá se souhlasem jeho majitele, nájemce nebo provozovatele, nebo o viditelné nošení anebo přepravu zbraně v souladu pravidly stanovenými zákonem o zbraních a střelivu, zbraň musí být nošena skrytě.`,c:`nejde-li o nošení zbraně ve zřetelně ohraničeném prostoru, nesmí být zbraň nošena v nabi�m stavu a zásobníky nebo nábojová schránka zbraně musí být prázdné.`,correct:"b"},
{id:323,cat:`Zákon o zbraních`,q:`Zbraň podléhající registraci je za účelem ochrany života, zdraví nebo majetku oprávněn nosit držitel:`,a:`rozšířeného zbrojního oprávnění.`,b:`zbrojního oprávnění nebo zbrojní licence skupiny ZL2.`,c:`zbrojního oprávnění nebo zapsané autorizace.`,correct:"a"},
{id:324,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení:`,a:`obecně platí, že zbraň musí být nošena skrytě; to neplatí v případech stanovených v zákoně o zbraních a střelivu.`,b:`obecně pla�, že zbraň může být nošena viditelně.`,c:`zbraň musí být nošena skrytě; místa, na kterých je možné nosit zbraň viditelně, stanoví v rozhodnu� krajské ředitelství policie.`,correct:"a"},
{id:325,cat:`Zákon o zbraních`,q:`Je pravdivé tvrzení, že nosit zbraň podléhající registraci je oprávněn pouze držitel rozšířeného zbrojního oprávnění?`,a:`Ano.`,b:`Ano, výjimky stanoví zákon o zbraních a střelivu v § 81 pro vybrané akce a činnosti.`,c:`Ne.`,correct:"b"},
{id:326,cat:`Zákon o zbraních`,q:`Osoba, která nakládá se zbraní, je oprávněna ji viditelně nosit:`,a:`pouze ve zřetelně ohraničených prostorách, přičemž zároveň nesmí být vidět všechny hlavní čás� zbraně nebo střelivo.`,b:`pokud jí bylo krajským ředitelstvím policie vydáno povolení viditelného nošení zbraně.`,c:`pokud se v souladu s tímto nebo jiným zákonem účastní akce nebo provádí činnost, při kterých se obvykle nakládá se zbraněmi, a pokud způsob nošení zbraně je přiměřený povaze této akce nebo činnosti.`,correct:"c"},
{id:327,cat:`Zákon o zbraních`,q:`Účelem akce nebo činnosti, při které zákon o zbraních a střelivu dovoluje zbraň nosit viditelně, může být:`,a:`ochrana života, zdraví nebo majetku, sportovně-střelecká činnost, veřejné vystavování zbraní nebo činnost ozbrojené skupiny podle zákona o nakládání se zbraněmi v některých případech ovlivňujících vnitřní pořádek nebo bezpečnost České republiky.`,b:`kulturní činnost, zejména filmová nebo divadelní činnost, rekonstrukce historické bitvy nebo obdobné události nebo pietní akce, výuka nebo výcvik v nakládání se zbraní, sportovně-střelecká nebo obdobná zájmová činnost, nebo provedení lovu nebo obdobné činnosti podle jiného právního předpisu.`,c:`podnikatelská činnost držitele zbrojní licence, ověřování zbraní a střeliva podle zákona o ověřování zbraní a střeliva, ochrana života, zdraví a majetku v citlivých prostorách, zpracování znaleckého posudku nebo posudku o zdravotní způsobilos� podle zákona o zbraních a střelivu nebo podle jiného právního předpisu.`,correct:"b"},
{id:328,cat:`Zákon o zbraních`,q:`Účelem akce nebo činnosti, při které se obvykle nakládá se zbraněmi a při které je viditelný způsob nošení zbraně přiměřený povaze této akce nebo činnosti, může být mimo jiné:`,a:`filmová nebo divadelní činnost a rekonstrukce historické bitvy.`,b:`realizace práva shromažďovacího, tj. například účast na poli�ckém shromáždění, demonstraci apod.`,c:`zprostředkovatelská činnost.`,correct:"a"},
{id:329,cat:`Zákon o zbraních`,q:`Nenabitou zbraň je osoba, která se účastní akce nebo provádí činnost, v rámci které zákon o zbraních a střelivu připouští viditelné nošení zbraně, oprávněna přepravovat na místo a z místa konání příslušné akce nebo provádění činnosti:`,a:`viditelně, a to za podmínky, že to připouští zvolený způsob přepravy, a pokud je to s ohledem na místní podmínky obvyklé anebo lze-li takovou přepravu považovat za přiměřenou povaze této akce nebo činnosti.`,b:`uloženou v neprůhledném obalu nebo schráně, střelivo musí být přepravováno odděleně od zbraně v samostatném obalu nebo schráně.`,c:`viditelně, je-li osoba, která zbraň přepravuje, držitelem rozšířeného zbrojního oprávnění nebo zbrojní licence skupiny ZL2 nebo ZL3; přitom nesmí využívat prostředky hromadné přepravy osob.`,correct:"a"},
{id:330,cat:`Zákon o zbraních`,q:`Veřejně vystavovat zbraň nebo střelivo lze:`,a:`na základě povolení veřejného vystavování zbraní nebo střeliva, které je příslušné vydat Policejní prezidium České republiky.`,b:`je-li osoba, která zbraně nebo střelivo vystavuje, držitelem zbrojní licence a předloží-li krajskému ředitelství policie dokumentaci výstavních prostor ve lhůtě nejméně 5 pracovních dnů přede dnem zahájení veřejného vystavování zbraní nebo střeliva.`,c:`za obdobných podmínek jako viditelně nosit zbraň; účelem veřejného vystavování zbraní nebo střeliva může být také účast na specializovaných veletrzích, výstavách a předváděcích akcích za účelem uvádění zbraní nebo střeliva na trh.`,correct:"c"},
{id:331,cat:`Zákon o zbraních`,q:`Pro veřejné vystavování zbraní a střeliva neplatí, že:`,a:`je možné jej realizovat za obdobných podmínek jako viditelné nošení zbraně.`,b:`jeho účelem může být účast na specializovaných veletrzích, výstavách a předváděcích akcích za účelem uvádění zbraní nebo střeliva na trh.`,c:`není povinností osoby, která zbraně nebo střelivo veřejně vystavuje, zajistit zabezpečení vystavovaných zbraní nebo střeliva proti zneužití, ztrátě nebo odcizení.`,correct:"c"},
{id:332,cat:`Zákon o zbraních`,q:`Osoba, která zbraně nebo střelivo veřejně vystavuje, je povinna:`,a:`mimo jiné zajis�t, aby vystavované zbraně nebyly umístěny tak, aby byly viditelné z míst mimo prostory určené pro veřejnost pořadatelem výstavy nebo veletrhu.`,b:`zajistit zabezpečení vystavovaných zbraní nebo střeliva proti zneužití, ztrátě nebo odcizení a zajistit, aby při veřejném vystavování zbraní nebo střeliva nebyl ohrožen život, zdraví, majetek nebo veřejný pořádek.`,c:`zajis�t, aby každá vystavená zbraň byla návštěvníky výstavy individuálně iden�fikovatelná, a to například uvedením kompletních iden�fikačních údajů včetně výrobního čísla zbraně na snadno přístupném a viditelném popisku vystavené zbraně; vystavené střelivo postačuje iden�fikovat pouze ráží a počtem vystavených kusů.`,correct:"b"},
{id:333,cat:`Zákon o zbraních`,q:`Osoba, která nakládá se zbraní nebo střelivem, je povinna zbraně a střelivo, které ukládá mimo svou bezprostřední kontrolu:`,a:`uložit u držitele zbrojní licence skupiny ZL1 nebo předat krajskému ředitelství policie do úschovy.`,b:`zabezpečit ve spolupráci s policií tak, aby bylo vyloučeno, že ke zbrani získá přístup kdokoli jiný než její hlavní držitel.`,c:`zabezpečit s ohledem na jejich povahu a místní podmínky tak, aby bylo zabráněno jejich zneužití, ztrátě, odcizení nebo zašantročení.`,correct:"c"},
{id:334,cat:`Zákon o zbraních`,q:`Podle zákona o zbraních a střelivu platí obecně pro zabezpečení zbraní a střeliva, že:`,a:`povinnost zabezpečit zbraně nebo střelivo má osoba, která s nimi nakládá.`,b:`zbraně nebo střelivo musí být uloženy pod bezprostřední kontrolou osoby, která s nimi nakládá.`,c:`se týká pouze zbraní podléhajících registraci.`,correct:"a"},
{id:335,cat:`Zákon o zbraních`,q:`Pro zabezpečení uložených zbraní nebo střeliva obecně platí, že je třeba je zabezpečit:`,a:`tak, aby nebylo možné zjis�t místo jejich uložení.`,b:`s ohledem na jejich povahu a místní podmínky tak, aby bylo zabráněno jejich zneužití, ztrátě, odcizení nebo zašantročení.`,c:`v souladu s pokyny stanovenými pro zabezpečení výrobcem zbraně nebo střeliva.`,correct:"b"},
{id:336,cat:`Zákon o zbraních`,q:`Pro zabezpečení zbraní podléhajících registraci platí, že:`,a:`se zabezpečují s ohledem na počet současně ukládaných zbraní, přičemž současně ukládanými zbraněmi se rozumí například zbraně ukládané současně v jedné ocelové schránce, uzamčené ocelové skříni nebo trezor, jejichž technické parametry stanovuje vláda nařízením, ale nikoli celkový počet zbraní, se kterými daná osoba celkově nakládá.`,b:`více než 10 kusů zbraní se zabezpečuje uložením do uzamčené ocelové schránky nebo skříně.`,c:`osoba, která s nimi nakládá, může současně uložit nejvýše 20 kusů zbraní.`,correct:"a"},
{id:337,cat:`Zákon o zbraních`,q:`Držitel zbrojního oprávnění ukládá celkem 14 kusů zbraní podléhajících registraci, z toho 8 kusů krátkých samonabíjecích palných zbraní a 6 kusů dlouhých opakovacích palných zbraní. Vyberte, který způsob zabezpečení uložených zbraní splňuje požadavky stanovené zákonem o zbraních.`,a:`společné uložení všech 14 kusů zbraní do uzamčené ocelové skříně, která splňuje technické požadavky stanovené nařízením vlády.`,b:`vhodný způsob zabezpečení všech 14 kusů zbraní s ohledem na dostupné možnos� zabezpečení v místě uložení zbraní, tedy například uzamčení v dostatečně robustní šatní skříni z masivního dřeva.`,c:`rozdělení zbraní v počtu 8 a 6 kusů a jejich uložení ve 2 uzamčených ocelových schránkách, které splňují technické požadavky stanovené nařízením vlády.`,correct:"c"},
{id:338,cat:`Zákon o zbraních`,q:`Uložené zbraně podléhající registraci a střelivo kategorie S1, S2 nebo S3 se zabezpečují:`,a:`v trezorech a sejfech schválených policií k zabezpečování zbraní, střeliva nebo munice podle Českých technických norem (ČSN).`,b:`s ohledem na počet současně ukládaných zbraní nebo současně ukládaných nábojů, a to uložením ve zákonem stanovených ocelových schránkách, uzamčených ocelových skříních, trezorech, uzamčených místnostech a jiných objektech nebo zařízeních, jejichž technické parametry stanovuje vláda nařízením.`,c:`s ohledem na kategorii zbraní podléhajících registraci a jejich funkci, a to tak, že samočinné zbraně kategorie R1 není dovoleno ukládat společně se zbraněmi ostatních kategorií, a zbraně podléhající registraci není dovoleno ukládat společně se zbraněmi kategorie PO nebo NO; obdobný princip se uplatní rovněž pro ukládání střeliva jednotlivých kategorií.`,correct:"b"},
{id:339,cat:`Zákon o zbraních`,q:`Více než 20 kusů současně ukládaných zbraní podléhajících registraci:`,a:`není podle zákona o zbraních a střelivu možné.`,b:`se zabezpečí uložením v uzamčeném skříňovém trezoru, který splňuje technické požadavky stanovené nařízením vlády.`,c:`se zabezpečí uložením v uzamčeném komorovém trezoru, který je chráněn elektronickým zabezpečovacím zařízením.`,correct:"c"},
{id:340,cat:`Zákon o zbraních`,q:`Zbraně kategorie R2, R3 nebo R4 v počtu nejvýše 2 kusů a střelivo kategorie S2 nebo S3 v počtu nejvýše 1 000 nábojů:`,a:`nemusí být zabezpečeny jinak standardním fyzickým zabezpečením s technickými parametry stanovenými zákonem o zbraních a střelivu a nařízením vlády a lze je zabezpečit pouze vhodným způsobem, pokud jde například o jejich dočasné uložení v obydlí nebo jiném obdobném prostoru, nebo jejich krátkodobé uložení ve vozidle.`,b:`musí být zabezpečeny standardním způsobem, a to uložením ve schváleném skříňovém trezoru, který musí být vybaven mechanickým nebo elektronickým číslicovým zámkem, mít minimální tloušťku stěny 25 mm a být současně ukotven do zdi, podlahy a stropu, nebo do podlahy nebo stropu a současně alespoň ke dvěma stěnám.`,c:`nemusí být zabezpečeny jinak standardním fyzickým zabezpečením s technickými parametry stanovenými zákonem o zbraních a střelivu a nařízením vlády a lze je zabezpečit libovolným způsobem, pokud jde například o jejich dočasné uložení v místě použi�, jako například na střelnici, v zaměstnání nebo na loveckém stanoviš�.`,correct:"a"},
{id:341,cat:`Zákon o zbraních`,q:`Osoba, která současně nenakládá s více než celkem 2 zbraněmi kategorie R2, R3 nebo R4 nebo více než celkem 1000 náboji kategorie S2 nebo S3:`,a:`je oprávněna takové zbraně nebo střelivo zabezpečovat stejným technickým způsobem, jaký zákon o zbraních a střelivu a nařízení vlády stanovuje pro zbraně kategorie PO a NO, tedy například uložením v uzamčené celoocelové schráně se stěnou o tloušťce minimálně 1,5 mm a vybavené zámkem s vysokou bezpečnos� zařazeným do třídy A nebo vyšší třídy podle technické normy ČSN EN 1300.`,b:`je může zabezpečovat také uložením ve vozidle, přičemž ale souvislá doba uložení nesmí přesáhnout 2 týdny.`,c:`je může zabezpečovat při jejich uložení jiným vhodným způsobem mimo zákonem o zbraních a střelivu a nařízením vlády definovaný režim technického zabezpečení.`,correct:"c"},
{id:342,cat:`Zákon o zbraních`,q:`Pokud se zbraní nakládá nezletilá osoba, platí, že:`,a:`její zákonný zástupce, opatrovník nebo poručník je povinen sám zajis�t zabezpečení zbraně.`,b:`její zákonný zástupce, opatrovník nebo poručník je povinen zajistit dodržování pravidel zabezpečení zbraně.`,c:`musí být vždy uložena u jiné osoby oprávněné s ní nakládat.`,correct:"b"},
{id:343,cat:`Zákon o zbraních`,q:`Jiný způsob zabezpečení, než který zákon a nařízení vlády stanovují, může na žádost povolit krajské ředitelství policie, pokud je zaručena jejich ochrana proti zneužití, ztrátě nebo odcizení, a to v případě:`,a:`že osobě, která se zbraněmi nebo střelivem nakládá, zákonem o zbraních a střelivu a nařízením vlády stanovené technické požadavky na zabezpečení zbraní nebo střeliva nevyhovují vzhledem k jejich bytové situaci nebo rodinným podmínkám.`,b:`nelze-li s ohledem na rozměry daných zbraní nebo střeliva, jejich množství nebo účel zajistit zabezpečení standardním způsobem anebo odpovídá-li to zvláštním místním podmínkám.`,c:`pouze jedná-li se toliko o zbraně kategorie R3, R4 nebo PO a střelivo kategorie S3 nebo S4.`,correct:"b"},
{id:344,cat:`Zákon o zbraních`,q:`K žádosti o povolení jiného způsobu zabezpečení zbraní nebo střeliva žadatel přiloží:`,a:`projekt jiného způsobu zabezpečení, o jehož povolení žádá.`,b:`znalecký posudek z oboru ochrana, obrana a bezpečnost, kterým se prokazuje existence potřeby jiného způsobu zabezpečení; není-li prokázán opak, je krajské ředitelství policie závěrem takového znaleckého posudku v rozhodnu� o povolení jiného způsobu zabezpečení vázáno.`,c:`územně plánovací dokumentaci prokazující, že v místě, pro které je o povolení jiného způsobu zabezpečení žádáno, je nakládání se zbraněmi a střelivem možné.`,correct:"a"},
{id:345,cat:`Zákon o zbraních`,q:`Pokud orgán veřejné moci vynucuje zákaz vstupu se zbraní do svých úředních nebo chráněných prostor:`,a:`je dle zákona o zbraních a střelivu zakázáno vstupovat do takových prostor, do perimetru 150 m kolem objektů, v nichž se takové prostory nacházejí, a na přístupové cesty k nim; porušení tohoto zákazu má za následek ztrátu spolehlivos� podle zákona o zbraních a střelivu.`,b:`je držitel zbrojního oprávnění oprávněn předat zbraň podléhající registraci a střelivo kategorie S2 nebo S3 zaměstnanci zajišťujícímu pro takový orgán veřejné moci provoz recepce nebo ostrahy; zaměstnanec zajišťující provoz recepce nebo ostrahy zbraň a střelivo po převze� zkontroluje a vydá držiteli zbrojního oprávnění potvrzení, ve kterém musí být mimo jiné uveden též zaměstnavatel takového zaměstnance, pokud jím je soukromá bezpečnostní služba.`,c:`umožní jejímu držiteli při vstupu do takových prostor bezpečné uložení krátké zbraně.`,correct:"c"},
{id:346,cat:`Zákon o zbraních`,q:`Jedinečnými údaji umožňujícími individuální identifikaci palné nebo plynové zbraně jsou vždy alespoň:`,a:`jméno a příjmení výrobce nebo dovozce, ověřovací značka prokazující splnění podmínek podle Úmluvy o vzájemném uznávání zkušebních značek ručních palných braní (C.I.P), ráže, číslo série a označení typu zbraně.`,b:`jméno výrobce nebo jeho obchodní značka, země nebo místo výroby, výrobní číslo, rok výroby, pokud není součástí výrobního čísla, ráže a označení modelu, pokud výrobce nebo dovozce takové označení užívá.`,c:`název výrobce, ověřovací značka prokazující splnění podmínek podle Úmluvy o vzájemném uznávání zkušebních značek ručních palných braní (C.I.P), ráže, výrobní číslo a název modelu, který musí být uveden ve formátu „vz.“ (vzor) nebo „Mod.“ anebo „M“ (model) a číselné označení konkrétního modelu.`,correct:"b"},
{id:347,cat:`Zákon o zbraních`,q:`Pro označení zbraně identifikačními údaji neplatí, že:`,a:`jimi musí být označeny palné a plynové zbraně.`,b:`je-li při úpravě nebo opravě zbraně poškozeno nebo zničeno, nemusí již být obnoveno.`,c:`musí být trvalé.`,correct:"b"},
{id:348,cat:`Zákon o zbraních`,q:`Mezi jedinečné údaje umožňující individuální identifikaci zbraně nepatří:`,a:`jméno výrobce nebo jeho obchodní značka.`,b:`výrobní číslo.`,c:`rok uvedení na trh.`,correct:"c"},
{id:349,cat:`Zákon o zbraních`,q:`Označení zbraně identifikačními údaji musí být:`,a:`trvalé, je zakázáno existující označení zbraně identifikačními údaji odstraňovat.`,b:`trvalé, pokud je takové označení uvedeno v centrálním registru zbraní; změnu označení smí její hlavní držitel provádět nejvíce jednou ročně a je povinen takovou změnu ohlásit ve lhůtě 10 pracovních dnů krajskému ředitelství policie.`,c:`trvalé, pokud to umožňuje materiál, ze kterého jsou hlavní čás� zbraně vyrobeny; odstraňovat existující označení zbraně iden�fikačními údaji je dovoleno, pouze pokud se �m neznemožní nebo významně nez�ží možnost individuální iden�fikace zbraně.`,correct:"a"},
{id:350,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie může držiteli zbraně rozhodnutím uložit:`,a:`zajis�t odstranění označení zbraně, pokud jsou iden�fikační údaje, jimiž je zbraň označena, důvodně považovány za nejednoznačné, nesrozumitelné nebo urážlivé.`,b:`předložit zbraň krajskému ředitelství policie k provedení dodatečného označení zbraně rozlišujícími údaji nebo diferenciačními znaky, které provádí technický pracovník policie; rozlišující údaje nebo diferenciační znaky se na zbraň vyznačí, je-li dáno podezření, že stávající označení zbraně iden�fikačními údaji je, nebo by se v budoucnu mohlo stát zmatečným nebo matoucím.`,c:`aby zajistil dodatečné provedení označení zbraně identifikačními údaji v souladu se zákonem o zbraních a střelivu, je-li to nezbytné pro umožnění její individuální identifikace.`,correct:"c"},
{id:351,cat:`Zákon o zbraních`,q:`Pro dodatečné označení zbraně identifikačními údaji neplatí, že:`,a:`držitel zbraně je povinen předat zbraň pro účely jeho provedení držiteli zbrojní licence skupiny ZL1.`,b:`krajské ředitelství policie může chybějící identifikační údaje nahradit vlastním označením.`,c:`držitel zbrojní licence skupiny ZL1 zapíše údaj o provedení nařízeného dodatečného označení zbraně iden�fikačními údaji do centrálního registru zbraní.`,correct:"b"},
{id:352,cat:`Zákon o zbraních`,q:`Údaje o ověření a kontrole identifikačních údajů zbraně podléhající registraci nebo zbraně kategorie PO vyznačí v centrálním registru zbraní:`,a:`Český úřad pro zkoušení zbraní a střeliva, pokud jde o zbraň, kterou ověřil nebo u které provedl kontrolu identifikačních údajů.`,b:`držitel zbrojní licence skupiny ZL2, který zbraň do České republiky dovezl.`,c:`Policejní prezidium v případech, kdy tyto údaje nevyznačí Český úřad pro zkoušení zbraní a střeliva nebo držitel zbrojní licence skupiny ZL2.`,correct:"a"},
{id:353,cat:`Zákon o zbraních`,q:`Každé jednotlivé základní balení kompletního střeliva musí být označeno:`,a:`ráží, jménem výrobce, výrobním číslem, modelem, pokud takové označení výrobce střeliva používá, a kategorií střeliva.`,b:`jménem výrobce, identifikačním číslem série nebo šarže, ráží a druhem střeliva.`,c:`ráží střeliva, počtem kusů nábojů v základním balení a seznamem typů zbraní, pro které je dané střelivo určeno.`,correct:"b"},
{id:354,cat:`Zákon o zbraních`,q:`Osoba, která se v rámci činnosti držitele zbrojní licence podílí na nakládání se zbraněmi podléhajícími registraci, zbraněmi kategorie PO nebo střelivem kategorie S1, S2 nebo S3, musí být:`,a:`držitelem zbrojního oprávnění; to v určitých případech stanovených zákonem neplatí, například pokud jde o osobu, která zbraně nebo střelivo nesvěřuje, nepřenechává, nepřevádí, nenosí nebo nepoužívá ke střelbě a která je držitelem zapsané autorizace.`,b:`zásadně držitelem rozšířeného zbrojního oprávnění.`,c:`držitelem zapsané autorizace, a to i tehdy, jde-li o držitele zbrojního oprávnění.`,correct:"a"},
{id:355,cat:`Zákon o zbraních`,q:`Pravidelné školení osoby, která se v rámci činnosti držitele zbrojní licence podílí na nakládání se zbraněmi podléhajícími registraci, zbraněmi kategorie PO nebo střelivem kategorie S1, S2 nebo S3, musí být zajištěno:`,a:`alespoň jednou za 3 roky.`,b:`do 10 pracovních dnů od konce každého kalendářního čtvrtle�; v případě osob, které mají alespoň úplné střední vzdělání s maturitou, postačuje pravidelné školení zajis�t do 10 pracovních dnů od konce každého kalendářního polole�.`,c:`alespoň jednou ročně.`,correct:"c"},
{id:356,cat:`Zákon o zbraních`,q:`Pravidelné školení osoby, která se v rámci činnosti držitele zbrojní licence podílí na nakládání se zbraněmi nebo střelivem:`,a:`se týká pouze osoby, která nakládá se zbraněmi podléhajícími registraci a střelivem kategorie S1.`,b:`musí obsahovat právní úpravu nakládání se zbraněmi a střelivem a zásady bezpečného nakládání se zbraněmi a střelivem s přihlédnutím k povaze úkolů plněných při činnosti držitele zbrojní licence a vnitřní předpis držitele zbrojní licence.`,c:`musí být zajištěno alespoň dvakrát ročně.`,correct:"b"},
{id:357,cat:`Zákon o zbraních`,q:`Pokud osoba, která se v rámci činnosti držitele zbrojní licence podílí na nakládání se zbraněmi podléhajícími registraci, zbraněmi kategorie PO nebo střelivem kategorie S1, S2 nebo S3, zajišťuje ochranu života, zdraví nebo majetku anebo obdobnou činnost nebo pokud při takové činnosti nosí zbraň:`,a:`zvyšuje se časová dotace školení zaměřeného na právní úpravu nakládání se zbraněmi a střelivem a na vnitřní předpis držitele zbrojní licence na dvojnásobek.`,b:`musí být součástí jejího pravidelného školení rovněž praktické ověření střeleckých dovedností a bezpečné manipulace se zbraní a střelivem.`,c:`musí být o konání pravidelného školení, jehož se taková osoba účastní, ve lhůtě 10 pracovních dnů přede dnem jeho konání vyrozuměno krajské ředitelství policie.`,correct:"b"},
{id:358,cat:`Zákon o zbraních`,q:`Pravidelné školení osoby, která se podílí na nakládání se zbraněmi podléhajícími registraci, zbraněmi kategorie PO nebo střelivem kategorie S1, S2 nebo S3 v rámci činnosti držitele zbrojní licence spočívající v ochraně života, zdraví nebo majetku anebo obdobné činnosti nebo pokud při takové činnosti nosí zbraň:`,a:`musí zahrnovat rovněž praktické ověření střeleckých dovedností a bezpečné manipulace se zbraní a střelivem.`,b:`musí být zajištěno alespoň čtyřikrát ročně.`,c:`se musí konat na zapsané zkouškové střelnici.`,correct:"a"},
{id:359,cat:`Zákon o zbraních`,q:`Nevratnou úpravou zbraně podle zákona o zbraních a střelivu je:`,a:`úprava zbraně, kterou dochází ke změně kategorie zbraně, ke změně druhu nebo funkce zbraně anebo ke znemožnění anebo ztížení budoucí balistické identifikace zbraně.`,b:`poškození nebo degradace zbraně takového rozsahu, že její uschopnění ke střelbě je vyloučeno.`,c:`každá úprava zbraně provedená průmyslovým nebo řemeslným způsobem, při které dochází k nerozbornému spojení komponentů zbraně, například svarem nebo nýtováním, nebo k rozdělení anebo redukci původně celistvých součás� zbraně, například obráběním nebo broušením.`,correct:"a"},
{id:360,cat:`Zákon o zbraních`,q:`Nevratnou úpravou zbraně podle zákona o zbraních a střelivu je mimo jiné taková úprava zbraně:`,a:`kterou dochází ke změně kategorie zbraně.`,b:`kterou se komplexně obnovuje povrchová úprava zbraně, a to včetně obnovení označení zbraně iden�fikačními údaji.`,c:`kterou dochází k usnadnění budoucího balis�ckého zkoumání.`,correct:"a"},
{id:361,cat:`Zákon o zbraních`,q:`Považují se úprava na zbraň jiné kategorie, úprava zbraně určené pro ostrou střelbu na akustickou a salutní zbraň, zkrácení hlavně, změna ráže zbraně, znehodnocení zbraně a zhotovení řezu zbraně vždy za nevratnou úpravu zbraně?`,a:`Ano.`,b:`Ano, pokud krajské ředitelství policie při kontrole zbraně rozhodne, že úprava zbraně je nevratná.`,c:`Ne.`,correct:"a"},
{id:362,cat:`Zákon o zbraních`,q:`Úprava na zbraň jiné kategorie, úprava zbraně určené pro ostrou střelbu na akustickou a salutní zbraň, zkrácení hlavně, změna ráže zbraně, znehodnocení zbraně a zhotovení řezu zbraně se vždy považují za:`,a:`deak�vaci nebo demilitarizaci zbraně.`,b:`neoprávněnou úpravu zbraně, pokud ji neprovádí držitel zbrojního oprávnění nebo zbrojní licence skupiny ZL2.`,c:`nevratnou úpravu zbraně.`,correct:"c"},
{id:363,cat:`Zákon o zbraních`,q:`Nevratnou úpravu zbraně podléhající registraci nebo zbraně kategorie PO je oprávněn provést:`,a:`držitel zbrojního oprávnění, který je hlavním držitelem zbraně, nebo držitel zbrojní licence.`,b:`držitel zbrojní licence skupiny ZL1, a to na základě povolení nevratné úpravy zbraně.`,c:`držitel zbrojní licence skupiny ZL2, a to na základě povolení nevratné úpravy zbraně.`,correct:"b"},
{id:364,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie může před vydáním povolení nevratné úpravy zbraně:`,a:`zbraň, u které má být provedena nevratná úprava, od žadatele o povolení nevratné úpravy zbraně převzít a uložit provedení jejího kriminalistického zkoumání.`,b:`nařídit odstranění označení iden�fikačních údajů zbraně.`,c:`prověřit, není-li taková zbraň potřebná pro doplnění balis�cko-forenzních sbírek policie, a případně z moci úřední zahájit řízení o vyvlastnění takové zbraně; žádost o povolení nevratné úpravy zbraně se v takovém případě zamítá.`,correct:"a"},
{id:365,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie může v povolení nevratné úpravy zbraně stanovit:`,a:`povinnost předložit po provedení nevratné úpravy zbraně tuto zbraň Ministerstvu vnitra k rozhodnu� o její nové kategorii.`,b:`že nevratnou úpravu zbraně provede konkrétní držitel zbrojní licence skupiny ZL2 odlišný od žadatele o vydání povolení nevratné úpravy zbraně, pokud je to nezbytné z důvodu zajišťování vnitřního pořádku nebo bezpečnos�.`,c:`technické podmínky provedení nevratné úpravy, povinnost doložení příslušné technické dokumentace nebo povinnost předložit zbraň po provedení nevratné úpravy krajskému ředitelství policie, a to za účelem zajištění souladu nevratné úpravy s navrhovanou změnou kategorie zbraně nebo za účelem vykonání dozoru nad technickou úrovní nevratné úpravy zbraně nebo nad jejím prováděním.`,correct:"c"},
{id:366,cat:`Zákon o zbraních`,q:`V povolení nevratné úpravy zbraně může krajské ředitelství policie mimo jiné stanovit:`,a:`povinnost předložit zbraň po provedení nevratné úpravy Českému úřadu pro zkoušení zbraní a střeliva.`,b:`povinnost předložit zbraň po provedení nevratné úpravy krajskému ředitelství policie.`,c:`povinnost předložit zbraň po provedení nevratné úpravy Kriminalis�ckému ústavu.`,correct:"b"},
{id:367,cat:`Zákon o zbraních`,q:`Znehodnotit palnou zbraň nebo zhotovit její řez je oprávněn:`,a:`držitel zbrojního oprávnění, který je hlavním držitelem zbraně, nebo držitel zbrojní licence.`,b:`držitel zbrojní licence skupiny ZL1.`,c:`držitel zapsané autorizace, jde-li o znehodnocení nebo zhotovení řezu zbraně kategorie PO.`,correct:"b"},
{id:368,cat:`Zákon o zbraních`,q:`Technické požadavky na nevratnou úpravu zbraně v případě znehodnocování palných zbraní stanoví:`,a:`u většiny ručních palných zbraní prováděcí nařízení Evropské komise a v případě ostatních zbraní (např. děla, odpalovací zařízení) pak nařízení vlády vydané na základě zákona o zbraních a střelivu.`,b:`prováděcí vyhláška Ministerstva průmyslu a obchodu.`,c:`u ručních palných zbraní harmonizované technické normy (ČSN EN) a v případě s ráží 20 mm nebo větší pak Český obranný standard (ČOS).`,correct:"a"},
{id:369,cat:`Zákon o zbraních`,q:`Po znehodnocení zbraně držitel zbrojní licence skupiny ZL1:`,a:`opatří největší hlavní část zbraně verifikační znehodnocovací značkou.`,b:`předloží zbraň ke kontrole Českému úřadu pro zkoušení zbraní a střeliva, nebo Ministerstvu obrany, jde-li o znehodnocení zvláště účinné zbraně, která podléhá mezinárodnímu kontrolnímu režimu.`,c:`vydá cer�fikát znehodnocené zbraně.`,correct:"b"},
{id:370,cat:`Zákon o zbraních`,q:`Pokud byla zbraň znehodnocena v souladu se stanovenými technickými požadavky, Český úřad pro zkoušení zbraní a střeliva nebo Ministerstvo obrany po provedené kontrole:`,a:`označí zbraň kontrolní znehodnocovací značkou a údaj o zbrani vymaže z centrálního registru zbraní.`,b:`vydá verifikační rozhodnu�, které se doručí vlastníku zbraně a Ministerstvu vnitra; verifikační rozhodnu� se uveřejní na internetových stránkách Českého úřadu pro zkoušení zbraní a střeliva nebo Ministerstva obrany.`,c:`vydá certifikát znehodnocené zbraně a označí znehodnocenou zbraň svou verifikační znehodnocovací značkou; číslo certifikátu znehodnocené zbraně zapíše Český úřad pro zkoušení zbraní a střeliva nebo Ministerstvo obrany do centrálního registru zbraní.`,correct:"c"},
{id:371,cat:`Zákon o zbraních`,q:`Osoba, která není držitelem zbrojní licence skupiny ZL1, je oprávněna vyrábět, přebíjet, delaborovat, znehodnocovat nebo ničit střelivo, se kterým je oprávněna nakládat, nebo zhotovovat jeho řezy:`,a:`v množství, které nepřesáhne 10 000 nábojů v průběhu 12 měsíců po sobě jdoucích; nezpracované výbušné látky a zápalky, jakož i výbušné látky a zápalky získané delaborací musí být odevzdány krajskému ředitelství policie k likvidaci, a to nejpozději ke dni uplynu� expirace stanovené výrobcem těchto výbušných látek a zápalek.`,b:`pouze pro vlastní potřebu a při tom postupuje tak, aby nebyl ohrožen život, zdraví nebo majetek.`,c:`pouze v případě nábojů do ráže 9 mm v případě kulového střeliva a do ráže 12 v případě brokového střeliva; vyrábět, přebíjet, delaborovat, znehodnocovat nebo ničit náboje s okrajovým zápalem je oprávněna plně svéprávná zle�lá osoba a náboje se středovým zápalem držitel zbrojního oprávnění nebo zbrojní licence skupiny ZL2 nebo ZL3.`,correct:"b"},
{id:372,cat:`Zákon o zbraních`,q:`Přebíjené střelivo zhotovené osobou, která není držitelem zbrojní licence skupiny ZL1:`,a:`nepodléhá povinnosti označení a ověření.`,b:`musí být v přiměřené době po svém přebi� předáno držiteli zbrojní licence skupiny ZL1 k označení a ověření.`,c:`se považuje za označené a ověřené v souladu se zákonem o zbraních a střelivu, není-li prokázán opak.`,correct:"a"},
{id:373,cat:`Zákon o zbraních`,q:`Na nakládání s aktivními komponenty střeliva v množství větším, než které stanoví vláda v nařízení vydaném k provedení zákon o zbraních a střelivu:`,a:`se vztahuje režim dohledu, který je osoba, která s takovými ak�vními komponenty střeliva nakládá, zajis�t prostřednictvím akreditovaného držitele obecné muniční licence podle zákona o munici.`,b:`se pohlíží jako na nakládání s pyrotechnickými výrobky podle zákona o pyrotechnických výrobcích a zacházení s nimi a o změně některých zákonů (zákon o pyrotechnice).`,c:`se použijí obdobně právní předpisy upravující nakládání s výbušninami.`,correct:"c"},
{id:374,cat:`Zákon o zbraních`,q:`Platí, že s aktivními komponenty střeliva:`,a:`kterými jsou střely a nábojnice, lze nakládat pouze v souladu s technickými požadavky a v množství, které stanoví vláda nařízením.`,b:`kterými jsou zápalky, střeliviny a střely obsahující aktivní náplň, lze nakládat pouze v souladu s technickými požadavky a v množství, které stanoví vláda nařízením.`,c:`kterými jsou zápalky, střeliviny a střely obsahující ak�vní náplň, lze nakládat pouze v rozsahu stanoveném rozhodnu�m krajského ředitelství policie.`,correct:"b"},
{id:375,cat:`Zákon o zbraních`,q:`Podmínky pro přeshraniční přemístění zbraně podle § 97 a násl. zákona o zbraních a střelivu se týkají zbraní:`,a:`podléhajících registraci, zbraní kategorie PO nebo palných zbraní kategorie NO.`,b:`kategorie PO a NO, se kterými jejich držitel nakládá při výkonu podnikatelské činnos� v oboru zbraní a střeliva.`,c:`které jsou vojenským materiálem podle zákona o zahraničním obchodu s vojenským materiálem.`,correct:"a"},
{id:376,cat:`Zákon o zbraních`,q:`Zbraň podléhající registraci, zbraň kategorie PO nebo palnou zbraň kategorie NO, nejde-li o vojenský materiál podle zákona o zahraničním obchodu s vojenským materiálem, lze za jiným účelem, než je podnikání v oboru zbraní a střeliva, dočasně na území České republiky přemístit a za stanoveným účelem používat pouze na základě:`,a:`zbrojního oprávnění nebo zbrojní licence skupiny ZL2 nebo ZL3 a v případě zbraní kategorie R1 nebo R2 a střeliva kategorie S1 nebo S2 též na základě odpovídající výjimky a v případě zbraní kategorie R3 též na základě povolení.`,b:`zbrojního průvodního listu nebo evropského zbrojního pasu vydávaného jiným členským státem.`,c:`zapsané autorizace nebo povolení nevratné úpravy zbraně.`,correct:"b"},
{id:377,cat:`Zákon o zbraních`,q:`Pro vydání evropského zbrojního pasu vydávaného Českou republikou platí, že:`,a:`jej vydá krajské ředitelství policie na žádost fyzické osobě, která žádá o zápis zbraně do evropského zbrojního pasu.`,b:`žadatel je povinen doložit, že je občanem České republiky a je vlastníkem zbraně.`,c:`jej lze vydat „blanketně“, tj. bez současného zápisu konkrétní zbraně.`,correct:"a"},
{id:378,cat:`Zákon o zbraních`,q:`Evropský zbrojní pas vydávaný Českou republikou se vydává:`,a:`na 10 let a nelze jej prodloužit.`,b:`na 5 let a lze jej prodloužit o dalších 5 let.`,c:`bez omezení doby platnos�.`,correct:"b"},
{id:379,cat:`Zákon o zbraních`,q:`Držitel evropského zbrojního pasu vydávaného Českou republikou je oprávněn zbraň zapsanou v evropském zbrojním pasu:`,a:`dočasně přeshraničně přemístit a používat na území jiného členského státu Evropské unie, pokud je účelem cesty lov nebo rekonstrukce historické bitvy nebo obdobné události anebo sportovně-střelecká akce, přičemž musí být kdykoli během takové cesty schopen doložit účel své cesty, zejména předložením pozvání nebo jiného důkazu; držitel evropského zbrojního pasu je povinen dodržovat podmínky nakládání se zbraní stanovené jiným členským státem.`,b:`trvale převést na osobu s místem pobytu v jiném členském státu Evropské unie nebo zbraň od takové osoby nabýt do vlastnictví, pokud se tak děje v rámci přeshraničního přemístění zajišťovaného na území jiného členského státu samotným držitelem evropského zbrojního pasu.`,c:`cestovat s ní v rámci Evropské unie a nakládat s ní obdobně, jako s ní nakládá na území České republiky; osoba oprávněná na území České republiky nosit zbraň za účelem ochrany života, zdraví nebo majetku skrytě, je oprávněn zbraň nosit obdobně i na území jiných členských států Evropské unie.`,correct:"a"},
{id:380,cat:`Zákon o zbraních`,q:`Kdo na území České republiky dočasně používá zbraň, která sem byla dočasně přeshraničně přemístěna v souladu s § 97 a násl. zákona o zbraních a střelivu:`,a:`není oprávněn současně přepravit střelivo pro takovou zbraň v množství odpovídajícím účelu dočasného použi�.`,b:`je oprávněn současně přepravit střelivo pro takovou zbraň v množství odpovídajícím účelu dočasného použi�, pokud s �m Policejní prezidium vyslovilo předem souhlas.`,c:`je oprávněn současně přepravit střelivo pro takovou zbraň v množství odpovídajícím účelu dočasného použití.`,correct:"c"},
{id:381,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení:`,a:`Držitel evropského zbrojního pasu vydávaného jiným členským státem je oprávněn bez jiného předchozího povolení dočasně na území České republiky přemís�t a používat zbraň kategorie R1, R2, R3 nebo R4 v něm zapsanou; chce-li za �mto účelem přes území České republiky cestovat do jiného státu, potřebuje další povolení.`,b:`Držitel evropského zbrojního pasu vydávaného jiným členským státem je za účelem uvedeným v § 81 odst. 1 zákona o zbraních a střelivu oprávněn bez jiného předchozího povolení dočasně na území České republiky přemístit a používat zbraň kategorie R2, R3, R4 nebo PO nebo palnou zbraň kategorie NO v něm zapsanou nebo za tímto účelem přes území České republiky cestovat do jiného státu.`,c:`Držitel evropského zbrojního pasu vydávaného jiným členským státem je oprávněn dočasně přemís�t a používat zbraň kategorie R1, R2, R3 nebo R4 v něm zapsanou na území České republiky; tuto zbraň je bez dalšího také oprávněn nosit skrytě za účelem ochrany, života nebo majetku.`,correct:"b"},
{id:382,cat:`Zákon o zbraních`,q:`Pozastavit platnost zbrojního průvodního listu nebo evropského zbrojního pasu vydávaného Českou republikou:`,a:`není možné.`,b:`je možné rozhodnutím krajského ředitelství policie z důvodu ochrany vnitřního pořádku nebo bezpečnosti na dobu, po kterou je dán důvod pro zajištění zbraně, střeliva nebo souvisejícího dokladu nebo listiny.`,c:`je možné rozhodnu�m zastupitelského úřadu České republiky nejdéle na dobu 30 dní.`,correct:"b"},
{id:383,cat:`Zákon o zbraních`,q:`Mezi důvody zániku platnosti zbrojního průvodního listu nebo evropského zbrojního pasu vydávaného Českou republikou nepatří:`,a:`uplynutí doby 30 dnů od jejich vydání nebo od vydání rozhodnutí o pozastavení jejich platnosti.`,b:`naby� právní moci rozhodnu� o jejich odně�, ohlášení jejich ztráty nebo odcizení nebo smrt jejich držitele.`,c:`uskutečnění dočasného přeshraničního přemístění nebo použi�, pro které byl zbrojní průvodní list vydán.`,correct:"a"},
{id:384,cat:`Zákon o zbraních`,q:`Trvale dovézt, trvale vyvézt nebo v rámci Evropské unie trvale přeshraničně přemístit zbraň nebo střelivo je oprávněn:`,a:`držitel zbrojního průvodního listu nebo evropského zbrojního pasu.`,b:`osoba, která je oprávněna nakládat se zbraněmi a střelivem jak ve státě, ze kterého mají být zbraň nebo střelivo vyvezeny nebo přeshraničně přemístěny, tak i ve státě, kam mají být dovezeny nebo přeshraničně přemístěny; jde například o situaci, kdy je fyzická osoba držitelem zbrojního oprávnění v České republice a zbrojného preukazu na Slovensku.`,c:`držitel zbrojní licence za podmínek stanovených jiným právním předpisem, kterým je zejména zákon č. 38/1994 Sb., o zahraničním obchodu s vojenským materiálem, zákon č. 228/2005 Sb, o kontrole obchodu s výrobky, jejichž držení se v České republice omezuje z bezpečnostních důvodů, a příslušný přímo použitelný předpis Evropské unie (nařízení Evropského parlamentu a Rady 2025/41).`,correct:"c"},
{id:385,cat:`Zákon o zbraních`,q:`Hlášení prostřednictvím centrálního registru zbraní podléhá, jde-li o zbraně podléhající registraci, zbraně kategorie PO a palné zbraně kategorie NO nebo střelivo:`,a:`přeprava zbraní a střeliva držitelem zbrojní licence skupiny ZL1.`,b:`každá, tedy i vnitrostátní nebo neobchodní přeprava více než 100 kusů zbraní nebo více než 200000 nábojů nebo nábojek, anebo aktivních komponentů střeliva v množství vyšším, než jaké stanoví vláda nařízením.`,c:`pouze obchodní přeshraniční přeprava zbraní nebo střeliva.`,correct:"b"},
{id:386,cat:`Zákon o zbraních`,q:`Pokud držitel zbrojního oprávnění přepravuje za účelem výkonu sportovně-střelecké činnosti v místě určení 120 kusů zbraní kategorie PO, hlášení přepravy zbraní:`,a:`neprovádí, protože přeprava zbraní této kategorie hlášení nepodléhá.`,b:`neprovádí, protože přepravu zbraní neuskutečňuje jako podnikatel v oboru zbraní a střeliva.`,c:`provádí, protože pro hlášení přepravy je určující počet přepravovaných zbraní, nikoli účel přepravy.`,correct:"c"},
{id:387,cat:`Zákon o zbraních`,q:`Hlášení přepravy zbraní nebo střeliva musí být provedeno:`,a:`písemně zasláním na adresu Policejního prezidia nejméně 5 kalendářních dnů před započe�m přepravy.`,b:`prostřednictvím centrálního registru zbraní nejméně 1 hodinu před započetím přepravy.`,c:`elektronicky vyplněním formuláře na webových stránkách Policie České republiky nejméně 24 hodin před započe�m přepravy.`,correct:"b"},
{id:388,cat:`Zákon o zbraních`,q:`Pro ohlášenou přepravu zbraní nebo střeliva platí, že:`,a:`jakékoli změny v ohlášené přepravě musejí být do 24 hodin ohlášeny krajskému ředitelství policie.`,b:`potvrzení o hlášení stačí mít k dispozici v místě zahájení přepravy, dále doprovázet přepravované zbraně a střelivo už nemusí.`,c:`každý dopravní prostředek určený k ohlášené silniční přepravě zbraní nebo střeliva musí být vybaven zařízením, které umožňuje nepřetržité sledování jeho pohybu a po celou dobu přepravy musí být zařízení do systému sledování pohybu přihlášeno.`,correct:"c"},
{id:389,cat:`Zákon o zbraních`,q:`Osoba, která nalezne zbraň nebo střeliva musí podle zákona o zbraních a střelivu:`,a:`neprodleně oznámit takový nález policii.`,b:`odevzdat nalezenou zbraň nebo střelivo na služebně nejbližšího útvaru policie.`,c:`si smí takovou zbraň nebo střelivo ponechat jako zbraň nebo střelivo vlastní, pokud je oprávněna s takovou zbraní nebo střelivem nakládat a pokud se ve lhůtě 6 měsíců ode dne nálezu nepodaří zjis�t, kdo je vlastníkem takové zbraně nebo střeliva.`,correct:"a"},
{id:390,cat:`Zákon o zbraních`,q:`Ten, kdo nalezne zbraň nebo střelivo ve vojenském objektu:`,a:`je povinen nalezenou zbraň nebo střelivo odevzdat nejbližšímu krajskému vojenskému velitelství.`,b:`je povinen takový nález oznámit, pouze pokud je příslušníkem ozbrojených sil, nebo pokud poskytuje osobní nebo věcnou pomoc ozbrojeným silám podle zákona o zajišťování obrany České republiky.`,c:`oznámí takový nález Vojenské policii.`,correct:"c"},
{id:391,cat:`Zákon o zbraních`,q:`Není-li vlastník nalezené zbraně nebo střeliva krajskému ředitelství policie znám,:`,a:`zbraň nebo střelivo připadají do vlastnictví obce, na jejímž území byly nalezeny.`,b:`krajské ředitelství policie předá zbraň nebo střelivo k dalšímu opatření Českému úřadu pro zkoušení zbraní a střeliva.`,c:`krajské ředitelství policie uveřejní informace o nalezené zbrani nebo střelivu na své úřední desce po dobu 12 měsíců.`,correct:"c"},
{id:392,cat:`Zákon o zbraních`,q:`Opuštěné zbraně nebo střelivo a nalezené zbraně nebo střelivo, u kterých nelze podle předpisů soukromého práva určit osobu, které mají být vráceny:`,a:`připadají do vlastnictví nálezci, pokud je osobou, která je oprávněna s takovými zbraněmi nebo střelivem nakládat.`,b:`připadají do vlastnictví státu.`,c:`se nestávají vlastnictvím žádného veřejnoprávního, ani soukromoprávního subjektu a jsou bez dalšího předávány k úřednímu zničení.`,correct:"b"},
{id:393,cat:`Zákon o zbraních`,q:`Pokud vlastník zbraně nebo střeliva uložených u krajského ředitelství policie tyto nepřevezme do 12 měsíců ode dne doručení výzvy k převzetí nebo uveřejnění informace o nálezu zbraně nebo střeliva:`,a:`má se za to, že je opustil.`,b:`krajské ředitelství policie doručí opakovanou výzvu k převze� nebo opakovaně uveřejní informace o nálezu zbraně nebo střeliva po dobu dalších 12 měsíců.`,c:`krajské ředitelství předá zbraň nebo střelivo pověřenému zástupci obecního úřadu obce, na jejímž území byly zbraň nebo střelivo nalezeny.`,correct:"a"},
{id:394,cat:`Zákon o zbraních`,q:`Zbraň podléhající registraci nebo zbraň kategorie PO lze zničit:`,a:`pouze formou úředního zničení zbraně, nestanoví-li zákon o zbraních a střelivu ve výjimečných případech jiný postup; úřední zničení zbraně zajišťuje stát.`,b:`pouze u držitele zbrojní licence skupiny ZL1 nebo ZL2, a to po odstranění označení dané zbraně iden�fikačními údaji.`,c:`tak, aby při takovém ničení zbraně nebyl ohrožen život, zdraví, majetek nebo veřejný pořádek a nedošlo k ohrožení nebo poškození životního prostředí; zničit zbraň podléhající registraci nebo zbraň kategorie PO je oprávněna osoba, která s takovou zbraní oprávněně nakládá podle zákona o zbraních a střelivu.`,correct:"a"},
{id:395,cat:`Zákon o zbraních`,q:`Nestanoví-li zákon o zbraních a střelivu jinak, obecně platí, že:`,a:`zbraň podléhající registraci a střelivo kategorie S1 lze zničit pouze formou smluvního zničení zbraně nebo střeliva, které zajišťuje držitel zbrojní licence skupiny ZL1.`,b:`zbraň podléhající registraci nebo zbraň kategorie PO lze zničit pouze formou úředního zničení zbraně, které zajišťuje stát.`,c:`střelivo nelze zničit.`,correct:"b"},
{id:396,cat:`Zákon o zbraních`,q:`Zbraň nebo střelivo k úřednímu zničení:`,a:`musí být označeno likvidační značkou, kterou na zbraň vyznačí Český úřad pro zkoušení zbraní a střeliva; likvidační značku na základní balení střeliva vyznačuje vhodným způsobem osoba, která střelivo k úřednímu zničení předává.`,b:`se předává vždy pouze během posledních 10 pracovních dnů v kalendářním čtvrtle�, a to buď osobně nebo prostřednictvím poskytovatele poštovních služeb.`,c:`se předává prostřednictvím krajského ředitelství policie; zbraň nebo střelivo předané k úřednímu zničení předáním krajskému ředitelství policie připadá do vlastnictví státu.`,correct:"c"},
{id:397,cat:`Zákon o zbraních`,q:`Zbraň nebo střelivo k úřednímu zničení:`,a:`se krajskému ředitelství policie předávají za náhradu, kterou hradí osobě, která zbraň nebo střelivo k úřednímu zničení předala, stát prostřednictvím krajského ředitelství policie, a jejíž výše nesmí být vyšší než cena druhotně využitelných materiálů obsažených ve zbrani a střelivu, a to ve výši ceny obvyklé.`,b:`se předávají i přijímají bezplatně.`,c:`krajské ředitelství převezme až po úhradě nákladů úředního zničení osobou, která zbraň k úřednímu zničení předává; paušální výše nákladů úředního zničení činí 100 Kč v případě krátké zbraně, 200 Kč v případě dlouhé zbraně a 1000 Kč v případě jiných zbraní nebo zbraňových systémů.`,correct:"b"},
{id:398,cat:`Zákon o zbraních`,q:`Nevyňatou veřejnoprávní institucí se podle zákona o zbraních a střelivu rozumí:`,a:`instituce zřízená zákonem nebo zřízená jinou takovou institucí, která není vyňatou veřejnoprávní institucí, jde například o obce nebo Českou národní banku; pro nevyňaté veřejnoprávní instituce zákon o zbraních a střelivu umožňuje použít podobný právní režim jako v případě držitelů zbrojních licencí, který však může být podle povahy činnosti nevyňaté veřejnoprávní instituce modifikován tzv. souhlasem Policejního prezidia České republiky.`,b:`ozbrojený bezpečnostní sbor nebo zpravodajská služby, ozbrojené síly České republiky, Vojenská policie, Ministerstvo vnitra, Ministerstvo obrany a Správa státních hmotných rezerv.`,c:`držitel zbrojní licence, který je současně subjektem kri�cké infrastruktury podle jiného právního předpisu, pokud takový subjekt požádá o přiznání statusu nevyňaté veřejnoprávní ins�tuce, a to vždy na dobu nejvýše 10 let; o přiznání statusu nevyňaté ins�tuce lze na žádost držitele zbrojní licence, který je současně subjektem kri�cké infrastruktury, rozhodnout též ve lhůtě 2 měsíců přede dnem uplynu� platnos� dosavadního rozhodnu� o přiznání statusu nevyňaté veřejnoprávní ins�tuce, a to i opakovaně.`,correct:"a"},
{id:399,cat:`Zákon o zbraních`,q:`Nevyňatou veřejnoprávní institucí není pro účely zákona o zbraních a střelivu:`,a:`obec.`,b:`Česká národní banka.`,c:`Ministerstvo vnitra.`,correct:"c"},
{id:400,cat:`Zákon o zbraních`,q:`Preventivními opatřeními podle zákona o zbraních a střelivu jsou:`,a:`pojistné mechanismy zbraní a jejich správné používání, každá zbraň uvedená na trh po 1. lednu 2010 musí již být vybavena snadno ovladatelným pojistným mechanismem pasivní bezpečnos�.`,b:`pravidelné kontroly zajištěných zbraní krajským ředitelstvím policie, které při každé kontrole zajištěné zbraně mimo jiné zjišťuje, zda není daná zbraň nabitá, jestli s ní nemanipulovala neoprávněná osoba a zda je daná zbraň kompletní včetně případného příslušenství nebo doplňků, pokud spolu s nimi byla zajištěna.`,c:`právní instituty zadržení nebo zajištění zbraně, střeliva nebo souvisejícího dokladu nebo listiny.`,correct:"c"},
{id:401,cat:`Zákon o zbraních`,q:`Zadržet zbraň, střelivo nebo související doklad nebo listinu může:`,a:`příslušník policie nebo jiného bezpečnostního sboru anebo příslušník Ministerstva vnitra.`,b:`příslušník policie.`,c:`krajské ředitelství policie, a to rozhodnu�m vydaným ve správním řízení.`,correct:"b"},
{id:402,cat:`Zákon o zbraních`,q:`Příslušník policie může zadržet zbraň, střelivo nebo související doklad nebo listinu:`,a:`je-li to nezbytné, aby jejich držiteli zabránil v jednání při nakládání se zbraní nebo střelivem, kterým porušuje povinnost nebo nedodržuje zákaz stanovený tímto nebo jiným zákonem nebo které může představovat ohrožení života nebo zdraví.`,b:`na základě pokynu orgánu samosprávy nebo ústředního správního orgánu.`,c:`pouze v případě, že nakládání s takovou zbraní představuje bezprostřední hrozbu pro život nebo zdraví osob.`,correct:"a"},
{id:403,cat:`Zákon o zbraních`,q:`Pokud se osoba účastní sportovně-střelecké akce a při manipulaci se zbraní opakovaně neuposlechne pokyny pořadatele, které směřují k zajištění bezpečného nakládání se zbraněmi a střelivem, a svým chováním ohrožuje zdraví a život ostatních účastníků akce, může příslušník policie, je-li na místě přítomen:`,a:`zadržet zbraň, se kterou osoba nakládá, a případně také související doklad nebo listinu.`,b:`rozhodnout o zajištění zbraně a souvisejícího dokladu nebo lis�ny.`,c:`rozhodnout o odně� zbrojního oprávnění.`,correct:"a"},
{id:404,cat:`Zákon o zbraních`,q:`Pokud nejsou zbraň nebo střelivo, které mají být zadrženy, na výzvu příslušníka policie neprodleně vydány a je-li to nezbytné pro ochranu života nebo zdraví:`,a:`zahájí krajské ředitelství bez zbytečného odkladu řízení o odně� zbrojního oprávnění, zbrojní licence nebo zapsané autorizace osoby, která nakládá se zbraněmi, které mají být zadrženy; taková osoba je povinna vydat zbraň nebo střelivo, které mají být zadrženy, nejpozději ke dni vydání rozhodnu� o odně� daného zbrojního oprávnění, zbrojní licence nebo zapsané autorizace.`,b:`může příslušník policie předat řešení dané věci v rámci řízení o zajištění zbraně, střeliva nebo souvisejícího dokladu nebo lis�ny; příslušnou k zahájení a vedení tohoto řízení je Generální inspekce bezpečnostních sborů.`,c:`může příslušník policie za účelem jejich zadržení vstoupit do obydlí, jiných prostor nebo na pozemek, má-li důvodné podezření, že se zde zbraň nebo střelivo nalézají.`,correct:"c"},
{id:405,cat:`Zákon o zbraních`,q:`O zajištění zbraně, střeliva nebo souvisejícího dokladu nebo listiny může z některého z důvodů uvedených v zákoně o zbraních a střelivu rozhodnout:`,a:`kterýkoli příslušník policie v rámci svých pravomocí, rozhodnu� musí ovšem vyhotovit písemně a doručit tomu, vůči komu směřuje, a to nejméně dva dny před samotným zajištěním zbraně, střeliva nebo souvisejícího dokladu nebo lis�ny.`,b:`krajské ředitelství policie, a to ve správním řízení, ve kterém může být vydání rozhodnutí o zajištění prvním krokem, a odvolání proti tomuto rozhodnutí nemá odkladný účinek.`,c:`krajské ředitelství policie, Policejní prezidium České republiky, Ministerstvo vnitra, Český úřad pro zkoušení zbraní a střeliva a v případě ak�vních komponentů střeliva také Český báňský úřad.`,correct:"b"},
{id:406,cat:`Zákon o zbraních`,q:`Existuje-li podezření, že zdravotní stav osoby, která s nimi nakládá, představuje v souvislosti s tímto nakládáním ohrožení života nebo zdraví:`,a:`krajské ředitelství policie může rozhodnout o zajištění zbraně podléhající registraci nebo zbraně kategorie PO, střeliva kategorie S1, S2 nebo S3 nebo souvisejícího dokladu nebo listiny.`,b:`příslušník policie a v naléhavých případech též zdravotník nebo jakákoli odborně způsobilá fyzická nebo právnická osoba zbraň nebo střelivo zadrží.`,c:`je taková osoba povinna s takovou zbraní nebo střelivem nemanipulovat, nesmí s ní nakládat na místě veřejnos� přístupném, zejména pak ji nesmí nosit, nesmí ji používat ke střelbě a je povinna dané podezření bez zbytečného odkladu oznámit krajskému ředitelství policie k přije� dalších opatření.`,correct:"a"},
{id:407,cat:`Zákon o zbraních`,q:`Existuje-li podezření, že zdravotní stav osoby, která nakládá se zbraní podléhající registraci nebo zbraní kategorie PO nebo střelivem kategorie S1, S2 nebo S3, představuje v souvislosti s tímto nakládáním ohrožení života nebo zdraví:`,a:`krajské ředitelství policie oznámí tuto skutečnost ošetřujícímu lékaři; další opatření může krajské ředitelství policie učinit až na základě postupu určeného ošetřujícím lékařem.`,b:`krajské ředitelství policie rozhodne o odně� zbrojního oprávnění.`,c:`krajské ředitelství policie vyzve danou osobu, aby se dostavila k lékařské prohlídce k vyšetření jejího zdravotního stavu, současně s výzvou doručí rozhodnutí o zajištění zbraně, střeliva nebo souvisejícího dokladu nebo listiny, s nimiž taková osoba nakládá.`,correct:"c"},
{id:408,cat:`Zákon o zbraních`,q:`Pokud krajské ředitelství policie obdrží například informaci zpravodajské služby, že držitel zbraně nebo střeliva představuje vážné nebezpečí pro vnitřní pořádek nebo bezpečnost:`,a:`může rozhodnout o zajištění zbraně, střeliva nebo souvisejícího dokladu nebo listiny.`,b:`může rozhodnout o odně� zbrojního oprávnění.`,c:`vezme tuto informaci na vědomí; další opatření může činit až na základě výsledku řízení, bylo-li s takovou osobou zahájeno.`,correct:"a"},
{id:409,cat:`Zákon o zbraních`,q:`Osoba, která přechovává zbraň, střelivo nebo související doklad nebo listinu, ohledně kterých krajské ředitelství policie rozhodlo o zajištění, je povinna:`,a:`tuto zbraň, střelivo nebo související doklad nebo listinu uložit na své náklady u držitele zbrojní licence skupiny ZL1 do úschovy, a to do doby nabytí právní moci rozhodnutí v řízení, které k zajištění zbraně vedlo.`,b:`tuto zbraň, střelivo nebo související doklad nebo listinu uložit u držitele zbrojní licence skupiny ZL1 do úschovy, a to do doby nabytí právní moci rozhodnutí v řízení, které k zajištění zbraně vedlo; náklady na uložení zbraně, střeliva nebo souvisejícího dokladu nebo listiny u držitele zbrojní licence skupiny ZL1 hradí obec, na jejímž území má takový držitel zbrojní licence skupiny ZL1 provozovnu, ve které jsou zbraň, střelivo nebo související doklad nebo listina uloženy.`,c:`je bez zbytečného odkladu odevzdat do úschovy útvaru policie, který o jejich zajištění rozhodl, nebo sdělit místo jejich uložení a umožnit jejich převzetí policií.`,correct:"c"},
{id:410,cat:`Zákon o zbraních`,q:`Pokud nejsou zbraň nebo střelivo, které byly zajištěny, neprodleně odevzdány nebo nebylo umožněno jejich převzetí policií:`,a:`může příslušník policie předat řešení dané věci v rámci zadržení zbraně, střeliva nebo souvisejícího dokladu nebo listiny; orgánem veřejné moci příslušným k zadržení zbraně nebo střeliva je v takovém případě Generální inspekce bezpečnostních sborů.`,b:`může příslušník policie za účelem jejich zajištění vstoupit do obydlí, jiných prostor nebo na pozemek, lze-li předpokládat, že se zde zbraň nebo střelivo nalézají.`,c:`zahájí krajské ředitelství bez zbytečného odkladu řízení o odnětí zbrojního oprávnění, zbrojní licence nebo zapsané autorizace osoby, která nakládá se zbraněmi, které byly zajištěny; taková osoba je povinna vydat zbraň nebo střelivo, které byly zajištěny, nejpozději ke dni vydání rozhodnutí o odnětí daného zbrojního oprávnění, zbrojní licence nebo zapsané autorizace.`,correct:"b"},
{id:411,cat:`Zákon o zbraních`,q:`Osoba, jejíž oprávnění k nakládání se zbraní nebo střelivem bylo pozastaveno nebo zaniklo:`,a:`je povinna do 10 pracovních dnů odevzdat zbraň a střelivo, se kterými nakládá, krajskému ředitelství policie, nebo umožnit krajskému ředitelství policie jejich převzetí nebo zabezpečení proti přístupu neoprávněné osoby na místě jejich dosavadního uložení.`,b:`je povinna do 1 měsíce převést vlastnictví ke zbrani nebo střelivu, se kterými nakládá, na příslušnou organizační složku státu, kterou je v případě ručních planých zbraní a střeliva Český úřad pro zkoušení zbraní a střeliva a v případě zbraní s ráží větší než 20 mm Ministerstvo obrany.`,c:`je oprávněna zbraň nebo střelivo, se kterými nakládá, buď bezodkladně předat krajskému ředitelství do úschovy, nebo je znehodnotit způsobem stanoveným nařízením vlády, a to vlastními silami nebo prostřednictvím držitele zapsané autorizace.`,correct:"a"},
{id:412,cat:`Zákon o zbraních`,q:`Vlastník zbraně nebo střeliva, který pozbude oprávnění s nimi nakládat nebo takové oprávnění nenabude, je oprávněn:`,a:`předat takovou zbraň nebo střelivo Českému úřadu pro zkoušení zbraní a střeliva nebo Ministerstvu obrany k provedení jejich znehodnocení nebo zhotovení řezu.`,b:`požádat krajské ředitelství policie o vydání výjimky z povinnosti být držitelem daného oprávnění; výjimka z povinnosti být držitelem oprávnění se vydává pouze v případech hodných zvláštního zřetele, s dobou platnosti, která nesmí být delší než 1 rok, a pouze pokud tím nedojde k ohrožení vnitřního pořádku nebo bezpečnosti.`,c:`požádat krajské ředitelství policie o předání zbraně nebo střeliva jiné osobě oprávněné s nimi nakládat, a to za účelem jejich úschovy, převodu, trvalého přeshraničního přemístění nebo nevratné úpravy, anebo k úřednímu zničení.`,correct:"c"},
{id:413,cat:`Zákon o zbraních`,q:`Jakým způsobem nemůže vlastník naložit se zbraní nebo střelivem, ke kterým pozbyde oprávnění s nimi nakládat?`,a:`Požádat krajské ředitelství policie o předání zbraně nebo střeliva jiné osobě oprávněné s nimi nakládat za účelem jejich úschovy, převodu, trvalého přeshraničního přemístění nebo nevratné úpravy.`,b:`Požádat krajské ředitelství policie o předání zbraně nebo střeliva k úřednímu zničení.`,c:`Požádat krajské ředitelství policie o stanovení lhůty, po kterou bude moci nakládat se zbraní nebo střelivem, přestože oprávnění pozbyl.`,correct:"c"},
{id:414,cat:`Zákon o zbraních`,q:`Pokud vlastník zbraně nebo střeliva, který pozbyl oprávnění s nimi nakládat, nenaloží s takovou zbraní nebo střelivem způsobem uvedeným v zákoně o zbraních a střelivu do 12 měsíců ode dne pozbytí příslušného oprávnění, a tedy například nepožádá krajské ředitelství policie o jejich předání držiteli zbrojní licence skupiny ZL1 za účelem jejich prodeje nebo znehodnocení:`,a:`dopustí se tím přestupku, za který může být uložena pokuta do výše 30 000 Kč nebo zákaz činnosti.`,b:`taková zbraň nebo střelivo připadnou do vlastnictví státu.`,c:`krajské ředitelství policie předá takovou zbraň, střelivo spolu se souvisejícími doklady a listinami Národnímu archivu České republiky k provedení jejich katalogizace, konzervace a k archivaci.`,correct:"b"},
{id:415,cat:`Zákon o zbraních`,q:`Centrální registr zbraní je:`,a:`neveřejný informační systém veřejné správy, který slouží k výkonu státní správy v oblasti nakládání se zbraněmi a střelivem, systematickému sledování zbraní a střeliva a provozování střelnic a k plnění dalších úkolů státní správy stanovených tímto zákonem, zákonem o munici nebo jiným zákonem.`,b:`veřejný a z prostředí Internetu nepřetržitým vzdáleným přístupem přístupný rejstřík, který obsahuje údaje o zbraních a střelivu a střelivu registrovaných na území České republiky a jiných členských států Evropské unie; za účelem ochrany osobních údajů osob, které se zbraněmi a střelivem nakládají, nejsou v centrálním registru zbraní osobní údaje těchto osob uvedeny a přiřazení registrované zbraně nebo střeliva jejich vlastníku je zajištěno prostřednictvím bezvýznamového identifikátoru fyzické osoby a zabezpečené konektivity vůči registru vlastníků zbraní a střeliva, který je neveřejným informačním systémem spravovaným Ministerstvem vnitra.`,c:`neveřejný vnitřní informační systém používaný výhradně Policií České republiky, a to za účelem předcházení násilné trestné činnosti se zbraněmi, střelivem, municí, výbušninami a jejich prekurzory, pyrotechnickými výrobky a biologickými agens použitelnými jako zbraně.`,correct:"a"},
{id:416,cat:`Zákon o zbraních`,q:`Správcem centrálního registru zbraní je:`,a:`Český úřad pro zkoušení zbraní a střeliva.`,b:`Ministerstvo vnitra.`,c:`Policejní prezidium České republiky.`,correct:"c"},
{id:417,cat:`Zákon o zbraních`,q:`Správce centrálního registru zbraní zveřejňuje na svých internetových stránkách:`,a:`seznam střelnic a míst využitelných pro střelbu podle jiného právního předpisu, údaje o držitelích zbrojních oprávnění, zbrojních licencí a zapsaných autorizací a statistické údaje týkající se kriminality spáchané se zbraní náležející do působnosti zákona o zbraních a střelivu.`,b:`seznam zapsaných zkouškových střelnic, údaje o ztracených nebo odcizených evropských zbrojních pasech a identifikující držitele zbrojní licence skupiny ZL1 a statistické údaje týkající se údajů vedených v centrálním registru zbraní a jeho provozu.`,c:`seznam zapsaných zkouškových střelnic, které nejsou držiteli zbrojní licence, údaje o ztracených nebo odcizených zbrojních oprávněních, zbrojních licencích a zapsaných autorizacích a statistické údaje týkající se údajů vedených v centrálním registru zbraní a v centrální evidenci střeliva, která je vedena mimo centrální registr zbraní.`,correct:"b"},
{id:418,cat:`Zákon o zbraních`,q:`Které informace vedené v centrálním registru zbraní nezpřístupňuje Policejní prezidium na svých internetových stránkách:`,a:`seznam zapsaných zkouškových střelnic.`,b:`údaje o ztracených nebo odcizených zbrojních oprávněních.`,c:`údaje identifikující držitele zbrojní licence skupiny ZL1.`,correct:"b"},
{id:419,cat:`Zákon o zbraních`,q:`Údaje vedené v centrálním registru zbraní, které podle zákona o zbraních a střelivu nepatří mezi zveřejňované údaje:`,a:`se neposkytují podle jiného právního předpisu, tedy například ani podle zákona o svobodném přístupu k informacím.`,b:`se podle zákona o svobodném přístupu k informacím poskytují pouze držiteli zbrojního oprávnění po předložení zbrojního listu ne staršího než 10 pracovních dnů.`,c:`nelze zveřejnit v elektronické podobě, protože tyto údaje jsou v centrálním registru zbraní uloženy ve fyzické podobě, tedy jako listiny a doklady, které nebyly vytvořeny jako elektronické dokumenty nebo nebyly do elektronické podoby konvertovány.`,correct:"a"},
{id:420,cat:`Zákon o zbraních`,q:`V případě, že vznikne pochybnost o kategorii zbraně nebo střeliva a tuto pochybnost se nepodaří vyřešit komunikací se správcem centrálního registru zbraní, zařadí zbraň nebo střelivo do kategorie:`,a:`Policejní prezidium, a to rozhodnutím o odvolání proti stanovisku správce centrálního registru zbraní.`,b:`Ministerstvo vnitra, a to závazným stanoviskem.`,c:`Český úřad pro zkoušení zbraní a střeliva, a to opatřením obecné povahy o kategorizaci zbraně nebo střeliva.`,correct:"c"},
{id:421,cat:`Zákon o zbraních`,q:`Pro řízení ve věcech týkajících se zbrojního oprávnění je místně příslušné krajské ředitelství policie podle místa:`,a:`sídla provozovatele zapsané zkouškové střelnice, na které byla vykonána zkouška odborné způsobilosti nebo komisionální zkouška.`,b:`pobytu fyzické osoby.`,c:`faktického umístění zapsané zkouškové střelnice, na které byla vykonána zkouška odborné způsobilosti nebo komisionální zkouška.`,correct:"b"},
{id:422,cat:`Zákon o zbraních`,q:`Podat žádost, provést registraci, ohlášení nebo splnit informační povinnosti podle zákona o zbraních a střelivu:`,a:`lze u kteréhokoli krajského ředitelství policie.`,b:`je držitel zbrojního oprávnění povinen u krajského ředitelství policie místně příslušného podle místa jeho pobytu.`,c:`je fyzická osoba oprávněna u kteréhokoli orgánu státní správy místně příslušného podle místa jejího pobytu.`,correct:"a"},
{id:423,cat:`Zákon o zbraních`,q:`Je pravda, že držitel zbrojního oprávnění může provést registraci zbraně u kteréhokoli krajského ředitelství policie?`,a:`Ano.`,b:`Ne.`,c:`Nelze určit, protože zákon o zbraních takový postup neupravuje.`,correct:"a"},
{id:424,cat:`Zákon o zbraních`,q:`Osoba, která převede zbraň nebo střelivo nebo jinak s nimi umožní nakládat jiné osobě, která k tomu není oprávněna, se takovým jednáním může dopustit například:`,a:`přestupku podle zákona o zbraních a střelivu.`,b:`kázeňského provinění, za které může být kterýkoli držitel zbrojního oprávnění potrestán krajským ředitelstvím policie podle příslušného stavovského předpisu.`,c:`pokusu neuposlechnutí výzvy úřední osoby ve stádiu přípravy.`,correct:"a"},
{id:425,cat:`Zákon o zbraních`,q:`Držitel zbrojního oprávnění, který neprovede hlášení přepravy zbraní nebo střeliva podle § 111 a násl., kterou zajišťuje a která hlášení přepravy podléhá:`,a:`se nedopouští protiprávního jednání, protože povinnost hlásit přepravu zbraní nebo střeliva má pouze držitel zbrojní licence.`,b:`se dopouští přestupku podle zákona o zbraních a střelivu.`,c:`se dopouští přestupku podle zákona o silniční dopravě.`,correct:"b"},
{id:426,cat:`Zákon o zbraních`,q:`Pro ukládání správních trestů podle zákona o zbraních a střelivu platí, že:`,a:`lze uložit pokutu ve výši stanovené zákonem o zbraních a střelivu, jiný druh trestu se nepřipouští.`,b:`lze uložit pokutu ve výši stanovené zákonem o zbraních a střelivu, zákaz činnosti lze uložit pouze vyňaté veřejnoprávní instituci.`,c:`lze uložit pokutu ve výši stanovené zákonem o zbraních a střelivu, za nejzávažnější přestupky držitele zbrojní licence lze uložit zákaz činnosti, při splnění podmínek stanovených zákonem o odpovědnosti za přestupky a řízení o nich lze uložit také propadnutí věci.`,correct:"c"},
{id:427,cat:`Zákon o zbraních`,q:`Za přestupek fyzické osoby lze podle zákona o zbraních a střelivu uložit pokutu:`,a:`až do výše 10 000 Kč.`,b:`v minimální výši 2 000 Kč a v maximální výši 20 000 Kč.`,c:`obecně do výše 30 000 Kč, a dále pak až do výše 50 000 Kč v případě, že pachatel porušil povinnost stanovenou zákonem o zbraních a střelivu opakovaně nebo udržoval-li delší dobu protiprávní stav, do výše 100 000 Kč, pokud pachatel zvlášť hrubým porušením povinností stanovených zákonem o zbraních a střelivu ohrozil život nebo zdraví, a do výše 1000 000 Kč, pokud bylo cílem jednání pachatele přestupku získat majetkový prospěch.`,correct:"c"},
{id:428,cat:`Zákon o zbraních`,q:`Maximální pokutou, kterou lze podle zákona o zbraních a střelivu uložit, je:`,a:`100 000 Kč; pokutu v této výši lze uložit pachateli, padělá, pozmění, zahlazuje nebo odstraňuje jedinečné označení střelné zbraně, které umožňuje její identifikaci.`,b:`5 000 000 Kč; pokutu v této výši lze uložit držiteli zbrojní licence například tehdy, pokud úmyslně, opakovaně nebo ve větším rozsahu nevede evidenci v souladu se zákonem o zbraních a střelivu.`,c:`30 000 000 Kč; pokutu v této výši lze uložit osobě, která neumožní, překazí nebo zmaří výkon kontrolní pravomoci Ministerstva obrany v rámci kontroly fyzického a evidenčního stavu zvláště účinné zbraně podléhající mezinárodním kontrolním režimům, nebo neumožní, překazí nebo zmaří výkon obdobné pravomoci zahraničního inspekčního týmu v doprovodu zaměstnance zařazeného v Ministerstvu obrany, pokud taková pravomoc vyplývá z mezinárodní smlouvy, která je součástí právního řádu.`,correct:"b"},
{id:429,cat:`Zákon o zbraních`,q:`Maximální pokutou, kterou lze podle zákona o zbraních a střelivu uložit, je:`,a:`5 000 000 Kč; pokutu v této výši lze uložit držiteli zbrojní licence například tehdy, pokud úmyslně, opakovaně nebo ve větším množství dodá na trh zbraň nebo střelivo v rozporu se zákonem o zbraních a střelivu.`,b:`50 000 Kč; pokutu v této výši lze uložit provozovateli střelnice, který umožní na střelnici střelbu neoprávněné osobě nebo osobě, na kterou se zákon o zbraních a střelivu nevztahuje.`,c:`3 000 000 Kč; pokutu v této výši lze uložit osobě, která jako člen organizované skupiny vyrobí, sobě nebo jinému opatří nebo přechovává výbušninu v množství větším než malém, zbraň hromadně účinnou nebo součástky, jichž je k užití takové zbraně nezbytně třeba.`,correct:"a"},
{id:430,cat:`Zákon o zbraních`,q:`Přestupky držitele zbrojního oprávnění podle zákona o zbraních a střelivu projednává:`,a:`obecní úřad obce s rozšířenou působností; příslušník Policie České republiky může projednat přestupek podle zákona o zbraních a střelivu příkazem na místě.`,b:`Český úřad pro zkoušení zbraní a střeliva, pokud jde o projednání přestupku v prvním stupni, a Ministerstvo vnitra, pokud jde o rozhodování o odvolání proti prvostupňovému rozhodnutí o přestupku.`,c:`krajské ředitelství policie místně příslušné podle místa pobytu držitele zbrojního oprávnění.`,correct:"a"},
{id:431,cat:`Zákon o zbraních`,q:`Zda držitel zbrojního oprávnění nebo zbrojní licence splňuje podmínky zbrojního oprávnění nebo zbrojní licence, prověří krajské ředitelství policie nejméně jednou za:`,a:`2 roky.`,b:`5 let.`,c:`10 let.`,correct:"b"},
{id:432,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie vyzve držitele zbrojního oprávnění nebo držitele zapsané autorizace k pravidelnému předložení jím držených zbraní:`,a:`alespoň jednou ročně.`,b:`alespoň jednou za 10 let.`,c:`nanejvýše jednou za 20 let.`,correct:"b"},
{id:433,cat:`Zákon o zbraních`,q:`Oprávnění nakládat se zbraní podléhající registraci nebo zbraní kategorie PO lze podle zákona o zbraních a střelivu prokázat například:`,a:`předložením zbrojního listu spolu s předložením občanského průkazu, cestovního pasu nebo obdobného dokladu osoby, které byl zbrojní list vydán.`,b:`předložením občanského průkazu nebo cestovního pasu a místopřísežným ústním prohlášením.`,c:`předložením osvědčení o úspěšném složení zkoušky odborné způsobilosti nebo komisionální zkoušky.`,correct:"a"},
