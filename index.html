{id:141,cat:`Zákon o zbraních`,q:`Žadatel musí v protestu proti průběhu nebo výsledku zkoušky odborné způsobilosti:`,a:`uvést osobní údaje zkušebního komisaře, jehož postupu se protest týká, důvod pochybení zkušební komisaře, které v průběhu nebo na výsledku zkoušky žadatel spatřuje, a to včetně odkazu na příslušné ustanovení zákona o zbraních a střelivu, k jehož porušení postupem zkušebního komisaře došlo.`,b:`uvést nedostatky, které v průběhu nebo na výsledku zkoušky spatřuje a na jejichž základě protest vznáší.`,c:`uvést místo a datum konání zkoušky odborné způsobilosti, které se protest týká, přičemž odůvodnění protestu lze doplnit dodatečně, a to ve lhůtě 10 pracovních dnů po ukončení zkoušky.`,correct:"b"},
{id:142,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie, které provádí dozor nad průběhem zkoušky odborné způsobilosti, protest na místě přezkoumá z hlediska souladu průběhu zkoušky s tímto zákonem a právními předpisy vydanými k jeho provedení, a shledá-li jej důvodným:`,a:`změní hodnocení zkoušky žadatele o vydání zbrojního oprávnění na „vyhověl“.`,b:`umožní žadateli o vydání zbrojního oprávnění absolvování komisionální zkoušky v prioritním termínu.`,c:`umožní žadateli o vydání zbrojního oprávnění opakování příslušné části zkoušky odborné způsobilosti.`,correct:"c"},
{id:143,cat:`Zákon o zbraních`,q:`Náklady na zkoušku odborné způsobilosti hradí:`,a:`žadatel.`,b:`krajské ředitelství policie.`,c:`krajské ředitelství policie, pokud jde o odměnu zkušebního komisaře, a žadatel, pokud jde o náklady na využití zapsané zkouškové střelnice.`,correct:"c"},
{id:144,cat:`Zákon o zbraních`,q:`Komisionální zkouška se koná:`,a:`vždy na zapsané zkouškové střelnici.`,b:`vždy na střelnici provozované vyňatou veřejnoprávní institucí.`,c:`zpravidla na střelnici provozované vyňatou veřejnoprávní institucí, a ve výjimečných případech i na zapsané zkouškové střelnici.`,correct:"c"},
{id:145,cat:`Zákon o zbraních`,q:`Zkouška odborné způsobilosti se koná:`,a:`vždy na zapsané zkouškové střelnici.`,b:`vždy na střelnici provozované vyňatou veřejnoprávní institucí.`,c:`zpravidla na střelnici provozované vyňatou veřejnoprávní institucí, a ve výjimečných případech i na zapsané zkouškové střelnici.`,correct:"a"},
{id:146,cat:`Zákon o zbraních`,q:`Pro účely zkoušky odborné způsobilosti a komisionální zkoušky je materiály, pomůcky, zbraně a střelivo povinen zajistit:`,a:`zkušební komisař, přičemž konkrétní značku a model ke každému typu zbraně, která se použije při praktické části zkoušky odborné způsobilosti nebo komisionální zkoušky, a to včetně uvedení typu mířidel a případných doplňků zbraně, je zkušební komisař povinen v lhůtě 14 dní před stanoveným termínem zkoušky odborné způsobilosti nebo komisionální zkoušky na požádání sdělit žadateli o vydání zbrojního oprávnění přihlášenému na daný termín zkoušky.`,b:`provozovatel zapsané zkouškové střelnice, přičemž konkrétní značku a model ke každému typu zbraně, která se použije při praktické části zkoušky odborné způsobilosti nebo komisionální zkoušky, a to včetně uvedení typu mířidel a případných doplňků zbraně, je provozovatel zapsané zkouškové střelnice povinen zveřejnit na svých internetových stránkách nejméně 14 dní před stanoveným termínem zkoušky odborné způsobilosti nebo komisionální zkoušky.`,c:`logistický útvar krajského ředitelství policie, přičemž seznam konkrétních značek a modelů jednotlivých typů zbraní, které se použijí při praktické části zkoušky odborné způsobilosti nebo komisionální zkoušky, a to včetně uvedení typu mířidel a případných doplňků zbraně, je stanoven v příloze nařízení vlády o provádění zkoušek podle zákona o zbraních a střelivu.`,correct:"b"},
{id:147,cat:`Zákon o zbraních`,q:`Právo provozovat střelnici jako zapsanou zkouškovou střelnici je přiznáno, pokud:`,a:`provozovatelem střelnice je držitel zbrojní licence nebo nevyňatá veřejnoprávní instituce, střelnice splňuje technické požadavky a požadavky na vybavenost za účelem zajištění průběhu zkoušek odborné způsobilosti a komisionálních zkoušek a v posledních 5 letech nebylo vůči stejnému provozovateli rozhodnuto o odnětí práva provozovat střelnici jako zapsanou zkouškovou střelnici.`,b:`provozovatelem střelnice je držitel zbrojního oprávnění nebo vyňatá veřejnoprávní instituce, střelnice splňuje technické požadavky a požadavky na vybavenost za účelem zajištění průběhu zkoušek odborné způsobilosti a komisionálních zkoušek a v posledních 5 letech nebylo vůči stejné střelnici rozhodnuto o odnětí práva provozovat střelnici jako zapsanou zkouškovou střelnici.`,c:`provozovatelem střelnice je držitel zbrojní licence nebo držitel zapsané autorizace, střelnice splňuje stavebně-technické požadavky na bezpečné provádění střelby osobami bez odborné způsobilosti a v posledních 5 letech nedošlo na stejné střelnici k žádnému bezpečnostnímu incidentu nebo mimořádné situaci, které by vedlo k pozastavení její činnosti jako zapsané zkouškové střelnice.`,correct:"a"},
{id:148,cat:`Zákon o zbraních`,q:`Teoretickou a praktickou část zkoušky odborné způsobilosti vykonává žadatel:`,a:`vždy ve stejný den, v případě nutnosti rozložení zkoušky odborné způsobilosti do vícero dnů je nezbytné opakovat vždy celou zkoušku odborné způsobilosti.`,b:`tak, aby mezi dny, ve kterých se provádí jednotlivé části zkoušky odborné způsobilosti, zpravidla nepřipadaly na dny pracovního klidu a současně byl mezi nimi časový interval, který nesmí být kratší než 10 pracovních dnů.`,c:`ve stejný den, přičemž ve výjimečných a odůvodněných případech může zkušební komisař umožnit konání praktické části zkoušky odborné způsobilosti v jiný den.`,correct:"c"},
{id:149,cat:`Zákon o zbraních`,q:`Mezi podmínky jmenování zkušebním komisařem patří mimo jiné:`,a:`dosáhnout věku 21 let, úspěšně složit zkoušku zkušebního komisaře, být držitelem obecného zbrojního oprávnění minimálně po dobu 3 let a mít alespoň střední vzdělání s maturitní zkouškou.`,b:`dosáhnout věku 30 let, úspěšně složit zkoušku zkušebního komisaře, být držitelem rozšířeného zbrojního oprávnění minimálně po dobu 3 let a mít alespoň střední vzdělání s maturitní zkouškou.`,c:`dosáhnout věku 30 let, úspěšně složit zkoušku zkušebního komisaře, být držitelem obecného zbrojního oprávnění, mít započitatelnou praxi minimálně po dobu 3 let v podobě služby v ozbrojeném bezpečnostním sboru nebo u ozbrojených sil a mít alespoň střední vzdělání.`,correct:"b"},
{id:150,cat:`Zákon o zbraních`,q:`Zkoušku zkušebního komisaře je žadatel, který u zkoušky zkušebního komisaře neuspěl:`,a:`není oprávněn opakovat; po neúspěšné zkoušce musí zájemce případně podat novou žádost o jmenování zkušebním komisařem.`,b:`oprávněn ve lhůtě 12 měsíců ode dne podání žádosti o vykonání zkoušky jednou opakovat.`,c:`oprávněn ve lhůtě 12 měsíců ode dne podání žádosti o jmenování zkušebním komisařem jednou opakovat a po neúspěšné opakované zkoušce je žadatel oprávněn za zákonem stanovených podmínek vykonat komisionální zkoušku.`,correct:"b"},
{id:151,cat:`Zákon o zbraních`,q:`Zkušební komisař nesmí podle zákona o zbraních a střelivu mimo jiné vykonávat svou činnost po dobu:`,a:`pozastavení jeho zbrojního oprávnění.`,b:`po kterou je vedeno řízení o protestu podaném proti průběhu nebo výsledku zkoušky, kterou vedl.`,c:`pozastavení provozu střelnice, na které jako na zapsané zkouškové střelnici provádí zkoušky odborné způsobilosti nebo je zde ustanovován jako člen zkušební komise v rámci komisionálních zkoušek.`,correct:"a"},
{id:152,cat:`Zákon o zbraních`,q:`Příslušník Policie ČR, který je zařazen u organizačního článku krajského ředitelství policie nebo Policejního prezidia České republiky, který je věcně příslušný k plnění úkolů správního nebo kontrolního orgánu podle zákona o zbraních a střelivu:`,a:`musí vykonávat funkci zkušebního komisaře.`,b:`nesmí vykonávat funkci zkušebního komisaře.`,c:`může vykonávat funkci zkušebního komisaře jen v případě, udělí-li mu k tomu souhlas Ministerstvo vnitra.`,correct:"b"},
{id:153,cat:`Zákon o zbraních`,q:`Vyberte správní tvrzení:`,a:`Policejní prezidium odvolá zkušebního komisaře, který pozbyl místo pobytu na území České republiky.`,b:`Ministerstvo vnitra odvolá zkušebního komisaře, který závažným způsobem nebo opakovaně poruší své povinnosti stanovené tímto zákonem nebo právním předpisem vydaným k jeho provedení.`,c:`Ministerstvo vnitra odvolá zkušebního komisaře, který přestal splňovat některou z podmínek pro získání nebo držení rozšířeného zbrojního oprávnění.`,correct:"b"},
{id:154,cat:`Zákon o zbraních`,q:`Ministerstvo vnitra odvolá zkušebního komisaře, který:`,a:`opakovaně znemožňuje dosažení účelu zkoušky odborné způsobilosti nebo komisionální zkoušky.`,b:`se stane příslušníkem ozbrojeného bezpečnostního sboru nebo ozbrojených sil.`,c:`opakovaně v rámci hodnocení praktické části zkoušky odborné způsobilosti umožní úspěšné složení zkoušky odborné způsobilosti více než 75 % žadatelů o vydání zbrojního oprávnění přihlášených na daný termín zkoušky.`,correct:"a"},
{id:155,cat:`Zákon o zbraních`,q:`Oprávnění vykonávat činnost zkušebního komisaře podle zákona o zbraních a střelivu mimo jiné zaniká dnem:`,a:`zániku zbrojního oprávnění zkušebního komisaře.`,b:`jeho zařazení u organizačního článku krajského ředitelství policie nebo Policejního prezidia České republiky, který je věcně příslušný k plnění úkolů správního nebo kontrolního orgánu podle zákona o zbraních a střelivu.`,c:`nabytí právní moci rozhodnutí, podle kterého byl zkušební komisař pravomocně uznán vinným pro trestný čin spáchaný i jen z nedbalosti v souvislosti s nakládáním se zbraní, střelivem, municí nebo výbušninou.`,correct:"a"},
{id:156,cat:`Zákon o zbraních`,q:`Oprávnění vykonávat činnost zkušebního komisaře podle zákona o zbraních a střelivu mimo jiné nezaniká dnem:`,a:`následujícím po dni, kdy zkušební komisař přestal splňovat některou z podmínek pro jmenování zkušebním komisařem.`,b:`následujícím po dni, kdy se zkušební komisař oprávnění vykonávat činnost zkušebního komisaře vzdá.`,c:`nabytí právní moci rozhodnutí, kterým je zkušební komisař odvolán.`,correct:"a"},
{id:157,cat:`Zákon o zbraních`,q:`Zbrojní licence:`,a:`opravňuje svého držitele – právnickou osobu nebo fyzickou podnikající osobu – k nakládání se zbraněmi podléhajícími registraci v rámci činnosti podnikatele v oblasti vývoje, výroby, opravách, nákupu, prodeji nebo přepravě zbraní a střeliva; pro nakládání se zbraněmi kategorie NO a střelivem kategorie S4 se v případě podnikatelů vyžaduje zapsaná autorizace.`,b:`opravňuje svého držitele – právnickou nebo fyzickou osobu – k nakládání se zbraněmi v oblasti vývoje, výroby, opravách, nákupu, prodeji nebo přepravě zbraní a střeliva; nakládá-li právnická osoba nebo fyzická podnikající osoba se zbraněmi nebo střelivem v rámci jiných typů činnosti, vydá krajské ředitelství policie namísto zbrojní licence podle typu dané činnosti hromadné zbrojní oprávnění nebo hromadný evropský zbrojní pas.`,c:`opravňuje svého držitele – právnickou osobu nebo fyzickou podnikající osobu – k nakládání se zbraněmi stanovených kategorií; pro činnost podnikatele v oblasti vývoje, výroby, opravách, nákupu, prodeji nebo přepravě zbraní a střeliva je zbrojní licence vyžadována vždy, a to i v případě zbraní kategorie NO a střeliva kategorie S4.`,correct:"c"},
{id:158,cat:`Zákon o zbraních`,q:`Pro činnost podnikatele v oblasti vývoje, výroby, opravách, nákupu, prodeji nebo přepravě zbraní a střeliva se vyžaduje:`,a:`zbrojní licence skupiny ZL1, nakládá-li takto podnikatel se zbraněmi podléhajícími registraci, příslušenstvím a doplňky pro takové zbraně anebo se střelivem kategorií S1 nebo S2 a vybavením určeným pro delaboraci nebo přebíjení střeliva.`,b:`zbrojní licence skupiny ZL1, nakládá-li takto podnikatel se zbraněmi podléhajícími registraci nebo kategorie PO anebo se střelivem kategorií S1, S2 nebo S3.`,c:`zbrojní licence skupiny ZL1 nebo ZL3.`,correct:"b"},
{id:159,cat:`Zákon o zbraních`,q:`Pro činnost podnikatele v oblasti vývoje, výroby, opravách, nákupu, prodeji nebo přepravě zbraní kategorie NO nebo střeliva kategorie S4, nejde-li o expanzní přístroje a pro takové přístroje určené nábojky, se:`,a:`zbrojní licence se nevyžaduje.`,b:`vyžaduje zbrojní licence kterékoli skupiny.`,c:`vyžaduje zbrojní licence skupiny ZL1 nebo ZL2.`,correct:"c"},
{id:160,cat:`Zákon o zbraních`,q:`Pro činnost právnické osoby nebo podnikající fyzické osoby, při které se se zbraněmi nebo střelivem nakládá například v rámci provádění výcviku ve střelbě nebo podnikání v oblasti ostrahy se vyžaduje:`,a:`zbrojní licence skupiny ZL2, pokud jde o provádění výcviku ve střelbě, a zbrojní licence skupiny ZL3, pokud jde o podnikání v oblasti ostrahy.`,b:`zbrojní oprávnění pro korporace a osoby samostatně výdělečné činné.`,c:`zbrojní licence skupiny ZL2 v případě, že se při takové činnosti nakládá se zbraněmi podléhajícími registraci nebo se zbraněmi kategorie PO, anebo zapsaná autorizace v případě, že se při takové činnosti nakládá pouze se zbraněmi kategorie PO.`,correct:"c"},
{id:161,cat:`Zákon o zbraních`,q:`Podle zákona o zbraních a střelivu se rozlišují zbrojní licence:`,a:`na 3 skupiny – ZL1, ZL2 a ZL 3.`,b:`na 2 skupiny – obecná zbrojní licence a rozšířená zbrojní licence.`,c:`na 2 skupiny – hlavní zbrojní licence a vedlejší zbrojní licence.`,correct:"a"},
{id:162,cat:`Zákon o zbraních`,q:`Rozlišují se zbrojní licence skupiny:`,a:`ZL1, ZL2 a ZL3; pokud zákon nestanoví výslovně jinak, platí, že pro podnikatelskou činnost v oboru zbraní a střeliva postačuje zbrojní licence kterékoli skupiny.`,b:`ZL1, ZL2 a ZL3; pokud zákon nestanoví výslovně jinak, platí, že pro činnost, pro kterou se vyžaduje zbrojní licence, stačí zbrojní licence ZL1 nebo ZL2, naopak zbrojní licence skupiny ZL3 musí být pro danou činnost přímo vydána.`,c:`ZL1, ZL2, ZL3 a ZL-PO; pokud zákon nestanoví výslovně jinak, platí, že pro nakládání se zbraněmi kategorie R1 se vyžaduje zbrojní licence skupiny ZL1, pro nakládání se zbraněmi kategorie R2 nebo R3 zbrojní licence skupiny ZL2, pro nakládání se zbraněmi kategorie R3 nebo R4 zbrojní licence skupiny ZL3 a pro nakládání se zbraněmi kategorie PO nebo NO zbrojní licence skupiny ZL-PO.`,correct:"b"},
{id:163,cat:`Zákon o zbraních`,q:`Držitel zbrojní licence skupiny:`,a:`ZL1 může být současně držitelem zbrojní licence skupiny ZL2 i ZL3.`,b:`ZL1 nemůže být současně držitelem zbrojní licence skupiny ZL2 a ZL3.`,c:`ZL1 nebo ZL2 nemůže být současně držitelem zbrojní licence skupiny ZL3.`,correct:"c"},
{id:164,cat:`Zákon o zbraních`,q:`Zbrojní licence skupiny ZL1 neopravňuje právnickou osobu nebo podnikající fyzickou osobu k:`,a:`přepravě nebo zajišťování dopravy zbraní nebo střeliva.`,b:`zprostředkování úschovy, skladování, vypůjčování, nákupu nebo prodeje zbraní nebo střeliva.`,c:`komerčnímu zajišťování výuky nebo výcviku v nakládání se zbraněmi a střelivem pro zájemce z řad střelecké veřejnosti.`,correct:"c"},
{id:165,cat:`Zákon o zbraních`,q:`Pokud hodlá právnická osoba, například zapsaný spolek, zajišťovat činnost sportovně-střeleckého klubu a nakládat při tom se zbraněmi podléhajícími registraci, musí být s ohledem na zákon o zbraních a střelivu držitelem:`,a:`povolení provozovat střelnici.`,b:`zbrojní licence skupiny ZL3.`,c:`zbrojní licence skupiny ZL2.`,correct:"c"},
{id:166,cat:`Zákon o zbraních`,q:`Pokud hodlá právnická osoba, například zapsaný spolek, vykonávat zájmovou činnost (například kynologický výcvik nebo filmovou anebo divadelní činnost), při které bude nakládat výhradně se zbraněmi kategorie PO, musí být s ohledem na zákon o zbraních a střelivu držitelem:`,a:`zbrojního průvodního listu nebo výjimky kategorie PO.`,b:`zapsané autorizace, pokud není držitelem zbrojní licence skupiny ZL2.`,c:`zbrojní licence skupiny ZL3.`,correct:"b"},
{id:167,cat:`Zákon o zbraních`,q:`Pokud hodlá právnická osoba, například zapsaný spolek, zajišťovat činnost sportovně-střeleckého klubu a nakládat při tom výhradně se zbraněmi kategorie NO:`,a:`musí být s ohledem na zákon o zbraních a střelivu držitelem zbrojní licence skupiny ZL2.`,b:`musí být s ohledem na zákon o zbraních a střelivu držitelem zapsané autorizace.`,c:`nemusí být držitelem zbrojní licence nebo zapsané autorizace, se zbraněmi kategorie NO může nakládat každá právnické osoba se sídlem na území České republiky.`,correct:"c"},
{id:168,cat:`Zákon o zbraních`,q:`Zbrojní licence skupiny ZL3 opravňuje svého držitele:`,a:`provádět příležitostnou podnikatelskou činnost v oborou zbraní a střeliva nebo zajišťovat příležitostnou zprostředkovatelskou činnost v oblasti dovozu zbraní a střeliva pro klienty, kteří jsou držiteli zbrojního oprávnění.`,b:`nakládat se zbraněmi a střelivem a provozovat střelnici, která však nesmí být komerční střelnicí.`,c:`jednorázově provést nebo za konkrétním účelem provádět činnost, pro kterou se jinak vyžaduje zbrojní licence skupiny ZL1 nebo ZL2; účelem vydání zbrojní licence skupiny ZL3 nesmí být podnikatelská činnost.`,correct:"c"},
{id:169,cat:`Zákon o zbraních`,q:`Pro zbrojní licenci skupiny ZL3 platí, že:`,a:`její držitel může být současně držitelem zbrojní licence skupiny ZL1.`,b:`její držitel je oprávněn jednorázově provést nebo za konkrétním účelem provádět činnost, pro kterou se jinak vyžaduje zbrojní licence skupiny ZL1 nebo ZL2.`,c:`účelem jejího vydání je podnikatelská činnost.`,correct:"b"},
{id:170,cat:`Zákon o zbraních`,q:`Na základě zbrojní licence skupiny ZL3 nesmí být:`,a:`nakládáno se zbraněmi kategorie R1 nebo se střelivem kategorie S1.`,b:`provozována podnikatelská činnost.`,c:`vyráběny zbraně nebo střelivo pro nekomerční účely.`,correct:"b"},
{id:171,cat:`Zákon o zbraních`,q:`Mezi podmínky pro vydání a držení zbrojní licence skupiny ZL1 nebo ZL2 nepatří:`,a:`mít sídlo na území České republiky.`,b:`být vlastníkem alespoň jedné provozovny odpovídající povaze činnosti, která bude na jejím základě vykonávána.`,c:`být spolehlivý.`,correct:"b"},
{id:172,cat:`Zákon o zbraních`,q:`Žadatel o vydání zbrojní licence skupiny ZL1 nebo ZL2 musí při podání žádosti doložit, že je oprávněn užívat místo způsobilé k nakládání se zbraněmi a střelivem pro účely činnosti podle tohoto zákona (tzv. provozovnu); to neplatí:`,a:`pokud bude nakládat se zbraněmi nebo střelivem pouze krátkodobě nebo v množství, pro které zákon nevyžaduje konkrétní způsob technického zabezpečení uložených zbraní nebo střeliva.`,b:`pokud bude zbrojní licence vydána právnické osobě, která nemá sídlo nebo odštěpný závod na území České republiky.`,c:`nebude-li při své činnosti držitele zbrojní licence nakládat se zbraněmi nebo střelivem.`,correct:"c"},
{id:173,cat:`Zákon o zbraních`,q:`Žadatel o vydání zbrojní licence skupiny ZL1 nebo ZL2 musí při podání žádosti doložit, že je:`,a:`držitelem příslušných kategorizačních rozhodnutí Českého úřadu pro zkoušení zbraní a střeliva.`,b:`bezúhonným a spolehlivým subjektem, který dlouhodobě, nejméně však po dobu 3 let, při své činnosti, pro kterou žádá o vydání zbrojní licence, nakládá se zbraněmi podléhajícími registraci nebo se střelivem kategorie S1, S2 nebo S3.`,c:`oprávněn vykonávat podnikatelskou nebo jinou činnost, pro niž má být zbrojní licence vydána.`,correct:"c"},
{id:174,cat:`Zákon o zbraních`,q:`Zbrojní licence skupiny ZL3 se vydává:`,a:`bez omezení doby platnosti; platnost zbrojní licence skupiny ZL3 je vázána pouze na platnost zbrojního oprávnění jejího držitele.`,b:`na dobu 12 měsíců, přičemž ve lhůtě nejdéle 6 měsíců a nejpozději 2 měsíců před uplynutím doby, na kterou je zbrojní licence skupiny ZL3 vydána, může její držitel požádat o prodloužení, a to i opakovaně, avšak vždy pouze na dobu dalších 12 měsíců, které navazují na předchozí dobu platnosti zbrojní licence skupiny ZL3.`,c:`na přiměřenou dobu nezbytnou pro uskutečnění jejího účelu; to neplatí je-li účelem vydání zbrojní licence skupiny ZL3 sběratelská činnost.`,correct:"c"},
{id:175,cat:`Zákon o zbraních`,q:`Zbrojní licenci skupiny ZL1 nebo ZL2 vydá právnické osobě nebo podnikající fyzické osobě:`,a:`Policejní prezidium České republiky.`,b:`krajské ředitelství policie.`,c:`Ministerstvo vnitra.`,correct:"b"},
{id:176,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie může v rozhodnutí o vydání zbrojní licence skupiny ZL3:`,a:`stanovit, že podnikatelská činnost, pro kterou je zbrojní licence skupiny ZL3 vydána, smí být provozována pouze v nahlášené provozovně.`,b:`stanovit pro činnost jejího držitele další podmínky, je-li to potřeba v zájmu ochrany vnitřního pořádku nebo bezpečnosti.`,c:`vyžadovat z důvodu ochrany vnitřního pořádku nebo bezpečnosti doložení bezúhonnosti a spolehlivosti také u osob, které s držitelem zbrojní licence skupiny ZL3 sdílejí společnou domácnost.`,correct:"b"},
{id:177,cat:`Zákon o zbraních`,q:`Podmínka zbrojní licence spočívající v odborné způsobilosti se plní prostřednictvím:`,a:`odborně způsobilého hlavního zbrojíře.`,b:`odborně způsobilého řídícího střelby.`,c:`každé svéprávné osoby, která je k žadateli o vydání zbrojní licence nebo držiteli zbrojní licence v pracovněprávním vztahu.`,correct:"a"},
{id:178,cat:`Zákon o zbraních`,q:`Žadatel o vydání zbrojní licence prokazuje svou odbornou způsobilost:`,a:`zkouškou odborné způsobilosti nebo komisionální zkouškou, kterou je povinen složit žadatel o vydání zbrojní licence, který je fyzickou osobou, nebo alespoň jeden člen statutárního orgánu žadatele o vydání zbrojní licence, který je právnickou osobou.`,b:`prostřednictvím odborně způsobilého odpovědného zástupce, který ustanoví hlavního zbrojíře a dohlíží na vyžadovanou odbornou úroveň jeho činnosti.`,c:`prostřednictvím odborně způsobilého hlavního zbrojíře.`,correct:"c"},
{id:179,cat:`Zákon o zbraních`,q:`Hlavní zbrojíř držitele zbrojní licence skupiny ZL1 musí být držitelem:`,a:`rozšířeného zbrojního oprávnění a má alespoň střední vzdělání s výučním listem v oboru zaměřeném na oblast zbraní nebo střeliva anebo alespoň 3 roky praxe zaměřené na nakládání se zbraněmi nebo střelivem.`,b:`alespoň obecného zbrojního oprávnění.`,c:`zbrojního oprávnění a složit zkoušku odborné způsobilosti hlavního zbrojíře před zkušební komisí Ministerstva vnitra, přičemž doklad o odborné způsobilosti hlavního zbrojíře se vydává s platností 3 let.`,correct:"a"},
{id:180,cat:`Zákon o zbraních`,q:`Hlavní zbrojíř držitele zbrojní licence skupiny ZL2 musí být držitelem:`,a:`zbrojního oprávnění alespoň po dobu 3 let a musí splňovat požadavek minimálního věku 25 let.`,b:`zbrojního oprávnění alespoň po dobu 3 let, přičemž tuto dobu lze u držitele rozšířeného zbrojního oprávnění nahradit oborovým vzděláním nebo praxí stanovenou pro hlavního zbrojíře držitele zbrojní licence skupiny ZL1.`,c:`rozšířeného zbrojního oprávnění.`,correct:"b"},
{id:181,cat:`Zákon o zbraních`,q:`Hlavní zbrojíř držitele zbrojní licence skupiny ZL3 musí být držitelem:`,a:`odpovídající koncese podle živnostenského zákona.`,b:`zbrojního oprávnění, přičemž v případě obecného zbrojního oprávnění musí být jeho držitelem alespoň po dobu 3 let.`,c:`rozšířeného zbrojního oprávnění.`,correct:"c"},
{id:182,cat:`Zákon o zbraních`,q:`Ve vnitřním předpisu držitele zbrojní licence se zpravidla neuvádí:`,a:`zásady bezpečného nakládání se zbraněmi a střelivem s přihlédnutím k povaze činnosti držitele zbrojní licence.`,b:`způsob ustanovování a vymezení úkolů hlavního zbrojíře.`,c:`způsob sestavování účetní závěrky.`,correct:"c"},
{id:183,cat:`Zákon o zbraních`,q:`Držitel zbrojní licence je povinen:`,a:`zajistit dodržování svého vnitřního předpisu a zpřístupnit jej dalším osobám jeho zveřejněním na úřední desce obce.`,b:`oznámit krajskému ředitelství policie bez zbytečného odkladu ustanovení a ukončení výkonu hlavního zbrojíře.`,c:`nechat ověřit svůj vnitřní předpis znalcem zapsaným v seznamu znalců.`,correct:"b"},
{id:184,cat:`Zákon o zbraních`,q:`Pokud držitel zbrojní licence vykonává svou činnost, při které nakládá se zbraněmi nebo střelivem, v obydlí:`,a:`dopouští se takovým jednáním přestupku na úseku zbraní a střeliva, za který ve správním řízení hrozí uložení pokuty do výše 50 000 Kč.`,b:`krajské ředitelství policie zbrojní licenci bez zbytečného odkladu odejme.`,c:`je povinen umožnit za účelem provedení kontroly své činnosti držitele zbrojní licence kontrolujícímu vstup do takového obydlí.`,correct:"c"},
{id:185,cat:`Zákon o zbraních`,q:`Pokud držitel zbrojní licence skupiny ZL3 nedodržuje omezující podmínky stanovené v rozhodnutí o vydání zbrojní licence:`,a:`je povinen předmětnou zbraň odevzdat k úřednímu zničení.`,b:`dopustí se tím přestupku, za který je možné uložit pokutu do výše 50 000 Kč.`,c:`krajské ředitelství policie uloží takové osobě ve správním řízení zákaz činnosti na dobu až 3 let, odvolání proti tomuto rozhodnutí nemá odkladný účinek.`,correct:"b"},
{id:186,cat:`Zákon o zbraních`,q:`Pokud držitel zbrojní licence, který při své činnosti nakládá se zbraněmi nebo střelivem v obydlí, neumožní kontrolujícímu za účelem provedení kontroly vstup do takového obydlí:`,a:`dopouští se takovým jednáním přestupku na úseku zbraní a střeliva, za který ve správním řízení hrozí uložení pokuty do výše 50 000 Kč.`,b:`krajské ředitelství policie zbrojní licenci bez zbytečného odkladu odejme.`,c:`je povinen umožnit vstup alespoň do náhradních prostor, zejména pak do ohlášené provozovny, ve které bude provedena náhradní kontrola; listiny a evidence, které měly být předmětem kontroly v obydlí, musí být předloženy v náhradních prostorách.`,correct:"a"},
{id:187,cat:`Zákon o zbraních`,q:`Držitel zbrojní licence, který podniká v oboru zbraní a střeliva, oznámí policii:`,a:`rovněž každé právní jednání směřující k převodu zbraně nebo střeliva, tj. například doručenou poptávku nebo reakci na inzerát obsahující příslušné právní jednání držitele zbrojního oprávnění.`,b:`seznam převodů zbraní nebo střeliva uskutečněných během pracovní doby; tento seznam za období uplynulého kalendářního měsíce se zasílá krajskému ředitelství policie elektronicky do 10 pracovních dnů od skončení daného kalendářního měsíce.`,c:`převod zbraně nebo střeliva nebo právní jednání směřující k takovému převodu, které důvodně považuje za podezřelé.`,correct:"c"},
{id:188,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie může zbrojní licenci pozastavit na dobu trvání překážek stanovených zákonem o zbraních a střelivu:`,a:`a na dodatečnou dobu nezbytnou pro provedení následné kontroly činnosti takového držitele zbrojní licence.`,b:`z důvodu ochrany vnitřního pořádku nebo bezpečnosti.`,c:`pouze je-li pozastavení zbrojní licence nezbytné pro zajištění podmínek pro plnění úkolů orgánů činných v trestním řízení.`,correct:"b"},
{id:189,cat:`Zákon o zbraních`,q:`Pokud držitel zbrojní licence přeruší výkon činnosti, pro kterou byla zbrojní licence vydána:`,a:`Ministerstvo vnitra může, vyžaduje-li to důležitý veřejný zájem, platnost zbrojní licence zrušit.`,b:`Policejní prezidium může zbrojní licenci odejmout.`,c:`krajské ředitelství policie může z důvodu ochrany vnitřního pořádku nebo bezpečnosti zbrojní licenci pozastavit.`,correct:"c"},
{id:190,cat:`Zákon o zbraních`,q:`Pro vydání rozhodnutí o pozastavení zbrojní licence platí, že:`,a:`může být prvním úkonem v řízení a odvolání proti rozhodnutí o pozastavení zbrojní licence nemá odkladný účinek.`,b:`je k němu příslušný pouze soud a v přípravném řízení též státní zástupce.`,c:`může být vydáno nejvýše dvakrát v průběhu 12 měsíců; pokud řízení o vydání rozhodnutí o pozastavení zbrojní licence přesáhne dobou svého trvání 12 měsíců, považuje se zbrojní licence za pozastavenou ze zákona.`,correct:"a"},
{id:191,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie odejme zbrojní licenci:`,a:`přímo protokolem o kontrole, při které byly zjištěny závažné nedostatky v činnosti držitele zbrojní licence, pokud situace nesnese z hlediska vnitřního pořádku nebo bezpečnosti odkladu a hrozí nebezpečí z prodlení.`,b:`ke dni zveřejnění rozhodnutí o prohlášení konkursu v insolvenčním rejstříku, je-li dlužníkem v insolvenci držitel zbrojní licence, a to případně i zpětně k tomuto dni.`,c:`jestliže držitel zbrojní licence přestal splňovat některou z podmínek zbrojní licence.`,correct:"c"},
{id:192,cat:`Zákon o zbraních`,q:`Pokud držitel zbrojní licence přemístí své sídlo na území jiného státu:`,a:`přestane tím splňovat podmínku zbrojní licence a krajské ředitelství policie rozhodne o pozastavení zbrojní licence, vyžaduje-li to důležitý veřejný zájem.`,b:`nepřestane tím splňovat podmínku zbrojní licence a je na jeho uvážení, zda se zbrojní licence vzdá.`,c:`přestane splňovat podmínku zbrojní licence a zbrojní licence zanikne dnem právní moci rozhodnutí krajského ředitelství policie o odnětí zbrojní licence.`,correct:"c"},
{id:193,cat:`Zákon o zbraních`,q:`Pokud držitel zbrojní licence přestane být bezúhonný nebo spolehlivý, krajské ředitelství policie:`,a:`rozhodne o odnětí zbrojní licence.`,b:`předá tuto informaci obecnímu úřadu obce s rozšířenou působností, ve které má držitel zbrojní licence provozovnu.`,c:`rozhodne o pozastavení zbrojní licence na dobu 30 dnů.`,correct:"a"},
{id:194,cat:`Zákon o zbraních`,q:`Odvolání proti rozhodnutí o odnětí zbrojní licence:`,a:`může být prvním úkonem v řízení o odnětí zbrojní licence a až do doby prvoinstančního rozhodnutí ve věci nemá odkladný účinek.`,b:`nemá odkladný účinek.`,c:`má odkladný účinek, který může být v rozhodnutí o odnětí zbrojní licence z důvodu ochrany veřejného pořádku nebo bezpečnosti v odůvodněných případech vyloučen.`,correct:"b"},
{id:195,cat:`Zákon o zbraních`,q:`Zbrojní licence nezaniká dnem:`,a:`nabytí právní moci rozhodnutí o odnětí zbrojního oprávnění hlavnímu zbrojíři držitele zbrojní licence.`,b:`nabytí právní moci rozhodnutí o odnětí zbrojní licence.`,c:`následujícím po dni, ve kterém se její držitel zbrojní licence vzdal.`,correct:"a"},
{id:196,cat:`Zákon o zbraních`,q:`Zbrojní licence nezaniká dnem:`,a:`smrti hlavního zbrojíře.`,b:`nabytí právní moci rozhodnutí o prohlášení držitele zbrojní licence za mrtvého.`,c:`nabytí právní moci rozhodnutí o odnětí zbrojní licence.`,correct:"a"},
{id:197,cat:`Zákon o zbraních`,q:`Výjimku kategorie R1 nebo S1 lze ze zákonem o zbraních a střelivu stanovených důvodů vydat:`,a:`držiteli zbrojního oprávnění nebo zbrojní licence.`,b:`držiteli zbrojní licence nebo rozšířeného zbrojního oprávnění.`,c:`držiteli zbrojní licence skupiny ZL2 nebo ZL3.`,correct:"c"},
{id:198,cat:`Zákon o zbraních`,q:`Výjimku kategorie R1 nebo S1:`,a:`lze držiteli zbrojního oprávnění vydat pouze pro sběratelské účely, není-li to v rozporu s vnitřním pořádkem a bezpečností; vydání výjimky kategorie R1 nebo S1 není nárokové.`,b:`nelze vydat držiteli zbrojního oprávnění.`,c:`lze vydat držiteli rozšířeného zbrojního oprávnění.`,correct:"b"},
{id:199,cat:`Zákon o zbraních`,q:`Je-li předmětem žádosti o vydání výjimky kategorie R1 zbraň zvláště účinná, která podléhá mezinárodním kontrolním režimům, může krajské ředitelství policie výjimku vydat pouze na základě závazného stanoviska:`,a:`Ministerstva vnitra, které žádost posoudí z hlediska vnitřního pořádku a bezpečnosti České republiky.`,b:`Ministerstva obrany, které žádost posoudí z hlediska závazků České republiky podle mezinárodní smlouvy, která je součástí právního řádu, a z hlediska zájmů na zajišťování obrany České republiky.`,c:`Ministerstva zahraničních věcí, které žádost posoudí z hlediska zahraničně-politických zájmů České republiky.`,correct:"b"},
{id:200,cat:`Zákon o zbraních`,q:`Důvodem vydání výjimky kategorie R1 nebo S1 nemůže být:`,a:`zabezpečení nebo ochrana kritické infrastruktury, objektů mimořádné důležitosti, objektů důležitých pro obranu státu, majetku mimořádné hodnoty nebo mimořádně nebezpečných nebo cenných zásilek.`,b:`nákup, prodej nebo vypůjčování zbraní nebo střeliva realizované držitelem zbrojní licence skupiny ZL1.`,c:`filmová nebo divadelní činnost nebo jiná kulturní činnost.`,correct:"b"},
{id:201,cat:`Zákon o zbraních`,q:`Výjimku kategorie R2 nebo S2 krajské ředitelství policie vydá žadateli, který je:`,a:`držitelem zbrojního oprávnění nebo zbrojní licence skupiny ZL2 nebo ZL3.`,b:`držitelem zbrojní licence skupiny ZL1 nebo ZL2.`,c:`držitelem zbrojního oprávnění nebo zapsané autorizace.`,correct:"a"},
{id:202,cat:`Zákon o zbraních`,q:`Výjimku kategorie R2 nebo S2 krajské ředitelství policie vydá například z důvodu:`,a:`ochrany života svého nebo i jiných osob v prostorech důležitých pro obranu státu; prostory důležitými pro obranu státu se rozumí objekty důležité pro obranu státu, objekty kritické infrastruktury a pohraniční oblasti České republiky do vzdálenosti 12 km od pozemní hranice České republiky.`,b:`ochrany života, zdraví nebo majetku v citlivých prostorách; citlivými prostorami jsou úřední prostory veřejných budov a veřejná prostranství, za citlivé prostory se naopak nepovažují soukromé prostory jako například obydlí.`,c:`ochrany života, zdraví nebo majetku v citlivých prostorách; citlivými prostorami jsou prostory, jejichž nedotknutelnost je zaručena jiným právním předpisem, nebo místa, kde se zpravidla nacházejí snadno zranitelné cíle.`,correct:"c"},
{id:203,cat:`Zákon o zbraních`,q:`Výjimku kategorie R2 nebo S2 krajské ředitelství policie vydá z důvodu:`,a:`ze kterého lze podle zákona o zbraních a střelivu vydat povolení kategorie R4.`,b:`ze kterého lze podle zákona o zbraních a střelivu vydat výjimku kategorie R1 nebo S1 a dále mj. též z důvodu spočívajícího v rekonstruování historických bitev nebo obdobných událostí.`,c:`ze kterého lze podle zákona o zbraních a střelivu vydat výjimku kategorie R3 nebo S3 a dále mj. též z důvodu spočívajícího v zajišťování zážitkových střeleb.`,correct:"b"},
{id:204,cat:`Zákon o zbraních`,q:`Pro vydání výjimky kategorie R2 nebo S2 podle § 48 zákona o zbraních a střelivu platí, že:`,a:`důvody pro její vydání mohou být také stejné jako důvody pro vydání výjimky kategorie R1 nebo S1.`,b:`krajské ředitelství policie ji nemůže vydat držiteli zbrojního oprávnění.`,c:`důvodem jejího vydání nemůže být rekonstruování historických bitev nebo obdobných událostí.`,correct:"a"},
{id:205,cat:`Zákon o zbraních`,q:`Výjimku kategorie R2 pro sportovně-střeleckou činnost:`,a:`lze vydat při splnění dalších podmínek stanovených zákonem o zbraních a střelivu, zejména pak musí být k žádosti přiloženo potvrzení držitele zbrojní licence, že žadatel u něj během posledních 12 měsíců opakovaně aktivně trénoval nebo se opakovaně účastnil soutěží ve střelbě a zbraň kategorie R2 uvedená v žádosti splňuje specifikace požadované pro mezinárodně uznanou střeleckou disciplínu, kterou se tento držitel zbrojní licence při své činnosti zabývá.`,b:`nelze vydat.`,c:`lze vydat za stejných podmínek jako v případě, že je žádost založena na důvodech, pro které lze vydat výjimku kategorie R1 nebo S1; žadatel musí pouze navíc doložit, že je držitelem zbrojního oprávnění (např. předložením zbrojního listu), neboť výjimku kategorie R2 lze na rozdíl od výjimky kategorie R1 nebo S1 vydat právě i držiteli zbrojního oprávnění.`,correct:"a"},
{id:206,cat:`Zákon o zbraních`,q:`Výjimku pro nadlimitní zásobníky vydá krajské ředitelství žadateli:`,a:`jako výjimku kategorie R2 nebo R3 pro nadlimitní zásobníky, a to podle kategorie zbraně, pro kterou je nadlimitní zásobník určen.`,b:`jako výjimku kategorie R2 pro nadlimitní zásobníky, a to za obdobních podmínek jako výjimku kategorie R1.`,c:`jako výjimku kategorie S2 pro nadlimitní zásobníky, a to za obdobných podmínek jako výjimku kategorie R2.`,correct:"c"},
{id:207,cat:`Zákon o zbraních`,q:`Výjimku pro nadlimitní zásobníky nelze vydat:`,a:`vyňaté veřejnoprávní instituci.`,b:`držiteli zbrojní licence skupiny ZL2.`,c:`za obdobných podmínek jako výjimku kategorie R2.`,correct:"a"},
{id:208,cat:`Zákon o zbraních`,q:`Výjimku pro střelivo kategorie S2 vydá krajské ředitelství žadateli:`,a:`jako výjimku kategorie R2, R3 nebo R4, a to podle kategorie zbraně, jejímž držitelem žadatel je a pro kterou je dané střelivo kategorie S2 určeno.`,b:`jako výjimku kategorie S2 pro střelivo kategorie S2, a to za obdobných podmínek jako výjimku kategorie R2.`,c:`jako opatření obecné povahy o zařazení střeliva kategorie S2 mezi střelivo, se kterým je daný držitel zbrojního oprávnění oprávněn nakládat, a to po dobu, která nesmí přesáhnout dobu 3 let.`,correct:"b"},
{id:209,cat:`Zákon o zbraních`,q:`Pro vydání povolení kategorie R3 platí, že:`,a:`nemůže být vydáno z důvodu ochrany života, zdraví nebo majetku.`,b:`rozhodnutí o povolení se vydává pro všechny zbraně, se kterými držitel zbrojního oprávnění nebo zbrojní licence skupiny ZL2 nakládá, společně.`,c:`ho při splnění všech stanovených podmínek vydá na základě žádosti krajské ředitelství policie.`,correct:"c"},
{id:210,cat:`Zákon o zbraních`,q:`Povolení kategorie R3 vydá držiteli zbrojního oprávnění nebo zbrojní licence skupiny ZL2 krajské ředitelství policie z důvodu:`,a:`ze kterého lze podle zákona o zbraních a střelivu vydat výjimku kategorie R2 nebo S2; výčet těchto důvodů je iden�cký.`,b:`ze kterého lze vydat výjimku kategorie R1 nebo S1 a dále z důvodu ochrany života, zdraví nebo majetku nebo z důvodu spočívajícího v rekonstruování historických bitev nebo obdobných událostí, nebo sportovně-střelecké, lovecké nebo obdobné zájmové činnosti.`,c:`ze kterého lze podle zákona o zbraních a střelivu vydat výjimku kategorie R2 nebo S2, přičemž ale povolení kategorie R3 nelze vydat z důvodu spočívajícího ve sportovně-střelecké činnos�.`,correct:"b"},
{id:211,cat:`Zákon o zbraních`,q:`Výjimka kategorie R1 nebo R2 a povolení kategorie R3:`,a:`musí být vydáno individuálně pro každou zbraň kategorie R1, R2 nebo R3, se kterou držitel zbrojního oprávnění nebo zbrojní licence skupiny ZL2 nebo ZL3 v souladu se zákonem o zbraních a střelivu nakládá.`,b:`opravňuje svého držitele k naby�, držení nebo nošení nejvýše 2 zbraní na každou samostatnou výjimku nebo povolení, pokud výjimka nebo povolení nejsou vydány krajským ředitelstvím policie jako hromadné.`,c:`opravňuje svého držitele k naby�, držení nebo nošení nejvýše 2 zbraní na každou samostatnou výjimku nebo povolení, pokud výjimka nebo povolení nejsou vydány krajským ředitelstvím policie jako hromadné.`,correct:"a"},
{id:212,cat:`Zákon o zbraních`,q:`Výjimka kategorie R1, S1, R2 nebo S2 anebo povolení kategorie R3 jsou pozastaveny:`,a:`na dobu, po kterou jejich držitel v rozporu se zákonem nedovoleně opus�l území České republiky.`,b:`po dobu, po kterou je jejich držiteli pozastaveno zbrojní oprávnění nebo zbrojní licence.`,c:`dnem naby� právní moci rozhodnu� o odně� zbrojního oprávnění nebo zbrojní licence.`,correct:"b"},
{id:213,cat:`Zákon o zbraních`,q:`Pozastavení výjimky kategorie R1, S1, R2 nebo S2 anebo povolení kategorie R3:`,a:`nastává, pokud je jejich držiteli pozastaveno zbrojní oprávnění nebo zbrojní licence.`,b:`je možné pouze na návrh Ministerstva vnitra.`,c:`zákon o zbraních a střelivu nepřipouš�.`,correct:"a"},
{id:214,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie výjimku nebo povolení odejme:`,a:`pokud jejich držitel není na výzvu krajského ředitelství policie schopen spolehlivě doložit existenci důvodu, ze kterého byly výjimka nebo povolení vydány; v případě případů zvláštního zřetele hodných lze výjimku nebo povolení odejmout i zpětně.`,b:`pominul-li trvale důvod, pro který byly vydány; to neplatí, pokud byly výjimka nebo povolení vydány z důvodu ochrany života, zdraví nebo majetku.`,c:`pokud držitel zbrojního oprávnění nebo zbrojní licence pravidelně netrénuje střelbu nebo se neúčastní soutěží ve střelbě anebo pokud při těchto soutěžích dosahuje opakovaně pouze podprůměrných výsledků.`,correct:"b"},
{id:215,cat:`Zákon o zbraních`,q:`Pokud držitel výjimky kategorie R1, S1, R2 nebo S2 anebo povolení kategorie R3, které mu byly vydány z důvodu výkonu filmové, divadelní nebo jiné kulturní činnosti, přestane tuto činnost trvale vykonávat, krajské ředitelství policie:`,a:`vyzve držitele výjimky nebo povolení, aby výkon činnos� do 30 dnů obnovil.`,b:`výjimku nebo povolení pozastaví.`,c:`výjimku nebo povolení odejme.`,correct:"c"},
{id:216,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie odejme povolení kategorie R3 vydané pro příslušnou samonabíjecí palnou zbraň pro střelivo se středovým zápalem, pokud osoba, která s takovou zbraní nakládá:`,a:`neoprávněně nakládá s nadlimitním zásobníkem určeným pro použití v této zbrani.`,b:`neoprávněně nakládá se zbraní podléhající registraci nebo zbraní kategorie PO.`,c:`byl držitelem zbrojní licence v hlášení podezřelých transakcí nebo podezřelých právních jednání směřujících k pokusu o převod zbraně označen jako osoba, která se takového podezřelého jednání dopus�la nebo se na něm podílela.`,correct:"a"},
{id:217,cat:`Zákon o zbraních`,q:`Výjimka kategorie R1, S1, R2 nebo S2 anebo povolení kategorie R3 zaniká dnem:`,a:`zániku zbrojního oprávnění nebo zbrojní licence držitele výjimky nebo povolení nebo nabytí právní moci rozhodnutí o odnětí takové výjimky nebo povolení.`,b:`uplynu� 12 měsíců ode dne vydání výjimky nebo povolení.`,c:`zániku zbrojního oprávnění nebo zbrojní licence držitele výjimky nebo povolení anebo uplynu�m 12 měsíců ode dne vydání výjimky nebo povolení.`,correct:"a"},
{id:218,cat:`Zákon o zbraních`,q:`Dnem smrti držitele zbrojního oprávnění, který byl současně držitelem výjimky kategorie R1, S1, R2 nebo S2 anebo povolení kategorie R3, nebo dnem nabytí právní moci rozhodnutí o prohlášení za mrtvého:`,a:`výjimka nebo povolení přechází na oprávněného dědice jejich držitele.`,b:`výjimka nebo povolení zaniká, protože rovněž zaniklo zbrojní oprávnění.`,c:`krajské ředitelství policie zahájí řízení o odně� výjimky nebo povolení.`,correct:"b"},
{id:219,cat:`Zákon o zbraních`,q:`Zapsaná autorizace:`,a:`je povolením udělovaným autorizovaným instruktorům, kteří jsou oprávněni zajišťovat výuku a výcvik žadatelů o získání zbrojního oprávnění.`,b:`je technickou autorizací, jejímž účelem je posouzení souladu zbraně kategorie PO s požadavky na její výrobní provedení stanovenými nařízením vlády, před uvedením takové zbraně na trh; každá zapsaná autorizace podléhá no�fikaci Evropské komisi.`,c:`opravňuje svého držitele k nakládání se zbraní kategorie PO a případně k dalším činnostem, stanoví-li tak zákon o zbraních a střelivu.`,correct:"c"},
{id:220,cat:`Zákon o zbraních`,q:`Zapsaná autorizace opravňuje jejího držitele k nakládání se zbraní kategorie:`,a:`R4.`,b:`PO.`,c:`ZA.`,correct:"b"},
{id:221,cat:`Zákon o zbraních`,q:`Podmínkou pro vydání zapsané autorizace není:`,a:`místo pobytu na území České republiky a zle�lost.`,b:`odborná způsobilost a spolehlivost.`,c:`svéprávnost a bezúhonnost.`,correct:"b"},
{id:222,cat:`Zákon o zbraních`,q:`Fyzická osoba, která žádá o vydání zapsané autorizace, musí být mimo jiné:`,a:`občanem České republiky.`,b:`starší 21 let.`,c:`plně svéprávná.`,correct:"c"},
{id:223,cat:`Zákon o zbraních`,q:`Při posuzování podmínky bezúhonnosti v řízení o vydání zapsané autorizace:`,a:`se nepřihlíží k zahlazení odsouzení ani k jiným případům, v nichž nastává účinek, že se na pachatele hledí, jako by nebyl odsouzen.`,b:`se za bezúhonného považuje i ten, na koho se hledí, jako by nebyl odsouzen.`,c:`se zohledňuje pouze spáchání trestných činů, které byly spáchány v souvislos� s nakládáním se zbraněmi, střelivem, municí nebo výbušninou.`,correct:"b"},
{id:224,cat:`Zákon o zbraních`,q:`Zapsaná autorizace může být za zákonem stanovených podmínek vydána:`,a:`fyzické s místem pobytu na území České republiky nebo právnické osobě se sídlem na území České republiky.`,b:`pouze fyzické osobě, která je občanem České republiky.`,c:`právnické osobě se sídlem na území kteréhokoli členského státu Evropské unie.`,correct:"a"},
{id:225,cat:`Zákon o zbraních`,q:`Pro pozastavení zapsané autorizace platí, že:`,a:`o něm rozhoduje Policejní prezidium z důvodu ochrany vnitřního pořádku nebo bezpečnos�.`,b:`trvá po dobu, kdy je u jejího držitele dán důvod pro zajištění zbraně, střeliva nebo souvisejícího dokladu nebo listiny.`,c:`se pro� němu nelze odvolat.`,correct:"b"},
{id:226,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie odejme zapsanou autorizaci, pokud:`,a:`její držitel přestane splňovat podmínku odborné způsobilos�.`,b:`její držitel přestane splňovat podmínku spolehlivos�.`,c:`se prokáže, že zdravotní stav jejího držitele by mohl v souvislosti s nakládáním se zbraní nebo střelivem představovat ohrožení života nebo zdraví.`,correct:"c"},
{id:227,cat:`Zákon o zbraních`,q:`Mezi důvody zániku zapsané autorizace nepatří:`,a:`rozhodnutí o prohlášení jejího držitele za nezvěstného.`,b:`vzdání se zapsané autorizace jejím držitelem.`,c:`zánik právnické osoby, která je jejím držitelem.`,correct:"a"},
{id:228,cat:`Zákon o zbraních`,q:`Osoba nakládající se zbraní a střelivem je podle zákona o zbraních a střelivu:`,a:`povinna střílet pouze na střelnici provozované podle zákona o zbraních a střelivu.`,b:`oprávněna střílet mimo jiné na střelnici provozované podle zákona o zbraních a střelivu, není ale oprávněna střílet na střelnici provozované vyňatou veřejnoprávní ins�tucí.`,c:`oprávněna střílet mimo jiné na střelnici provozované podle zákona o zbraních a střelivu nebo na střelnici provozované vyňatou veřejnoprávní institucí.`,correct:"c"},
{id:229,cat:`Zákon o zbraních`,q:`Osoba nakládající se zbraní a střelivem může střílet na střelnici provozované Ministerstvem vnitra nebo Ministerstvem obrany:`,a:`pokud jí to tento provozovatel umožní.`,b:`pokud k tomu udělilo krajské ředitelství policie předchozí souhlas.`,c:`pouze pokud se jedná o střelbu ze zbraně, u které není úsťová energie střely vyšší než 30 J.`,correct:"a"},
{id:230,cat:`Zákon o zbraních`,q:`Osoba nakládající se zbraní je podle zákona o zbraních a střelivu oprávněna střílet ze zbraně, u které není úsťová energie střely vyšší než 50 J, nebo ze signální zbraně nebo jde-li o jinou než ostrou střelbu:`,a:`na soukromém pozemku.`,b:`na místě, kde je zajištěno, že nebude ohrožen život, zdraví, majetek nebo veřejný pořádek.`,c:`na pozemku, který se z hlediska svého využi� považuje za sportoviště nebo za ostatní plochu.`,correct:"b"},
{id:231,cat:`Zákon o zbraních`,q:`Střelba ze zbraně, u které není úsťová energie střely vyšší než 50 J, nebo ze signální zbraně nebo jiná, než ostrá střelba je možná mimo jiné i na místě:`,a:`kde je zajištěno, že nebude ohrožen život, zdraví, majetek nebo veřejný pořádek.`,b:`které v rozhodnu� určilo krajské ředitelství policie.`,c:`s nímž vyslovil souhlas obecní úřad obce s rozšířenou působnos�, na jejímž území se místo nachází.`,correct:"a"},
{id:232,cat:`Zákon o zbraních`,q:`Na místě, kde je zajištěno, že nebude ohrožen život, zdraví, majetek nebo veřejný pořádek, je osoba nakládající se zbraní oprávněna střílet:`,a:`ze zbraně, u které není úsťová energie střely vyšší než 50 J, nebo ze signální zbraně nebo jde- li o jinou než ostrou střelbu.`,b:`ze zbraně s nasazeným tlumičem hluku výstřelu.`,c:`poplašné nebo signalizační zbraně, u které je úsťová energie střely vyšší než 2 kJ, ale nižší než 20 kJ, nebo z plynové zbraně.`,correct:"a"},
{id:233,cat:`Zákon o zbraních`,q:`Používat zbraně podle tohoto zákona, které nejsou zbraněmi palnými nebo plynovými (např. laserová zařízení, která jsou považována za zbraň, nebo plamenomety), je dovoleno:`,a:`na soukromém pozemku.`,b:`pouze na střelnici zvláště schválené pro takovou činnost.`,c:`na místě, kde je zajištěno, že nebude ohrožen život, zdraví, majetek nebo veřejný pořádek.`,correct:"c"},
{id:234,cat:`Zákon o zbraních`,q:`Je pravda, že jiný zákon [např. zákon č. 449/2001 Sb., o myslivosti, ve znění pozdějších předpisů nebo zákon č. 166/1999 Sb., o veterinární péči a o změně některých souvisejících zákonů (veterinární zákon), ve znění pozdějších předpisů] může stanovit i jiné místo, na kterém je osoba nakládající se zbraní a střelivem oprávněna střílet?`,a:`Ano.`,b:`Ano, ale pouze pokud se jedná o střelbu z jiné než palné zbraně.`,c:`Ne.`,correct:"a"},
{id:235,cat:`Zákon o zbraních`,q:`Na střelnici, jejíž provoz byl povolen podle zákona o zbraních a střelivu:`,a:`lze ke střelbě používat pouze střelivo; munici lze střílet výhradně na střelnici pro munici, jejíž provoz byl povolen podle zákona o munici.`,b:`lze střílet munici se střelou bez obsahu aktivních muničních náplní, pokud je její kinetická energie srovnatelná se střelivem, jehož použití je na střelnici povoleno.`,c:`lze střílet munici se střelou s obsahem množství výbušniny, které je ekvivalentem nejvýše 50 g trinitrotoluenu, pokud použi� takové munice provozní řád střelnice povolené podle zákona o zbraních a střelivu připouš� a pokud je střelnice vybavena dopadištěm v minimální vzdálenos� 50 m od nejbližší palebné čáry.`,correct:"b"},
{id:236,cat:`Zákon o zbraních`,q:`Platí, že střelbu munice:`,a:`lze provádět na střelnici, jejíž provoz byl povolen podle zákona o zbraních a střelivu, a lze ji přitom provádět se střelou s obsahem ak�vních muničních náplní.`,b:`nelze provádět.`,c:`upravuje zákon č. 91/2024 Sb., o munici, ve znění pozdějších předpisů.`,correct:"c"},
{id:237,cat:`Zákon o zbraních`,q:`Provoz střelnice pro střelbu ze zbraně, u které je úsťová energie střely nižší než 50 J:`,a:`podléhá souhlasu Českého úřadu pro zkoušení zbraní a střeliva.`,b:`podléhá povolení krajského ředitelství policie.`,c:`nepodléhá uvedenému souhlasu ani povolení.`,correct:"c"},
{id:238,cat:`Zákon o zbraních`,q:`Je-li v souladu se zákonem o zbraních a střelivu zajištěna bezpečnost provozu, lze jako střelnici využívat:`,a:`pouze pozemek nebo stavbu.`,b:`pouze technické zařízení.`,c:`pozemek, stavbu nebo technické zařízení.`,correct:"c"},
{id:239,cat:`Zákon o zbraních`,q:`Podle způsobu provozování se podle zákona o zbraních a střelivu střelnice rozlišují na střelnice:`,a:`komerční a nekomerční.`,b:`veřejné, na kterých se neprovádí evidence osob provádějících zde střelbu, a neveřejné, na kterých se provádí evidence osob provádějících zde střelbu, pokud jde o držitele zbrojního oprávnění, zapsané autorizace anebo oprávnění k provedení přeshraničního přemístění zbraně nebo střeliva.`,c:`příležitostné, které nejsou podle provozního řádu využívány častěji než 26 dnů v kalendářním roce, nebo stálé, kterými jsou střelnice, které nejsou příležitostnými střelnicemi.`,correct:"c"},
{id:240,cat:`Zákon o zbraních`,q:`Podle způsobu provozování rozlišuje zákon o zbraních a střelivu střelnice na:`,a:`veřejné nebo soukromé.`,b:`příležitostné nebo stálé.`,c:`civilní nebo vyhrazené.`,correct:"b"},
{id:241,cat:`Zákon o zbraních`,q:`Podle konstrukce se podle zákona o zbraních a střelivu střelnice rozlišují na střelnice:`,a:`kulové, na kterých je dovolena střelba z dlouhých kulových zbraní, a brokové, kterými jsou střelnice, které nejsou kulovými střelnicemi.`,b:`kryté, u nichž se celý ohrožený prostor nachází v uzavřeném objektu, který je konstruován tak, aby byl únik střel do okolního prostoru při dodržení provozního řádu vyloučen, nebo otevřené, kterými jsou střelnice, které nejsou krytými střelnicemi.`,c:`zapsané zkouškové střelnice, kterými jsou střelnice, jejichž provozovateli krajské ředitelství policie přizná právo provozovat střelnici jako zapsanou zkouškovou střelnici, a ostatní střelnice, které nejsou zapsanými zkouškovými střelnicemi.`,correct:"b"},
{id:242,cat:`Zákon o zbraních`,q:`Podle konstrukce se podle zákona o zbraních a střelivu střelnice rozlišují na střelnice:`,a:`kryté nebo otevřené.`,b:`vnitřní nebo vnější.`,c:`nadzemní nebo podzemní.`,correct:"a"},
{id:243,cat:`Zákon o zbraních`,q:`Provozovatel zapsané zkouškové střelnice, na které lze konat zkoušku odborné způsobilosti nebo komisionální zkoušku:`,a:`nemusí být držitelem zbrojní licence.`,b:`musí být držitelem zbrojní licence.`,c:`musí být držitelem akreditace.`,correct:"b"},
{id:244,cat:`Zákon o zbraních`,q:`Není pravda, že povolení provozovat střelnici:`,a:`vydává krajské ředitelství policie.`,b:`lze vydat pouze právnické osobě.`,c:`se vydává na žádost.`,correct:"b"},
{id:245,cat:`Zákon o zbraních`,q:`K žádosti o povolení provozovat střelnici se nepřikládá:`,a:`provozní řád střelnice odpovídající požadavkům zákona o zbraních a střelivu.`,b:`znalecký posudek vyhotovený znalcem zapsaným v seznamu znalců nebo projektová, popřípadě technická dokumentace, a to za účelem prokázání bezpečnos� provozu střelnice.`,c:`vyjádření krajského úřadu k provoznímu řádu střelnice z hlediska ochrany veřejné mravnosti a zdraví a z hlediska prevence sociálně patologických jevů.`,correct:"c"},
{id:246,cat:`Zákon o zbraních`,q:`Přiložení vyjádření krajské hygienické stanice k provoznímu řádu střelnice z hlediska ochrany veřejného zdraví před hlukem k žádosti o povolení provozovat střelnici:`,a:`je nezbytné ve všech případech.`,b:`není nezbytné v případech střelnic vymezených nařízením vlády, č. 187/2025 Sb., o technických požadavcích a dalších specifikacích pro některé zbraně, střelivo a střelnice a pro zabezpečení zbraní a střeliva.`,c:`je povinné pouze u otevřených střelnic.`,correct:"b"},
{id:247,cat:`Zákon o zbraních`,q:`Provozní řád střelnice nevymezuje:`,a:`pravidla provádění dohledu správce střelnice nad nakládáním se zbraněmi a střelivem na střelnici, a to pro celou dobu, po kterou je na střelnici prováděna střelba.`,b:`pravidla bezpečného provozu střelnice s ohledem na místní podmínky a používané zbraně a střelivo.`,c:`náležitosti žádosti o povolení provozovat střelnici.`,correct:"c"},
{id:248,cat:`Zákon o zbraních`,q:`Pro provozní knihu střelnice platí, že:`,a:`vymezuje práva a povinnos� správce střelnice a řídícího střelby.`,b:`stanoví rozsah odpovědnos� provozovatele střelnice za škodu způsobenou při provádění střelby na střelnici.`,c:`obsahuje seznam osob, které na střelnici provádí střelbu, a zbraní, které k tomu používají.`,correct:"c"},
{id:249,cat:`Zákon o zbraních`,q:`Totožnost osoby, která na střelnici provádí střelbu:`,a:`se ověřuje.`,b:`se ověřuje pouze tehdy, je-li osoba cizinec.`,c:`se neověřuje.`,correct:"a"},
{id:250,cat:`Zákon o zbraních`,q:`Mezi povinnosti provozovatele střelnice patří:`,a:`zajis�t seznámení osob, které se budou nacházet v ochranném pásmu střelnice, s provozním řádem střelnice.`,b:`oznámit krajskému ředitelství policie bez zbytečného odkladu ustanovení a ukončení výkonu funkce každého správce střelnice.`,c:`zajis�t vedení evidenční knihy střelnice a její uchování nejméně po dobu 60 měsíců po skončení daného kalendářního roku.`,correct:"b"},
{id:251,cat:`Zákon o zbraních`,q:`Pokud došlo ke změně podmínek provozování střelnice a provozní řád jim neodpovídá:`,a:`povolení provozovat střelnice zaniká do 10 pracovních dnů ode dne, kdy tato změna nastala.`,b:`je provozovatel střelnice povinen provést změnu provozního řádu střelnice.`,c:`nemá tato následná změna na znění provozního řádu střelnice žádný vliv.`,correct:"b"},
{id:252,cat:`Zákon o zbraních`,q:`Cizinec, který nemá místo pobytu na území České republiky a který se neprokáže oprávněním pro přeshraniční přemístění zbraně nebo střeliva:`,a:`nemůže na střelnici provádět střelbu.`,b:`může na střelnici provádět střelbu pouze za přítomnos� řídícího střelby, který ovládá mateřský jazyk cizince nebo jazyk, o kterém cizinec prohlásí, že ho ovládá.`,c:`může na střelnici provádět střelbu a je povinností provozovatele střelnice zajistit zápis této skutečnosti do centrálního registru zbraní v obdobném rozsahu jako do provozní knihy střelnice.`,correct:"c"},
{id:253,cat:`Zákon o zbraních`,q:`Není pravda, že správcem střelnice může být ustanovena pouze osoba:`,a:`která je plně svéprávná a zle�lá.`,b:`která není členem orgánu nebo odpovědným zástupcem provozovatele střelnice.`,c:`která je držitelem zbrojního oprávnění.`,correct:"b"},
{id:254,cat:`Zákon o zbraních`,q:`Správce střelnice musí být:`,a:`zletilým držitelem zbrojního oprávnění.`,b:`zle�lým držitelem zapsané autorizace nebo zbrojního oprávnění.`,c:`svéprávnou zle�lou osobou, která má praxi v oblas� řízení střelby alespoň po dobu 3 let.`,correct:"a"},
{id:255,cat:`Zákon o zbraních`,q:`Správce střelnice:`,a:`v souladu s provozním řádem střelnice dohlíží na jeho dodržování a je oprávněn za účelem zajištění bezpečného nakládání se zbraněmi a střelivem udělovat osobám na střelnici pokyny.`,b:`v souladu se zákonem o zbraních a střelivu odpovídá za technickou správu fyzické infrastruktury střelnice.`,c:`v souladu se zákonem o zbraních a střelivu a případně s jiným právním předpisem dohlíží na osoby provádějící na střelnici střelbu a v případě uskutečňování střeleckých závodů na střelnici zajišťuje dodržování pravidel stanovených pro jednotlivé disciplíny schválených příslušnými mezinárodními sportovními federacemi.`,correct:"a"},
{id:256,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení:`,a:`Správce střelnice v souladu s provozním řádem střelnice dohlíží na dodržování provozního řádu střelnice.`,b:`Správce střelnice není oprávněn za účelem zajištění bezpečného nakládání se zbraněmi a střelivem udělovat osobám na střelnici pokyny.`,c:`Správce střelnice může i bez toho, aby tak stanovil provozní řád střelnice, určit řídícího střelby, který správci střelnice poskytuje součinnost při dohledu nad dodržováním provozního řádu střelnice.`,correct:"a"},
{id:257,cat:`Zákon o zbraních`,q:`Řídícím střelby je podle zákona o zbraních a střelivu:`,a:`držitel zbrojního oprávnění, kterého určí v souladu se zákonem o zbraních a střelivu krajské ředitelství policie a který policii poskytuje součinnost při kontrole nad činnos� provozovatele střelnice a prováděním střelby osobami přítomnými na střelnici.`,b:`držitel zbrojního oprávnění, který je správcem střelnice.`,c:`zletilý držitel zbrojního oprávnění, kterého určí v souladu s provozním řádem střelnice správce střelnice a který správci střelnice poskytuje součinnost při dohledu nad dodržováním provozního řádu střelnice a při zajišťování bezpečného nakládání se zbraněmi a střelivem na střelnici.`,correct:"c"},
{id:258,cat:`Zákon o zbraních`,q:`Není pravda, že řídícím střelby může být určena pouze fyzická osoba, která je:`,a:`plně svéprávná.`,b:`zle�lá.`,c:`držitelem zbrojní licence.`,correct:"c"},
{id:259,cat:`Zákon o zbraních`,q:`Pokud se jako řídící střelby určuje konkrétní fyzická osoba v souladu se zákonem:`,a:`musí být o jeho určení správcem střelnice vyrozuměno krajské ředitelství policie, a to elektronicky se zaručenou iden�tou, jinak je určení řídícího střelby neplatné.`,b:`musí být o jeho určení vyhotoven písemný záznam, který podepíše správce střelnice a řídící střelby a ve kterém se vymezí rozsah úkolů řídícího střelby; není-li záznam vyhotoven, je určení řídícího střelby neplatné.`,c:`provede se zápis do provozního řádu střelnice, a to psacími potřebami umožňujícími nesmazatelný záznam; neprovede-li řídící střelby tento zápis do 10 pracovních dnů ode dne svého určení, může krajské ředitelství policie rozhodnout o pozastavení provozu střelnice.`,correct:"b"},
{id:260,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení:`,a:`O určení řídícího střelby musí být vyhotoven písemný záznam, který podepíše správce střelnice a řídící střelby.`,b:`S určením řídícího střelby musí vyslovit souhlas krajské ředitelství policie.`,c:`Určení řídícího střelby lze dohodnout ústně, je-li dohodě přítomen provozovatel střelnice.`,correct:"a"},
{id:261,cat:`Zákon o zbraních`,q:`Není-li o určení řídícího střelby vyhotoven písemná záznam, je jeho určení:`,a:`platné, pokud s �m řídící střelby souhlasí.`,b:`neplatné, pokud se neplatnos� řídící střelby dovolá.`,c:`neplatné.`,correct:"c"},
{id:262,cat:`Zákon o zbraních`,q:`Byla-li v 24 měsících předcházejících podání žádosti o povolení provozovat střelnici v daném místě již provozována střelnice, která se svou povahou v podstatných znacích neodlišuje od střelnice, o jejíž provozování se žádá:`,a:`je řízení o žádosti o povolení provozovat střelnici jednodušší, pokud jde o počet povinných příloh přikládaných v žádosti.`,b:`krajské ředitelství policie prodlouží platnost povolení provozovat původní střelnici.`,c:`nemá tato skutečnost na řízení o žádos� o povolení provozovat střelnici vliv.`,correct:"a"},
{id:263,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie může z důvodu ochrany vnitřního pořádku nebo bezpečnosti povolení provozovat střelnici pozastavit mimo jiné na dobu, po kterou:`,a:`je ohrožován život, zdraví nebo majetek jiné osoby z důvodu rozporu skutečného technického stavu střelnice s jejím provozním řádem nebo s technicko-organizačními požadavky, které stanoví příloha č. 3 k tomuto zákonu.`,b:`lze očekávat nižší vy�ženost střelnice s ohledem na roční období nebo denní dobu, a to i pokud s �m provozovatel střelnice nevysloví souhlas.`,c:`není určen žádný řídící střelby.`,correct:"a"},
{id:264,cat:`Zákon o zbraních`,q:`Pokud provozní řád střelnice vážným způsobem neodpovídá podmínkám stanoveným zákonem o zbraních a střelivu nebo provozovatel střelnice nepřijme účinná opatření, aby zamezil opakovanému hrubému porušování zákona o zbraních a střelivu nebo provozního řádu střelnice při jejím provozu:`,a:`krajské ředitelství policie může povolení provozovat střelnici bezprostředně zrušit.`,b:`krajské ředitelství policie může povolení provozovat střelnici pozastavit.`,c:`krajské ředitelství policie o tom sepíše úřední záznam a předá jej Policejnímu prezidiu k dalšímu opatření.`,correct:"b"},
{id:265,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie povolení provozovat střelnici odejme, jestliže provozovatel střelnice:`,a:`opakovaně neprokázal svou občanskou zachovalost a krajské ředitelství policie místním šetřením v místě, kde je střelnice provozována, prokáže závažné nedostatky v osobní pověs�, které požívá provozovatel střelnice nebo osoby střelnici pravidelně navštěvující.`,b:`ani v přiměřené dodatečné lhůtě podle správního řádu neodstranil nedostatky žádos� o povolení provozovat střelnici nebo došlo k odně� práva provozovat střelnici jako zapsanou zkouškovou střelnici.`,c:`ani v přiměřené dodatečné lhůtě, kterou stanoví krajské ředitelství policie a která nesmí být kratší než 60 dnů, neodstraní nedostatky, které vedly k pozastavení povolení provozovat střelnici.`,correct:"c"},
{id:266,cat:`Zákon o zbraních`,q:`Přestane-li provozovatel střelnice splňovat podmínku bezúhonnosti nebo spolehlivosti, krajské ředitelství policie povolení provozovat střelnici:`,a:`prohlásí za neplatné.`,b:`pozastaví.`,c:`odejme.`,correct:"c"},
{id:267,cat:`Zákon o zbraních`,q:`Povolení provozovat střelnici nezaniká dnem:`,a:`naby� právní moci rozhodnu� o jeho odně�.`,b:`smrti správce střelnice.`,c:`následujícím po dni, ve kterém se jej provozovatel střelnice vzdal.`,correct:"b"},
{id:268,cat:`Zákon o zbraních`,q:`Držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, který nabude zbraň podléhající registraci, je povinen:`,a:`ohlásit tuto skutečnost krajskému ředitelství policie do 10 pracovních dnů ode dne uhrazení kupní ceny takové zbraně; v případě, že jej k tomu krajské ředitelství vyzve, má rovněž povinnost předložit tuto zbraň ke kontrole ráže.`,b:`ohlásit tuto skutečnost do 10 pracovních dnů ode dne, kdy s takovou zbraní začal nakládat, krajskému ředitelství policie a předložit mu tuto zbraň k prohlídce jejího označení a technického stavu.`,c:`ohlásit neprodleně krajskému ředitelství policie, že nabyl zbraň podléhající registraci, uvést kategorii této zbraně a označit osobu, od které zbraň nabyl; krajské ředitelství policie ověří u označené osoby údaje uvedené ohlašovatelem.`,correct:"b"},
{id:269,cat:`Zákon o zbraních`,q:`Držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, který nabude zbraň podléhající registraci, je povinen ohlásit tuto skutečnost do:`,a:`10 kalendářních dnů ode dne, kdy s takovou zbraní začal nakládat.`,b:`10 pracovních dnů ode dne, kdy s takovou zbraní začal nakládat.`,c:`30 dnů ode dne, kdy s takovou zbraní začal nakládat.`,correct:"b"},
{id:270,cat:`Zákon o zbraních`,q:`Držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2 je povinen ohlásit:`,a:`nabi� zbraně podléhající registraci, a to do 10 pracovních dnů ode dne, kdy byla zraň nabita.`,b:`nabytí zbraně podléhající registraci, a to do 10 pracovních dnů ode dne, kdy s takovou zbraní začal nakládat, krajskému ředitelství policie a předložit mu tuto zbraň k prohlídce.`,c:`nabi� zbraně podléhající registraci, a to do 10 dnů ode dne, kdy s takovou zbraní začal nakládat, přičemž ale je povinen zbraň ve lhůtě 30 dnů ode dne provedení ohlášení opět vybít.`,correct:"b"},
{id:271,cat:`Zákon o zbraních`,q:`Držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, který nabude zbraň podléhající registraci, je povinen tuto skutečnost ohlásit a současně:`,a:`předložit zbraň krajskému ředitelství policie k prohlídce jejího označení a technického stavu.`,b:`ji zaznamenat v centrálním registru zbraní.`,c:`předložit krajskému ředitelství policie kupní smlouvu ke zbrani.`,correct:"a"},
{id:272,cat:`Zákon o zbraních`,q:`Držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, který převedl registrovanou zbraň na jinou osobu, je povinen:`,a:`ohlásit její převod Policejnímu prezidiu České republiky, a to do 10 pracovních dnů ode dne jeho uskutečnění.`,b:`ohlásit její převod krajskému ředitelství policie, a to do 10 kalendářních dnů ode dne jeho uskutečnění.`,c:`ohlásit její převod krajskému ředitelství policie, a to do 10 pracovních dnů ode dne jeho uskutečnění.`,correct:"c"},
{id:273,cat:`Zákon o zbraních`,q:`Držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2, který převedl registrovanou zbraň na jinou osobu, je povinen:`,a:`ohlásit její převod krajskému ředitelství policie, a to do 10 pracovních dnů ode dne jeho uskutečnění.`,b:`ohlásit tuto skutečnost do 10 pracovních dnů krajskému ředitelství policie a předložit mu tuto zbraň k prohlídce jejího označení a technického stavu.`,c:`ohlásit její převod krajskému ředitelství policie, a to do 30 dnů ode dne jeho uskutečnění.`,correct:"a"},
{id:274,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie rozhodne o odmítnutí provést registraci zbraně podléhající registraci, pokud:`,a:`její držitel věrohodně neprokáže právní �tul naby� takové zbraně do svého vlastnictví.`,b:`označení zbraně iden�fikačními údaji neodpovídá požadavkům zákona o zbraních a střelivu.`,c:`jde o zbraň, s níž její držitel není oprávněn nakládat; v takovém případě krajské ředitelství policie zbraň zadrží.`,correct:"c"},
{id:275,cat:`Zákon o zbraních`,q:`Pokud držitel zbraně ohlásí nabytí zbraně podléhající registraci, se kterou není oprávněn nakládat:`,a:`krajské ředitelství policie rozhodne o odmítnu� provést registraci zbraně a zbraň znehodno�.`,b:`krajské ředitelství policie rozhodne o odmítnutí provést registraci zbraně a zbraň zadrží.`,c:`krajské ředitelství policie provede registraci zbraně a zbraň převezme dočasně do úschovy.`,correct:"b"},
{id:276,cat:`Zákon o zbraních`,q:`Hlavním držitelem zbraně je osoba:`,a:`která má největší majetkový podíl na hodnotě zbraně v případě zbraní podléhajících registraci ve spoluvlastnictví nebo sbírek zbraní ve spoluvlastnictví.`,b:`které byla tato zbraň zaregistrována.`,c:`kterou na návrh vlastníka zbraně takto označí krajské ředitelství policie v centrálním registru zbraní; vlastník zbraně je oprávněn určení hlavního držitele zbraně kdykoli odvolat nebo změnit.`,correct:"b"},
{id:277,cat:`Zákon o zbraních`,q:`Krajské ředitelství policie zapíše do centrálního registru zbraní vedlejšího držitele`,a:`na žádost hlavního držitele, a to ke zbrani podléhající registraci, se kterou jako hlavní držitel nakládá.`,b:`vždy, pokud jde o zbraň ve spoluvlastnictví; vedlejšími držiteli jsou všichni spoluvlastníci, a to podle velikos� podílu na vlastnictví zbraně.`,c:`na návrh osoby, která má být jako vedlejší osoba zapsána a která v době návrhu se dotčenou zbraní nakládá.`,correct:"a"},
{id:278,cat:`Zákon o zbraních`,q:`Žádost, aby do centrálního registru zbraní byl ke zbrani podléhající registraci zapsán jeden nebo více vedlejších držitelů zbraně, podává:`,a:`hlavní držitel zbraně.`,b:`hlavní držitel zbraně, pokud s �m Policejní prezidium předem vyslovilo souhlas.`,c:`hlavní držitel zbraně po uplynu� nejméně 60 dnů ode dne, kdy mu byla zbraň zaregistrována.`,correct:"a"},
{id:279,cat:`Zákon o zbraních`,q:`Jako vedlejší držitel zbraně může být do centrálního registru zbraní zapsána osoba, která:`,a:`nabyla vlastnictví k této zbrani, ohlásila její naby� krajskému ředitelství policie ve lhůtě 10 pracovních dnů ode dne jejího naby� a předložila tuto zbraň k prohlídce jejího označení a technického stavu.`,b:`je držitelem zapsané autorizace a podle zákona o zbraních a střelivu nebo jiného právního předpisu má povinnost své zapsání jako vedlejšího držitele zbraně strpět.`,c:`je oprávněna v souladu se zákonem o zbraních a střelivu s danou zbraní nakládat a se svým zapsáním souhlasí.`,correct:"c"},
{id:280,cat:`Zákon o zbraních`,q:`Jako vedlejší držitel zbraně může být do centrálního registru zbraní zapsána osoba:`,a:`kterou navrhlo krajské ředitelství policie.`,b:`která o to sama požádala.`,c:`která je oprávněna s danou zbraní nakládat a se svým zapsáním souhlasí.`,correct:"c"},
{id:281,cat:`Zákon o zbraních`,q:`Jako vedlejší držitel zbraně kategorie R3 může být zapsán:`,a:`žadatel o vydání zbrojního oprávnění; po vydání zbrojního oprávnění je taková osoba oprávněna požádat o změnu zápisu v centrálním registru tak, aby se stala hlavním držitelem zbraně kategorie R3, se kterou jako vedlejší držitel nakládá.`,b:`držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2 nebo ZL3, a to za podmínky, že je takový držitel zbrojního oprávnění nebo zbrojní licence držitelem povolení kategorie R3.`,c:`držitel zbrojního oprávnění nebo držitel zbrojní licence skupiny ZL2 nebo ZL3; osoba, která má být zapsána jako vedlejší držitel zbraně kategorie R3, nemusí být držitelem povolení kategorie R3, neboť nedochází k přechodu vlastnictví dané zbraně.`,correct:"b"},
{id:282,cat:`Zákon o zbraních`,q:`Pokud bylo vedlejšímu držiteli zbraně pozastaveno zbrojní oprávnění nebo mu zbrojní oprávnění zaniklo:`,a:`krajské ředitelství policie bez zbytečného odkladu o této skutečnosti uvědomí hlavního držitele zbraně.`,b:`je vedlejší držitel zbraně povinen o tom informovat hlavního držitele zbraně.`,c:`je hlavní držitel zbraně povinen krajskému ředitelství policie navrhnout provedení výmazu zápisu takového vedlejšího držitele zbraně.`,correct:"a"},
{id:283,cat:`Zákon o zbraních`,q:`Nabytí zbraně kategorie PO musí být ohlášeno krajskému ředitelství policie:`,a:`do 14 pracovních dnů ode dne, kdy s ní začal její držitel nakládat.`,b:`do 10 pracovních dnů ode dne provedení kusového ověření takové zbraně Českým úřadem pro zkoušení zbraní a střeliva.`,c:`do 10 pracovních dnů ode dne, kdy s ní začal její držitel nakládat.`,correct:"c"},
{id:284,cat:`Zákon o zbraních`,q:`Ohlášení podléhá nabytí:`,a:`historické zbraně.`,b:`krátké opakovací palné zbraně pro použi� střeliva se středovým zápalem.`,c:`signální zbraně pro použití signálních nábojů nejvýše ráže 16 mm.`,correct:"c"},
{id:285,cat:`Zákon o zbraních`,q:`Lhůta 10 pracovních dnů pro ohlášení nabytí zbraně kategorie PO se počítá ode dne:`,a:`kdy byla jejímu držiteli doručena výzva krajského ředitelství policie k provedení ohlášení.`,b:`kdy s ní začal její držitel nakládat.`,c:`ode dne vydání zapsané autorizace.`,correct:"b"},
{id:286,cat:`Zákon o zbraních`,q:`Zbraň kategorie PO, jejíž nabytí ohlásil držitel této zbraně:`,a:`musí být současně předložena k prohlídce krajskému ředitelství policie.`,b:`se k prohlídce krajskému ředitelství policie povinně nepřikládá.`,c:`musí být současně předložena ke kontrole Českému úřadu pro zkoušení zbraní a střeliva.`,correct:"b"},
{id:287,cat:`Zákon o zbraních`,q:`Držitel zbraně kategorie PO, který tuto zbraň převedl na jinou osobu, je povinen:`,a:`ohlásit její převod kterémukoli útvaru policie, a to neprodleně.`,b:`ohlásit její převod krajskému ředitelství policie, a to do 10 pracovních dnů ode dne jeho uskutečnění.`,c:`ohlásit její převod krajskému ředitelství policie, a to do 20 dnů ode dne vydání zapsané autorizace.`,correct:"b"},
{id:288,cat:`Zákon o zbraních`,q:`Pokud držitel zbraně ohlásí nabytí zbraně kategorie PO, se kterou není oprávněn nakládat:`,a:`krajské ředitelství policie zápis změny stavu zbraně do centrálního registru zbraní neprovede a zbraň zadrží.`,b:`krajské ředitelství policie provede zápis změny stavu zbraně do centrálního registru zbraní a zbraň převezme dočasně do úschovy.`,c:`krajské ředitelství policie zápis změny stavu zbraně do centrálního registru zbraní neprovede a zbraň znehodno�.`,correct:"a"},
{id:289,cat:`Zákon o zbraních`,q:`Pokud držitel zbrojního oprávnění, který je hlavním držitelem zbraně podléhající registraci, předá tuto zbraň dočasně držiteli zbrojní licence skupiny ZL1, například k opravě nebo do úschovy:`,a:`ohlašovací povinnost držiteli zbrojního oprávnění vůči krajskému ředitelství policie nevzniká, neboť se nejedná o převod zbraně.`,b:`je povinen ohlásit toto předání krajskému ředitelství policie, a to do 10 pracovních dnů ode dne tohoto předání.`,c:`je povinen ohlásit krajskému ředitelství policie a vedlejšímu držiteli toto předání; tato povinnost nevzniká, je-li zbraň držiteli zbrojní licence skupiny ZL1 předána na dobu kratší než 30 dnů.`,correct:"a"},
{id:290,cat:`Zákon o zbraních`,q:`Povinnost ohlásit převod zbraně podléhající registraci nebo zbraně kategorie PO do 10 pracovních dnů se netýká zbraně:`,a:`kterou nabyla k tomu oprávněná osoba, která tuto zbraň do 10 pracovních dnů ode dne, kdy s ní začala nakládat, v souladu s rozhodnu�m Policejního prezidia dočasně přeshraničně přemís� mimo území České republiky.`,b:`kterou nabyla k tomu oprávněná osoba, která tuto zbraň do 10 kalendářních dnů ode dne, kdy s ní začala nakládat, přemís� po území České republiky.`,c:`kterou nabyla k tomu oprávněná osoba, která tuto zbraň do 10 pracovních dnů ode dne, kdy s ní začala nakládat, v souladu s jiným právním předpisem trvale přeshraničně přemístí mimo území České republiky.`,correct:"c"},
{id:291,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení.`,a:`Povinnost ohlásit převod zbraně se netýká pouze přenechání zbraně podléhající registraci nebo zbraně kategorie PO v souladu se zákonem o zbraních a střelivu.`,b:`Povinnost ohlásit převod zbraně se netýká pouze svěření zbraně podléhající registraci nebo zbraně kategorie PO v souladu se zákonem o zbraních a střelivu.`,c:`Povinnost ohlásit převod zbraně se netýká ani přenechání ani svěření zbraně podléhající registraci nebo zbraně kategorie PO v souladu se zákonem o zbraních a střelivu.`,correct:"c"},
{id:292,cat:`Zákon o zbraních`,q:`Držitel zbrojní licence skupiny ZL1 v případě nabytí nebo převodu zbraně:`,a:`je povinen ohlásit ve lhůtě 10 pracovních dnů naby� nebo převod zbraně krajskému ředitelství policie.`,b:`je povinen ohlásit naby� nebo převod vlastnictví zbraně Policejnímu prezidiu České republiky, a to ve lhůtě 5 pracovních dnů.`,c:`zapisuje tyto změny do evidence, kterou vede v centrálním registru zbraní.`,correct:"c"},
{id:293,cat:`Zákon o zbraních`,q:`Držitel zbrojní licence bez zbytečného odkladu zapíše do centrálního registru zbraní každou osobu:`,a:`které svěřil zbraň podléhající registraci.`,b:`která se v rámci jeho činnosti podílí na nakládání se zbraněmi podléhajícími registraci, zbraněmi kategorie PO nebo střelivem kategorie S1, S2 nebo S3; krajské ředitelství policie bez zbytečného odkladu uvědomí držitele zbrojní licence o skutečnosti, že osobě, kterou zapsal do centrálního registru zbraní, bylo zbrojní oprávnění pozastaveno nebo jí zaniklo.`,c:`která je vůči němu v základním pracovněprávním vztahu; krajské ředitelství policie bez zbytečného odkladu uvědomí držitele zbrojní licence o skutečnos�, že osobě, kterou zapsal do centrálního registru zbraní, bylo zbrojní oprávnění pozastaveno nebo jí zaniklo.`,correct:"b"},
{id:294,cat:`Zákon o zbraních`,q:`Mezi osoby, pro které je držitel zbrojní licence povinen zajišťovat pravidelné školení a které zapisuje do centrálního registru zbraní, nepatří osoby, které se v rámci činnosti držitele zbrojní licence podílí na nakládání se:`,a:`zbraněmi podléhajícími registraci a zbraněmi kategorie PO.`,b:`výhradně zbraněmi kategorie NO.`,c:`střelivem kategorie S1, S2 nebo S3.`,correct:"b"},
{id:295,cat:`Zákon o zbraních`,q:`Pokud se osoba přestane v rámci činnosti držitele zbrojní licence podílet na nakládání se zbraněmi podléhajícími registraci nebo zbraněmi kategorie PO nebo střelivem kategorie S1, S2 nebo S3:`,a:`držitel zbrojní licence o tom pouze učiní poznámku ve svém vnitřním předpise.`,b:`držiteli zbrojní licence zaniká povinnost zajišťovat pro ni pravidelné školení a provede její výmaz z centrálního registru zbraní.`,c:`držitel zbrojní licence požádá o její výmaz z obchodního rejstříku.`,correct:"b"},
{id:296,cat:`Zákon o zbraních`,q:`Pokud osobě, která se v rámci činnosti držitele zbrojní licence podílí na nakládání se zbraněmi podléhajícími registraci nebo zbraněmi kategorie PO nebo střelivem kategorie S1, S2 nebo S3, bylo zbrojní oprávnění pozastaveno nebo jí zaniklo:`,a:`krajské ředitelství policie o tom bez zbytečného odkladu uvědomí držitele zbrojní licence.`,b:`držitel zbrojní licence o tom bez zbytečného odkladu uvědomí krajské ředitelství policie.`,c:`tato osoba o tom bez zbytečného odkladu uvědomí živnostenský úřad.`,correct:"a"},
{id:297,cat:`Zákon o zbraních`,q:`Držitel zbrojní licence, který v rámci své činnosti nakládá s palnými zbraněmi kategorie NO, součástmi zbraně umožňujících samočinnou střelbu a polotovary hlavních částí zbraní podléhajících registraci:`,a:`je povinen je evidovat v evidenčním soupisu, který se vede mimo centrální registr zbraní.`,b:`je povinen je evidovat v centrálním registru zbraní.`,c:`není povinen je evidovat.`,correct:"a"},
{id:298,cat:`Zákon o zbraních`,q:`Držitel zbrojní licence vede evidenční soupis:`,a:`zbraní kategorie PO a součás� zbraně umožňujících samočinnou střelbu.`,b:`zbraní kategorie NO, součás� zbraně umožňujících střelbu a neregulovaných součás� zbraně, se kterými nakládá.`,c:`palných zbraní kategorie NO, součástí zbraně umožňujících samočinnou střelbu a polotovarů hlavních částí zbraní podléhajících registraci, se kterými nakládá.`,correct:"c"},
{id:299,cat:`Zákon o zbraních`,q:`Vyberte správné tvrzení.`,a:`Držitel zbrojní licence musí zajistit, aby evidenční soupis obsahoval mimo jiné aktuální údaje identifikující každou palnou zbraň kategorie NO.`,b:`Držitel zbrojní licence musí zajis�t, aby evidenční soupis obsahoval mimo jiné aktuální údaje o druhu a ověření regulovaných součás� zbraně.`,c:`Držitel zbrojní licence není povinen zajis�t, aby údaje z evidenčního soupisu byly dostupné pro potřeby provedení kontroly.`,correct:"a"},
{id:300,cat:`Zákon o zbraních`,q:`Údaje identifikující osobu, které zbraň nebo regulovanou součást zbraně držitel zbrojní licence předal nebo na niž je převedl [§ 75 odst. 3 písm. c) zákona o zbraních a střelivu], je držitel zbrojní licence povinen uchovávat:`,a:`na datovém nosiči.`,b:`odděleně od údajů iden�fikujících zbraně kategorie NO.`,c:`10 let ode dne jejich zápisu do evidenčního soupisu.`,correct:"c"},
{id:301,cat:`Zákon o zbraních`,q:`Držitel zbrojní licence skupiny ZL1 je povinen do centrálního registru zbraní zapisovat údaje:`,a:`o záznamech v evidenčních knihách, ve kterých vede údaje o zbraních a střelivu podléhajících registraci, se kterými nakládá, a o účetních dokladech týkajících se těchto zbraní.`,b:`pokud, do něj má zřízen přístup; přístup do centrálního registru zbraní musí mít zřízen držitel zbrojní licence skupiny ZL1, který má roční obrat vyšší než 1 milion Kč.`,c:`o zbraních podléhajících registraci, zbraních kategorie PO a střelivu, s nimiž nakládá.`,correct:"c"},
{id:302,cat:`Zákon o zbraních`,q:`Mezi údaje zapisované do centrálního registru zbraní podle § 76 odst. 2 nepatří:`,a:`údaje iden�fikující konkrétní zbraň podléhající registraci nebo zbraň kategorie PO.`,b:`údaje o ráži a počtu kusů nábojů a nábojek a o druhu a množství ak�vních komponentů střeliva.`,c:`údaje identifikující každou součást zbraně kategorie NO.`,correct:"c"},
